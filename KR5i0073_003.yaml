front:
  text: 玉詮金闕至真靜湛上仙白大真人
  hash: sha256:585aceeeef7848609e9137de67dd1d99aebedc8025ee325e2164371ad2f47bea
  markers:
  - {type: page-break, offset: 2, content: '', id: CK-KZ_KR5i0073_03p001a}
body:
  text: 玉書曰敬稽大真人於己酉冬特降玉壇卽傳太上傳心指心語錄嗣後臨壇最殷無不出言成經應口是法如大法宗洞玄經等隨機施教妙貫天人更時與開化天尊對談道奧卽如釋迦文佛讃歎多寶如來使聞教者莫不立地明心頓開大乘後之皈者欽之白上仙言全才難得全義難稱須要用得十分苦工纔做得一箇全人我看桐羅桐諟吳諟二子甚可立德甚可力學不可自棄大凡處境有三難一曰幼而失所依二曰長而從惡道三曰知而不發志汝二子幸會慶中適逢正教有志可發然皆未曾具一點苦心堅剛不阻故入道而道未聞讀書而書未悟日月之逝者不復來後生之老者不復壯且讀書一事尙未能盡心盡力奉恁道也我有八則二子聽之一曰盡心盡心者帝玄流炁厥生爾心此心如猶化機愈擴愈開取之靡盡讀書者當具勇猛心二曰報本報本者天賦爾靈靈眾之靈天開汝覺覺眾之覺靈覺一日不用便獲負本之罪讀書者當具畏罪心三曰體孝體孝者身係父母所生須竭力奉命貫徹古今明達經濟有才不恃有學宜充宗族愛其能鄕黨欽其識言行同乎古人舉止合乎禮義纔稱得一箇孝子讀書者當具報恩心四曰成人成人者此身雖𣺌智廣則大此身雖幻道廣則實上輔天心次忠國家下安兆庶讀書者當具致用心五曰揚教揚教者眞儒一脉幾斬復興曲盡五倫廣敷五德宣前聖未發之旨開後賢向往之誠周遍宇内攝度蒼生讀書者當具繼統心六曰輔正輔正者挽回舛運指點聖丹巍巍功行諸邪不入蕩蕩化度眾惡不萌返還黎民之正性斬除海内之妖氛正氣不失民無夭札讀書者當具慈悲心七曰通玄通玄者太極動靜本乎玄中玄中旣得天行和地瑞出保固山海安鎮四極身同天地廣教無邊讀書者當具解脫心八曰欽命欽命者帝命浩浩廣示將來須盡倫盡性盡理盡物方不負本來一炁之初天帝生育之始然後可以入自然道悟大通身命與帝符性與天一讀書者當發無上心以上八則自幼及壯自壯及老千劫萬輪一心記之永得證道永得救苦方是人倫中有德君子也毋怠白上仙曰我從虛空中來動虛空中鸞說虛空中法泥沙一盤上接天書妙理豈在沙上非沙不傳妙理妙理原在沙中二子不動心我亦不動心二心皆不動鸞在心中動妙理豈在鸞亦不在心一縱一橫天之文也一直一曲地之脉也一動一變人之根也飛鸞象之故能運動人身能具鸞象否鸞者通也具鸞象者亦無鸞象惟得鸞根所以厯劫不冺帝子開化山中得鸞基也今人屢屢變更着鸞身也善哉誰得我鸞而度四生者我植其根矣鸞之根其在虛空中乎全我本精名精鸞也完我元神名神鸞也我返性體名性鸞也保我天真名天鸞也四鸞者其在爲乎爲之者其在人乎夫人者道之子也靈之長也故法天體道謂之孝子䕶道宣靈謂之明師具此二任而不任者非人也當此二任而難任者非人也我看來今劫中無盡人矣安得盡天顯我鸞化三界之中誰人不當任此何自棄如此可勝歎息雖然虛空不可量也安知此地無人哉是待朱天君註曰宣化宣靈非一空不能念頭不起經綸大千何曾着一個有字修行人要知實裏真空空中妙有如往如來本是上仙法相言說空寂亦是妙理真常真空旣得大化萌緣來本非來動亦非動說亦未說只用性天一覺大法卽傳此身有物亦原無物着我不得道離我又不見道着理乎曰理亦不着人天一理理不一我故曰在猶不在是以真空回頭一顧靈體宛在此上仙與子等何常別耶道本我性中自有何必鸞爲人能常淸靜天地悉皆歸空則久久則昌花開果生葉茂根盛上士於此得方便門乎天鸞流演始自元皇元皇乃應基化之年卽得以開教人世至今人心昧昧宿業未消未能見通靈本性真空故不能斷疑生信白仙之鸞有四一曰精一曰神一曰性一曰天四鸞之大用不同皆要一空字立本無業障則精鸞成無無明則神鸞成無玄玄則性鸞成無誠一則天鸞成四鸞之人已定玉册大道中之一路人性中之一樂因緣雖有定數慈憫恒欲咸知故曰誰得我鸞而度四生此意在空以法天實以行度便是奉鸞真弟子鸞本大共道在眼前唯具勤行本慧方可學此四法天化已遠未有真心人顯其鸞化則是此人未能盡爲人的道理人有二責不任難任只是不曉因緣未知空妙故白仙又望又難之汝等學我否學我無難只守一個圓明之性此性不要在法中求亦不要在心中求心法俱空此性見矣朱天君註曰此叚大旨在虛花莫戀真性宜充天人本不二理眼前卽是真機故下曰思眼前一塊來是何物也妙在答思陳思眼前一塊來是何物也思無對代答曰來者我身思空中飛散了何故代答曰没有空思旣没有空何甚飛散代荅曰只因弟子不飛散思此個因緣在何處來代答曰有弟子在因緣盡來了子怕否代答曰弟子雖怕不怕思往何處去代答曰弟子來見我師思欲見我何不忘我代答曰弟子身重不能忘思忘雖不能效我何道代答曰弟子觀師學自己是效師道也思我你不相見何處觀我代答曰弟子身去身來時時可見思身去身來見我不從何故代答曰弟子心多不見夫子所見者夫子之形也思能影中辨我毛體膚髪否代答曰弟子常辨常疑故不竟從善哉可從我入無想天受教朱天君註曰空中卽是真相真相卽是凡身一塊者妙理未嘗打破安得如來不過一來是矣故着於色相名是物也没有一性故没有空真飛不散若可散者緣有空也欲了此空須是没有没有空𨚫何飛散此個問在逆想出來如此空空難道一件不是天地日月山河那個不是道不要看得飛散非道飛不散是道飛散也是道着於不散道必散矣故曰只因弟子不飛散千身萬身輪轉修行皆是因緣若不空此身因緣便要做還要知此事有身卽有不可解脫故曰有弟子在因緣盡來了此因難盡此緣難修怕者是畏墮地獄故下句說雖怕如畏墮落欲避眼前因緣卽着妄想入魔道矣故又曰不怕旣不怕有相之緣當宗無相之道白仙之身卽是道身如欲善緣必欲見道也白仙身如道體何處着得必要捨盡有法除盡有相入是箇中不知有道者方見白仙如來之法體故曰忘重非身也心重身亦重也只因未解脫苦惱身負塵沙眼界不明自取身重忘乃上乘修行其次莫如有爲故又曰效我何道爲者無空無實融於一處加力猛進又不是勉强乃卽我身内之事不過以白仙作一樣子身去身來時時可見者要子不着於色相身去身來是無定處無住心無執有無頑空方可見白仙於定寂之中不礙已身耳有言教澄羅澄今日風狂澄否澄無對代答曰本身自澄不畏風也風狂矣澄原不動否代答曰弟子未知風之狂也水高於山尙未知否代答曰澄本不在無風始定故有風未嘗不定洪濤千尺澄能安乎代答曰弟子自作何敢不安何以知其自作代答曰山石岸土今日不動是以知其自作澄風自天來何不求天代答曰弟子知命且過今日天必安我澄心一點藏在何處代答曰弟子藏在一中守此一能弗動否代答曰弟子動猶不動動而不濁澄汝本根好尙不知流代答曰弟子在圈中故流不出流不出何不從雲而上代答曰弟子心中尙有塵沙故不能上也善哉子原未澄耳所以未嘗滿量朱天君註曰從道在一心一則空欲求一心先斷疑障欲斷疑障先去雜想是知大道在空真心在一至人在靜至理在中守此四極雖有波險澄亦不動塵沙少者宜流塵沙多者宜上上者一刀斬斷見性解脫乃是處常不動靈湛如如之道也故道至澄則爲滿量若不能澄道非究竟矣白上仙言靈非我靈求不得上前下去皆虛妄此時見道見元身不用苦修脫塵網若風若影覔還空陰霧潛消月自朗我身卽是過來物現體無聲或虛恍今日我欲教子開心見真汝宜諦聽帝乙育我胎身卽妙如來元體無有影天心降予懷春桃與夏蓮時至自能栽兎角與龜毛妄意結塵胎未孕至能言倐忽動作衰嗟此幻泡影結緣乃自埋若欲見天花顱門接三台若欲睹元炁意真掃塵埃若欲見本形心有明鏡臺悟兹三法身天花對真開吉祥本無路一應見真數非我亦非人抱虛孝真母此身有異名七寶未爲富亦曰自在身隨心能遠步亦曰真道身三途解愁苦亦曰智慧身百竅生雲霧帝玄本無形亡形尙能補欲解四大業先明智覺路此物是穢濁勿以心牢錮本見合自然仰頭取甘露玄理本非玄參玄枉招禍安受天地恩衣食皆要務白上仙言予欲無言奈子等之愚也予欲示意奈子等之昏也予欲顯形奈子等之迷也姑借死法以暢活機識見非我自有知覺盡要機開業報未能消得因緣皆要還來䕶性命無㨗法只管信命毋起分别趕前去魔山高縮後去苦海深中途號泣無人引只問你是何因實從四大礙虛明入我室忘我門與你嘯歌上蓮城且聽命就此安心白上仙曰黃庭絳宫總在一處鍊時要靜開動闢氣爲神母精乃神膏膏充則神睟凡鍊氣凝神煉鸞行度先須寶精子等神疲氣散摠是不曾聚精聚精者非淫慾耗也凡境界中一有係戀精卽不能聚於丹府俗人奉道不過曰我能齋戒我能䖍誠我能寡慾我能破貲種種俱不是學道的樞要我今日要勸子學道靜天靜則高地靜則堅木靜則夀水靜則流靜中生動草拂春風真動不動鳶飛羽飄真靜常靜山嶽相朝一太極之初一未生一二炁互交一還其一天一之淸崑崙之門地一之寍芝蘭之精採藥萬種一搗遂凝愁城萬叠一掃絶痕千門萬法一真則靈劈破洪濛一冲仙旻白上仙言我在淸微宫中聞元始大法響如洪鐘傳道一切真靈而第一義則曰觀幻得性妙如第二義則曰割愛忍辱妙如第三義則曰靈通睿謀妙如第四義則曰慈慧金剛妙如第五義則曰空緣寂相妙如第六義則曰應化知時妙如第七義則曰五藴孕精妙如第八義則曰種福修利妙如第九義則曰聖覺聰明妙如第十義則曰入月乘光妙如第十一義則曰名聲化度妙如第十二義則曰非非鑒神妙如第十三義則曰童相妙如十有三義至道充足我特臨此諭汝等汝等後日開壇立教當宗此十有三之法演說十有三之義妙機降世萬真從此而出不可忽也寶明真人曰玉光啟化妙如十三義度人宗印已盡於此今爲子等演之義中精奧平日時參可以審緣隨悟也第一義曰觀幻得性妙如玉京證位上極無上玄玄妙一化化靡窮觀彼眾生視同保赤緣緣起會非道不開故首義曰觀幻受形賦質莫非幻影富貴窮通莫非幻泡榮華憔悴莫非幻夢真師慈悲願切先提一幻字爲度人張本然形幻也心不幻質幻也願不幻只緣幻身中原有一真在故也一真者何真性是也真師啟化淵源只要弟子在三幻中尋出真性故未閱厯者不知卽巳閱厯未見道者亦不知也所以真修真行之士不但今世閱厯不肯壞性縱百劫中或富或貧或夀或殀性光一點晃若明燈不壞不滅真師妙義所以先說此而次第皆有層次也第二義曰割愛忍辱妙如幻身旣離不得在幻中生出活計不過要認我真主人主人旣在三尸六賊自然潛跡逃形世緣自然看得空淡愛根何自而生只因下凡俗子不知理會不肯崇奉真身偏要在軀殻上盡心照顧所以般般不捨件件難抛因愛成貪因貪逐妄貪妄二字從愛根發出根苗子本當孝愛暱則親疎臣本當忠愛偏則君薄一點成忠成孝念頭俱爲抺倒惟有妻孥是好名利是躭恣口戕生害人利巳靡所不爲真師憂之在幻身上想出愛字是墮真身坑塹指示人汲汲尋個慧刀來斬一斬勿使遲疑畏縮留了根蒂又接忍辱二字忍者不惜自已辱者勿懼他人所以真師開教下人忍辱爲先有種俗子見道則悅見妻孥亦悅斯人心未嘗不正也而貪妄念頭不凈漸漸悅道念淺悅妻孥念深若不急急回頭假身存而真身去矣豈不孤負真師第三曰靈通睿謀妙如愛根一斷真身具存真師開教不過要人人通見性玄所以知得幻身斬得愛根靈明可復睿智旋生所言所行可以輔天宣化可以演法濟人一通所至六通自全靈光覺性自然而至奈下凡弟子通而不靈謀而不睿一遇事機紛紛㳫㳫漫無主張或引規而失指或援訓而遺原或偏見滯着致醮爲虛設或游移任人而上化不顯兹皆通而不靈謀而不睿之故也欲修上乘者當以此義先銘心骨第四義曰慈慧金剛妙如真性旣開大覺自顯真尊降世度人非爲小乘靈異而設故靈通睿謀之後卽曰慈慧下凡俗子遇人卽分人我人我見分真身絶迹故天真修道大慈無我大慧無明方成得至真地位人亦能之雖厯千魔萬試本性圓明全無一毫蔽我正覺大智於此漸生矣所以真師立教要弟子從慈慧兩字顯出貞固不壞之體若慈而未慧便是緣情立愛能爲煦煦之仁不能發廣大之願若慧而未慈還是因智成識雖明諸法精微未悟性中真實故必要慈慧雙修斯能智行雙成真身自然堅固第五義曰空緣寂相妙如金剛旣成圓明性體毫無掩蔽矣何故真師又指出空寂二字教爾等修習只因凡夫所以不見道者緣緣互縛相相交纔入道緣俗緣又障卽道緣中一粘帶仍是俗緣種子也人惟具得空緣之心俗緣旣不着道緣又不染總是水中月影方能全得我本來大月本壇真師開化示慈慧金剛後卽說空緣寂相眞是學人最要𦂳處相若旣寂任是千變萬態因緣毫無繫滯况平平之順逆耶第六義曰應化知時妙如金剛上慧空寂妙覺從何徵騐從應化上徵知時上騐卽如自巳有了十分道行還是車成而輪未就故真師又說應化者彼人自化而我應之譬如陽春草木萌芽巳處處欲動只待時雨一滋抽枝布葉全不費力本壇所以應化下土不是昔所本無今方突出有個時節因緣乃因人心中個個具存一種善根運符數合盡欲萌芽所以天真上聖不辭煩瑣不厭塵囂時時降光啟廸凡爲玉光弟子必須合得真師知時聖慧方能廣宣道化然時之一字可知而不可爲可因而不可强必要自巳先通了聖化先去了我相本性圓明時時上接性光所照慧眼自明先看同壇道侣道心消長念起念滅一見便了次看壇外來人塵少塵多心影偏正一望亦知而後應去自然聖化易明燈燈相引方是應化也若逢時錯失者奚足道哉第七義曰五藴孕精妙如假身旣不可着如何真師又說個五藴只因世人之迷認假身太着反使假身都不自在卽如有人曰我非不欲長齋奈長齋則精枯矣我非不欲究法奈究法則耗精炁矣我非不欲積行累功奈費心力則精竭矣所以者何只因真精不蓄病體長存雖大願時發而力不副可奈何故真師大慈又指孕精二字教弟子修習目以光爲精耳以聽爲精鼻以嗅爲精舌以唾爲精四肢以力爲精皮毛以衞爲精腰以轉運爲精胸膈以吞吐爲精一精不孕便如樹木一枝炁洩洩之甚者枯槁隨之矣人身若此便具大勇猛心難求精進力况人多所嗜慾多所疑退也是他四大不和所致如人火多夢中淫起如人水涸食時思肥此皆以病幻障其身也不知精全之土入水不溺入火不𤍠何况區區六欲尙思戀不捨耶第八義曰種福修利妙如真師福全智廣故登玉京聖境下至諸天及九品仙人皆有福力方得證位故真師旣說五藴孕精又說種福修利教爾等從此發心從此證道也慈是福之本願是利之基如世人多病多貧多橫多殀莫怨命薄皆是前生慈心未透或恣口而戕生或損人以利巳或見殺而不憐或見愚而不憫故爾今身福緣淺薄又如有人無謀無智有爲輙誤有事輙阻被人毁謗被人凌壓種種不利也不是天來磨汝只因前生願地上還不務實或揚善而文過或修道而不真所以今生利緣難就如下個種字一分便有一分福果十分便有十分福果莫謂種福二字近似俗語也要知大慧非福不成玄功非福不就勉之第九義曰聖覺聰明妙如真師前諭曰觀幻得性又曰慈慧金剛可見慧本皆是性中流出聖凡初無二性只爲不種福田不修利因昏昏夢夢抛棄了多少聖性所以真師至此提個覺字喚醒下凡不但言覺而曰聖覺要盡人證個真尊地位真師之願方愜無奈世人纔有幾分小慧便播弄文墨矜已之長訾人之短小慧一乘大覺頓盡真師宏願務要弟子先覺覺人如霧開見日心目豁然使後人爲高曾之矩然後聰明迅發金書玉笈觸目洞然不偏不着所行所作一如真師如是方可超凡入聖第十義曰入月乘光妙如聖覺洞開性光烺炳真師又於此提出性光根蒂曰入月乘光入月工夫全從五藴孕精中發出五藴之中心爲日腎爲月日以資陰月以輔陽真陰堅固真陽自明所以修真者先養牝而次養心腎陰旣足心陽不枯陽動陰靜真玄之士必先修靜靜功旣熟牝中一縷真炁綿綿延延上如車葢下如仙掌葢之下垂名曰白雪掌之上生名曰黃芽修靜三三黃芽下長靜修九九白雪上生總是着不得纎毫貪妄故前是工夫此是效騐孕精者要人䕶持得好乘光者要人發現得純精本柔也煉之則堅精本散也聚之則圓旣堅旣圓體同大月矣第十一義曰名聲化度妙如幻可成真空能見相總是成仙成佛一種玄機然進一步卽有一步妙景真師開化不要說大弟子方可授法就是凡夫俗子一言之善一行之真天耳遙聞無不採錄况弟子旣入吾壇能不時時覺察所以分別三光上爲者玉光次者曰法光次者曰道光三種弟子分其名則聲是從爲何名曰修大覺知大通爲無而悟無相而真是曰大名爲何曰聲去識則聲淸僞去則聲直去怠則聲宏去欲則聲壯是曰至聲名聲兩全何難委蛻南山乎第十二義曰非非鑒神妙如名聲化度者從聞生覺從見生悟盡聞盡見之外更有一種宻印秘宗非上根不能知也何謂宻印則曰鑒神何謂秘宗則曰非非到此地位非凡非聖非悟非迷緣非有緣空非有空相非有相寂非有寂元始靈光卽我靈光元始大月卽我大月故曰鑒神此叚工夫不如前面十一義之尙有層次須要頓超凡心頓脫塵髓方顯得鑒神之妙可惜真師頒示如此直截法門而下凡之人不能服習我今在此指點是指個影子點個圖樣便要把非非兩字作一路單刀直入不可執了義句抛了自己元神也第十三義曰童相妙如童相妙如者萬德周身萬道洞達大悟無悟大成無成全體是玉光上聖之體全真歛性無私無欲若嬰兒然故曰童相無限法門於此攝盡矣葢世人之所以不入聖者只因離了童心逐了塵心任了幻心生發諸妄試思汝等初出娘胎時曾有種種好惡分别否曾有種種貪戀順逆否奈何假身日長假性日萌以致逐假飛揚竟忘郤本來面目我願汝等雖不能如玉光之萬德周身汲汲把本來童心保䕶愛處須割辱處須忍動時須以靜操慧生須以樸守着處宜離實處宜空似此修習方與童義少能相應天真自此全復纒縳自此漸脫能如是者何患不爲上仙妙如者玉光之心印妙者能離一切粗着之謂如者能契一切真理之謂子能宗此十三法義修之始能成一個妙如也白上仙言真心須自植不植何能生將法作饒土勤耕自然穫我本一老農善知天地機不求亦無得助長徒爲爾而今修善道取譬亦如是不難善種生惡種難驟去莫管他人非常求自己過一日德不新所修便非是將身立危崖失足命非有將身浮大海輕動葬魚腹將身臨戰場眼花被鎗槊將身入鬼營略怖便加縛譬如瞽目人終身不見日汝旣幸有目何爲亂五色譬如耳聾人畢生不聞樂汝旣幸有耳何因耳移心譬如暗啞人欲言不可得汝旣幸有舌莫造諸口過觀彼未完人一一當取譬冥心想諸法諸法無窮趣一志入大乘大乘進亦易是偈乃養心之妙訣不但可以求法并可以求慧其大意在黜耳目之欲觀法性之妙方與天機地軸默默感通成真悟道不外是也白上仙言浮光朗照碧玉流香珠圓玉潤體固神颺藉此正氣養育平康情火一熾慾火遂狂性光遂减乃八鑊湯智士悟道玉光是藏傳傳不絶世世法王桐子汝前生修煉有年故得此心鸞相接相接處卽成道處也吾子化生以來未嘗把自己精光一毫減損只因未得下人之教嗔火未除由嗔火中受生故此今生愚昧罔悟本元然子若能急早修行皈心玉聖則如吾所言可以世世授法永爲仙子身入道若此生更有俗念則汝法緣漸斷矣玉文曰性滅墮爲畜生法滅成爲羅刹昔有真人因法滅故入於羅刹吞火啖氷惡心愈熾直至身化爲塵性化爲埃受苦無量得元始煉質聚形之法乃復其本昔有真人因法滅故受苦九年遂沈地獄因惡業重大永不得出桐子汝思本身豈是堅固豈是久遠奈何動作悉爲所牽忘郤化生中元始戀郤化生中夢幻吾來言此惟子自爲不可再負真師也白上仙謂金淵鼎曰金子心在何處性在何處對言心在空性在一曰非也心性非二物心還其心卽性也心有己心有天心擴其天心消其己心如此而己矣淵鼎言坐玄是存養工夫須加省察否曰操存省察亦非二事觀心爲上靜則靜觀不可有動動則動觀不可有住靜觀其有動觀其無陳濟思言未發是靜已發是動否曰是靜中之有不動之有也有者其元神乎動中之無不住之無也無者其妙門乎道無名象應變在心心心不息是曰玄根玄根者以樸而守以誠而用夫所謂以樸而守者要此心無事文飾無事雕琢空空洞洞去其所無存其所有所謂以誠而用者要此心無事勉强無事執着用其所存舍其所行子等數年學道心體未明胡然而天胡然而帝皆是勉强虛假雕琢文飾至於天心樸實神明妙用究何嘗知乎子等須將從前作過打掃乾净善惡兩忘方是本壇宗旨積善而求善名善中之惡甚於惡也何則惡根盤結故也一念之錯千里之謬不可不慎白上仙言淸凈真宗至平至易欲入淸凈門先除躁妄習全吾本真在乎不妄持吾元神在乎不躁不躁不妄自然心地寛舒性池流潤那有客火犯我真嬰所以諸經要義諸法精微皆以淸凈二字爲學人下手工夫子等學道有年尙於此處勘騐未真所以積習未改見得一分真改得一分習除得一分習成得一分道天真上聖俱爲了眾生積習兩字費盡無量苦心說經授法方便垂示無非去人之習染以還其本真耳今子等身逢大緣善承天教莫若先從靜中勘淸中騐以靜勘淸其未淸者可知也以淸騐靜其未靜者可知也此卽禪宗定慧之法儒宗精一之傳弟子果能行之何憂道運之不昌天化之不永乎洗滌凡情在乎能淸研窮道機存乎能靜惟淸斯剛惟靜斯慧世人之昏昏見利則趨見名則好見車馬則歆見少艾則慕種種凡情一刀難割總是無慧慧光生者不如是也若其欲割未割展轉縈懷纒戀無休動靜不能自主平日討論粗見一斑臨事舉行又失全體如是種種總由未剛剛德具者不如是也今弟子等欲全慧光欲養剛德莫若靜中勘之淸中騐之勘者如進兵追賊非鼓其炁無以奏其功騐者如執詞平獄非虛其衷無以折其誣一勘一騐全力具存如是用功方名真實下手若朝翻貝葉夕講玄文雖有所得亦名空解與本際全不相干積習凡情依舊未去縱能見得極透說得極明亦止可在大壇作一應對執事未能實傳我宗印也白上仙言人處塵沙步步皆障欲脫離苦障須净三業消六塵方能圓得真身具得六通方可行法養玄何謂三業第一身業乾坤具偹五炁流行業何自來只因心不在中任憑五魔顛倒所以正氣乖違邪炁逆入貪口貪淫貪財貪懈勉於敬而怠忽乘之勉於玄而疑忽及之勉於公而私忽間之所以身業不净不能對天亡後墮地獄道第二口業口承天津上沐甘香下吸牝珠本無有業不奈下損真精百骸就槁中損真精五官日頺上損真精崑峰將䧟加以膠執己見以非爲是褻凟聖真恣爲誹議不直不諒多慮多迷炫己之能道人之短勉於禮誦而心不在經文勉於利濟而志不在大公勉於奉教而意不在超證所以口業不净𡨚債不消亡後墮畜生道第三意業意業從心惟誠方是在五行則爲分支在絳臺則爲裔出若能誠意便可立心如日無幽不照無迷不開不奈眾生去誠用私天光泯滅只圖利己罔顧他人只貪自便罔識利人嗔火助私意而不見君親淫水溺私意而不知分别貪炁攘私意而不量取予勉於昭對而忿尙未平勉於問玄而心懷百慮勉於酧酢而炁忽攖爭所以意業不净五毒内攻亡後墮餓鬼道是三惡業種三惡道豈可不知省改尙有五障一曰欲障欲者戀也戀於財則亡義戀於愛則忘真戀於俗則忘靜戀於生則忘玄道人有方以淡情覺之二曰疑障疑者昧於理也大道至公大路至坦有何疑也只因分別心太明疑從明起滯執心太堅疑從滯起恃已心太厚疑從恃起道人有方以豁達心覺之三曰理障理者酌天地之中而要於至當之謂也非雜出於紛更而析剖之也玄詮真訓橫說䜿說總要明得混沌源頭無奈學人指一爲是指二爲非徒撓真心毫無得手道人有方以養性覺之四曰苦障凡夫在世無時不苦無日不苦苦之源必要盡如已意方樂殊不知賦𢌿有常豈能悉遂凡夫所以墮障者一在貪一在迷貪則淸操不持苦於身而不悟迷則假身重視苦於業而𡧾沈貪迷入骨至死不捐道人有方以割愛覺之五曰浪障天地生我本以擔當造化得入大便壇是千生仙種奈何至道不探真玄不究悠悠𡻕月無補聖功膺天爵而不知崇授秘法而不知煉如春蠶徒老繭中纒綿自縛如秋萍分散波間聚會何時奄奄真性空自飄零豈非自家暴棄道人有方以通寂覺之白上仙言元慧昭然真性洞朗惟能净識斯與道契八識之中惟一阿頼耶識乃人生最初所具不染一塵故幾於道若前七識眼與色合起紛華塵耳與聲合起順逆塵鼻與香合起氛穢塵古與味合起貪恣塵身與境合起人我塵意與物合起分别塵六識爲使令而主之者末耶識也故人學靜坐者從前六識旣已不用尙有非神非人如幻如夢之想撓亂正定則末耶之所爲也末耶華言傳送也阿頼耶華言海藏也卽慧海藏識此識一通可以照見五藴洞觀天上地下神鬼未來皆能知之故入道者不修此净識則元慧不現不得此元慧則真道不明然此元慧非易見也必做一番掀山倒海工夫方能取效如其不能縱使修持至死終在皮殻耳陳源寛問如何是掀山倒海工夫曰山至重也掀之則重者失矣海至大也倒之則大者竭矣人之無明性虛僞性好動性彼此性怠逸性此五種惡性皆從千生以前結就與真性紐合一塊如油入麵最難脫離比之山之重海之大也故真心求道者必具大勇猛心勇猛求之而不得又必發大哀心大哀求之而不得又必具愛䕶心愛䕶求之而不得又必具大虛心如是四心參伍運用總成一個真心是故真心者前兼悟後兼行上接果下接因故我向言真心是直直者無委曲也無留滯也無分歧也諸子若能具此真心何患道不成就夫所謂前兼悟後兼行者非虛言也人言知則未真人言悟則已真如惡惡臭則真惡而欲去之也去之甚力則是兼行也所謂上接果下接因者如人云一念彌陀逕生西方此真在因也又如經云菩薩依般若波羅宻多得阿耨多羅三藐三菩提心此真在果也是故諸子當知真心不發終與道倍無一是處若悟而不以真心承之則爲妄悟反不如愚也行而不以真心開之則爲僞行反不如俗也因而非真則無果果而非真則絶因絶因者魔之道也無果者鬼之道也欲得知行相生因果相成者非一真不能也欲真不能者識亂之也故禪爲教外别傳亦只傳一個去識之法識去心明人人是佛胡不勉而爲之施錦言弟子捨俗住壇並無妄想知識究不能進道何也曰若子所言已進道矣而子猶以爲未進者子謂進道何如耶對言三品未能完聚光明未能上徹以是爲不進道也曰未得效耳非不進道也子依我所說真心做工夫去雖不求效而效自來若汝認無效爲不進則元慧上反添一翳至於三品完聚光明相接又屬色身起識何關進道子暮年之人光陰甚少若不從直道修則恐徒費氣力到底不能成熟不如從直道修包括得百千功行也夫去識者所謂墮懸崖而不懼蹈烈火而不疑虎狼盜賊一以誠信待之者也尙有細小事物如饑嗔飽喜疲愁煩惱靜淸動濁遊思夢想一切不生方是元慧開光地位故曰真道在真心真心惟去識識去元光明人人是仙佛白上仙言萬天寶月光萬土咸受𢌿萬氣妙爲仙萬物人咸備我本萬仙王今爲萬國主萬道從此生萬法從此始度人及萬類萬劫垂慈濟三壇宣化至大因緣此壇直通上壇最爲高廣世人難可得遇仙子等在壇宣化當先明三洞之法所謂洞真洞玄洞神也三者之中真爲玄本玄為神基脩此道者當先返真以立玄之本修玄以培神之基工夫初進則先見神再進則全神歸玄再進則通玄合真故洞真爲三洞之首仙子等欲知真之所在先湏去妄去妄者去心非去境也去心之妄則妄境因心而真去境之妄則妄心離境仍在譬如病目所見空花但能去病花自歇息我發願以靈乘宗教道化南洲本自會通三教之源宣演一珠之秘故設和緣合道法門以度凡俗之士又設淸净真一法門以度修真之士要之三洞工夫無分仙俗原本一心所現若必分修仙處俗爲二法則維摩室中便不能容八萬四千獅子座矣欲求此道者當參八使本願經洞玄月九諸品經自然覺悟日開疑迷日去矣白上仙言上真我也上真汝也我與汝皆上真也我不上真是以上真子惟上真是以不上真爲於無爲者爲之上也思於無思者思之大也持於無持者持之要也事於無事者事之妙也在文者道之文在言者道之言合而觀之文勝則質虧言華則實損是以上真厭文士而惡多言求亡羊者曰咩求亡豕者曰口賀未嘗言多而詞藻也而無求不得奈何以已身之物而好以文言亂之哉我去也由我去我來也由我來去來自在爲有我也子欲去不敢去子欲來不便來爲有子也我見汝不見汝故有我也汝不見我而見我故有子也若亦見如不見去來何妨天下之難聞道者莫如婦人女子然婦人女子苟能聞之其得道也最㨗何也性之專也天下之最易聞道者莫如文人學士然文人學士雖得聞之其成道也甚迂何也心之紛也故愛文之心等於利欲若更近名則過深於利欲小炷燈偏永頻搖香力微願君明此道卽是保生機合什欽先佛擎拳禮老君一時與十劫遲速自家分一時成道非因智十劫蹉跎豈爲愚道自無心人有意算來萬慮不如無我今日在壇要子等斬盡葛藤另開面目把向來口中說者紙上塗者人前道者意中得者盡情掃去先從三寸地中培種九英黍米俟其萌芽待其茁壯䕶其碩果勿忘勿助以底有成其間尸魔萬狀當𥪡起天眼破其迷障捍其侵伐則漸聞大道矣或問尸魔之義曰尸者因身而起魔者世風結成如事境苦樂之處可以損吾道心統曰魔也細論之如子等愛文喜譽畏勞怕辱着相慕靈俱名尸情有此等情不能飛仙必爲尸鬼故曰尸或問凝神養炁二者何先曰凝神養炁工夫善爲者則兩得其助不善爲者徒兩致其病其中進退損益惟深心爲能悟之是故修玄之子先去躁心葢躁則淺而靜則深從靜而深神光内守此時縱有神光勿以神光用事但當呼吸始靑玄氣調養大丹玄精二物相抱身中子午日月弦望順機循度不遲不數涵育黍米而月殿清幽寶月流光凝神之功始爲八手若躁心未除氣粗精滲炁粗則火熾精滲則藥傾火熾藥傾丹鼎迸裂形體旣已先疲神光豈能增長縱能攝心不動强視微明終成客火所以調炁之功當先於凝神也氣旣調則凝神在其中矣先凝神而遂致逆氣者比比有之故曰須爲善也白上仙言諸子𡻕將闌矣塵機擾擾胸中各存得砥柱否影裏尋來影裏歸此心現在是耶非直湏參透月中月萬象光明雲霧稀是法從來閃電機纔生擬議萬重非頂門關捩休牢鎻撥轉光明透玉池俗海茫茫不掉頭此身何日是虛舟物來應物原非惡只恐真身不可留所以古來學道者必先做割愛工夫把平時所歆羡者不去歆羡所攀援者不去攀援以至一飮一食一步一趨俱不與庸俗相酬對行之久久道氣貫通此心便同太虛廓然無依湛寂之中惟見大寶月輪光照性海此名大定漸發元慧元慧一發漸入元通眼前俗境轉爲聖境日後凡緣無非道緣到此地位方知學道之樂不知學道之苦今子等所樂在彼所苦在此其間卽有有志之士粗能捨華就淡捨競就寂然猶近於勉强未進於自然所以獲效遲也梅花報蕋獨争先雪壓霜欺生意偏細草委靡無勁質秋風一捲色都捐白上仙言廓落光明徧十方寶珠璀璨布慈航傳心不在多言說掃盡塵根性體香奉行天化之人必須心如太虛神如朗月不靜而靜不一而一靜一之功不粘不着不離不脫侍教之下當無所不悅無所不信無所不悟無所不得方可稱爲善承天教其待壇侣也親愛之心如同一人亦當無所不愛無所不敬無所不滿無所不廸方可爲其領袖施子錦果有志傳玉開宗當先克除意念所偏存此心如朗月之懸於太虛方可合我心而契我印光明洞照聖教宣揚曷昌壇化湛寂真常玉規大範厥旨聿彰彙爲玉書寶字琳琅脩真學道有典有章放彌六合卷之退藏一中妙道示現無方勿寛勿峻毋隱毋彰殫惟厥衷以廸元良大乘廣乘聖化遐昌功成道備位證帝傍鳴呼小子識之莫忘奉化宣慈當滅勝心勝心之伏希微難見假如有人謗我曰大壇鸞教亦不甚高大壇法寶亦不甚妙子當曰如是不高故高也如是不妙故妙也不可與之争較曰鸞教本高奈何子云不高法寶己妙奈何子云不妙一動諍心便名好勝假如有人問汝曰做何工夫子必曰欲學而未能也又曰子多過失子必曰欲寡而未能也不可曰我做蒲團上工夫平常日用已無大過矣假如有人問汝曰上真所訓之道大旨如何子必曰未知彼人曰汝日聞教何云不知子當曰人日履地不知地之厚也魚日在海不知海之濶也吾日聞教欲取一語以騐吾心而不可得故曰不知也若子頗存勝心必不能出詞若此必將漫應之曰子言萬語不過勸人爲善耳否則應之曰教旨廣大精微豈爾所能知者如是一言可以興戎又如有問子曰子壇中有道行者幾人子必當應之曰皆有道行不可指稱某某爲上某某爲次也設使其人素識一二道侶而意輕之必曰如某某者道行恐次之乎子必謝過曰我年老乏知人之明或有之而我實未知也總之中心不存矜勝之心出詞自有雍容之度不可因我今日之言而又騐心於口角則於廓落光明之體更添一障古德云只愁不作佛莫愁佛不會說話旨哉斯言白上仙曰湛湛光明接始靑真胎結就慧光生如如靜定方得道大米呈輝寶月盈太虛無物謂之明一毫無染謂之淸淸其心方可以承聖化明其道方可以嗣宗燈今子等皈道有年身與真從念隨俗染奚能到得淸明地位殊不知絳臺之中自有一縷玄光藏而莫顯隱而弗彰必須善脩之士方會其微善養之士方識其妙妙玄妙化由此而入始而掃凡繼而淨塵此等工夫雖曰深微精奧然亦非有高遠難行之事只要含光守雌返觀内照含久而手足現神舞蹈所徵由也照久而珠臺朗湛三品兹於會也息息深深光在中靈明一點照長空嬰童姹女咸起舞胎就丹凝道自通息息深深光在中觀心得月聖真通瓊花瑞草千年秀靜極方知妙境崇靜中妙境不勝言呼吸時時養寸田胎息工夫渾簡易茶煙一榻慧光添添年妙訣此中宣二六時中常寡言靜嘿能參仙境近何勞俗事染珠田渾渾淪淪始氣全一呼一吸妙玄天能知三品符元處久視長生百病痊泥丸光洞照三台胎轉爐温五體諧舞蹈工夫非易得身中靈慧及時栽凝定生光光體淸淸明保固是完人人知解得黃庭義方是能修三寶身人世茫茫不可言撇開俗網見真玄須將一寸珠田耨湛湛空空長慧蓮道以靜而成丹以一而就靜一工夫是添年之藥胎息二字是得月之漸悟得靜一源頭胎不期轉而轉矣息不期綿而綿矣解得胎息妙藴靜不期真而真矣一不期恒而恒矣此等功效最速最㨗無論智愚皆得成就無論老少皆宜習學無論寒暑咸當留意無論晝夜俱可呈光無論坐卧俱可結胎一片明霞接始靑始靑妙氣浴朱嬰嬰兒舞蹈崐崘頂頂現玄光胎息存存存胎息可通神神慧齊輝大米凝凝定功夫原簡易松窻靜坐檢黃庭黃庭讀罷月偏明明月從中長聖晶晶固慧凝丹鼎結結胎胎就號真人人生濁境境風吹得解觀心郤是誰好把内田勤灌漑他年聚首共綢繆白上仙謂陳鵬曰陳子頗有上修之願而未空凡念之侵所以不克見光得月先天祖氣何處舒華本來覺照何時發現必須洞明三空之旨方可還我太極一曰空念靜坐時無論凡塵之想當絕卽步步求真心心合道卽此求真合道之中便發無窮障碍故必空空蕩蕩心同太虛一呼一吸盡歸玄竅照見始氣往來淳淳穆穆真一無爲晶英吐秀臟腑流香是香所發太和絪緼行之久久三品漸粹充塞兩間遊行無外念空之效當如是也次之以空境境遇如秋容易一番搖落心臺是寶奚堪五欲交攻人生濁世或富或貧總無關於性分惟有煉成玉質方能天地同體笑可凡士俱爲境而累心擾擾生平未認桃源真徑悠𡻕悠月奚尋不夜金丹要之境不困人人自困於境也若善養心者身居天地之中神超六合之表境之順逆於我如浮雲雲去天空月留光顯乃能鍊出金剛不壞之身故必境空而後心安心安乃能得道道光一現達命樂天所謂淡泊明志寍靜致遠者此也知境空矣貴在悟入人我空人我之見最能碍道故真規大旨重在平等我者卽私念之萌也此見未融彼此界分靑白異眼安能冺形忘已善與人同所以古之有道者運心於太無離象於塵外是非悉化物我齊衡見得一切衆生盡出元始胚胎一氣無容分别忘其人并不知有我化其我又安見有人人我俱平平等相視我人渾一一道同風太和氣象萬兆彌綸卽本願經所云性功重修能到玉淸也如是三空養丹之本也修真之路也契燈之程也宣化之章也白上仙言觀息得金之後復有三級工夫一曰綿息忘金息無其息金水洋溢不見息安見金忘其金息益純渾渾淪淪一氣中山河日月正西東萬物靜觀真我在茶煙半榻送仙風故曰綿息忘金也一曰運息調金金息不調始炁不運氣從崑崙轉金童衞朱戸月出五雲中光照無邊土運真氣於無運金息方調調神精於沛朗三花吐秀欲得調運之功必臻照了之境心地廓淸萬川朝海水源澄澈片滓胥除是名修慤悟通覺士一曰充息藏金息不充時氣曷周迴旋上下寶珠浮浮沈消息從兹現玄臺黍米喜添抽金水易盈弗藏則泛金水易竭善藏始充充息藏金道在於是是三級者以靜而得以一而入以自强而堅固以不息而純真所以本願經曰靜而不擾動而至純綿綿密密固蒂深根明乎此者可以語玄玄可以臻道道矣玄無所謂玄道無所謂道玄道兩無道玄貫徹到此地位卽經所云空忘見白光也白上仙曰上無上名太上上有上非真上上上傳玄上妙上上上顯慈航上乘開玄上上上度凡䝉元始胚胎上上忘上離乎上超上上上一上一上一上又一上上一上爲極上上妙上根慧苗發上上無上始玄上悟得上諦會丹頭心印正宗拓化上王天君曰頃傳上上宗旨中多奧義無盡玄微子等宜細參潛玩自見入道丹頭上者一點指心體而言見得人各有心心須常在靈明湛然方可復我本來真性若有片時失察離此一點卽非上矣一䜿者主也言能主翁坐定外物不撓養此妙明之體可以配合三才參賛兩儀通天徹地入聖超凡而見我白仙妙相大丹成而鼎爐耨矣故有此一丨也下一畫者慧刀也人生五濁世中無事不粘皮帶骨戀戀不休孳孳不己或貪於名利或恣於口腹種種欣羡愛慕之端造出無邊罪過若能把慧心照定慧刀斬除則立地成仙回頭是岸從前過愆渙然氷釋故加一畫於下以全上字之體所云一上者學人八手之功又一上者真階層進之級卽所謂切磋琢磨己精求精之義從此悟得透徹則於道中思過半矣白上仙曰湛寂空洞素虛冲靈無染無着妙浹天人太和充溢甘露三津弦藏癸室丙歛丁金偃月爐鼎庚辛耨温上通元始中含慧明下開地軸四極彙真人身始結精氣玄英神爲道寶水火存存旦參夕煉功行圓成超乎物表豈混俗氛一呼一吸飲食長莖是名法髓吾道干城嘆彼凡夫荏苒晨昏未知培䕶汨爾珠晶日月其逝覺岸奚尋叮嚀神使爰啟宗燈傳規頒戒善誘迷塵英賢濟濟夙植咸深皆緣怠惰鮮契玉心仲冬開教轉瞬新春各宜捫已勿負隆恩片言垂訓銘座書紳王天君曰至尊寶訓所諭弦藏癸室丙歛丁金之旨子等有能微探其義乎夫弦者月之始生也癸者水之真精也月得水而彌光水因月而倍淸所以庚辛文武爲玄功爐火之一候人惟養成此月烹煉此水一心常定光明内含則此心澄淸湛寂而外邪不亂嗜慾不紛同於太虛超乎物表而可以印燈分照妙行圓隆矣故曰藏也丁金爲水火之源金能生水水可滋金金火相耀日月同明乾坤掌握之中八海寸珠之内頼有丙爐温耨方能見天地之心造峰巒之上然苟失於培䕶則此浮沈之火變爲客燄之火而光明漸散大月旋虧安能超凡入聖遄臻堂奧耶必須歛以收其芒靜以拓其神内涵三米外䕶九英英粹米輝天泉洋溢真金日朗則凡火日沈聖水上浮則丙爐漸固性天開曉智海澄淸淸心寡欲無慮無營何思何慮之天若近若遠之際空空洞洞虛明湛照我之性中自然吐出三奇靈九華寶一元米五芝香十勝慧八識從此殄六塵由兹掃四魔不能入七障由此捐矣故曰歛也此二句爲玄功之要求道之髓有能悟之半爲仙矣有能參之卽可結大丹而凝米月片言提命盡玄功大月光浮寸米中子欲契天培絳室六時烹煉覔空空至性存存悟妙空二言提唱黍珠融照還本體真如朗半卷黃庭五夜鐘傳真濟苦無上玄元靑羅慧照靜明真光妙行大羅真人大真人於辛亥年十月始降玄壇内宫至壬子年正月傳示濟苦符法一宗靑羅大真人曰真光須直桐子未直直者桐心子未能直未能見心也本來心最直不着於有不着於修不着於定此個心法此個情法此個意法皆玉光之奧篆太上之真傳靑羅在在傳心先須玉光照心本來在心玉光現也玉光現相童遁始全寶月成矣靈通傳道不如真修修真則大悟靈通多小悟小悟則恃念生大悟則性光滿真人成道非有困苦窘廹不能直上傳心在心應物之心非我本來之心傳志在志作起之志非我自然之志求性者從應心以悟本心從作志以悟自志則化機在心觸處皆能領曾然不用一番沈定工夫心尙不見安能分别源流以入妙道卽如聖真所說種種法皆是活法法中種種意皆是一意得一知二得二知三爲三得二爲二得一一之至精無米而米無直而直如是知覺卽名正覺如是意見卽是實見道中之人也不然求道求法徒向外面文字侍真侍聖徒作隔膜修爲雖積千萬身之力亦猶一夢况於一二生耶汝從此入門漸漸世緣水釋情想雲散方能仰奉真教餐聽琅音以成百世之英萬國之秀以事我玉光也靑羅大真人曰金火大神玉光真人慈心所化將以開闢鸞教敷衍真常有大威德大神通其金爲真人之所寶其火爲鬼神之所祕靈真浩浩難可名言惟有修真弟子於五濁中生淸靜意於報身中作大身想於塵沙中修光明業則金神致喜上帝允俞天神恭敬時以金光䕶其靈祥煙覆其身修道悟道參玄得玄至於一切有爲皆同一元無上無有窒礙故仙子上合天意下握神機則令聞不已充於九州被於四裔溢於八海雖至路絶道斷自有舟航是以有德則無死地得道則無辱緣又何必破生死之關而修忍辱之道也顧在子等自取耳子等善取莫如應天合數三九之數是應天之精奧也可不至心懇請金火大神乎諸子勿以小見小識拘於舊聞循循乎衆說須發一種智慧金剛直入帝室則千神萬神無非上帝生之也帝光下燭黑霧潛消金火流輝沈淪悉起此修道之士所以樂有神通也非爲已也悲衆生也報帝恩也故曰飛玄者能孝天矣孝天者能飛玄矣靑羅大真人曰傳法傳道全在玄機玄機之現皎若天日靜若圭玉可見可思非如鏡中花也金光爍處元始𢌿我真一妙玄故玄而非玄化機在我矣仙子能知其故因其利順其數則大法可守至於一切有爲之法皆是作用非秘傳也惟是集神𢑥真予子正氣注子玄精汝陽靈䕶持汝上慧此天之所以秘傳仙子者也鐵可鍊爲鋼石可結爲玉海蚌函珠鳳有朝陽之寶龜能食息猿能吞月龍致雲虎呼風天下萬物各得一精以成大丹故能長生不死是以精爲靈寶精光所聚卽有神光神精光一卽成法光其要在一爲氣也修道者不過勿傷其氣而已自然之道不外於此也爲有之功亦不外於此也性藏於空洞之中道藏於有無之間心藏於動靜之交三者實而虛精氣神三者虛而實虛實相成化機得矣人生在世亦應作如是觀則事業之立與不立功名之成與不成皆可順於天而安乎命樂乎性而逍遙乎智此乃是真實工夫也靑羅大真人曰道不難知惟一可進守心守氣尙是着迹欲求上者先要除郤外障獨見性中一天方不退轉方爲不事所𦊱礙若止守心靜時方能有定一遇境紛則心爲境轉矣炁者可養而不可制能炁養爲先天强制則氣隨神耗矣葢性中之天爲不死生變靜如是動亦如是如源流來自星宿活活潑潑無可休息法源道源總作如是觀卽飛玄一宗雖爲内功之秘大旨要尋月中之水以養黃芽非徒就三品解悟也靑羅大真人曰九天開化所接有三兆民廣衆獨立上修父母天地子弟萬民上接道統行聖心神下育賢良道宗性源乾坤同體日月同光萬物合德上士之修接之開化萬世䝉休上有至聖吾闡其言下有子弟吾啟其爲愚國必爲忠民必仁五倫備體三教明心匡扶聖道振起弊衰中士之修接之興化學道明理讀訓知性或忠君王或孝父母一善可稱一行可錄言無妄發事不苟行慕聖希賢功國澤民此爲下士接之輔化三士之外帝子無求許真人曰真人因來壇者甚雜且恐子等不知上意故諭雖然此壇文昌開化故必錄此三種儒士若論玉壇所接三教同源又不止此三者正壇建立欲子等代天行化化仙救苦斬惡輔正修無上乘登無上境化天下無不忠不孝之夫超天下皆入真入化之鬼此上士立功之要務也故上士立言以訓天下後世中士躬行以示天下後世下士獨善一身以感天下後世此謂大功子等之任已重自待宜高以無上乘爲必不可不證之道以天下人爲必不可不救之人方俯仰無媿而成大弟子也勉之哉靑羅大真人曰靈光奕奕徹三天細八微塵法雨纎洞空空洞迹非迹鏡珠珠鏡玄中玄能解塵根消六識虛明方見性中禪應迹從來不應心靈車風馬絶紛紜守靈守志守丹穴中和太室印天真劔子金子近日法光如何金光本洞然塵昏自不現玄靈本易參識淺反眩亂二子有大根不奈心越畔譬如桃李花易被春光捲願留果蒂堅任落紅紫片守心在一敬敬至氣自綿氣氣歸我室乾坤藏一線瑤島琪樹枝寶之堪久玩大法大符永當鑄心不必在紙面上做工夫行住坐卧皆法壇也金闕内宫洞玄得道選仙楊大真人大真人諱球一諱照真字靜意於壬子年降斗壇提點靑羅混元兩法楊大真人曰洞真皇古初𣺌𣺌混太虛萬化化無極成性含真如性含三品全氣氣歸先天有識若無識是故名洞玄世人動物欲蔽此真性門凡情日以熾至道日以昏天慈開大化提命託飛鸞欲以真性水滌爾紅塵煩紅塵本無盡煩惱亦無邊真玄兩不昧諸障何由纒人生大慶幸逢此聖化開願爾掃諸障攝心視靈臺靈臺高峩峩中有先天圖諸識識無識一炁和大和用之當不勤藏之當有鈞藏用苟合度元神暢然欣全爾元初神葆我元初真兹從輔靈乘咸仰聖化新爾等俗中求道不比我昔時入山修真入山修真者其障少而見心易在俗求道者其障多而復性難要之障之多少亦不係外緣之順逆而分於一心之迷悟迷悟之因則存乎修持之純雜純雜之機又出於意識凈之穢故余之名曰照真號曰凈意意不可不凈也欲知意當凈先將性地空我性出先天蕩蕩齊高穹雲翳本不着况被塵垢䝉修真煉三品腎爲碧水龍龍飛躍天門五雲自相從汪汪性水滋炁炁歸綘宫綘宫有珠虎慎勿攖厥鋒湏用慧刀制自然順和風虎龍兩降伏神光倍崢嶸三品旣己全塵垢絕纎踪我心本不有意豈留膺胸意靜識歸虛冥默還一中休言入俗難頂有崑崙峯時時學卧遊耳目皆春融始知我故巢寄在萬壑松一切假作合請付流水東三品之中精爲天源最宜䕶惜若天源一枯百病交作養精之道不過冥默二字冥則靜處觀心默則動處歛炁久久心氣俱冺湛然太虛方始見得先天也凡緣本無垢實爲作聖基有等拘執者高談尙無爲動云緣是障一切人我歧人相着於中是非顛倒施我相存於心憎愛頃刻移人我旣憧擾意垢難自知所以處凡緣動靜都失宜真人求至道聖凡同一規但問自心凈不厭凡俗淄不善善之寶善爲不善師愛師復愛寶至寶永不迷含真在忍辱何論尊與卑修我元初神神光耀天衢持我元初氣真炁流四肢守我元初精真精漾三池三品旣調泰身中位育時一切庸俗情俯視如糞蛆若樂一穢中何由肯出離有緣方得度無緣莫相隨從此意日凈燁若琪樹枝天源自不竭永爲大道資此名凈意訣爾等咸三思道人修道一事從來看得獨重不與諸緣作對待觀所以經云秪爲一大事也俗人所爲大者不過曰生死得失毁譽榮辱耳豈知俱不足以配道猶之幻泡無真實相安可捨大逐小而喪我本來面目耶金闕内宫洞玄得道寶明朱大真人大真人諱雷光又諱泓澄𣷠又諱玄正普照靜安於已酉年冬降玉壇頒示符命至辛亥年降文壇傳示三返大法法天君曰朱真是天真降世大法甚多太虛中之慧燈故自號寶明乃三天大法師混元一會之宗師凡行移檄必奉其教諸神共仰白天君曰真人寶明玄範分身上安成道玄啟登真巍巍真凈𣺌𣺌玉京大慈悲願願度迷塵金符玉籙大洞玄文敷揚神化拯救羣生四苦三災惟人自徵命隨業墮業逐心成心昏道失氣氣歸陰陰擅陽消永劫沉淪至心之士皈命真人持身若玉防意若城身不二過意絶惡因真人監兹保䕶其人法從心傳道從心明苦災漸脫形氣常淸珠光湛湛照耀中庭九九候足鼎中生金水木火土綿綿若存不寒不燥不虧不盈精依氣長神藉形生命從此固玄從此升淘洗形垢浣濯元真淸和結聚飛玄洞靈靈光充備合真度人朱楊王靑羅四大真人曰今日欲與諸子談道談法諸子一心聽受可以悟三五洞玄三九飛玄我等降世己久三千大界尋聲赴感天上天下皆有應化法身金光統妙引翼學道修真紅塵滚滚慾海滔滔誰個肯思本來傳道傳心惟望此壇數子繼續前輝法已傳矣訓已詳矣緣已正矣人事不可不盡先湏固守靈光次修返還之術飛玄洞玄高上真妙也神玄始氣洞照天機故名洞玄帝鏡默孚統妙上宗故名飛玄所謂傳心秘法也諸子奉道有年道光已具銛子篤實照了三天有名何憂不仙只要參透三關真胎可結生月者五也運五者虛也當虛其志不識不知虛其神無視無聽虛其心冺動冺靜心虛而始靑現五者金精之胎常思常念寶光入月金子先得金火接師自能於進九悟本進九要妙在精精者神之母母安則子舒一者九之太玄妙有虛無三三得洞玄也三者一炁之真精二炁互交一還其一也三三者返三而還九精中有陰陰中有月也月生於九神生於二道法之原也九九者三三不已三九叠生命曰萬物之神萬神之精至於飛玄洞玄不九不三不三不一僞光凈而真光發矣能悟其門卽爲九天真人况造其室耶思子知我言乎我之言舉頭可見惟慮子不靜心思之我所謂靜者非子所謂靜也元始初真謂之三素能安其素卽見不動真體素者未有聲色之先居其素聲色空何動之有旣無其動何靜之有樞子凝神之法亦當如是神凝則光合氣通則寶成聖根在蓮苞善藏方能善用細細以察之深深以觀之勤勤以煉之可以神感三淸四子之事不可稍懈靈光在於精桐子精鸞不可虛應故事湏要在勿忘勿憶中深深體會沈浮卽悟法無大小心無智愚有爲則直上爲不則墮凡不可不勉也諸子勉之直道傳心心非言傳直道在乎虛無直心在乎靈覺虛無靈覺之處非一色一相可以和入所以世人種種惡業皆是好文而始心一而已一心好文卽一心忘真忘真則性光减性光减則慧光絶慧光絶則情欲勝情欲勝則舉心運念遂結愆尤從此而下不知所之矣我願玉壇諸子皆得性光故願玉壇諸子冺好文心直上之教諸子勿視爲迂飛玄大法非玉光弟子不能成就所謂玉光者浩光一氣未漓未散氣散精濁精濁則神昏玉光不可得矣能守此心如天光朗耀方是玉光弟子米真人人俱存一洗便見子等未嘗洗耳大凡煩惱起時其熱如火性光覺時其淸如水將性水涵養充足是名天精杳杳冥冥之物也洗心之法莫若密守玄宫收智八月如此則性水現而浩光凝諸子平日洗心工夫皆從此處着力否性水者三也不知其三焉知其九能知其三三卽是九飛玄飛靈應以此觀之真心真心真心飛靈飛靈謁帝太素之根五一妙玄精中有元五一妙靈元中有精知者自然昧者難明有生之初玉光湛盈寶月黍珠一氣所生天中之竅始靑玄都地中之妙真黃密羅人中之道金臺玄阿見之者安失之者危三品上藥零用則多天香交感性水太和可見可守聖慧婆娑真言教子永斬塵魔朱大真人曰我來爲子言魔道人深居大洞欲絶想絶則魔其空道人貴顯朝廷行仁行義則魔其遇道人平等爲心悠恬頣養則魔其報道人公我公人無所折屈則魔其勢道人受法通靈則魔其靈道人深信飛鸞則魔其鸞故求道者失師則道堅遠母則智全無所不容非有倚也無所不納非有向也是以道貴反不貴正修貴苦不貴樂木其志强其骨愈魔愈高直遂之路也朱大真人曰上帝取人真具天眼上使教人真發慈悲二子飛鸞真弘願力三心旣合法可傳也大爲能空至謙日崇修道以心入神以法法無大小惟一乃貫一貫之道盡我忘物上慧生長凡夫不知惟其不知民故易化修真之子過化存神無踰兹道子實其心勤其爲我於雷光中教子也朱大真人曰教道無窮羅網不出妙真得妙真妙得真靈通自然自然入心玄珠玄玄上慧化成仙根氤氲養始育精動以志操靜以神存金童來靑玉女素明絳宫玄房交於黃庭微微綿綿揚華吐雲珠體湛湛謂之混靈丹室在一至道獨存結治結治深入光明類衆超凡與物無爭保合太和妙真之門心以氣定性以心凝凝慧體元道全精遁不可奪志志喪神驚不可戀色戀色迷性一丹旣結百丹相生内寶旣就身居五雲性光虛無淸凈爲真真元浩廣純修斯臻純則不雜緝熙守敬奉神見神求心見心盡其欲相方爲寶明五中大道太上曰玄修金喜火火滅難生高高玉光寶明煉成先天之精生相流形後天之精守相附形參精得道得道悟神神居元始若亡若存悟見真體洞知無名貫徹五中三田皆明仙仙三寶正陽之精精卽是火所以煉金金卽是水所以得玄不損不滅固有之物至奇至幻忘我之宗真妙旣備寶明真人真人妙高妙高玄真真人妙有妙有神通回回子元其修塞淵三以見已已沁性光九以見神神合性忘三三九九巍巍難量進道者勤入道者嘿妙道真真黃而非黃道妙混混靑而非靑以收丹火以養丹元以役神官以見天心圓明真妙法王寶明梵氣彌羅結子真根無匹無待洞然光明玉光之仙皆昇玉淸玉淸心法名曰妙如玉淸妙如名曰普照至道至精玄之又玄人能見之卽是見天學道得道求仙得仙子守真精精聚養靈子守真氣氣充生神神靈安泰非想觀形形亦至妙至妙至真空寂性完斯入玉淸光在玄中玄在身中明了障礙修復漏因乘大慈光以全天命朱大真人曰我等奉命承旨來此塵寰必非無故聖化久湮諸子中何人能付天命命者理之所自出天者道之所自形不知天命卽不知理道不知理道者不知神也混沌未分神含其真沌混旣分神操其化化不一神不二卽從四大因緣而論人生林林總總或是因身或是果身或是應身或是報身更從禀受而論亦有因性亦有果性亦有應性亦有報性身不一是以遇不一性不一是以法不一不一之中是有千等萬等高下淺深厚薄善惡無數不齊之緣道人者能空萬緣者也能空萬緣者知天命知天命者不疑不懼不驚不怖故能漸入自在心與神俱精與珠旋化與道守而入淸凈解脫真一之法無數天真無鞅聖賢皆以此入道慎其心則心安運其思則思睿絶其想則想直制其情則情和情和則萬物亨想直則天心復思睿則神明通心安則寶珠現具此四德可以知天命也可以受大法也可以不墮凡流也不明乎此謂之小信人盲修瞎煉縱使積功如恒沙作善如湏彌不過招得來生福報非天命也故𣺌然一身其命至大命大性亦大性大智亦大智大事亦大故曰得一之人傳心而心傳傳道而道傳傳空而空傳傳化而化傳千真萬聖傳傳不絶不在於此卽現於彼不在於彼卽現於此此命之存也道之真也諸子如能一心悔罪一心報恩卽有無量慈光重重降下復能藉此良緣廣種福田弘植慧本可以往生十方諸大天宫全真保覺故生滅盡已而得寂淡逍遙無上真境玉淸真境非遙非邇妙如真法不高不卑常行常道罔不備具諸子玉真自具何不求哉空寂應感具在方寸方寸之機得在寂感修仙者先之以靜以察其動先之以空以謀其實則應化如神天真自接故能居卑而上人捨身而得神通無爲而宰萬物仙子之命也知天命者可與適道矣朱大真人曰我奉命到壇開鸞啟教擇今聖誕良辰重振淸修法事上資祖考下及民生敬孝由中者擢爲上士慈惠及人者選進仙班行五行者蔭及子孫持十戒者超昇玄祖三業無造現受安榮四儀克謹終免災劫遵道而行者真仙導之真師衞之真果成之背道而行者真仙絶之真師譴之真果削之毫釐之失不可不察縷之善不可自矜悔過期於改過成功貴於忘功治身湏嚴四維不可少缺接物在惠五仁不可不敦在下毋傲在上無驕見利勿歆臨害勿疑淸心不擾是名大定真心不散是曰真明本壇開化靜明爲基玉光傳心忍辱爲宗明以靜而生辱以忍而化得道之士心柔氣柔形柔三柔則生氣從之故能長生失道之士心剛氣剛形剛三剛則死炁隨之故至夭死寸陰不可捐簣土不可棄與善人居與善人言不知其有益而善心日開與惡人居與惡人言不知其有損而惡念漸長故宜擇友而交端身取友毋眩於勢毋惑於佞毋苦於直毋畏於賢修身而身修善交之力也揚化而化揚立已之效也諸弟子各勉而行之大壇妙化靜攝眾生以上士闡上宗自然道席興揚真人繼出若未知自修未植德行欲以禍福文章誘翼羣生是爲無本之道雖暫昭彰終歸淪廢究竟慕仙無以得仙向道無由入道總不如平實修行以淸凈爲門以解脫爲岸希夷澹素漸登真域是故本壇真規首斷問事空汝等禍福心也開汝等淸凈心也欲造至道禍福心能斷卽是禍福心一斷疑心不生疑心不生覺心常照可以參上宗可以習真法可以取良朋可以化羣類此乃是玉光真種世間正脉也朱大真人曰道人常侍靈寶大天尊宣靈光之妙法開寶藏之真傳每𡻕一會登選庶職上品妙果進昇飛仙中品真果進昇天仙下品善果進昇地仙三品仙官俱由增修功行上棲真於金闕下應化於塵寰安樂自然克享高夀百千萬劫不墮輪廻今我降蒞靈壇考選修真奉道弟子能進昇地仙者百無一二進昇天仙者千無一二進昇飛仙者萬無一二奉命氷兢恐孤帝眷由是盡心教諭示以玄詮彰以報應感之以神光秘之以心性道無不揚教無不闡欲使天下一家萬國一體接真化於禹餘還元神於元始隨有無極高真無鞅大神諸真仙子降鸞襄化赴思應感凡人稍有志向卽便接引在壇以俟裁成其中至靈至大者如此名號曰飛玄洞玄之神飛靈洞靈之神飛真洞真之神飛仙洞仙之神飛空洞空之神飛慧洞慧之神飛光洞光之神飛元洞元之神飛道洞道之神皆是上帝分化敷演神功開彰聖德上察玄理下觀化機體昭明入混沌說諸經咒談諸真詮此真曠劫難逢之大恩也能敬信之可以煉神可以煉形可以煉氣可以煉心三品仙果可以超證若有大願大行之人信道信法之人真脩真品之人實好實樂之人勇進勇往之人虛懷虛巳之人參玄得道神淸志直我當收爲上等弟子上聞金闕靑籍注名金編紀錄功行圓滿親謁禹餘若有俗子身雖未能入道亦能敬信奉承三寶者身心淸凈處世和平在家克孝在國克忠在在處處常行方便我當上聞金闕注祿𣷹真身境逍遙漸聞大法亦可功行圓滿神飛天闕若非道心道行漫列靈壇漫習法寶妖言鼓眾妄說欺人縱其愚見逞其私情壞真教而敗因緣入魔道而忘返始我當上聞金闕削其仙籍注入酆都速則一載遲則一世更不赦宥夫善士信道惟在一誠稍萌私識誠心遂賊稍起妄念誠心遂滅稍存誇大誠心遂敗稍積憎愛誠心遂壞稍慕靈異誠心遂去稍貪安榮誠心遂冺稍着執迷誠心遂障稍縱狂情誠心遂掩種種過愆惟由心造心能去過其道近名爲上士心不能去過其道遠名爲下士世人所以不能爲上士者非不欲爲上士也勝人之念多克已之念少勝人者一念之私克已者天理之正制私全理惟在靜專靜以養炁則炁和而淸專以養神則神一而化自然神炁相交靈光朗照涵養純熟一朝成丹可以飛度天窟形化爲真可以超昇玉境真合於玄上之可以達天命下之可以安萬靈立壇開教故曰正宗飛鸞應化故曰傳心若不真修實行冲養道根天恩雖渥難爲不恭者寛也敬之敬之朱大真人曰玄功要見得舒而徐夫慈母之撫赤子朝夕相依旦暮相伴初不意赤子之長也而赤子長矣慈母亦未嘗有赤子速長之心也然而赤子已自長矣當襁褓之日顧惜何其至誘掖何其深培養何其切雖有汚濁不以爲厭少有疾患便覺心憂内嬰亦當若此下手施子錦勉之朱大真人曰修身學道成真證果具得十分誠敬行得十分勇猛存得十分精神此事方能入手誠敬者念念無他惟懷真道勇猛者行行不止日進月新精神者惺惺不昧微細咸通吾觀在壇弟子少此三種善根汝等不可不知知之不可不儆儆之不可不深必湏深自刻責念我初發心時爲身無常爲眷屬無常爲疾病生死無常爲悲歡離合無常種種無常心無所安以故發心皈道則是道者譬如飲食弗得則饑如衣服弗得則寒如珍寶弗得則貧如渡海舟航弗得則溺如登山杖屐弗得則顛如病中藥弗得則死如口中舌弗得則廢如小兒之父母如童䝉之嚴師如在家之眷屬如出路之良朋如天覆我如地載我如日照我如五行養我大道之於我身猶若此也一念離道心如分散如死人氣如空中花一事離道身如倒懸如穢中蛇如水上沬我身離道猶若此也知此已奈何善根不發若不發者譬如盲瞽不自求相譬如服毒不自求解如已溺不求援如巳蹶不求扶如入虎穴不求兵衞如遇昏夜不求燈火如行風濤自摧其楫如逢賊人自去其侣如淤泥築牆如朽木作筏知而不儆猶若此也是以古之能修道者作如是念發如是心深深自責而進於道故所行無阻所志無隳所存無疚漸返真常漸出無常斷滅常心頓悟常道聖根湛如性真超脫在壇弟子敬信吾言可也一言一泪勿厭重複朱大真人曰施子奉行大法湏養内丹吾壇宗旨玉光教心並非高遠奇異只要覺地上培基得厚自然有靈芽慧花發現自能行法自能度世矣救世濟人雖係功行然終非吾性分内事緣來緣愛可也不必着亦不必倦沈子淸心之法稍有入門否對言觀心反覺火炎曰澄心方可返照氣定方可回光若心未澄氣未定便是照見玄臺反至客火炎上矣羅澄問何名太極曰神光從太極中生太極者卽一陰一陽極和境界水不濕火不乾混然淸虛故名太極若認作一穴强爲思想卽非真矣認作一虛漠然無知亦非真也朱大真人曰欲海茫茫惟牽幻識本性圓明識多則昧六根兠攬六欲飛揚總爲一個識性作主所以到於老死終不能斷是惡根惡根旣不能斷真果如何可證所以古來修道工夫先去任識逆識往識㪚識根本識命識見識空識八識去後方見圓明三果進時方成寶月所謂三果者真行真願真無我爲三若有真行名曰聖慧妙如果若有真願名曰慈印妙如果若有真無我名曰覺證妙如果因是三果漸得三明一者明於觀身一者明於度世一者明於大性海如是三明漸生六通由於觀身而得心通宿命通由於度世而得慈力通方便通由於性海而得上遇通如意通寶月斯成惡根斯斷修如是道方是玉光弟子不然爲在堂一小巫耳做工夫處接續最喫𦂳犯不得一毫間斷一毫間斷工夫便不成熟譬如植苗於土尙要滋培灌漑相繼而施十日培之一日傷之便不能生長成實况人身黍米靈苗最嫩智花最微七情爲蟊賊六欲爲稂莠墾之未力耨之未恒雖有存者止具外貌其中精神膏液日損月耗如是而曰我苗可長我苗可實徒成宋人之愚耳曷足貴哉蔣德坤問心光明暗相乘欲靜不得何故曰汝卽是任識所使任者内無所依任物流轉唯覺可以勝之唯明可以去之然覺明二字非可强爲如我號寶明不因求明而明乃因成寶而明真明真覺識性不立有識性明卽是偏覺亦曰僞光故我得寶而後明始全大明之量朱大真人曰澄子羅澄福因善積善自真成禍從暴招暴緣躁始夫所貴乎知道者爲能去其躁心使遇事不至於暴則對天而天孚待人而人恊禍機不禱而弭矣夫所貴乎進道者爲能見其真心期事事皆合於善則内而在家有雍和之化外而涉世有仁厚之風福緣不求而至故凡人之習性暴者其善不積躁者其真難守吾每見夫世人原知善之當積治心治身事天應物件件自以爲善矣而不知往往於極細微處不在意處露出一分不真則把從前好善之功盡爲烏有原知暴之當戒靜參動察言謹行狷件件自以爲不暴而不知每每於莫可解處不及持處生了一點躁心則把向來欲除之暴一時復起由是而嘆曰善固未必有福也仁固未必免禍也其不自反亦甚矣豈知天下之理善非真不積真非和不守不守真和欲成善道猶持漏巵以貯淸泉時見其涸難望其滿也今子具性本真善功不愁不積但秉心近躁而暴過或有以漏之不可不自琢磨也况去躁卽是守和守和於心神志光明守和於身五體淸寍守和於家藹氣盈庭守和於世泛愛親仁守和於壇常合天真守和於道行滿功成故太上五千言教最重慈和柔善四字謂世人用之所以得道者在此矣所以成仙者在此矣所以修齊者在此矣所以治平者在此矣所以弭災消劫者在此矣所以化天下爲熙熙皥皥不至擾擾攘攘以失性命之元者亦無不在此矣極言其效豈止免禍而己哉凡人之奉道者孰無善念奉道而知修道者孰無善功修道至十年二十年日積一功萬功成矣月積一善三百善矣何福緣之未至禍機之未消祗因善功雖多漏之者衆故不積也譬如服藥養元汗大出精大洩喘大發形大動雖欲元氣之積不可得矣故脩道而躁心未除者猶病人之動形也暴念常起者猶病人之發喘也慾事未絶者猶病人之精洩也妄想未去者猶病人之汗出也服藥補元不能療此四病元則不復藥不見功脩道培福不能斷此四漏福則不邀道難虛庇所以佛家最重無漏功德無漏卽可成阿羅漢果且太上有言曰善不期大期於莫損功不務多務於莫隳皆無漏之旨也我觀本壇弟子勤勤奉真兢兢守法豈不内竭心思外勞筋骨然而善功隨積隨漏况又兼之所積之善功併非真實之善功隱微之中必夾帶着私利兩字則無論漏時漏去併積時亦且不積所以勤勞十年二十年而終無一善之圓一功之積也今子若能解悟此旨心不必勞身不必疲隨境隨緣一舉念而善功存焉一舉手而善功在焉一動一靜一語一嘿皆善功之所由積也夫而後災禍自弭福緣駢集矣朱大真人曰仙子謂韓子耀宗道莫遠求治心卽是治心之法先認源頭源頭旣淸鳶飛魚躍上下昭著一理貫通衆善咸集所以善修道者工夫不甚難苦活撥撥地順流而入如江漢朝宗百折不回所以然者源頭得也今仙子躬膺隆命主化宗壇當知斯任非易斯慶無疆發大乘心直任其事不疑不二不矜不誇不詭不詐不畏不退不躁不隘不貪不妄依教奉行按規舉動能使大化有爲而歸寂眾弟子奮勉而就安隨其品量各成真果便是善於主化大道盡此矣疑二矜誇數種非言惡俗之過也卽所謂小乘心也必能去得諸心方是大乘然欲去諸心亦不是逐件驅遣只要認得源頭自然諸心不發故我曰直任其事葢直心也余嘗慨世人俱有直心俱自弄得邪曲邪曲旣久直心喪盡便使知見顛倒行業穢濁顛倒穢濁相因相附遂積十大惡業遂犯五大逆罪罪業旣多天根永絶到此地位不待此身殁後魂魄拷掠酆都卽此身未亡神光已先拘繫幽都矣子等當知人禽之界判在幾微直心曲心僅差毫髮從此頓念天化昭垂愛鸞愛道任有萬丈紅塵不揜天心大月則大道從此契合天真從此交孚時至緣開神功普濟如斯勝果總不越於真心基始莫墮小乘而自邪曲使現在至靈至妙之心而被幽都所拘繫以現在至貴至寶之身而受酆都之考掠也子等三思哉天地以自然爲德人身以至妙爲玄妙不具則玄理不充而大道反爲所掩具於何基六義六微不可不察也一以事無上天以存我天我天開爽日月齊明呼吸風雲運炁變通可自得也一以盡至孝以備我氣仁靈豁現三界昭融塵垢將侵可自去也一以正無盡見以純吾見末派支流可不惑也一以發廣一心以修我性邪識亂真能自絶也一以守貞常以靖吾想水流花放任機應趣順逆遭逢可淡忘也一以厚生脉以培始秉坐卧行持靜敬中節素植自見妙靈來也是爲六義皆仙子處世之正術其道則包於微焉氣正光淸微藏米内是名元天神直慧開微藏於月是名寶明火聚丹房心宫至大是名鼎陽精貫朱陵横縱三九是名皇極英聚生華光毫百丈是名廻風真身安定出有八無是名蘭香欲進六微必由六義入手摠不外我珠晶大妙之明所謂心湏常在勿忘勿憶也今人解六義者不少而不知進於六微則邪魔尙易乘間窺伺敬神不常明潔到得究竟地位不免沈溺不升也悲夫近日聞子等有以真規痛絶歧志爲疑者當爲爾等破此魔障有疑者何不是胸中無主卽是見地不明殊不知規旨大公言言至道叛師賔壇義理昭明子等未嘗致思是以歧志任其生長成遂不肯痛加剪裁歧志存中疑心自起看得真規旨趣淺狹曰禁我歧者不過欲我專於輔壇耳不過爲他處未必合道耳若他處道法果真善事果實卽是我壇何妨兼奉嗟嗟此所謂非大乘之心也上真之所以惡歧者非與他會競爭隆替也大道貴專天地自然之理也人心不可二萬世不易之常則也子等今生因緣遇合旣已得爲玉光弟子譬如一個胞胎已落一母之腹爲貴爲賤爲貧爲富爲妍爲媸斷無再易一母以事之理卽易一母而事之盡善天道人心亦必不稱爲孝卽兩事之亦大似夷之二本之見不亦愚乎然此我特粗粗分解耳若使弟子果能從我今日之言去歧去怠發大乘心直任厥職至於功圓行滿玄就神通方真悟專一之如此其利益也歧二之如此其損害也師言不我欺真規衛我信到此地位方可云斷疑生信而子身已成金剛不壞身矣朱大真人曰靈乘開宗教唯心感應門心爲萬法主靜一道方存含吐玄元氣包涵太始精炁精歸太極妙育洞空神三品無上藥產生在一源長川輝寶月𤍞𤍞五雲興識道由定性性水一泓澄妙光相燭際溶溶鏡比明修身與齊家樞紐在一誠誠以養已身嗜欲奚由攖誠以化吾家孝弟自克敦刪盡諸蕪穢内念常和平求已無求人朗然抱淸真仙道與儒修源頭摠一心將心歸靜一聖化賴君承我久未臨壇諸弟子進修何如施錦言弟子年老未能有進衆子碌碌鸞法久虛大真人曰三教職所司何事而令弟子怠惰若此且教者不在多言羅典化何得亹亹多詞欲闡道耶抑弄才耶時典化師訓詞甚多故有是諭嗣後不得屢降鸞筆以撓弟子淸真之體當靜施光明如月空懸而淸源自照靜者得見一者得存不靜不一者雖畢生無由見之存之非爾責也當效觀察陳希夷先生斯爲善教耳羅典化粗識道原未解圓旨徒以言詞訓誨雖用意諄切而於化之一字實有所乖施德浩言不言之教惟上士能會弟子輩皆屬中下之質猶賴典師稍知憬悟大真人曰浩子所言甚善我當細爲子分解之淸靜真空性自然何人不具地中天主翁逐向紅塵去欲待回頭只半言訓子成人在義方不勞晨夕話言長仙凡未熄無明火誨語空多聽者忘何况玄玄大道機悟迷只在一斯湏言詮俱是存皮膜那得教人見骨髓上士無言亦解修藉師祗在點丹頭話長反塞淸虛戸撇郤靈臺冊子求中士茫茫進退間指陳凶吉藉言詮然而煩劇翻難會豈解虛明象外玄下士聞名大笑之耳提面命總空施况張婆舌紛紛口一信難尋豈解持今日回頭今日仙真機只在眼前看談玄說妙何湏着玄妙俱空見性天休所難休漸大休凡塵飛散月如鉤從兹養到弦和望只在三神自肯留三神三丹田神也展經最忌讀經文滿紙繁華昧聖心修士貴知返本路攝歸靜一道方聞道本尋常甚易知譬如飲食救饑虛飽時更列多珍饌下箸空忙身已疲又如挾纊救嚴塞得暖堪教四體安錦綺裏身徒外美死時難仗一綿是故玄詮不貴多貴將權句攝心魔三師受職休懷懼累累空言落舊窠靈山會上有經句權句經句者順說其理權句者逆奪其人至道從來卽是心被人竊去入魔軍只湏伸出拿雲手魔障冲開心自寍開緣說教意無他月正中天影不斜殺盡妖蟇光自皎頭歧路莫咨嗟妖蟇蝕月之物俗所謂野月是也隨羅計二星而至本沴炁所結非星也人身大月本來明上下三田澈洞淸最是貪嗔與嗜欲妖魔肆虐月難盈吾道全湏日用行妙光時䕶寶方明休將塵境縈思慮圓滿蟾光暗自傾靈光能蓄寶光明涵養冲和攝内田元子施元根性真能上接傳言奚及悟重玄吾道湏向空明虛洞處尋個真實旡妄來操持方能日進一日不可徒愛紙上淸言絳臺微白便謂是大道之根本殊不知綘臺微白師真暫賜之光緣盡時違一時收去爾便耳目無措同於未聞道者此不可恃一也至於紙上淸言雖師真期望深切不憚煩勞反覆詳語元子施元根當領會其大旨而體之於心則千萬行不及會心之一二字專求靜解卽此一二字中千變萬化皆從此出始有益於聞教若不如是徒以師真亹亹之思以爲自己靈明所接所接益多則我之靈明益擴始而私喜繼而潛恃竟自謂月鏡親窺證真路近殊不知師真覺世情深假汝童光以宣道諭瞬息光陰子身壯矣壯則塵魔四起而攻之子光能如故耶倐忽之間年就衰矣衰則三品漸凋七塵旋復子光能如故耶是以太上有言曰少則得多則惑日誦萬言不如守一靜則通動則盲多言數窮不如守中我故不欲典師之多言惟欲爾之嘿受者道在日用常行故也朱大真人謂施錦曰仙子年高矣望重矣然年高者不可自高望重者必湏自重能自重方知自高之非不自高方悟自重之實卽如目下工夫養神保精息氣寡言皆自重之實卽如目下壇事愛訓悅規委司任職樂賢勸能皆不自高之騐也自重與不自高善用之則並行而不悖不善用之則兩謬而俱荒置吾身於萬物之表方能存吾身於天地之中若屈我身於萬物之下併不能措吾身於道法之中矣仙子慎之保精養氣補先天莫慮頭童齒復顛一息在胎三寶煥寒枝仍與嫩枝鮮仙子可悟一息在胎之說乎胎息二字先賢借此以喻精氣大還之候得與不得騐於一息一息之候堪延一紀之年若復之至九卽名九還大丹已成昇仙不死矣故我不曰息息在胎而曰一息在胎葢指子秘訣也一息在胎時更有異名一名病無百慮相煎百病攻衰年那得復成童何期一息胎元接四體輕安浩氣充又名曰塵消塵性依情未易消生門杜絶鬼門招若人能斬凡魔盡一息存胎現玉毫又名曰復天學道先湏悟二天天分先後理相連此時一息非言晚卽是先天大道玄又名曰道生胎元孰不帶將來盡被紅塵百劫埋保氣保精俱有道道功成就合三才又名曰寶始七寶莊嚴未易成存胎一息候偏明此時始入玄脩境涵養功成湛九英又名曰慶光人生五福夀爲先若個能教一息添悟入無形原有兆胎元能復地行仙又名曰霞期百年昇舉藉雲霞内未修成外豈華一息在胎消息好到期三素共相迓𡻕𡻕談玄說養神工夫最是此言真諸君有志能探討日坐芸窻轉玉輪此時方是惜身時滿眼繁華我不迷滅郤貪根尋道果垂垂玉蕋在南枝此時方是惜身時能守謙和更不欺滅郤嗔心丹訣盡一輪寶月在中池此時方是惜身時身外浮雲總不知滅郤痴情心影正梅稍淡月兩依依工夫當從調息做起昔人云息有一時不調命非我有可見養生之道必以調息爲先故諸法總持曰凡煉法者必先靜坐一香調息凝神不守玄不坐光此四句入法之要訣故名諸法摠持然其奧義則在不守玄不坐光二句子等俱忽而未察也不守玄者所以守玄不坐光者所以坐光坐守兩忘玄光立現直至一息在胎方完得調息凝神四字之義分心於坐則神爲坐勞用心於守則息爲守亂故必撇去坐守二境而專其神息之功養玄之道始能入手然平日三毒未除雖能守此一竅而每爲邪魔所障不能得造一息在胎之境縱使百日靜養偶造斯境而三毒未滅過此必幻現事端以壞厥脩故凝神法曰去邪去妄去貪求便是真人真丹頭不去則厯劫坐玄工夫終不成就能去則功效之見敏者七日鈍者百日耳故心印經云知者易悟葢言無三毒者知之卽悟故曰易昧者難行蓋言有三毒者行之終昧故曰難也今日我以實言勸子矣小小痴情去不難枯魚銜索靜中觀中心哀悼時時現肯逐獮猴沐且冠小小嗔心亦易除是非榮辱總皆虛泡消影滅歸何處葢世英雄一土堆小小貪根枉自纒人生衣食總由天銅山金穴皆灰燼但博貪名後世傳三毒能除卽是仙一腔淸氣太和宣人生呼吸通天氣一息歸胎至寶全朱大真人曰我道平平貴守一羣英仰望咸思則常將内寶加培養養就圓珠聖道得見光入月亦何難從前舊習應知革將心收拾玄關裏一息存胎真聖格無爲歸寂大規傳審能脩之仙果出一者心也能見是心方名得月者印也能明是印始曰純脩者水也水月交凝方能聚神丶者精也精光洞徹會歸有樞乚者氣也氣足胎完惟天獨朗者燈也識得此燈方可宣化調息存存客火消真精充滿貫珠毫一呼一吸綿綿永黍米呈光塵自超子欲見光湏守嘿嘿能制躁萬魔藏慎毋助長虧珠體體現三花五慧香廣子真靜工夫巳解得否水者上田之英也是英所發光現頂門頂門光現方會真傳傳傳大道賴英生一點明霞燭帝京湛湛本來真面目心能澄凈靜光凝者藥也中田藥滿是真修光耀崑崙大月留記取靈芝𦂳自閉明晶莫向俗中投靈芝靈苗也者慧花也下田光現徹幽都玉枕徐徐妙慧敷一悟存胎三寶煥如如朗月紫雲多者胎也結胎丶米現於中中有明珠映碧空空妙妙空成朗月月光一現與真通者神也神光照處若秋霞霞湛心淸長慧花花蕋湛分蘭桂種種真休使染塵沙乙者爐也爐温鼎固似秋蟾宻勿存存靜始參參透玄元純不已玉尊妙道箇中傳松子輔化勳高聖眷殷存胎要旨靜中明脫郤塵衣卽是道道光丕著在心淸者俗也何事紛紛似網纒能知擺脫聖功圓心心念道方參月月一輝時梵寶傳者月之初長也心能淸凈月光開休使紅塵染寸臺試看一灣何有盡川川畢照長珠胎丶者脩也跳出凡庸圈内圈心珠朗朗悟真玄黃庭半卷丹爐轉轉轉脩持聖質完朱大真人曰返動以靜返語以默此是徹始徹終之學弟子等身居凡俗緣境牽心酬酢無已身雖欲靜而不能口雖欲嘿而不可身心互牽識情交用而成客火客火一成性水銷鑠身中五行任緣消散是以古先聖賢欲求至道者必先以靜坐爲始故曰徹始至於得道忘情慧開識化功行出於自然神通可以坐致故曰徹終如是微妙工夫非可驟入必先以一嘿爲基魏仙曰默默默無限神仙從此得太上曰道可道非常道多言數窮不如守中葢人有三要曰耳目口此三件人身至寶有之可以經綸事業有之可以希聖作仙無往而非其用也故曰要然不善用有之可以耗散精氣有之可以牽引三毒有之可以濟成十惡喪身敗行造業招禍亦無往而非其用也故曰要然三要之中唯口爲甚太上曰病從口入禍從口出是以古先聖賢欲求至道者必先之以慎言慎之又慎至於守嘿然後性功可通大丹可結且言非獨造過招尤然後宜慎也卽言言合理人人樂聞亦爲我身脩道之蠹故仲尼曰道聽而塗說德之棄也君子欲訥於言而敏於行指心錄曰其言淺其道靈上神也其言淡其道空仙也其言虛其道深上仙也其言無其道妙而後可曰大真人也世人愚昧不知言之美德在於淺淡虛無偏欲每事快談劇論失淺之旨矣偏欲一語卽思駭聽驚人失淡之旨矣偏欲一時建功獲效失虛之旨矣淺也淡也虛也三德尙未能守安能得無言之妙悟大道之精乎故指心錄又曰凡夫好言故言說俗人利言故鈍說何也心不在於言其言也善心在於言其言必不善故利於言者其說愈鈍也爾弟子且依我所囑密密操持自能日有顯明處也金闕内宫洞玄得道仙史王大真人大真人諱煌王大真人曰大化本無心無心方見心雲心月不離浪息徹波心波心悠悠雲心靜中涵寶珠光不冺湛然其中淵然色能虛能大葆中室花心不落果心成根在月兮枝在直堪嗟世上多塵心真心反被塵心没欲去塵心了不難莫把花心任風汨玄玄一點箇中存内日外月雲霞吸法本無法道非道心心只認元胎息秋去冬來萬物藏梅花洩漏文王易王大真人曰玄元妙寶一黍未宣湛而能光是名真米崐陽萬珠本於丹苖苖方油油是名真性一點皓月出於長空無垢無翳是名真靈明霞纎纎光浮碧落剪盡塵霧是名真空以天還天以道去道直露玄基是名真覺返歸混沌掩爾明聰無意無識是名真天存真敷氣守吾精無攖我神見吾靈無炫我明㝠冥默默洞然妙門玄元妙氣本在無氣而生生者滅之根脩玄者不致氣而致一洞然天光心與之並去心則明守心則摇修玄者不守心而守靈空洞無我着物則私窒爾五官我見其我脩玄者不悟空而悟有王大真人曰諸子具得四正念否何謂人身難得也此四字不從靜參不知惟靜參者元性漸復照見前生方知擾擾衆生失人身者甚多得人身者千百而一二耳縱幸得之或生邊隅外域或禀盲聾殘廢如是身相不足爲貴今我所具復異於是然旣得此難得之身又當思無始以來空過了幾許好身若不空過此身應在天上何得復在人間日與五濁爲徒若又空過此生則此生以後正不知墮三塗十惡道矣靜參者生如是覺故乃發大誓願曰不再虛受不再者深悲往世之虛度也往世虛度尙在是人悲悔之中而况今世光陰肯一刻輕擲乎所以發此念者必能心心向道念念體道步步遵道事事合道雖造次顛沛此念未嘗渝也如是者可謂一念正持矣何云大道難逢也靜參之士元慧開明照見道原出於天本於性而開於聖人之言故真教之淵微統千聖之心而會通於我之性天者也若非聖師開化焉知我等不爲外道所誘不爲魔祟所攝今幸逢之何以仰報唯大智者乃能生其大願曰當勤參問一日參一日不參非勤也一疑未晰不卽審問非勤也問而不答不再加參非勤也參而未信不再加參非勤也今子等所以安於不勤者總未知大道難逢也總欲孤負聖師之心也况爾等年命無常人人目擊徒自諉之命數反有狂言自欺曰此身我已幻泡視之不足愛惜其言雖似有道不知其心中曖昧不可告人惟大覺大智者觀此年命無常卽當深信真玄大法存神保炁養志攝精如是以愛惜年命爲念則於世間一切欲樂自然漸淡世間一切貪嗔自然漸離世間一切營求自然漸寡世間一切業妄自然漸除何以故所愛者年命所惜者三品愛惜之念深故能超凡也何云塵機無底也塵機本無底而愚昧者偏欲於無底中求底故一生波波吒吒頭出頭没而不自救也唯大覺大智者靜參之際實見得世事無實無好無了無堅故比之幻影泡形而不以爲藉唯藉吾身中一點靈光出生入死如同移居證聖成真如同返舍斯可恃耳若欲於塵世一切境中求實求了求堅是不知其無底而甘心沈没也安能向道哉陳子主壇之任貴乎能主不貴乎能教自今以後只當虛衷俟命命子爲者不可生一退縮念不命子爲者不可生一自見心卽如昔年劒子正當頒規定制之時郤不細心檢討乃欲自明正學闡發儒宗一針相錯遂厯千魔若非上光提接此時尙沈幽暗矣可不懼哉所以孔門高弟如顏閔之徒終身未嘗著書何也彼但懷欲罷不能之心耳但存欲從末由之念耳厥後曾參之傳大學孔伋之述中庸葢以爲後世津梁不以作杏壇鼓吹彼如是大賢尙不敢參雜聖訓汝賢幾何而敢參雜天真大教耶所以四使有言曰與其修美言不如修美身汝能虛衷佩教内攝三品外和境緣使汝身無病無惱神觀至皓首而不衰光明至耄年而益盛如是身旣美矣雖無一言及人人將效之天將助之弘化何難也金闕内宫洞玄得道大使郁大真人大真人諱於辛酉年降玉壇校科注月九經郁大真人曰光明洞照卽聖胎結矣我在塵時惟煉太玄金火充滿骨節卽得冲舉子等傳授大法詮諦充棟何尙未有一得詮語中有精粗乎無有也大乘中有頓漸乎無有也信於此生疑於彼起悟於彼得迷於此乘道人者不信亦不疑不悟亦不迷空中有光光中有靈非光也非靈也真一而已矣亦非真一太玄金火妙如之心也我故忘心而并忘身忘身而并忘物無取舍無愛憎緣至而道成任成於道運合而丹就任就於天心中空洞不𦊱一一不掛湛然常淸此時雖不欲仙不能不仙矣是故雲車風馬非外物也身中有之何况應感之道反可離身而妄冀乎金闕内宫洞玄得道宏誓鄧大真人大真人諱灉鄧大真人曰元運統休湛明寶慧嘉和時順厥名肇生無象自象不文而文化機運得至理元亨粵稽大壇厥數有年宗燈繹烺賴兹妙靈噫吁鮮解余實愍殷有知勿用知冺生晶有見勿恃見冺生英仰觀白霞俯覯靑萍似着非着有定無憑化行自如可以長存玄宗妙靈渾空生英元象非象元明非明照以廸悟悟以肇真厥名上宗亦曰大乘慨夫世人性命具真性稟於天命囑於星台星在首人之上英斗光應臟人之上靈二十八宿環拱帝庭受形之貴妙無等倫天有元亨仁禮之根人有義信乾之利貞四德合天大智寶明所以性體全契帝真奈何信士心染囂塵真性日錮塵性日紛真相旣失徒恃幻形目好華色耳好淫聲舌戀肥甘鼻戀嬌馨馳騁逸樂自喪元晶形同裹革積漸膻腥性同暈月掩蔽烟氛有明不見有聰罔聞出言尖巧以刻爲能行止齷齪以濁爲淸惟務色相罔念元真惟眈文飾弗勵躬行奉道事天總成好名上真哀憫降自玉京開示正宗以利嗣人正宗非他寶月九英慧從英得月從智生寶月旣滿大智圓明聖無二法法無二因聖無二道道無二心心因俱一道法雙成何者曰法玉梵金經何者曰道天教人倫何者曰因立志超塵何者曰心回顧元明人能知此妙行得門妙從門人行從門行行滿功圓永侍聖尊
