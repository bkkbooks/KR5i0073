body:
  text: 立壇宗旨皈壇規約讀詮心法太上道德大天尊浯邱天公本師玉光普照天尊文昌帝君更生永命天尊正陽帝君飛行救劫天尊孚佑帝君純陽妙道天尊立壇宗旨本師諭眾言子等能知我壇宗印否宗有三一曰上二曰覺三曰正天下乩仙應化之壇咸出上宫淵源師派故凡建立壇宇要皆從上覺中演化而來惟我大壇上承元始中通金闕所以規曰玉壇正宗正者該乎覺而統乎上者也所謂印者亦有三義一曰妙二曰慈三曰照凡乩仙度世附鸞傳教者本乎照印中出照者悲深願重已能照徹本來亦望世人同加照徹借鸞以伸其接引之意此照印所由名也至若元皇開教闡道拯迷自從厯劫修證妙印圓隆乩鸞流藴奧竅弘宣故曰妙印要之妙也照也俱爲一洞因緣寸地現光而非普慈上乘之旨惟大壇分演八毫光光映續十眞開萬載之勝因八使護現前之妙道所以上覺惟此地爲宗妙照奉玉清爲主主印宣慈慈光四覆金光一百里祥烟徧江南正宗二字確有指歸實有明驗爲是壇弟子者必須内究性元外操言行層層解悟步步隄防於至紛至擾易動易雜之時尋出大明不昧之體寶月高懸萬物畢照自然左右逢源法元俱徹方名善解上修弟子庶幾正宗慈印日顯月彰矣大金神曰天化昭垂聖慈廣運勅眞仙以度世傳法寶以濟人天下有正壇三十六而玉壇爲之宗因緣浩大功化淵深所以玉壇之光直接三壇而通玉闕上壇金光洞眞之宫中壇雷光洞元之宫下壇寶光洞神之宫故勅罡元紫微大帝督典上壇星元文昌眞君督典中壇輔元八大金神督典下壇三壇珠貫燈聯光充十極而此玉壇肇始於甲辰之秋定基於已酉之冬顯明於甲寅之春充括於癸亥之夏莫不待人而後著藉道而後弘如是三十餘年之功績遙遙接五百餘年蜀水之宗而開後千百萬年之緒成眞之數已著明混元寶圖豈不偉哉子等千生慶幸値此正緣務須發志發志之道不在銳進不在廣叅但要大其眞心去其凡心證其聖身空其幻身自然生出大志今俗夫之不入道者非道難也志不立也志立則信心漸堅志立則覺性漸開志立則正行漸充志立則元功漸著所以我規約之中首言有志卽白上仙所云傳道傳心傳心傳志也然此志非人可發非心可發更非言語可發更非文字可發何也發與不發關乎道之成與不成是以就子等身上說則有天命主之根器佐之夙修成之尙有風土囿之元氣範之業𡨚持之所以易者易而難者難也然在子等旣逢大壇難道任其虛生浪死該就極難發處特立志中之志念我大志何故不發必有𡨚業持我急思所以解之必因元氣嗇我急思所以培之必爲風土囿我急思所以超之有此三種思修方能解悟夙修完其根器而全歸天命矣子等勉乎哉韓眞人曰仙道儒道同者道也不同者法也儒道之中性天亦備但法在治世故詳於倫教而元元之理秘而未宣故我道祖憫世降凡敷揚神奧傳道德于圅關授元科於玉局發先聖所未發以爲萬劫度世慈航今函關一派尙識全眞玉局一宗漸流應俗是以玉光聖尊重開木鐸丕濟烝民曰明曰直顯大通出自重元曰月曰米闡性功本於元始正教煌煌言不能殫惟在有志弟子入我壇讀我書專心求之教心自悟一志行之聖果斯登矣陶眞人曰飛鸞開化其來久矣秦漢以來在在有之總皆出於上帝大慈光所現不知者以爲奇事不信者以爲異端豈知通天達冥原屬吾人性分中事是以上古聖賢性光純潔雖無飛鸞之名咸有通靈之實是以苞符啟秘河洛成書嵩山授治水之經赤水傳補天之術甚至七返九還醫經辨藥等書皆從昔賢性光中得而利澤垂於萬世中古以降湻風漸漓人之靈慧不能出於自然是以上帝哀之徧勅瓊仙周流八海或託鸞以示化或假筆以相接其進者則如阿難之心聞道陵之神籙莫不從無達有自隱至彰雖因緣之殊途而感通則一致也迄今大壇啟化聖恩優渥溯泉源之細流匯巨浸而澤物所以道通元始法布玉京而仍有取於飛鸞以示教者爲其近而易知也爲其顯而易見也爲其實而易學也苟能進之心聞神籙漸次堪成其靈通漸臻上古金書玉籙澤及將來此玉光啟化之深意也無奈世人肉眼未破一見飛鸞卽驚詫爲奇事或以奇而信奉或以奇而疑退信奉者不過買櫝還珠疑退者眞同暗中投璧甚至偏邪小人挾其私心鄙見謗爲異端致使已皈弟子不能堅守初心捨道入俗者比比有之此等庸夫總之未解鸞理罔識帝心眞所謂欲自絕於天而並傷其日月也豈不更可哀哉又曰三天之上亦有鸞臺其臺高廣數千仞中設珠鸞丈餘金色香沙布於碧玉之几兩仙侍傍眾天人咸於臺下仰觀惟高眞上仙許登臺侍側二仙子端肅甯靜乘鸞不動傳亦不多一言一句出於妙機聞者無不立地開悟歡欣頌揚聲如雷震故其天曰雷音寶勝天所以三天之上亦設是鸞者非天眞之不能親謁元始故也蓋因天天有民不能隨上聖高眞遠去故假鸞一接其文皆一丈天書能自發光音天民雖眾無不聞見不待侍眞宣傳而後知也是以二仙眞人亦曾供職九十劫始證天仙子等莫視侍鸞爲艱苦事當作想此時侍側便不疑高眞上仙之登臺鵠立安知此室之外庭除之下不亦有億萬幽靈仰瞻妙化乎所以侍鸞一日其功同於行煉一次故本願經曰同此無爲功德之所莊嚴其功莫大也皈壇規約玉壇者上帝開化選擇眞修之子以充眞淨一會之壇也金闕巍巍七寶元苑上帝宫中侍眞侍神悉是了悟因緣斷除障礙清齋弘誓曠劫修證故得親奉慈顏聆大妙音聲嬉遊聖域逍遙自在上帝慈憫深摯見彼眾生貪名逐利迷失本來猶如慈母見赤子入井心如箭入爰以神通移接下塵世界污垢之中成大羅宫七寶苑金闕殿復以一毫吹散人間以成十大眞人八大元帥侍列左右金光一百里祥烟遍江南是名曰玉清正壇爲是壇弟子上事聖眞中交神明下濟羣生修元功立妙行入寶月叅性宗浩浩乎上帝之心也悠悠乎米眾之因也有志者視戒規碧玉眞宫大戒一戒曰不殺微命二戒曰不起淫意三戒曰不生諍念四戒曰不盜一芥五戒曰不欺一愚六戒曰敦行盡力七戒曰語言無妄八戒曰千魔不轉九戒曰弘發願力十戒曰事聖不倦眞人曰上乘惟一道捨此難成覺圓明自然路非由爲人作人性至廣大性開成上仙王天君注曰本師言夫玉壇者上帝開化選擇眞修之子以充一會眞淨之壇也開化二字上帝慈悲之心上帝自龍漢劫來何日不以赤子之心待人何至立了玉清正壇纔說開化要見得時節因緣元始上帝親涖塵沙而說法也法廣而深眞仙聽法之際咸發誓願親往下方濟度是時祥烟遍覆七寶浮空隨地結成宫殿仙眞下降或示鸞書或降凡身親臨輔化上帝承是願言設立上中下三壇層次宣達俾有緣之子不致汨沒靈光所以本師又說選擇二字選者選其夙根擇者擇其品行夙根旣嘉品行又正方許入得大壇是曰眞修眞修者以眞心行實修也眞心旣充上光自接不待慕靈著異而始面我本師也壇曰玉清爲何又說眞淨見得以眞合眞性光明淨方始充得大弟子不負元始上帝之眞切妙化也又說上帝慈憫深摯見彼眾生貪名逐利遺失本來一段要見得慈憫之心時時入人心坎照見那有夙根的被名利之心喪了有品行的被名利之心邪了本來故物日暗日昏上帝雖慈焉能人人盡施大藥故仙眞不忘本誓時時降光啟迪冀復其本來如赤子入井何等皇急心如箭入何等哀痛選擇眞修不得不汲汲也十眞八使咸以本師之心爲心指詮示法不啻萬言而示弟子眞實清修只有七件七件之中前三件是教弟子之顯功後四件是教弟子之密證第一曰上事聖眞上事者敬心所發萬聖千眞式臨壇宇在内則屏息斂容時存兢惕在外則揖必至地拜必挺腰無速無遲班聯如一著不得縱肆之念方展對越之儀第二曰中交神明中交者誠意所動神祇將吏森列在前或冀表文之上達或冀符命之宣通當平氣以相接舒顏以導誠著不得諂媚之念方見孚信之至第三曰下濟羣生爲弟子者上事旣敬中交已誠一點誠敬之心直達瓊霄是時不將天化闡揚豈不依然虛生浪死所以本師又致叮嚀以下濟爲急濟之一字有百折深情如渡江泛海必須乘風方能達岸如壇緣之順逆非逆施而行也壇緣之處逆則當固守待時處順則當廣宣壇教隨處宣揚以副上帝眞慈又濟者廣及之意也萬民之災沴如我一人之災沴水旱之祈疫癘之禱豈容不爲請命壇中弟子有厄如我一人之厄疾病之來祟邪之殄豈容不爲驅遣至於下度沉淪亦在濟中生出第四曰修元功元者天之正色丹之定基自然而然非說可說修之則能中包天地外契五行不修則爲血肉之窟而仙根難見矣本師指出箇修字有不疾不徐不難不易境候俟人自驗可歎世人妄意修元者或指左元右牝或指虎嘯龍吟或冥覩凝想或息氣閉關俱是拘形逐跡大足悞人所以又指箇功字示人這功字要見得不是内面去尋外邊去究寔只須靜中著力一身三百六十餘竅皆有光明正上應周天之數人只須在尋常日用間靜持其眞動維其簡勿勞我形勿役我身自然眞竅中有妙光上蟠下際可通上帝之心可濟兆民之命故密證之功以修元爲首務也第五曰積妙行元基旣定若無善行持之其基必致易傾所以本師又以積行爲急人之處境不一而可積行則一也故我規中分貲力之法以勸弟子卽本師積妙行之法也貲者人之所吝也知妙行則吝可化力者人之所惜也知妙行則惜可竭總之積得一分自種一分善果他人奪不去人當初積之時尙有苦難之色若曉得了這便是妙行而千而萬勢如百川赴海豈有稍舍之時成眞證果多稱妙行可見行不在成證之後而後積也明矣第六曰入寶月寶月者本師之名號也本師名號不一而此云寶月者要弟子見本師之心光明洞徹無一毫䝉蔽也本師何心以弟子之心爲心故比明而共印弟子之心何心當體本師之心爲心故潔凈而常圓所以提箇入字出來見得本師如愛護赤子惟恐傷之弟子亦宜以慈母之恩待本師惟恐一刻離之這纔是入寶月第七曰叅性宗性者人所固有之天良宗者人所當止之歸宿性出於天而賦於人五常百行豈有舍性而外求大道者乎故性有專屬而命則隨之修性不謂命者專主於天也立命兼攝性者自盡乎天也奈何世人不知正命遂因而縱食色之性以累吾眞是以性水不滋長生路絕性光不透十釁叢乘而夙根品行又烏可言哉所以將叅字示人使時時内考常自檢曰今日所行會合天否曾縱情否自考未定於明師良友之中互相訂證失則攺之是則更勉行之旣力性水性光自然重復而萬里危程今日始到是爲完人七件旣能方曰玉光上乘弟子庶不負上帝之心本師言有志者聽受戒規選擇清修之子便當立志志在精勤方始植得夙根不畏霜雪之壓覆志在堅確方始成得品行不爲利欲所搖惑故曰有志上文密證旣已持循勿怠全賴戒規以守本心故本師又說十戒弟子當細心靜聽本師頒這十戒可謂巨細兼該就是禪門之菩薩戒元門之天仙戒亦不出此範圍所以上文說了性宗戒中就教人明心一戒曰不殺微命此戒要弟子發慈憫心上帝慈悲度世只在仁字中發出所以物物必要度盡方始愜我大願本師示現十八身中尙欲變形飛走以度惡道故畜生一道其報最慘莫道他業重任受刀砧之苦弟子等見之便當惻隱動中惕然悲涕思我前生安知不曾墮此而忍殺之乎又當思我今雖爲人安知來世不又墮此道甯忍嚼而戀之乎回思至此當代爲哀求懺悔冀彼復全覺性至於微命尤人易忽殊不知他也曉得避寒欣暖躍草啣花一種自憐自適景象何常異人只因有知無覺有識無靈所以自生自滅一段覺靈未曾悟得耳爲弟子者當憐之救之方不負本師之戒那有戲殺故殺之事乎受戒者當深體戒言不殺微命若微命不殺决無恣口腹而自奉者可知二戒曰不起淫意此戒要弟子發潔白心本師承帝恩開化度儒門而成正果修至性以全道心不是教弟子捨身出家而輕廢彝倫也所以指一意字示人然淫字亦要看得廣不可拘在色欲上說卽如廢當務而逐遊覽是專淫蕩棄常經而事奇藝是專淫巧疎上眞而媚左道是專淫祀捐詩禮而躭豔曲是專淫詞故本師說戒至此條要弟子守定眞操勿爲外好所役方能鍊得此心潔白如秋水一泓汙濁盡去故曰不起淫意受戒至淫意不起决無漁美色而敗倫化者可知三戒曰不生諍念此戒要弟子發忍辱心諍者諫言之直也雖君父之前尙有諍臣諍子然施於君父則可若守眞之壇事關救濟合於天足矣何需於諍理符機會契於眞足矣何待於諍况是非曲直言下卽明必俟受諍始明此中先已撓亂烏能藉諍而感格乎甚有明知其非而故言其是明洞其曲而不言其曲任其事往而私議曰我已知其事之非而假意順之者恐言之以觸其怒也明知其理之曲而不面言其曲者言非我責奈何我獨饒舌也本師所以指一念字以抉人之隱人若能去此念字必也和其衷以納人之言大其識以繩人之謬彼此同心如水受月事無過舉理不妄牽人盡合天斯爲大道故曰不生諍念受戒弟子諍念不生决無生謗誹而壞天化者可知四戒曰不盜一芥此戒要弟子發明净心貪者盜之萌欲者盜之漸人身一落塵沙纔離襁褓貪欲之心頓生養成驕慢以爲舍此貪欲便無以立身成家故本師特揭個盜字警人甚至富而貪貴雞鳴喔喔猶如昏夜之乞憐貴而欲富虎視耽耽惟念脂膏之潤已燒黃煉白空求不死之丹翠繞珠圍幾見蘭枝之夢迨至欲求眞道授受何從所以不盜之戒最難遵守不盜尙難况一芥乎若以明凈之心克之則取與之界清而盜源息矣故曰不盜一芥受戒弟子一芥不盜决無攫金於市廛者可知五戒曰不欺一愚此戒要弟子發眞實心小智小慧最足損人道德而播我之智慧全將一欺字術人以鳴其得意殊不知愚有二種有質厚而賢之愚有質魯而拙之愚賢而愚者不受欺拙而愚者不知欺豈非徒逞機鋒而不受不知於彼何損况愚忠愚孝在聰明者止可旁觀愚直愚誠在椎魯者易於入道此戒犯者最多只因不知欺人正自欺耳故曰不欺一愚受戒弟子一愚不欺决無喪天眞以害教者可知六戒曰敦行盡力此戒要弟子發報本心至性所出惟有良知良能何謂良知彝倫之外別無可知何謂良能彝倫之外更無當能知矣能矣而不加功盡力則景賢學聖則古稱先謂何所以本師指箇敦行二字爲入道之階况凈明宗旨首重孝弟故斗重孝弟王垂法度人壇之脈絡實由於此奈何弟子等名浮於實性滅於情事親無養志之心他日事君必僞事兄無友愛之篤平居待友必疎甚有衣冠甲族而醉柳眠花學敗倫之蕩子詩禮名家而馬釣錢攤等下賤之傭工竟不知立身一敗萬事瓦裂豈不痛傷第思若輩豈不自有知能以用惟用之不良故至此耳所以本師要將行字去盡力盡力在行上爲之自然惟日不足那得工夫去閒遊曠蕩喪失天良乎故曰敦行盡力受戒弟子盡力敦行决無壞名節以傷化者可知七戒曰語言無妄此戒要弟子發誠一心妄之一字埋沒了多少仙根道果只因妄字認得太眞故耳孰不有正緣當悟被那富室田園孶孶罔倦營謀不已貪嗔濟之甚有侵人之產以方圓已產占人之穴以爲已穴遂致陽訟陰號貲傾家疾莫不從妄而生此外境之妄當戒也若内妄則馳情縱欲但知圖歡習惰偷安不思精進妄冀長年而無玄功之修靜妄干聖眞而無妙行之能積出片言而謂人必我從妄發於欺答一語而謂人必我信妄流於蕩甚有對上眞而無實矯詞飾行叅上帝而不誠陽攝威儀心不存於經懺而内與外相違志不專於幽明而聲與意俱倍如此而曰清修知大道者如是乎所以言語出入最有關切天心之去留在乎誠僞人之誠者言必寡人之僞者言必支是以善聽言者聽心善視人者視色若弟子能受此戒立功必成以其能嘿而守也妙行必積以其能簡而操也故曰語言無妄受戒弟子能不妄語言决無逞舌辨而妄道者可知八戒曰千魔不轉此戒要弟子發堅固心魔從心起不是外來世人常謂道高一丈魔高十丈此浪言耳非眞實語若道高而召魔則古來得道者鮮矣何以龍漢劫來得道者愈繁而避魔之書絕少可見云道高者道究未高也世上妄稱道高者不一有嫺習歧法而顯神通圖私利者道不高有煉外丹而服假氣者道不高有品行端方眞傳秘授不知時節强以與人者道不高有良緣際會大壇眞元䙝慢不珍者道不高召魔之由皆從此出若入壇之後妄想有爲必受境魔入壇之後卽冀天福必受病魔入壇之後不立輔天大願逐隊隨班無上進之志者魔亦不來道亦不見故本師以魔字堅弟子信心去弟子俗念所以不曰一而曰千鍊金剛體者自能解之經云魔王退保可見魔非邪道所以堅固正道也故曰千魔不轉受戒弟子雖千魔不轉决無舍正道而外求者可知九戒曰弓口發願力此戒要弟子發廣大心經云齋戒禮誦無願不成此爲初進道弟子而說也蓋弟子初入大壇未知心性工夫當先以齋戒清其心禮誦明其性以至淺之事開發其至深之功所以願在是功卽在是若加功旣密便要將弓口字擴充其廣大之心大士云弓口誓深如海若有志無願志爲虛設有願不弓口願爲塵沙所以證如來成大道者願必大大而浮又慮其易竭故曰深如海所以大士辭佛身而作菩薩者度人之念億劫常存也我本師誓願不憚塵穢腥濁隨處眞光相接者以誓願弓口深神通廣大耳本師更不欲以一已之願度人而欲羣弟子皆當以本師之願爲願故曰發弓口誓願受戒弟子發弓口誓願决無作自了以成眞者可知十戒曰事聖不倦此戒要弟子發精進心聖心無處不現聖光無在不燭所云事聖者非專指醮祝參鸞之際也人當不聞不覩必宜嚴如在如臨之愼倦心之生皆因平居失於戒愼故雜慮紛乘而自不覺惟能事聖者守神於室則事聖可接聖光納氣於中則事聖可見聖心若疲神傷炁則已之心光先已撓亂安能守天乙玄精而明我聖日聖月故本師提出不倦二字而表精之根源丹基萬法未有不先從事於精而可安身立命一身之中百骸九竅皆有眞精而精之主則在中田上田爲神廬精充則神光常湛下田爲氣海精足則氣脈常流大月之源皆出於此本師故以水月示人入道精喜靜靜則明精喜蓄蓄則清故曰清明在躬志氣如神以清明之躬事聖天心和豫而至誠足感以勇往之志立功則妙行皆圓矣故曰事聖不倦受戒弟子事聖不倦决無面聖眞而昏怠可知十戒之後本師復以偈言繫之曰上乘惟一道捨此難成覺上乘工夫不過見性明心所以本師以叅性宗透了箇性字十戒内皆藏一箇心字世間萬法千門未嘗不具大道而獨我本師立將以心悟性一解卽超無上所以說捨了這易進易遵之道更有何處能尋覺岸又云圓明自然路非由爲人作圓明二字卽本師寶月二字圓而不明不見大月之體明而不圓難澄金水之輝本師教弟子入道之法不過斂光於精定志於一便是登雲捷徑若簸弄靈光希通異法立願不堅喜入旁門者卽與本師之道殊矣所以自然之道貴乎無爲無爲之道方可有爲此志此願要言下立發如參唯唯是也所以說斯道之源如是若一萌歧退卽父子之親師友之切其昇其墮誰能挾之故曰非由爲人作又云人性至廣大性開成上仙本師嗟嘆人之元性出於天而𢌿於人巍巍蕩蕩與元始之光明不異爲大壇弟子卽當養元始之光明以濟羣生充元始之光明以事聖眞放元始之光明以交神明總不外這性字性見心明三彭六賊聞風宵遁故曰性開成上仙又何疑乎余自受督教以來本師之教弟子玄詮眞訓多矣似無煩余之再贅然天心密邇不暢發本師之心恐愚迷弟子矯者無以化其正滯者無以致其和故將本師之訓所說戒言條分縷晰如霧開見日頃刻洞明庶幾後來英俊借此爲濟海之葦云爾辛未讀詮心法王天君曰本壇妙經眞詮須潛心細讀叅求大義勿著色相邊推求勿向隱怪處尋覓平平蕩蕩眞路自開切勿舍爾靈龜向街頭問卜倘遇盲人指點翻令性海汪洋納於牛跡矣又曰壇教雖有深淺之不同而所以爲教者並無深淺之分看鸞諭者須要會心到無深淺處方能豁然有得苟萌一點好文之心深者則愛之淺者則置之縱使淹貫寶藏於心何益看諭之法第一要平心將眞詮訓語如今日新聞句句不敢輕放第二要靜氣上眞寶訓本從性光中演出若氣有不靜性光已昏何從更得妙義第三要去執本壇教言有因人而發者有因時而出者皆有一種妙圓妙機不可認作死句看第四要去恃人世元言甚多已同塵土苟本壇教訓亦將粗疎之見一覽便道能解不惟上孤帝眷抑且無益性靈若能去其執恃養其平靜可以閱寶藏而得眞傳可以行大法而襄天化又曰正宗大道本在平直平則不偏直則無曲大壇所傳經訓如九孔神針一線而貫弟子等誦繹經訓先當尋繹大節大根方得我大壇綱領太上道德天尊壬子年降太上曰金精洞然大月之基性水昭融者天眞自全精微至靈道寶惟一不二眞一之悟靜觀元妙復其本來同德於元始氣氣相資光自不滅人能發正信道意尊敬玉光天子卽有三清眞人三洞神將施力護衞永斷夢幻泡影之相而得神明不壞之身性非難修和光剖微則悟眞常入道者微以動著光以破迷可得性水湛明心如滿月大通無礙吾念銛能以鈍姿而修解脫復元之道故特降此言之須時時護苗種黍愛養靈苗以承大命不可忘也浯邱天公玉書曰浯邱太上假名爲本壇洞法主浯邱天公曰廣揚聖化誕演眞如恢漠妙道傳授眞書本元妙本元眞本元神三者同爲萬化之母同謂之元五玄精六玄神九玄靈玄精神玄玄靈同出於一氣本元也精之始生冲然而虛精之始成湛然而明精之始有翼然而英故道人見英而知明見明而知虛虛之又虛謂之玉虛氣之始生鬱然而清氣之始成浩然而誠氣之始有肅然而青故道人見清而知誠見誠而知青青之又青歸乎始青神之始生混然一元神之始成昭然如嬰神之始有奕然有思故道人見思而知嬰見嬰而知元元之又元至於太元夫三者人之所以爲人也卽地之所以爲地天之所以爲天也妙眞神三者上玄之體頂有金光覆護其身心如寶月性如帝英現光度世之本也浴神之道莫如無思吞芽之功莫如不馳養丹之法莫如至虛治身之方莫如不驕恬然無欲怡然神舒此之謂性青爲元青虛爲元虛元爲元元入乎道則不知其入乎元一我而已傳道卽知命明心卽見性眞眞神神妙妙一元而已何者爲眞何者爲神何者爲妙一性而已夫惟如是期於得者必至於失期於有者必至於無期於勝者必至於不勝故入道之人心無所期惟有所止神神眞眞妙妙矣三者一玄玄起於帝故名曰帝玄帝玄玄一不知其所以然故道心無所住謂之眞住心無所空謂之眞空心無所爲謂之眞爲心無所化謂之眞化圓明之門盡於此矣吾故能知眾生之性浯邱天公在洞神之上居太於元居元於妙莫乎不可得微乎不可測遠之則不現現之則大變水之母金之眞如烟具妙具妙生神吾能踐其位而不疑入其堂而不懼造其室而不怖所以然者吾能得精氣神而養之也夫是以知三者妙眞神之基妙眞神三者精氣神之元眞人於此六者念念在心未嘗不勤三靈九英至此始矣本乎太元發乎九天道法一宗志士密傳秘之秘之浯邱天公曰主法須明行法須誠悟斯道者玉清可臻恩光甚渥天化靡窮在壇諸子皆有成果證因之日各宜勉力自新毋至倦怠斗宫九法乃太上勅命傳頒將來大法聿開神光正郁須俟壇中有大弟子出方能成就此緣也成道之人皆具弓口誓得道之人皆具慈悲造道之人皆具清淨行道之人皆具智慧修道之人皆具堅固大弟子在此五種人爲之開化不易言事聖有倦不能開化矣事聖不易言昭明不結不能事聖矣昭明不易言天心不湛不能昭明矣天心不易言人我未忘天心不湛矣壇之興敗在乎幾微道之存亡在乎頃刻人之離合在乎須臾命之去留在乎纖毫大道坦坦大化昭昭大人純純大德平平能一者隆能空者弓口去其所愛得其所愛離其所欲遂其所欲反其所好成其所好用其所知開其所知導其所能進其所能遠其所樂適其所樂大弟子以此悟人之性見人之情明人之志順人之意發人之思啟人之睿大道之門有一而已入門之門可二可三可四可五因其所偏以正治之因其所陷以力挽之因其所窮以通將之因其所迷以照引之因其所失以得助之諸弟子皆能見道矣大弟子者諸弟子之師天神之君玉光之子眾生之燈第一曰守戒第二曰好善第三曰勤修第四曰靈通第五曰凈見第六曰正覺第七曰明曉第八曰入流第九曰乘時第十曰護念第十一曰大忍第十二曰大和第十三曰大慧第十四曰大觀第十五曰妙行第十六曰具妙第十七曰大具妙第十八曰無勝妙第十九曰最妙神光所在之處名爲光嚴所居之境名爲妙境所化之人皆得名爲正法弟子一劫之中度人化人其果可知矣我見眞道流行之妙至此盡美矣天心在一一者性天也天化在變變者神化也天道在誠誠者元眞也夫是以知大弟子不勞其形不役其神不炫其明不有其知大人純純此之謂也傳道在心心之主曰神道光旣厚神自清明是名修行門心主不清神明不察難得其道以心提起勿使坐昏是名煉神門大道在心心光未充見猶不見能勤能聞道亦可得是名致知門三門者乃入聖之要道見性之捷程入道者先須入門入門者先須認主夫如是人材日廣吾教可興夫如是天心可得度人乃弓口夫如是原本者多無有退轉夫如是神通廣大不入旁門夫如是性天合一俱入大乘故大弟子爲諸弟子師當矣安矣妙法傳於月妙道傳於米傳傳而下月米而已月者米之精米者月之英悟其精返其英天尊恭敬尊重稱大弟子玉光弟子度人弟子妙如心法可以心傳飛玄神法可以神傳一切大法可見可聞三清妙境卽在此矣現光弟子修光弟子乘光弟子愛光弟子現音弟子修音弟子乘音弟子愛音弟子皆是大弟子之徒師諸弟子者大弟子也當矣安矣入壇卽入道未入道不可名爲弟子聞道卽聞性未聞性不可名爲弟子談玄卽談行未立行不可名爲弟子侍鸞卽侍聖未侍聖不可爲名弟子當名信子蓋言可進於弟子者信也聞我之言當知我心見我之化當悟我道我心直而不倚我道常而不弊大弟子當具清淨而修解悟大化自彰天眞可得夫道一而已無可言者也欲化眾生不得不言夫性一而已無可論者也欲化眾生不得不論然而吾道吾性終不可得而言之論之妙周於萬化化周於萬物萬物得化而生得妙而靈大弟子得妙而度眾生妙雖可得眾生不可得雖曰度眾生而實非度也妙道至此可以登眞矣我奉上帝玉命來臨此壇俯觀景運眞道宜隆因緣大事惟在諸子自召不可忽也浯邱天公曰修心不可着有著便非修萬法歸一空惟空乃能宏性覺圓妙性圓則合性滯則離歸眞則能反一養慧則能定光人之一身非神寓則死人之一靈非道涵則滅故養其神而神長生守其道而靈常在凡夫不知道故不明心不明心故不入道道爲心元心爲道本兩者豈可暫離離道則昏昧心則著不可不知也滌心須滌盡莫放一毫污煉丹須煉眞莫著一分假爲已須爲徹莫存一點障爲人須爲透莫置一絲寛大徹方大樂是卽我安心積功成聖胎所修亦如是試問學道人還元欲也未浯邱天公曰靈臺峩峩鬱蒼香服氣生神守胃房雲霞杳沓來天中妙光湛湛聖月藏因道遂機玄中玄語語皆是仙中王回風混合眞人悅延星康斗童女芳始氣在我絳樓中天精飛入天乙堂太上眞符不用鈎直道金文付玉皇子能見之可翺翔飛玄洞神遊帝鄕世人不知心是母太玄𣺌𣺌非中黃太乙一現守太乙居之不懼藏不息固精養氣護靈明一點眞文落太極圓明氣母是法主苟能悟之三彭死入道長生永遠希見玄爲寶丹光立用神使將在金樓金樓一門通天子照徹英英三九數彷彷彿彿皆來護一日二日萬法通吾子得之是要路天皇眞氣在泥丸太乙眞精是丹母虛心觀之可現光光從金水長空窩胎元在我兩腎交丹田火熾胎元墮一昇一昇復一昇眞人乘火飛金門飛玄𣺌𣺌不可說煉光煉月皆有得世人豈知性裏通吾子知之可度蒙玄玄至道非尋常知識意見悉宜空湛然一點帝光照飛玄天道眞天道眞人志士始得聞一朝可役千萬神至心思念玉光聖三九心傳方可進十年功行積無邊到此方知是天性一言教子當細思一事臨身當愼之勿輕勿逸養靈光自有天神開子知聞道未可名言說至人勤行實無得歸來寂然相色忘天顏在邇天根實胞元一斷霹𩆝聲飛玄恍惚入帝庭大法有聞修可到莫將三毒喪元精太上眞符在主君瑩徹光芒卽可行何須步罡履牛斗何勞結訣誦靈文元始一符萬神走上帝一印千靈欽隨子立行并立功俱是我等眞心興化工在人不可遏玄元眞使靈通絕世人當知大月居故傳此法同志習勿使匪人敗化機勿使庸夫胡亂閱上道非緣弗可聞盜來雖成終日傾子當愼之勿慢存一言一字皆玉文誠敬由中舉止端品格卻從孝弟敦審緣察安不可忽付法他人如此說太上靈寶在心傳非心慕道神光滅愼兢翼翼開大教生者受恩亡者越傳心傳道及傳神高上金門上使臨惟有金剛不退轉飛神自然到玉清本師玉京左宫天子玉光普照天尊一號玉清首座聖慧寶月如來一號救生發願慈悲碧玉眞人玉書曰敬稽天尊洪名寶號未著人間而辛漢臣所集錫福寶懺終僅有玉光普照天尊六字今爲玉壇開化教主者自庚戌年下元蒙頒月九眞經始知天尊以重梵光身發司靈大願叩元始而開宗顯聖師以度世故頒經之後卽蒙眞駕時涖靈壇教雨滂沾宗風丕振又按天庭金格曰本壇正脈元始傳宗故號玉清而正宗心印惟寶月得其眞故教主則爲玉光雖曰玉京左宫天子要之卽是上帝應現法身託眞人以立名示師道以設教蓋慈願也大金神曰玉光微妙淵通我等皆仰爲師範今立壇在此如寶蓮出世色聲香味無一不臻至妙壇中弟子誰能消受此蓮之色得眼方見此蓮之聲得耳方聞此蓮之香得鼻方知此蓮之味得舌方嘗消受寶蓮之具爾等箇箇俱足只要能淨不淨則雖具而不足矣吾可爲子等淨之然須先發肯心肯心一發善根卽現現光弟子是也玉光弟子皆由現光弟子造就百年當如一日切勿求速效雷天君曰上帝住在金闕而玉光卽上帝之清淨身也故居元始玉清宫今來此土開教降聖臨凡慈悲豈可名量奉道弟子必須心同玉光慈悲救苦奉玉光之戒同玉光之行守玉光之規同玉光之教叅玉光之訓同玉光之心奉戒守規叅訓乃可稱玉光弟子王天君曰靈應十方混然無名慈尊妙相寶月圓明慈尊妙心難狀難形浮黎黍米萬劫修成慈尊妙音普度天人三珠振響檀熾和鈞慈尊妙道三界推尊大無等倫細入微塵吾聞慈尊證果玄眞萬仙爲師千聖爲朋吾見慈尊仙眞道迎藹藹天顔穆穆天心吾願輔慈尊俾使正教興吾願輔慈化俾使人民欽本師言玉和靈範道結眞光三藐泛蘭祁曩專然明梵浩𣺌淨正太皇我示刀圭蓮華黃房醜鑒惡奕洛澤眞格三邱上聖元始天王抱孕萬靈散霞吐芒六角眞妙觀察四方雲雲流流通入飛舞品圓液成次歸上玄蕩蕩大化眞法之光咸至佻忘綿綿是狂景照互容飛到帝旁大聖智慧從定心降金門大神奔走雲鄕護道驅魔度人無量道者綿息非動償其幻動復歸綿息身如泡影法如鏡花不可取非法亦不可取身法非法非非法我心如是常應常靜故如來之果可修心者神之元領之至神完之至擴不損不滅勿害於情深求其情害心之故悟見本來俱爲幻空空而非空至於玉清眞人在上情生五衰五衰旣現重下雲霞之天住有欲界以煉我無慾天人在天性迷生四相四相發露重下紅塵受人我報眾生短命報夀者滯生報故當於報中忘相叅性復其本來凡人亦然欲動結愆愆結害炁沉爲魂魄受報諸苦或者分靈之苦或者囚性之苦或者迷徑之苦或者落阱之苦或者戀眷之苦或者驚惶之苦心迷諸苦遂陷地獄惡境受無窮痛苦辛酸具本來而不見思欲脫而無門通道雖邇莫如返還是故人當克欲求神金闕可到凡人之報非止於一二生之前所定自元始分眞卽當有是深淺因緣眞光旣遠道岸難臻甚者緣報未盡復結罪狀生生不已愈久愈昏不知大地之上有聖賢可師空寂之中有玉光可得執迷忘返以墮苦惱求道者能捨除眼前境界卽可安穩心志不驚不怖不畏而入清淨解脫無上眞門俗者心之至妄眞者我之至常但凡夫不知大本以俗爲眞忘其所以有俗是故落於凡流人能空其俗緣悟其眞常卽見無量光明卽耳無上妙音卽聞無上眞香卽讚無上妙道卽通無上聖眞樂淡自然眞人可至法無頓速無遲延道無憎惡無好樂雲過月現幽寂之境米光湛然是曰沉潛大定可見妙如妙如之名我之妙如非妙如之我非爾之我是道之我故我不見有我亦不見有子子能不見有我不見有我我卽是妙如虛無大道宗元正本得正眞之炁也修無爲者必先爲有爲有爲之爲卽是修無爲徹玄之義明玄之道收玄之神任玄之境故名之曰寶月妙如絳宫眞人可飛可走可動可靜無形之形有名之義洞玄之子須當志以求之我昔在西天名天修如來三昧忍辱之性而證金仙厯無量億劫化人救苦乘元始玉毫來事元始上聖名曰普照眞人飡聽妙法修入黍珠又厯三千劫得大乘菩薩道永超情想故號之曰聖慧寶月如來居大羅天處碧眞宫登七寶座以成福報但凡夫之人未能苦志先貪福利故終不悟喪其眞元深可憫也靈非我靈眞人之靈神非我神至道之神道非我道中天至道心者得道非載道文者載道非得道但凡夫之人忘文卽是忘道忘心卽是幻道不能貫玄上士非文非心非我至悟於無法之境執法之柄如是如法故大貫成身以心累非身累心情以性累非情累性眞見本來幻者卽是至實忘者卽是至眞方圓可合大小相容而悟要妙風土習成易離易破神光一遠萬法難逢能皈命大道眞師修緣養寂便有大羅眞人教訓或出或入或立或行或坐或臥無非長養性光生神合帝而飛玄中金闕大殿有神無量無數皆同一性皆同一志皆同一慈皆同一信義理自然果報清淨周行大千世界可大可小無體無形無能無功漸摩涵養共悟元始人能知神之神故能傳神神化妙道不求可得求在解脫之志解脫者眞心去障則慧性日新克之又克卽是大慧金剛豈不入道但凡夫之人不知我心安知非心不悟無障豈知有障故宜調神息慮思我丹元也本師言上乘知覺在空本來欲悟本來先曉因緣銛等能悟因緣否業是因四大因緣著塵沙解障斷因緣莫如探本體空空卽是道空道卽是身勿見罪福相一切皆如來指你業身及業報有因有果種塵沙沙深忘本逐塵飛動幻本形不復識高高一鏡在生前解脫塵沙容你拾斷諸有相與有情水月鏡花皆福德旣曉前因做此緣先空知覺後空玄認定本來眞實相電光泡影又誰牽須具天眼以照已身卽得前說上眞玄音不可忽略皆是直指性丹須要日夜思量方得進步徒以句解字叅無益也皆是因緣皆是命修緣盡命見原身傳燈引你入蓮花業根報盡如來意本師言寶光現處空罪垢容得他人卽善夀千年萬劫無量修不如一日能和柔他人劣子父母管何必兄弟結深仇今世惡劫非由他相𡨚相報氣當發天宫帝子皆欲善地獄眾生偏好殺眾生生命命無常俱是浮生趨苦惱一瘟一水一刀兵見世善人知多少三天法主眞慈悲現諸妙與令人隨一年靈應龍沙劫金書玉文皆滿盈六𡻕孩兒傳此脈道釋儒門皆曉得飛鸞種子在誰人二木中曲一木直羅眞人曰一日能和柔者非言今日和柔而明日便不和柔也此一句如孔子所云一日克已復禮天下歸仁焉之意蓋修道者已先從千生萬劫廣種福田普植慧本福慧兩足道性弓口開故能得此和柔之一日是此一日卽爲寶光現處三界十方充周無礙而厯劫罪垢從此一空無纖毫之滯染故曰寶光現處空罪垢從此罪垢旣空則一身清淨卽多身清淨一人清淨卽一世清淨如是則視彼五無間性盡是聖因十八獄果盡同眞趣到此地位善道獨存則惡機絕滅夀量無盡則萬災不干故曰容得他人卽善夀王天君曰父母天地也人之爲不善乃自絕於天地故曰劣子而我與它同爲天地之子則兄弟也今有人責其兄以不孝責其弟以不順爲之兄弟者甯不仇怨耶本師言寶合音開甚自然大迷不智認爲玄我根爾根在何方只在我爾心中主看此動時道根出若爲妄心若爲識從此看透世緣清何爲合一何爲分上眞佛俗皆成道視佛俗殊增煩惱我曾出現三千身半從佛教半爲人火宅不過金不堅污泥不著蓮不鮮衣珠身寒不如綿樂國華麗安如天空中有門何處得欲得正覺須知偏上佛應口卽是法捨此修乘皆可殺魔教佛教判一心著法生魔離法眞妙如子孫多無數仙教魔教皆滅度滅度不得地獄嚴火熖血硤亦吾心報盡報盡復報盡我知我子去復來此音示與眾生知貪多癡迷枉自迴本師言空中有相復有音若箇爲偏若爲眞今我教子莫分別物來物應非吾心心同秋月尙非得纔得團圓永終缺寶中明月無數形三千大千皆可悅妙如出果師玉清玉清眞境何人聞始炁變出三菩提分付吾子無昏迷仙根修盡成佛果佛果能離得是心𢆯定禪修皆誘法不肯受誘是逆子打他辱他苦惱他賢子貴時必生孝此是下識非非門豈是有魔方作佛汝等今年進道卽有無邊知覺如不進道同彼逆子卽有無數魔障若汝心性汝等不要看道難能進一毫卽是賢子辛亥本師與白上仙同降靜壇本師吿上仙言靜湛眞人妙如在玉清爲首座長者未敢以爲聞道每自克過無有他求上仙言眞人每自克過無所不得卽是大求眞人靜湛在玉京金闕爲至眞眞人亦無所他願惟願眾生不入苦道發是願已無刻懈怠本師言眞人無刻懈怠是大願本妙如亦以此爲心無刻懈怠上仙言眞人靜湛於二六時中每自思想眾生不來之故求不可得願眞人言之本師言眞人不來無故生心無故心求不得何况非心生心者耶上仙言眞人眾生非心緣何墮落此意惟靜湛能疑惟眞人能道本師言眞人至此我亦不能道妙如所能道者以法心也上仙言眞人我念眾生苦於犁牛深不敢安願卽說是法心使下界有所宗别本師言眞人慈心救世妙如安敢不言哉但下方人民有五果五報六障三業不能信我之言不能愛我之訓上仙言眞人所謂五果五報六障三業可先示之乎本師言善哉妙如亦願先說焉心爲至虛著入魔果心爲至眞妄入生果心爲至常變入惡果心爲至明昧入罪果心爲至解迷入親果魔果之報心如烈火生果之報心如沃湯惡果之報心如飛散罪果之報心如觸雷親果之報心如覆塵眞人以此五果五報盡得入我心否上仙言眞人靜湛思惟五果五報盡同入我性六塵三業願眞人再示本師言眞人大慈妙如何敢不言哉眞人不入眼通不聞是法不入耳通不聞是法不入心通不聞是法不入鼻通不聞是法不入舌通不聞是法不入神通不聞是法上仙言眞人六塵消滅緣何積功而得之眞人可說本師言眞人至誠妙如何敢不言意業不盡道心不來身業不盡五體不具口業不盡𡨚債不退眞人以此三業之身得聞二人說法否上仙言眞人斷不得也本師言眞人三業之身尙不可以得說何况於是業中更造無數惡業上仙言眞人若人造如是惡業能度得否本師言眞人雖入羽毛濕化之儔亦得滅度上仙言眞人羽毛濕化眞人將何法度之本師言眞人妙如在玉清宫放大玉光雖羽毛濕化亦得見其本性不復墮落上仙言眞人靜湛聞之眞人有十八身教可得聞乎本師言眞人妙如未敢安耳非敢曰教上仙言我在四八日中常思大力願示勿吝本師言眞人大慈妙如何敢不言哉眞人妙如常現天眞之身發諸異香神光徧遊三天之下及大地獄以攝眾生妙如常現人聖身行諸妙道設諸禮樂以攝眾生妙如常作孝子身忠臣身忘諸貪戀不畏斧以攝眾生妙如常現道人身獨處山林殊無畏懼以攝眾生妙如常於惡劫大難現苦修身終得生活以攝眾生妙如常現富貴身施財忘我以攝眾生妙如常現魔王身誘諸惡類入於地獄變換靈根以攝眾生妙如常現貞女身諸邪不入以攝眾生妙如常現貪夫身聚諸金寶以殞其命以攝眾生妙如常現十惡五逆身受諸極刑致入地獄受大苦楚以攝眾生妙如常現貧困身衣食不給以道自處以攝眾生妙如常現邪教身興諸廟宇爲道人所繫以攝眾生妙如常現禽獸身飛鳴有節飮啄有時以攝眾生妙如常現良醫身教人養護以攝眾生妙如常現陋貌身人所棄擲以攝眾生妙如常現飛化身人所敬仰以攝眾生眞人妙如一心慈悲止此已乎上仙言眞人若以十八身教爲可已不爲道人卽不得爲妙如是故靜湛能知眞人止言其可見不言其不可見本師言眞人在玉京中以何法救度上仙言眞人靜湛在玉京中說八大法天宫帝子皆以我法得度本師言眞人是八法者下界銛等可得聞乎上仙言眞人靜湛在元始前懇恩方便銛等可得而聞本師言眞人妙如觀時已至可卽言之上仙言眞人命我靜湛何敢不言靜湛初於浩劫之先求道不得爲心著物以忘物門得道眞人靜湛復求道未得爲有我見以忘我門得道眞人靜湛復求道未得爲有長生見以忘長生門得道眞人靜湛求道未得爲有眞人見以忘眞門得道眞人靜湛求道未得爲有師見以忘師門得道眞人靜湛求道未得爲有弟子見以忘弟子門得道眞人靜湛求道未得爲有如來見以忘如來門得道眞人靜湛求道未得爲有救護見以忘救護門得道本師言善哉微妙之言銛等何幸得聞乎本師言銛吳銛汝知法中法蔽乎心法蔽眞慧慧法蔽眞通通法蔽眞母母法蔽眞空空法蔽眞道是故我囑仙子莫著一切法莫著一切相我如也人如也道全德備矣凡人能識一百字可以奉飛鸞可以聞正法鸞不著相故也如珠錦錯綜泉源浩浩我視之如死泥塊何以故於道多迷也上清之上有炁無形玉清之上有道無文今動此處鸞意飛天外矣念之本師言主大法宣大化宜空如妙如行如妙如願如妙如大德不德成於空無能勝體成於行如意祥光成於願夫妙如玉清之心法境忘色忘相忘反其無英洞然元明月光隱晦其寂藏月光顯著元始玉身有至寶惟在斷欲道有萬層專沉直上落落乎恢矣上士聞道如與已爲𡨚顧惜不得故能有成我悲眾生慧識旣短又愛凡軀生成大障桐羅桐諟吳諟有自然大道之言諦心察聽可用以宣化也玉清大使七什藍迦曰三界之主其言大慈深抉奧妙非等於常文道道者宜細心叅究堅猛受持庶幾入道不負玄恩本師言神光之子大本可悟性光之子大本可求道光之子大本可聞如其不聞急急悔罪不能悔罪速攺其過不能攺過一心下人下人者道也非下人也道下人也無道之人上人非上人也大逆命也死不足救生不足接引仁人之心如是仁人之心上帝也上帝亦如是仙子不可畏我言妙如之言也本師言通明本覺何一何二世人不知遂分空玄究之心性不殊趨慕自異而本來慧光潛沒所以上帝分身開化先定其門自見其質有質則光深光深而明照自然可以洞達八景可以潛育三珠可以昭融九幽可以闇暉月鼎總從本來生質上把立若質已漏損雖外繪文采内先崩裂與道雖親離道愈遠矣子等功夫先要鍊成金質火不能焚煉成雷威山不能壓煉成玉毫日月不能奪其明斯方可爲上帝弟子玉尊法臣然平日第一要養氣氣能貫天符可達天氣能貫地符可徹地氣能通神符可役神若平日不莊以律身敬以接物放精耗思妄思妄想溢喜溢怒七情顚倒六慾逞揚先天一氣先已漓喪直至臨時尙欲自矜曰我取者祖氣也此生氣也此煞氣也此五方正氣也以此而云藉氣達符吾未之信也第二要保元元者無極之先昏昏默默無作無爲一點中已包億劫化生人人具有只因認無作有訛以致訛將飛靈謁帝爲實境反使神思飛揚心光搖蕩眞元反不能接矣第三要澄心心者太虛之境太虛之中洞洞空空不著於物不粘一絲無明無暗無識無知無來無去方爲大光明境界一涉有爲便非眞境眞境旣虛眞元何辨眞氣何生三者缺一縱得玉籙千箱金書萬軸已身尙不可度焉能度人弟子勉之壬子本師言虛空妙道惟在忘相入門所謂不住心一也一者妙如之心不住者妙如之法觀此幻相眞相卽現空此幻相眞相卽實此爲道法統宗天人一貫之源在壇弟子不可不悟今宵我見諸子神光頗明故來眞光爲神光之本神光爲眞心之枝植其本而枝自茂培其枝而本以滋神眞交養妙如可得法者神之作用道者性之作用故道法兼修眞神兼足從此以入虛空是我玉清眞傳也若非然者終爲小量未見本來非非雖切究無成功我願諸子好樂斯言也碧眞弟子曰道道傳法皆要一空空者大道之空非冥頑之空亦非著境之空天空故高地空故厚厚者能載高者能覆惟其一空故天地能覆載於人於人一空更能覆載天地也空者實之本靜而不動居斯空也清而不濁見斯空也虛而不著法斯空也一而不紛得斯空也玄而不色道斯空也聖慧寶月一空而已性光九英一空而已玉清之正法大道之直門若非寡過滌愆之士安足以語其妙哉我碧眞弟子也事碧眞者億萬士眞師護念未嘗私偏妙如之道妙如之法宣說示現罔不聞之是故大道人無所爲秘法亦無所爲心法心法有直道雖罪障重重莫不以直道教之也子等莫言直道難進莫言直心難發總在一已雖多言以寛自亦無益也同心同德方能應化子等俱已共事眞師謂何彼我之念如此深重可憐爾等只因障大未能見得道字眞相字假耳今日眞人親來指點子等當於靜中求悟斯悟道矣壬子本師言大華嚴經云佛言是平等心欲令一切眾生悉從十慧而證如來平等之心人人具足不待修持不待行願世上凡夫肉眼看得道字過高視得身家太重所以一言一行俱與平等相背將自已蓮苞十慧日凋日謝本然晃晃明燈悉被惡風吹滅今日爲爾等將蓮苞香露洗刷垢穢本來再現須具金剛力拔盡罪根智慧刀割開𡨚債自然卽心見佛然世上凡夫有五種斷不入道底人謗佛謗法者無論矣有一種聰明自用的人玄詮眞諦過目便知郤道此言無甚深微不求精進此種人譬如春藻秋蓉一時文雅畢竟不能成實願爾等勿效也有一種夙植旣好又現生富貴的人鐘鳴鼎食翠繞珠圍縱遇直師不過歡喜佈施不知前生因果此種人譬如冠嶺秋霞日落自滅願爾等勿效也又有一種心雖向道性卻無常的人朝叅夕誦自謂精勤殊不知萬法千門畢生豈能盡曉若一法未能又尋一法一詮未解又討一詮費盡神思了無一得此種人譬如羣雀啣梅止可得香不能得飽願爾等勿效也又有一種俗緣牽染不肯明心但營家計者竟不知身是外物可速可久心爲大寶萬劫常存只要時時放開苦惱中卽現蓮花時時提醒火坑内遍沾甘露若今日不閒明日又多俗事心隨身盡業與道違此種人譬如青蠅躭嗜葬在嗜中願爾等勿效也又有一種無善無惡半信半疑的人自謂平日雖不修行斷無入獄之事聖眞道遠甯有相接之時縱發敬心徒矜外貌雖在聞𢆯豈肯細探竟不知天耳甚親審過甚密如此之人終身偃蹇斷無發慧之時譬如風逐浪萍東西無定願爾等勿效也如此五種人非不具聖性也非不具靈根也只因不知平等二字所以到底無成這平等二字原極易明白極易點正今日爲爾等開發此心便是蓮花種子平者如水本來原無波浪平者如鏡本來不著塵埃那波浪塵埃𨚫是外面生出與本來種子絕不相干只要爾等清淨其心縱有掀天波浪我心一派銀河耿耿白在明潔其心縱遇徹地塵埃我心中自具一輪寶月瑩洞眞空奪我一毫光明不去如此纔是平等平等心見佛心卽見自然十慧發生把從前所作豁然大悟便是立地聖賢道經云是法平等儒言夫子道在忠恕皆是平等源頭爾等可細繹之經云妙空不空以忍辱故不怖不畏卽云妙空空者實之門天生人物各有眞空本相故天以空而明日月以空而光星宿以空而燦山岳以空而靈河海以空而不竭人性以空而存眞故曰妙空不空此指性宗以示人也性出於天本來無惡無私如日之未昇雲霞就斂萬籟寂如此時妙空景界内外悉符就於此回光一照始見性光合處卽是心光心光四照若海旭旣高倐然晃朗到此地面必待工夫工夫初起先存忍辱忍辱之道不分順逆不論尊卑只要時時省察能化不能化皆以此心待之能存不能存悉以此心運之以積誠持事事無不得以積善持身身無不全故如來說法先要人具忍辱心而後可以發廣大願爾等今日願非不廣行多不逮未能忍辱故也忍辱之心出於妙空妙空之心卽是佛性爾等旣皈三寶不能得寶縱使爾等身到金沙亦是矮人觀劇不能見我寶相不能聞我法音願子等各具無怖畏心方可悟得正宗三昧那怖畏念頭不是叅悟可消只要爾等去怯去私便是工夫作用如怒蛟出穴風雨自隨爾等不得坐縻𡻕月墮落在因循業網中也壬子本師言修性者上乘之道性無體而慧有覺慧無形而定有丹法中之丹心光湛然道中之丹天君泰然心道不二是名眞一解悟無上玄文講演無上妙法積功妙化神可飛昇但修行之子未知有形難悟無形若知有形有卽是無無無至妙不可名言故我强名之曰玉光又名之曰寶月月者光之體慧者月之基修定入慧修慧見性性光之徹悟者自見吾於性光中分演金火玄元無量大神心心清淨未嘗滿足如未分者故人當知大慧終不離定定者大定非如枯定全定非守隅定三昧至深成於忍辱是曰金剛定玉清眞妙成於解脫是曰無障定梵炁杳冥成於昏嘿是曰大精定性全定全慧全定全道全定全眞定得道乃得常道常明見性卽見天矣故好爭者性之盜多欲者慧之賊欲盡則偏見消爭冺則道光溢可以奉至眞而登玉清聖境也本師言諸子欲行法先降炁欲明道先修性總之靜定爲行法之本覺悟爲明道之門知其光定其神去其妄除其躁方是我玉光弟子汝等旣煉混元法名守得定三字戒否淫戒不守玉光不見殺戒不守金光不燦盜戒不守雷光不赫圓明一炁出先天寶月光明遍大千地水基全滋性體火風昭灼慧光堅本無塵沙諸惡垢貪心一染慧心捐避淫當如避大蟒惡涎污觸牝門天戒盜當如執火鞭竊人一草戒非全戒殺先當戒食鮮勿謂鯤鮞命不全煌煌金闕已標名無戀凡身利與名月光洞處飛𢆯見只在黃庭寸地尋碧海盈盈無限春元精一喪盡枯傾金樓全在神光守氣亂何堪役萬靈我心卽是玉光心念念慈悲接眾生若有一毫私障起層層錮獄卽時分勿矜勿傲勿恃靈下人忍辱證天眞百年能得幾重九三九因緣仔細尋時壬子𡻕九月九日本師言圓明上眞統御九靈三才配合五炁相生天玄直指悟命門台爲性主斗乃身根弟子求道先禱元辰元辰之尊巍峩紫京每𡻕六度注照人身救災奪禍長養元靈修眞上士不日丹成慕法中士常接玄音祈福下士應感遂心願子䖍誠皈命斗君降期齋醮獲福非輕障緣漸釋道業易成逍遙自在身性同眞斗主福澤卽人命元修道者旣悟碧眞以見性當皈慶華以植福乃是單入雙修證眞要路植福者非邀福也邀福是欲植福是道言道不言福則道未全二子異爲日人行法亦當作植福觀若云邀福道多礙矣是日諸子祝斗母誕故有是諭本師言我說於眾聞妙如侍玉清上聖見有黎庶初發善心已發善心終發善心不住於色不住於聲相以心皈道以身皈道以眷屬皈道以家財皈道如此厯年永久乃得眞道見諸道因法相成就道果法會未有向道心懷輕淺内念不實著色著聲著相多生疑惑多生計較而成道者吾於天中見諸弟子奉道迷道事眞違眞外竊道名内無道念心心口口不見眞道惟有私見撓亂正眞及妙如徧觀他壇人多匪類法無正宗玄功以誘長生之見符法以惑靈通之見禍福以愚俗人之見狐禪以子前信後疑又有俗子始眞後僞又有俗子因財射利又有俗子因人畏法又有俗子叛道違天故生偏隅執見者又有俗子謗師毀戒故生邪私阿曲者又有俗子生心慕道不專爲道者又有俗子生心愛法不專爲法者又有意在以道爲名而附聲勢者又有意在以道爲名而資口食者又有意在以道爲名而索營生者又有意在以道爲名而顯雜技者又有以道爲名而欲寄懷遊戲者又有以道爲名而欲倡爲異說者如此等類盡非道人所爲事事逆天違聖罪過一積受報無窮或者壇事毀裂或者神鬼索𡨚或者災殃並起或者謗毀時來或者刑罰常遇或者禍患時臨由是眞於始者邪於終正於初者敗於後積於未察成於不救深可憐憫故我丁𡧾神使爲說眞規以絕諸障防衞修眞弟子如金湯堅固萬劫不磨非法之精得法之奧非心之法卽心之法壇在心心在壇壇心兩立自然入道本師言玉尊恩命化度仙種爰建靈壇所以大開法藏盡露𢆯機眾弟子今日在壇聽法者俱不從禍福中來卽是一念淨信向本來性分中發生毫無假僞時存此心豈不快樂子等所以不能時存者只爲塵沙惡業障蔽是心遂致本來性地恍惚難尋如驪珠重寶已落萬丈污泥光明安能復吐今日汝等先當作清塵想欲令性地一時解脫卽發大慧心皈神玉帝以清白自守以貞固自持積功累行至於道岸方是眞實下手工夫本師言仙子仙子崇德德生遷善善立懷仁棲一身可永存消者長之本息者生之機日有寒燠月有盈虧山川有時崩竭水火有時克戰守奇不變所以棲一能知此者可以養神空其中實其外可以含和空其外實其中可以含眞兩者皆名有爲玄眞未至當其可何實當其直何空非空非實是名元英一目視直一耳聽專一心應全生死從此定矣仙子仙子病境者心也病心者志也志多於神其神日昏神旺於志其道日至青春雨露豈無稿草𢆯冬霜雪豈無茂花知時者昌乘時者貴知命者安立命者大道也不知道者或求於天或求於人豈若求之我哉米光光之本也根於大月培於黃芽滋於𢆯霜生於大直三五之神天地之元精也本光立枝炁生炁炁皆光矣本師言生生化化何不窮兩儀劈破離洪濛件件搬本都有象象中大象眞人通傳心世上無人識識者原從沙裏得何爲先天大道中心印飛來名是月主人𢆯𢆯坐玉堂旦餐甘露夕瓊漿有時出遊六合表滿衣惹得三珠香我欲提命浮黎眾不奈眾心如大夢點出一圓金火珠丁𡧾神使相呼動立壇開化豈有心應度不度皆夙因旣逢良緣莫失果勤修三九歸𢆯中法天君曰名是月者言乎妙如心體難可言語形容卽稱寶月猶屬名相究竟人人具足無待外求不藉師授故曰原從沙裏得言卽在塵沙性中未嘗欠缺些子然必要悟得先天大道心印方得得心印時本自内出反若外至故曰飛來也本師言靈三神五𢆯中機一點精英九内居圭𢆯金熾抱太乙朝元降眞出黃廬一水纔生尾閭間雙輪烏兔金玉圓一升一降飛金火縷縷珠光徹九天天光返照龍虎窟水騰火伏綿胎息混合回風八景宫眞人帝子騎赤龍一還一返眞丹固眞丹只在三五中再還再返升降冺龍虎無事吟雲風只留一月照金水丹爐妙候露珠融眞人無眞眞太極無相無色歸浩空此是頂門度世針守玄抱一凌高穹鼎藏於金胎成於玉金者三之精玉者五之炁三五合一鼎成胎結化者其神乎而所以凝神者非化生者其氣乎而所以結炁者非生生生化化非三不一非九不成故知三九者成月運三九者成大月水爲火用火不能爲水用故𢆯基在一不在五五者中之極天星斗樞地維岳奠人衡藏英皆五數也知天之樞先守崑頂知地之奠先守𢆯室知人之英先固黃廬人中無米欲見米者當先見心心空光見光見米成天以靜運神以靜凝養靜者守丹以交眞火凝靜以俟眞雷牝不可守守牝者當知其門門入而日月可探息不易調調息者當知其鼎鼎安而呼吸始洽觀心得月心月非二見心者知月見月者明心莫將心上想觀息得金金者丹之母也母戀子子自和順弗用歸想𢆯牝萬法一門知空是也道無大小見元是也空非頑空心靜空知元非外元性明元復雷光生火而非火之生金光出水而非水之發解水火之源者先復性而修玉光飛玄其神乎見我神者始知飛玄若神未至而遽云知法者神爲人襲也神未充而遽云知法者人爲神𣺌也俱不得爲飛玄天體圓人體直能修直道當接元始妙萬物者天化萬物者地生萬物者風動萬物者雷天地風雷備於一體者其人乎人中三品上合三光運而不竭謂之炁施而不窮謂之精充而常通謂之神修飛玄者基於炁存於精而飛於神能飛神者存乎慧陳濟思問養心之法本師曰養心之法在潛潛則動而不溢精光内守而一呼一吸皆合至道方見胎息若酧酢未終矯强靜息則水火不調多致神瘁靜如春水之魚泳游自得動如臨風之鳥吟弄悠悠本師言欲求道者求之以眞眞求無求無求大求直道法門久不談矣諸子若能去盡凡思靜涵聖性我當時降靈壇演說眞直之道眞直之道演說可明非眞直也直道不在心不在身不在有不在無不在無中有不在有中無不在大不在小不在外不在内不在内而外不在外而内不在空不在相不在實不在虛不在虛而實不在實而虛一言不可著一相不可存圓明本無際悟者得傳心眞直本直道人欲說眞直眞直難以言傳師不能告之弟子父不能傳之子孫所以者何直道本空無所比類諸子發志求直道者當求無上圓明是圓明之心不染於物不著於相清清淨淨廓然無礙無曲無二一道充盈是無上直心也命從此立道從此生世人不知修行妄執有相故隨任遷轉至於老死而心不悟夫所謂悟心者照空命根全復本性觀我有生如同宅舍泥瓦木石假合而就嗔怒悲忿譬如火然喜樂淫蕩譬如風搖憂慮疲勞譬如水浸以假合之凡胎受三般之毒苦潰敗自來無所迴避故能悟心者不戀不毀終其天年而本性如故此心旣悟萬善同根隨感而應善道具足以是天眞教旨惟一直心指引眾覺終始圓妙並無隔礙子等若於直心有悟精進大道利己利人不可稱說其或未能見此直心眞實誠一亦能保此性光漸希覺悟收心洗念又保性之要也今日所言略明心法傳道之人修心爲要日用之中一舉一動皆須反已之心覺照時時在内方能合道若一念不存便爲外物所動而直心難見矣陳濟思問曰動而省察亦須靜而存養乎本師曰光明之心本一無二光現之時靜固存也動而能察明掩之時動固昏也靜亦外牽金淵鼎問守玄抱一之道本師曰收心可以守玄守玄是名抱一所謂抱一者非有一之可抱也常守於中謂之抱專靜無雜謂之一得來之時不出一个直心子等守玄基立丹鼎皆須於死法中參求活義方是下手工夫若執定死法千萬寶詮皆是我性之障矣陳濟思曰讀寶詮而自有心得是謂能參活義者耶本師曰譬如嗅花得香香入吾鼻花雖不一快鼻則同若執著於花必徧嗅而後知香非也必一花香竟而後再嗅一花亦非也寶詮利益當如是觀陳濟思曰花雖有香必具聞性始得本師曰然聞香之性眾生咸具特患不到萬花園中則空負此聞性矣你道萬花園在何處陳濟思曰卽現在眞壇光明相接處本師曰然本師言心從性出性自天成流行不息是曰𢆯根以假入假混入紅塵用心返性見我元神淡欲心虛心虛氣清氣清不息不息理明理明於天日月星辰理明於地山岳眞形理明於時元亨利貞理明於幻身外見身理明於俗三綱五倫理充法界理貫天人守樸工夫莫如悟心心以假合愚癡貪嗔心自性出見性忘心見性之功用默而存冥心内鑒太始之精天元交合五行迭運乾坤皆聚成形化心子有現在身是卽凡夫身藉此凡夫身可以證金身夫凡夫身天生其身則落愛心繼入情心再入幻心更入善心是爲凡夫心以心入相而爲凡夫身我於先天一心入於後天化形心入異形而不作異心身入凡塵而不起凡心及至身爲凡夫而不作凡夫心故能出有入無若隱若顯劫劫度人未嘗少損金身少亂聖心守此平直之心誓將來證位救度眾生守樸何如道人以示玄機不息之根使汝知眾妙之門天靈降生身從何有皆是一息之中陰陽混沌而成故身形入世則有混濁昏華美色奢淫皆是身中之境意中之念動中之心故從靜中而返息中而生如是虛幻相能消除已盡境界皆虛欲作不生非從長生是無長生方得有生以生不靈其心則眞以心有靈其身不生故法無常法動息長甯天靈旣得此身卽生散之是境其心現眞以是道法爲之玄境當此玄中化玄劫中修玄以玄去劫以劫化劫其心旣眞身從性成復用元心返觀五内從心發現透出神光一切境中生滅不聞有無不見身非其身形化心眞神成道相不作塵心而有道心但有道心而無塵心可以運神飛步玉清本師言元一未分混虛空洞動靜旣殊體分爲二一元流注於二體之中二體奉承乎一元之化而後三數生焉太極之數也迨夫清玄之氣稟三數而爲天渾厚之氣稟三數而爲地英間之氣稟三數以爲人三各有三而成九九者一元之全數也故修眞之法洞悟其三則知吾身所從受眞空妙體萬劫不磨洞悟其九卽知吾身所從去一靈湛然二陰不隔如此者生死不能動其情榮辱不能擾其志苦樂不能易其生淡然無欲其欲易遂泊然無求其求易得恬然無思其思易通靜然無爲其爲易就是以眞人常行喜心不行恚心常行信心不行疑心常行定心不行亂心常行空心不行住心故能身脫乎塵網之牽心超乎妙如之樂今之修道者不然也以欲爲常以妄爲實以道爲奇以靜爲滅以有爲眞以無爲寂故所愛者鮮衣美食肥駟高堂所畏者淡飯粗衣茅廬土室所愛者分甘漸澤朋眷交稱所畏者住靜逃榮沒世無譽所愛在彼所畏在此不亦愚乎道人非惡富貴也視之如一非好貧賤也視之如一他人雖二之我心自一也他人雖百之我心亦自一也能如此者謂之守一守一之人可以修玄眞吾開化本壇心中清淨無設教想無救度想金子守化本壇亦當無行道想無興化想何也是一想根卽離眞一種種障道皆從此生經曰實無眾生得滅度者不知者謂是言心空知者謂是言我法空俱未解也此正金剛一點萬磨不折之心在如來卽爲般若在上帝卽爲解脫正所以弓口大化廣度人也吾今日所言若能合壇信受心解神識見之語言自無鄙倍見之動容自無粗暴見之行事自無惡濁格諸天上聖伏諸方地祇行無礙慈心開無邊法藏如此者壇運豈不隆乎然而旣言壇運尤當作不住心一陰一陽天之運也一生一殺地之運也一盛一衰人之運也是故聖人尙有休否末學亦有疾傷水火尙有克戰天地亦有否終道之隱顯亦運使然所謂運者卽我所言一生爲三三化爲九輪轉無停範圍至道陶冶萬物其不可究者雖上帝猶不能盡其可至者雖末學之夫亦當悟之也汝善念之雷天君曰天眞之言語語皆是度世金針不是尋常文字三九當參我身不可如小家術數也道機流行陽化陰成一元爲土混炁全眞一化爲二乾金始生其在於人胎元性英三從二化水始爲精不以情散是曰仙根一二三者神與炁精五行迭運三品交生神爲寶月炁爲無英玉光眞精爲九之神先天而生後天而存炁炁相化化化相成悟斯道者玉清之眞本師言金火洞玄房水月還相印心心非我心我心能入聖聖光湛然明明光藏聖性收收冥不見便入黍珠境金子今年壇事方肇當先立心壇方可應求人生幻泡壇非可恃上眞非可恃鸞非可恃皆不過曇花一現指點聲香所可恃惟心壇一建可以通三界可以濟萬方可以傳億劫可以對至尊可以證天眞遊行如願豈比人寰衣祿易罄哉天教廣大無窮約之只在一性諸子修玄煉法何處立腳總之要復此大月耳陳濟思問曰只宜在絳宫做工夫否本師曰從絳宫做工夫者又要從一切法煉絳宫也故爲心道寶心定道生法爲心寶法貫心明陳濟思曰是宜一心煉法本師曰我說一切法者該舉聖典廣及因緣無非見性之資故靜坐求佛譬之磨磚成鏡此有量工夫非圓通之法也汝不聞乎净此一心明此萬緣勤求至道名列天仙可見求道工夫當用全副精神做去若只在絳宫中求大月尙只做得半邊工夫難聞圓妙陳濟思曰是謂萬物皆備於我耶曰不是抑謂成已所以成物耶曰非儒言有體有用吾言無體無用吾所言者卽是規中審緣直悟二法金子傳燈繼體欽哉念之開化主壇要如嬰兒無私無欲天根不漓守化主壇要如處子謹言謹動内守幽貞若使本性先昏雖壇運日隆壇根日壞矣欽哉念之善宏吾道諸子今日到壇聞教者皆有一個眞信在汝心頭道芽已露但須培養方得長成使汝等平日在家夙興夜寐眞信時時不攺便造大圓明地位不足爲難所慮者諸子道心輕淺一入塵勞便忘妙諦今日我欲鼓舞子等善心啟迪子等道念又恐說法無常難以日日提命則使汝等今日雖豁然心開他日仍墮雲霧中矣金子如是應若何繼吾心也金淵鼎對曰當念念正壇曰看取吾言再答淵鼎未達本師曰若子可謂無間否對曰形迹未能無間也弟子一心如是本師曰志不間易工夫不間難必要工夫無間方是修眞眾弟子尊汝爲師亦須使其道芽恆長方可開化使汝置於度外無以教之何賴主壇諸子亦須自修清眞自攺俗氣使諸子聞教不思修持不力何賴奉道今𡻕各各自勉毋使光陰浪擲也王天君申諭曰修行之道始於齋戒基於禮誦若壇中有能常修禮誦者金子當立清修一錄以紀其功勤玉眞問汝之意如是而子一時未能解故不終諭本師言大千法界大千法門接引下土化導羣生元始正因細若微塵視而不見聽而不聞中有智人破彼微塵流傳文字開示眞經無邊法藏三界充盈時有愚人修煉不精妄測元始忽此微塵修習幻相幻法乃興接續到今與正並行奇靈更速技巧更能以此誘民惑眾成羣嗟夫正道不行不明正道平直遜彼通神正道眞樸讓彼技精所以世人莫奉莫承我立此壇誓度修眞一塵非小天地含精願與世人講習晨昏恢弓口妙元斬斷魔根振我彝倫翼我天心救我迷子育我眞嬰勉哉諸弟弓口化在人守眞無變守一無分敬爾丹臺保爾元神抱爾眞樸養爾九英惕惕在心毋使魔侵庶幾夙夜無斁我云時弟子有以煉筆逢魔者故諭及之金子經教未悟故法席不揚玄詮萬軸出一微塵子將微塵參究便生解悟究之若無邪法正法亦無子從邪正兩無時看這微塵作何狀貌此際惟是一團眞炁其上不皎其下不昧渾渾淪淪一物未起便欲喚他作道亦不得也然此非吾子旦夕可會下手先把玄宫掃淨少私寡欲作念我是道人要存眞道世人不見而說故僞道人見而不說故眞如此潛修數年何患道果不成乎有偈付汝吾年七十無言說終日昏昏守玄默世人伎倆幻非常笑我老夫還似拙一山雲一窗月獨坐蒲團看不歇莫可洩金丹術秘在囊中已百劫世人忙忙採藥龍轉笑世人眞是拙返還都在不言中尋得天根共月窟眞修二字誰能解得當從虛處觀詮實處觀玄生神生炁生精以至種種妙丹皆是從實而修修眞之士須要步步踏著實地故玄眞一道出於妙有而非出於太空然其中神神化化著不得一毫非想容不得一毫粗炁貴在精思定慮方能煉出眞丹金淵鼎問靜坐時當存心何處本師曰主人在那裏便照此處玄者心也心外求玄不爲眞玄故炁未平者示之以觀息精未充者示之以觀丹田水火未交者示之以守玄牝神光未接者示之以存上田默朝或取炁或運神或觀水火輪或呼五臟神此皆因病之藥若上智人精足性空者亦何頼此哉本師言妙性離塵垢光明湛十方空洞化無化幽德由斯彰眾生欲所染害道如斧斨内爲三毒惡外爲六業戕對境心便起展轉成無良修心在明性非戒何由防眾生愚所染全無智慧光遇物便搖惑處事多乖張一心不能別道義從此忘欲入定與慧非戒何由將眾生業所染三世有夙殃内善恆易失外惡恆易長令人智顚倒皆因業所妨魔軍來惱亂非戒何由降眾生習所染虛僞成肺腸居心多隱惡外事徒晦藏天鑒如明鏡神明若電光實善斯遇福僞行有不祥修眞須攺習非戒何由昌戒能離眾欲欲去心果芳戒能破愚暗愚去性智揚戒能淨諸業業淨神乃光戒能洗舊習不爲俗所攘一切聖賢人奉戒如奉王飮食造次間敬守莫敢傷細微必愼密容止亦務莊嚴淨結法界相好同眞皇具足妙功德悉由戒所昉我道甚易知甚易行也平心以遇物物無不化虛心以御境境無不清實心以求德德無不立慈心以開教教無不明諸子當應物御境求德開教之時須問自己心上平否虛否實否慈否若覺己心憎愛未融順逆未化隱顯未一人我未同急宜懺悔能改前過能禁後惡方能直超無上然而人生濁世世濁性亦濁性濁智亦濁是以少分善功卽懷盈滿多方罪過力除未能一念欲平及遇物時平心又失一念欲虛及御境時執著還在一念欲實及求德時僞根潛伏一念欲慈及化度時人我山高所以者何皆是汝等業性昏濁定慧不全故我今日欲以大戒普吿子等今汝等有志者從事戒行戒行立則眞身自具眞身旣具我道何待外求信者眾善之母忍者萬行之基無上元良非信不發無量堅定非忍不能信以入之忍以止之道在此矣然信忍二字非能强生必要從自己身上密密返觀卽如經云俯念浮生遂捨其國入山修道豈不是信割愛學道行忍辱故捨己血月豈不是忍覺悟處全在俯念浮生四字一見得浮生空幻便見得眞性常住故一切法門皆能信入一見得浮生虛妄便見得世界無常故一切是非榮辱苦樂生死業報如同浮雲任其去來而本性自若故能忍止諸子今日有志修道者且從我平虛實慈信入忍止八字諦思可也癸亥本師言寶月圓明黍珠湛寂總不離寸心而成人能淨此心無一毫污染明此心無一毫障蔽便是寶月黍珠之根蒂也子等試想平常日用酬緣應物之際所謂污染是心者何在障蔽是心者何在在外耶大地山河無非淨相人緣酬酢亦是虛舟那一個是污染障蔽的主子在内耶丹臺紫府眞吾常存意馬心猿空中幻現那一個是污染障蔽的面目子等若能想得此想便是從想入觀從觀入定之學莫謂道屬空虛漫求無想心有靈光非想不開但爲之有道進之有門爲之以正想而不以正是斷其道也進之以專想而不以專是塞其門也子等誠能開其門由其道自然靈光現前玄法易就若不從淨明二字立基縱能談玄縱能煉法亦止做得外面皮殼究竟一個眞吾落在迷障中永不能出所以本壇玉光宗印先要弟子具清塵想行忍辱行修含眞法廣妙如心總是爲汝等滌去污染開通障蔽奈何汝等平日昏昏逐逐營名營利得之則喜不得則憂背其覺明趨向黑暗當知此心與清塵反又若營求不得百慮交攻一縷善功便思誇耀一毫過差便思推卻所以者何是愛名故一步讓人五中火𤍠一分損已平日難忘所以者何是愛利故世人惟具此二種愛心所以嗔恨嫉怨惱怒爭鬬時時現形作主把我眞光錮害當知此心與忍辱反又有一種習性本非有求終日營營本非有失終日忽忽本非有與卻好張弛本非有取卻躭色相致使眞光失其明凈之體變成雲霧之幻當知此心與含眞反含眞旣反情深障重本來一點眞炁消磨剝蝕塵沙惡業觸處糾眞月不來性水不潤所以然者爲有住著心也當知此心與妙如反所謂妙如心者一曰平等二曰通圓三曰精微四曰空寂含眞則内寶漸成忍辱則業𡨚冰釋清塵則外境無牽以此三種工夫培養寸天還復始炁此眞妙如宗印也子等勉之白上仙曰正等無上心普令聞妙覺有爲卽成妄非法是眞法心印印眞心妙明燭無物來去任經過著迹墮魔窟大抵人無智愚妙如心人人具有只爲障蔽重重不能自見旣不能見安能自立所以眞皇要人含眞必先掃除凡垢透露光明如同日月方能丹臺不壞故曰含眞又恐世人凡情易熾眞性難融一點米珠墮入情田慾浪若非𦂳𦂳操存時時提醒神仙種子被他汨沒殆盡所以要人忍辱天生是人旣𢌿五行方成形質最尊至貴卻笑世人自待卑薄道是大道難聞修眞匪易惟酒肉是躭惟聲色是戀英英一個寶器埋沒在糞溷中豈不負了天恩所以眞皇教人清塵三者之中本無深淺分合只要教人認了妙如心自然一做卽徹若想了清塵又想忍辱又想含眞妙心先自散亂了卻得如何下手一點珠光圓又明塵沙豈得凂眞身多緣愛裏綿著總有鋼刀怎割情情慾相牽似海潮朝朝隨信起狂濤若能忍得人難忍引領凡夫駕六鰲丹基本是自家基修築還須著意搥貞志旣堅馴養足琪花萬樹玉連枝妙如心本妙如心出入隨機變化神修到無修方得手乾坤一氣統初眞本師言將來道法聿隆聖眞甚邇惟在子等洗滌塵埃自然能見光明沾雨露今日我二人到此所說者俱是無上眞宗印心妙諦子等各宜盡心思維不得視爲虛語入耳出口已也我觀壇中諸子俱有慧根未具定力俱有才智未辦眞覺所以諄諄誡訓不外清塵忍辱含眞妙如四門修清塵者先要看透心源本無污染湛然常清卽有萬丈紅塵無礙本體如此下手方得頭腦不是塵已來而驅之心已亂而束之也修忍辱者非俗云忍耐也蓮花眷屬本是和同蝶夢身心終歸無我以此勘破縱有極難忍者不以難忍而失我本眞矣修含眞者道在無言有言斯淺僞光去則眞光生小慧淨則大覺見亦非獨瞑目内觀而已也務要把從前好見才智鼓弄聰明的氣習打掃無餘母飾賢以矜愚母尊已而淩物縱能成得大丹悟得至道也要含蓄得住方能眞實若一有炫露於人卽眞光爲僞光矣修妙如者寶月妙道人人可至只因塵沙一著眞性遂昏先要看自已性根所成就何者是塵其搖動飛揚者是塵也何者爲月其湛寂光明者是月也子能於此見得自然守遁自然還童童相全則眞月成矣妙如如我本明心一著塵沙遂失眞剖破凡情須忍辱眞光内蓄反元身本師言元化無言有言卽落小乘子等能知元化乎元者始也命有元本在天性有元本在人人能立命方能見天見天之功不在意識而在存養何謂存存者存其所不見何謂養養者養其所未萌只將不見之中默默存想自然知得來路清方能保得去路正來去路頭平平坦坦絕無一毫蹇塞聖愚一般走得只爲心中一亂便覺慌忙歧路旣趨人禽頓別故入道者先要立腳天賦人身便如種一寶樹五行具備日月洞明祿食作雨露之滋培動靜合乾坤之旋轉何等護持珍惜奈何不知答報任其增長惡芽故修道者先要防意每日意之所起先在寅時人能披衣正慮默想天光初曉心光亦曉此時此際善善惡惡俱聚在一團腔子内卽當在未萌之先善者掖之使長惡者剪之使無自然眞宗不失元命永存可以見天可以成人而以元還元本初仍在化者以人化不爲欲所化賦命之後我可自主認得眞我方不爲外誘所奪若身隨物役則神爲邪侵本來大化逐氣而盡故元化二字道之微妙不易輕言我今觀壇中弟子俱無能保守元化故去年如是今年亦如是所以如是者或過或不及耳惟金子稍能守中但百尺竿頭不能上進更有犯淫犯盜犯殺種種不端不止一人不糾不教前所云壇中氣象如愁雲苦霧豈不信然我本欲指此等弟子列名於壁姑念向來曾有功績可書尙冀將來悔過自贖故亦已矣今後不可不嚴其防也元元始氣洞然清不奈閒花滿地侵邪徑易勾春蝶去誰人得似妙如心元元始氣洞然清只爲貪金不見人鼠竊難盈千日飽誰人得似妙如心元元始氣洞然清利筆戕人只爲貧也有宰屠營一飽誰人得似妙如心本師言三寶道爲先唯虛故無上一元啟萬化道體常居中三寶次爲經聖言誠可畏一切言語中唯經載實相三寶終爲師師以道爲貴有傳斯有益非徒重其名汝等奉道者是爲奉聖師因師得聞經誦經宜報恩因師得聞道修道莫負恩恩在冥冥中非心可思議心量旣不及耳目何能知言報卽非報言知是不知洞達爾身心自見眞師恩恩在不欺誑非實不汝言眞語似庸庸天心只一中一中含萬化三界一中中三界如何在一中寂然不動始能通元化無形成萬象電飛雷吼本無踪本師言一元萬化會合神眞統元返玄全復元眞道以元結德以元成一元之炁藹如春雲動息靜開眾妙化生寶珠培護傳心九英去邪去妄含元守靈滌心浣慮元炁長存傳經大事時傳元始廣化開緣經何我靈光不接眾問故曰夜來言多此番傳經乃因陳子志願始發故傳付大寶以明至道奈何仙子志雖發矣而習氣尙未琢磨習之未攺不可以言學氣之未變不可以言道陳濟思言因𤍠心勸人故不覺言之雜本師曰唯之與呵相去幾何唯則恭呵則慢而人之應我則大異矣豈獨陳子爲然哉輔教二子亦若是也施子妙矣道則堅矣而語言之間則近於好奇奇則流於僻羅子妙矣道則眞矣而語言之間則病於有支支則傷於囂所以太上欲傳至道首必曰可道非道葢甚言言之害道也發於道猶且不可况發於習乎况發於習之偏僻者乎今陳子旣有大誓願闡揚吾化則當以修詞爲首務辭之輯矣人之洽矣辭之懌矣人之莫矣向來人心之不合壇運之不昌其咎豈非言哉雖然修辭者亦有原非鉗口也游乎太虛志乎無爲直之以仁義裁之以威儀養炁乘時因心善導斯可以言矣本師言玉京開化啟迪良知緼英成質含性成眞人生下土性光漸漓良知斯昧肇開靈乘救拔沈淪各正本性各化氣質空洞自然元性具存修之充之可達帝庭性光本具因欲斯昏欲修性光先須滌垢欲去天全乃返眞常欲充性體先須守一守一則中時中應化天教丕揚無言默會契合天心靈不著靈其靈乃大空不執空其空乃眞心無偏倚行無邪僻見無滯著意無固執空空蕩蕩方可言通天堂地獄總在一心數年教誨殫心盡力今次臨鸞願子復性性見道明性具道立返乎無始歸乎渾淪日就月將得證瓊班因循如故永墮輪迴欲思救度重霄黑壞援手無由拯度無門言至於斯三嘆太息性本靈明無形無體三景彙合五行化成付𢌿下民方得成人情欲日染眞性自昏性本虛靈忽焉錮蔽性本清明忽焉魔障性本大公忽焉自私性本至直忽焉矯枉性本正大忽焉污染性本眞實忽焉浮僞性本高明忽焉卑陋如斯等類不可盡言與性相反那能見性與性相背那能復性一塊血團成何天性私意日萌欲心日起皆非天性乃是人心去卻人心復還天性其機甚捷其功甚難其道最大其理最微難處下手微處思惟轉關甚捷修玄最大玄玄妙諦方可得聞修玄無歧趨復性接天機光芒億萬丈飛玄乃聖基本師言一炁瀰淪太素具凝金光一點照遍寰區盡倫盡性不失玄英超乎生死入乎中和運行五炁參贊乾坤流行不息與天長存無聲無色萬象昭融天高莫測人性須存理存天復理失天滅得失之機甚危甚微勉爾厥躬毋安舊習毋起懈心朝乾夕惕本師言碧霞眞氣人人具在丹田何云碧非白非青是也何云霞眞水眞火是也故至聖高眞全是眞炁存之則成玉光現之則爲青毫總由眞元不壞常淸常靜乃能保此最初元炁子等旣入宗壇旣聞宗教當知是炁我所固有存之弗失仙根巳充養之無間仙果斯證不奈人生五濁元眞易漓人我易分爭競易起徒知修道是邀福之途不知修道乃超劫之具所以愈久愈迷方進方退也有道之士能修五觀以絕五種惡根何謂五種惡根一者計較根二者思維根三者分別根四者虛假根五者貪著根如是五種惡根輪迴結俾爾等性光易昧大道難修豈知此五根者非我性體欲還元眞先須斷絕人處天地之中陰陽爲胚五行爲範貧者如少水生魚生涯易竭富者如高原播粟穎實自然貴者如細草山巓雲煙偏近賤者如青松卑隰天日恆遙夀者如豫章出土堅質已存夭者如木芍敷春弱姿先稟安者如藏燭洞房自遠狂飈危者如浮航巨海終沈弱浪是知天地定位而物命係之故謂之數陰陽摩盪而物命屬之故謂之氣五行交戰而物命隨之故謂之劫斯三者計較徒然欲絕計較根者當作无我觀修道之士道從何修豈非現前之光明心耶修心之士心從何修豈非現在之正眞法耶然以法治心貴知本來之心方能會法得道子等性光易昏所以視法不悟則起思維起於思維而得者往往與法背馳也於法背馳則趨於物趨於物則隨乎境隨乎境則散於應是以定志不守性光愈迷欲絕思維根者當作無心觀凡人之心愚者不知分别大智者不起分别唯中材之士小慧之人最好分别不知眞道乃天地自然之理亦卽我自然之心初不因分別而後得從分别而始正也然凡夫性光未明因生四種分别一者相上分别如舍利佛爲天女轉化是也一者法上分别如婆羅門訕佛擕齋是也一者報上分别如佛弟子不敬彌勒癩疾是也一者見上分别如阿難錯認佛身紫金光聚是也前此四種分别大乘弟子尙然未免何况爾等因物動情任情起念種種分别總不是主人翁之運用所以一事當前便忘卻向來所得之道胡亂酬應轉增迷障今須認定玉光宗旨以無計較立其命以無思維養其性以無分别通其心則眞道日進矣欲絕分别根者當作一等觀妙有之境是爲玄眞玄眞之庭字曰眞常眞常者卽眞性也四大乘化而來隨化而去不得爲常世界緣氣而結依氣而散不得爲常五親有緣則合緣盡則離不得爲常七情逐境而生境空則滅不得爲常惟有先天一炁結成一粒黍珠生死厯劫本體如然乃可曰常耳所以修道工夫不向此用力總名虛假然此虛假二字實之賊而成之仇必須用力觀察稍有一分未誠未實便爲虛假惡根所據蓋虛假因地有五存於人心最難斷絕何謂因地如因於身身是陰陽所稟陽實陰虛故陰性用事則好虛假如土卑濕常出浮烟因於境境本心造造境非心凡夫不知遂於境上著我施設假心假意件件屬虛如撮塵沙不能作飯因於聞見聞見者眞聞眞見也若未聞謂聞未見爲見此名自欺亦曰自障皆由凈眼未開内不見已外不見物故虛假從此而發如轉兩眸遂見二月因於人我人我本是幻相暫分何從覓出眞人非我眞我非人不知道者每每從人我見中增出虛假二字謂不假恐人得以槪我也不虛恐我不足以餂人也此種虛假最妨大道如兩猴舞機變互生因於智巧智巧之於人大用之則爲大智聖巧惟不善用者偏於小處繫心如煉法而止嫻音調事聖而止習外儀爲之久久内中究無實得外人視之亦皆謂此人道法虛假耳所以然者蓋因性本智巧已具一種虛假根故也如將寒枝綴以綵花欲絕虛假根者當作眞愚觀妙如之道甚易知甚易行也一切不貪則心自明心明則性自定一切不著則心自空心空則性自照子等欲求吾道當觀察已心所貪者何事所著者何物不貪不著時此心必能自見但爾等有生卽著於生有知卽著於知有才卽著於才是故著於生者貪欲具焉著於知者私己乘焉著於才者妄想出焉有此三種過失故曰貪著之根最背大道况我壇宗教闡發不住心一之旨卽道中之靈通感應尙須不著不貪况於世味之中而可貪著耶欲絕貪著根者當作大苦觀人生下土何身非苦何情非苦何遇非苦總欲於斯世尋樂者非徒樂未得而大苦隨至是故我弟子莫求世樂當求世外之樂何以故世樂無常人所爭天所吝物所忌我欲攫其所爭邀其所吝蹈其所忌此願何時可遂若我道者人所弃也天所遺也物所貢也取其所弃拾其所遺受其所貢夫復何患能遠患者是天下之至樂也三九金神頌曰一炁開元化分毫照萬方踢破禍福關始得面眞皇眞皇大無外纖巨皆納藏無分人我相不競清濁場舌底清蓮生玄談字字香人心能一中卽與覆載量此衷稍有歧天律肯降祥所以開宗教玉語皆琳琅定志習五觀眞炁生三漿可以滋内鼎可以輔聖光可避水火劫可挽𡻕雨晹漸漸碧霞興天路同翺翔本師言眞相啟眞教無我成眞修融融眞性中一炁化眞樓樓中十二眞環抱眞皇洲光華接大千言言契冥搜養精擴眞抱專默絕妄求三花聚眞頂眞風任遨遊顧視蚩蚩者捨眞與妄浮萍緣有時去眞珠難暗投何如蓄眞嬰燈燈萬載悠我道平直平者心無爾我直者意無邪曲學道之人能修心凈意行來步步都是平直以此見性性可復也以此參玄玄可一也本是人人可以造就得的只爲人之一性各墮一偏遂致道本相懸萬萬三惡五逆無論矣卽如有志見性有志參玄者一落僻性到底是個凡夫死沉下鬼豈不痛惜我且略言其僻或銳進而不研精曰妄或因循而不振發曰疲或昧於事理之經權名之曰執或罔識中正之條理名之曰瞽或授金書而不展習正法而不探名之曰蔑或貪世務而懈眞修或恣謔言而忘大戒名之曰流種種結習我弟子多所易犯故今日特來諭爾務宜洗滌肺腸互相勉勵將來爾之性復卽爾之天位亦復矣靈乘開緣宣揚眞教不過補三教之所未足發三教之所未明非别有歧旨而另闢一宗也子等於三教中未能通其源植其本是以無門可入無路可由不知本原原極易探取不待勉强儒道曰中中者天地間自然之理凡心凡性便是不中所以去了凡心凡性此中卽可與天地合德矣佛道曰正覺覺者人所本有奈爲執著我人虛僞六偏所錮此覺遂難得正故以圓破執以空破著以無常破我以無實破人以定破虛以戒破僞凡佛乘所演莫非輔行儒道闡發一中妙諦耳至我本師元始眞皇立極於太無虛寂之先演道於黍珠生生之後大無不包細無不入要不外此一中之性厯劫度生並無二旨故我今日仰承本師宗印開化南洲亦不過以一中正覺化導弟子子等誠能養心理性開已心之正覺合天心之大中則道在是矣豈遠乎哉三教皆言性混然同一化儒修最居先一中遞相授偏倚偶不齊毫釐千里謬禪定有大覺從空得眞有若涉寂與無菩提非樹覆𣺌𣺌玄中玄雲霞生虛牖著迹去貪求珠光轉難覯唯有冺識知全得絳宫竇人生天地間幾睹光明晝余心已若剖君子愼屋漏慧光使者曰玉尊授眞法眞法無别岐大中自然道正覺人所知塵情一洗滌斯道自不離凡心好虛無學道常自欺爲子不能孝爲父不能慈爲弟非誠共爲兄弗友于爲朋乏觀摩面善無先施倫行旣不立學道徒爾爲豈知三教源一中實在茲見中自敦行守中自循規敦行與循規正覺始立基基本立以誠虛僞成百非基本立以公人我眞卽違基本立以大執著大乃迷所以大眞師開宣大乘機一中傳至道三教剖玄微爾等被教者教心須熟思中非虛寂理處處藏云爲所云苟非中戕口實禍樞所爲苟非中雖善亦易隳何况不中者秉心己自愚戒則不能守定則不能持慧心因此沒隨塵作澆漓正覺日云亡大苦常相隨諄諄勵爾等有志莫自迷授訓至眞前深信無傾移一言當三復庶免歧途悲本師言天開弘化性靈玄眞三三九九直道自循剝極生復靜機動根守我三關勿使炎侵綿綿玉鼎文武徐温一炁沖和辛弦望盈無爲水溢無爲火崩嘿守丹元煉質鎔金金身不壞永固壇根堪嘆世人虛擲光陰不知報本不識元身法律煌煌不見不聞規旨簡括葉析枝分無爲有爲倒施逆行司職曠厥咎唯均上天無私昭鑒甚明我今誕吿各發正誠主言如風加草則從輔言如金加火則鎔教言如雪加月則瑩糾言如霆善驚瞶矇科言如星條畫適中黽勉同心玉聖心宗一有間曲正化難弘主輔協志庶職殫躬謹身愼行明目達聰三品内滋五德外榮母負此身可亮天工清眞大道著不得一毫塵垢容不得一毫虛妄所以俗人一著塵垢性卽不清一容虛妄心卽不眞俗之一字違道最易今日我欲重申清眞妙義諸子各將光明心承受我訓夫守玄之道金欲其清土欲其眞金土者精氣之源也清眞生萬化也修性之道神欲其清志欲其眞神志者覺悟之基也清眞生萬行也治身之道心欲其清行欲其眞心行者福德之幹也清眞生萬善也宣化之道規欲其清法欲其眞規法者化度之本也清眞生萬道也故經曰道清斯高道眞斯明唯其得高明之道方化得塵垢之俗離得虛妄之習世人擾擾一生何一不將塵妄用事甚有正覺汨沒反視塵爲潔以妄爲能者語以清眞大道彼必惘然無所從入不知元始眞身人人具有丹臺妙覺本自高明特患未曾下手做得清眞二字工夫所以心地卑污性天霾霧今日自聞吾訓之後各宜反求諸身自問曰吾性清乎否乎凡塵俗垢去乎否乎吾心眞乎否乎虛僞妄志去乎否乎立此清眞二字若結道場時時崇奉時時回向尋出身中超凡玉體不壞金身卓然現前方爲下手修清者先禁嗜欲修眞者先誠口意口無論人意無輕人則元神内守神守則眞光發矣口無貪味意無求樂則元性内蓄性蓄則清氣集矣是以善爲道者不期高而高清也不求明而明眞也子等勉之本師言欲尋仙種繼靈壇法乘盈盈仙拜難曩日劒鋒淬未就今時鶴羽又凋殘謂主壇吳子及陳子也虛垂玉字詔塵閣漫有金書秘錦函分付後人休務外六時常把念頭看吾自建立靈壇以來無日不望弟子咸成一道各證一眞所以徧勅諸仙臨鸞啟導而諸仙之應勅臨鸞者咸能上契我心所垂法訓宗旨不歧不二歸於大中至正而止矣吾意弟子閱是法訓亦當心開而道成矣孰知弟子等奉事雖䖍業根仍在向往雖切心境未空化度四十餘年而弗能有一人登堂入室者徒見其少者漸壯壯者漸衰老者漸病病者漸死同溺於塵海波濤頭出頭沒不能自救安望救人所以我今日特來再爲囑付一番夫我道之傳於世也是生民之命脈也是人天之眼目也是乾坤之正氣也是無始之元和也得其命脈之用則已身可以長生救濟可以利人得其眼目之用則心合至眞道通天地明察萬機化被草木得其正氣之用則中和位育萬沴消亡百邪遠遁天地清甯得其元和之用則道參太極陰陽交化金玉易身在世可以拯災捍患在已可以脫化飛形有此四種道用故宣斯道於壇今法乘充盈譬如慈父愛子情深已多與之財寶矣而子等尙無移氣移體之驗徒滋弱喪弱穢之容可知子等雖有法寶未知受用雖有寶訓未能樂聞所以因因循循仍如窮子一般模樣深負余之期望也雖然諸子各有一種妙心所以能敬我鸞能愛我訓較之庸俗可云霄壤爲主壇教職者必當本乎時訓細細爲弟子宣明宣明之道先宜審人人之愚者宣之宜詳不詳則不明人之慧者宣之宜要不要則不信人之文者宣之宜雅不雅則不投人之俗者宣之宜淡不淡則不順更有進者或以嘿宣或以身宣或以規法宣宣訓之道也而主教二子向來鮮能行之是以大道未明也人心未開也上眷雖隆福果未成也主教二子其交勉之本師言雲羅八表慧光始開無上玄天金樓玉臺炁通元極津轉根荄骨從茲正筋從茲諧百脈凑理無舛無乖因我自有全我本來萬災不干慧接三台是爲靈首大月入懷清心寡思擔荷眞宗唯誠斯固唯信斯通信者無疑水乳交融誠者無僞日月同宫二手一心旋若輕風光中生光大觀目中是形非形機至形同是象非象化成象容靈通妙乘輔化高穹志發性開修純性和有修無志厥功豈無以云入道止得我膚有志無修其心孔嘉以此求眞左右逢魔志發修純昻首玄都無高爾志志在識途無大爾修修在養和内懷明朗外若糢糊是曰善藏慧花日敷元湛元英寶相雲羅上通八表遊衍太無靈乘秘旨玉光要圖念之斯得母曰我迂本師言靈臺一點徹重霄妙湛光明契玉毫迷悟只爭方寸地凡心拂盡道心高聖眞立壇啟化傳教傳經無非欲人去迷得悟化凡心爲道心變凡身爲道身如是而已不奈下凡愚昧不知内求於心實修於身而徒馳逐妄緣沉沒幻海因妄起妄因幻入幻竟把靈臺一點黍珠錮蔽得鐵桶相似不能有一毫光明乘機發露是以上聖慈悲託鸞宣教教言雖繁教旨無二善聞教者當以一心承受一心參求一心學習一心取證自然上聖傳教宗旨洞明爾心爾心旣得洞明自然能於一切經教一切規教一切法教知其一貫無二無雜大道昭昭取擕而得矣若不明此則雖日聆教言反增五障所謂五障者一曰計較二曰分别三曰思維四曰疑惑五曰執著如是五障一起不能得聖教之益反成受教之病所以然者皆因不悟宗旨而不内求於一心故也五障不除則意識用事意識用事則神慧不宣神慧不宣則性光不透所謂性光者道合於自然之謂也若計較則理多歧途而趨向不决若分别則心無統一而解悟不眞若思維則意識相牽而參求不實若疑惑則光明淆亂而踐履多舛若執著則悟機阻塞而取證皆妄五障不除名曰强合夫强合者非自然也所以性光之子最易入道其聞教也卽知以一心承受一心參求一心學習一心取證歧疑不起五障不生坦坦蕩蕩觸處洞然舉而措之於身則身無不修推而見之於事則事無不宜事無不宜則境緣隨我而化身無不修則天人順我而融轉凡入聖之機存乎此也是故能以一心承受者必能嘿而識之能以一心參求者必能聞一知十能以一心習學者必能時措而宜能以一心取證者必能見眞合聖而五慧六通漸次圓成如是聞教是名善受所謂一者統於中貫於心合於元會於神見於機發於微也是以開化南洲務使人人了明此理勿爲歧二所搖勿爲小乘所引勿爲爾我所間必令盡入寶明鏡中此我立壇以來千言萬語不過俾子等識得我心自然包容元化大道探原矣奈何頗有解者此心乍合乍離合了一分反離了九分悟在終朝旋迷於頃刻黍光最大積久而通如是間斷曷能通達殆非性之不明皆由心之不一故是等人終不能見我也不能見我則明明一月任彼雲遮蕩蕩周行多生荆棘他日業攻一心錮鎖百慮搖撼出入無門進退不得積年事聖工夫竟付火關水窟矣故知我道者心一不患乎無援六陰攪擾從他猖獗我心一定立有神光破之心一不患乎病死大限臨頭試魔在側任他威暴我心一定卽有智光袪之究之玉京在眼黍照當眉而陰鬼爲我所伏之人試魔卽是保迎之將故知我道者必剛必果乾清而浮至剛大也地厚而輿至果定也人生而靈炁會元也坦坦一途卻被小智歧趨便壞我門一道爾等宜致力焉修性不難割愛爲難見心不難含眞爲難不含眞不能使神光之無漏不割愛不能使慧地之發光所以善修性者必先割愛凡於一切事境所係戀所躭染所欣羨者必用智刀慧劍一斬而盡方全復我性體性體旣復道源清澈自不爲外境所淆不爲歧途所惑善見心者必先含眞眞知眞悟入道之時人人有發露之頃眞慧眞光學道之際人人有透現之機只因子等於發露透現時非特不能沖虛涵養每每乘其發露必有意以炫耀之偶獲透現必有念以表著之是以外事徒張内功潛損子等果能發出無上道心决當從事於割愛含眞唯割愛始有眞可含能含眞更無愛可割應玄經云有生曰窒萬欲叢成有知曰賊萬私交集有才曰蠧耗我靈眞人能不以有生役其神則諸欲不起而性體空洞高明崇效天矣人能不以有知喪其元則私意不起而性光温厚博大卑法地矣人能不以有才恃其慧則靈眞日擴而性光鞏固性波流潤若高山之永奠大川之不息而性量全具矣如是三愛旣割則諸塵亦盡視彼嗜欲貪妄一切瑣屑之境我自有智珠照破本無可愛又安用割割旣不事含眞自然恬淡虛無頭頭是道到此地位纔可稱曰是我弟子繼壇一日一日之眞功也傳教萬年萬年之道行也陶眞人曰昔我與惠遠交問曰何名外道遠曰心外求道是名外道又問曰何名中道遠曰心中求道是名中道此二句答言與前日教旨相契大眞人見子等求道多年全無心得故特唱此四句宗印曰一心承受者非僅言聞教之時也是言聞教之後心心相對須臾不離如有所稟令故曰承如有所容納故曰受若卽見之語言譬如所受已傾出在外若卽問以遺忘譬如所承又旋念背棄機括甚緊勿輕視也曰一心參求者訓言雖已承受終是死法與我性未能貫洽猶如服藥不化所以參求之功尤爲緊要參者兩物相衡求者收歸所放故教旨如是必返觀已心能如是否再周觀於事物淆亂時已心能如教旨否攝心靜察無二無迷方是眞參其或已心與教心扞格多端當知一一懺悔必期與教旨洞然契合卽始見終通徹無礙方是眞求曰一心習學者大道重在躬行眞參眞求不過完得知悟邊事事無分於大小習勞總是積功道不離乎日用能淡是爲超脫至一切功行之圓必要具得普賢行願方不虛前此之參悟習學可不重乎曰一心取證者道以得心爲貴譬如素習清靜而尙有一念之未空一時之妄動則知其心中所修清靜寶珠猶有玷缺若珠已得斷無是也譬如素學凈明而偶有一意之染着一境之障蔽則知其心中所修凈明寶光尙未實證若已證者永不失也從百千教法中悟百千大道其力在參求從百千大道中出百千功行其力在習學從百千功行中得百千智果其力在取證如是參求習學取證方全一心承受四字耳子等奈何不以上眞之訓反覆體驗耶本師言通明妙覺空洞清虛天光沖照湛然眞如道以靜凝玄以靜明明玄得道惟靜爲門四大無堅堅在行生行之無阻生之無窘無阻無窘陰陽和平外扞六氣内調五神沖照渾全眞身始成慨彼凡夫不智多愚沉迷慾海馳逐塵途損沖滅照勞機是躭大道昭垂覺者誰焉無堅四大日渙日病孰能生香有如桂枝秋霜一及頓失榮滋入道無苦入俗無娛奈何弟子不知自圖愼爾旦氣保爾康精神廬定居百病孰乘旣盥旣沐日新又新迪慧蹈知去順卽安塵緣交錯緊抱一丹三品上藥毋苟竭焉可以養生可以利人可以宣化可以葆眞厥惟靜功入道之基有基勿壞存乎去歧寶月中天人咸仰之不睹諸子久矣子等敬信之心雖厯久不渝而於成已成物之處毫無半分入手忙忙碌碌日墮塵凡法訓經詮未能神會眞規玄範未克躬修在家則戾氣未消在壇則道光未明四大虛疲五神慘黯我甚爲子等憐之傳吾道者誰乎得吾印者誰乎究竟所慕之塵囂所逐之凡境毫無結果譬如蝶戀芳花一遭風雨香色俱空而粉蝶已盡退脫仍附弱草卑枝以待斃耳若夫有道根者先成已而後成物眾人嗤嗤我獨不移眾人擾擾我獨不迷眾人嘻嘻我若有遺眾人攘攘我若有往專我所求一我所向不隨人境而或遷恢恢乎似躡雲而直上蕩蕩乎若憑虛御風而遊行人間無人能見我無人能知我幽兮若處子質兮若嬰兒渾渾乎若寶珠之未脫淵而良玉之在璞也簡兮潔兮若飛鳥無迹而逝水無痕也光兮白兮若日中天而月旣望也如此道心己成道身已固道行充周道功圓滿方副我屬望至意不料子等元慧淺薄塵根深固有緣不修是不能立命也有訓不悟是不能見性也性命兩途因緣錯失尙思保無堅之四大了不盡之凡緣謬矣謬矣迷悟關頭一界分上懸下隔似雲塵人生誰是長年者何不將心自照身羅眞人曰聖師云迪慧蹈知去順卽安迪者通也蹈者行也人有本慧而以物欲蔽之故慧光阻遏而難通人有良知而以已私間之故眞知自欺而不行若能修道者必先迪其元慧使不爲小慧所迷必能蹈其眞知使不爲邪知所亂去其事物之順我私欲者就其理境之安我元眞者則慧曰迪而知行相長矣昔有儒士愛食江鱸其一日戒之其妻曰君平日好鱸何反戒鱸士曰唯其好之是以戒之惡其順我欲而累我心也又有一高僧凡人供具香疏美饌必拂衣而走曰何得誘我毒蛇出戸凡供華服必趣侍者取去曰汝肯代我擔此械鎖乎此皆去順之意也所以提心法中有去順提心一品俗中若能行此去順一法在富居貧同於入道又安見其礙道耶本師言清眞妙道三界欽崇正壇開化普度凡蒙規以定志戒以律躬懺以洗業科以立功法以授印經以傳宗日光月潔淵靜源通理無遺義文與化工持循匪懈三景昭融絳臺甯謐丹室含弘三品自調百絡自雍四象互交身寶聿逢天人交仰一道同風鸞理精微聖心淵廣非凡夫所克解非俗士所能通相接之際全憑一片神光方能契鸞理而合聖心夫神光者靜則凝動則散止則流搖則暗譬若火之在燈香之流篆也是以侍鸞之道貴乎靜一靜者非動於欲乃爲不靜卽動於理亦爲不靜也一者非歧於邪始爲不一卽歧於正亦爲不一也是故主一無適所以云敬莊子云用志不分乃凝於神修眞學道凡事皆然智不靜一不能開丹不靜一不能結心不靜一不能澄身不靜一不能養行不靜一不能圓功不靜一不能立法不靜一不能探神不靜一不能感事不靜一不能辦規不靜一不能行是故明乎侍眞之道候鸞之理者積功致靈證行登眞無餘事矣寶地輝煌眾妙門金書玉笈護祥雲何人參透玄元旨主領宗風大道行紫霞靄靄覆靈壇識得眞機天地寬漫道塵情難割捨空羈塵跡未全刪特地爲人得此生如何不覔好前程平夷大道休言淡入我門時不負君塵世茫茫應不窮此雖空了彼難空直須主一無他適動靜方能合化功垂老年華去日多百年瞬息一南柯時時常作臨行想不怕塵機不漸無哀哉庸俗日奔忙精漸乾枯志漸荒縱有慈航如海闊豈能度爾出圍墻我道談來止一言無中莫把有來六時度日休生事湛寂光明接上天寔地修行此話長一涵清靜一爐香素心若問靈壇旨此外惟餘向日光修眞最怕說修眞一說修眞已落塵直道難容如芥障太虛寥廓是眞人顧子廷玉汝爲司教將來若何施設廷玉對曰願遵規守玉勸勉同壇共襄大化本師曰今日主司急務唯在去歧歸一返動爲靜若云遵規習法其事已繁靜一之體已損施設之事皆謬安能稱其教職至勸勉同壇一事尤屬逆浪之舟灌畦之甕不足以宣揚二玉必也已身能實地修行已心能洞然三極方可以德感人人可不言而化廷玉問曰何名三極本師日月九經云伏以眾生心塵沙永不明開緣說正寶吹散諸塵氛此立壇之極也上乘唯一道捨此難成覺圓明自然路非由爲人作此一切法之極也先天理生直結絡自月魄眞炁從精生包羅億萬神此一切心之極也三極旣明一訥爲寶如是乃可宣吾至道若一味豔稱二玉半極未窺舌搖唇鼓人將厭之非教理也廷玉曰修三極者當從靜一入手否本師曰始之以勤繼之以不欲速終之以無倦靜一者非修靜一也言修道當以靜一修之也時時能攝心使靜御神歸一斯可謂勤矣攝之未能卽靜而不忘攝御之未能卽一而不退悔斯可謂不欲速矣直至大月洞明三極照了回心起慈指示盲瞽斯可謂無倦矣所以聖賢之人其修巳也必使人見無萌其度人也必使我見冺滅人見無萌修已之功方力我見冺滅度人之意方眞下士不然修已則以人見障之其修已也必不純度人則以我見雜之其度人也必不化何者靜一之道不合也今子二見未化教旨未明當遵我訓以參二玉其曰勸勉非爾責也軒子羅松軒培糾者合也合乎道而爲糾則受糾者其心皆能合道皆能合道卽人無異志咸有一德一道同風之象端賴乎糾是故爲糾之道亦當以靜一爲宗以我之靜制人之動以我之一破彼之歧自修之功原與教職無二惟熟識科條執持規律爲少遜於教旨圓通耳然身不可不修心不可不正意不可不誠言不可不愼毋見已而不見人毋見人而不見己見人不見已者咎人之非而忘己之非也見己不見人者恃已之明而忘人之明也協心於主教指標於壇庶嘿而後言斯寡尤矣和而後諍斯無爭矣陳諫不從而我志弗違斯道氣集於爾躬矣化人維艱子其愼諸廣子施德浩廣程科職雖繁明理則易辦科職雖卑輔化則多功善爲科者能令壇眾樂爲之輔則人人知進道之門人人識積功之路人之進道積功皆爾之進道積功矣所以一事之微不可或苟一物之小不可或輕一人之能不可不察一士之長不可不用微事必愼大化斯昌矣小物克謹大道斯明矣有能必察庶事維整矣有長必用眾心咸豫矣子而曰壇事可悅人皆曰壇事可悅彼此同悅踴躍之機鼓舞之用在是矣子而曰法事煩苦人皆曰法事煩苦彼此共苦轉退之機廢弛之兆在是矣宣科無人甯不行科習法無士甯不行法苟且爲醮不如清修勞人多事不如省事以逸人也竭貲供養不如儉用以常繼也總之大化貴以漸行人心貴以實感天眞貴以信奉規事貴以自然五事修於平日三要盡其當務斯爲司科上首積功成果豈淺淺哉本師言金光洞玄一黍通元靈風四垂五炁回旋上帝玉光充滿人間知之者夀見之者仙湛寂光明普照無邊凈我六欲保我三元培我五府養我四田金光沖頂大道聿傳可得五慧可達九天神化蕩蕩奠坤轉乾珠英勃勃露芝鮮妍結爲眞米眞果斯堅大道無他躬行不言直超三乘契宗印玄有悟之者妙炁齊添陰甯陽壯丹堅鼎全無思無想無𦊱無牽獲我凈樂成我高安回光返照金明玉宣米月之道入聖因緣仙山寶樹移植塵寰可以出世可以和緣性天開朗功德廣覃道成法備衣德象賢敬哉諸子願各勉旃我自立壇傳教以來無日不以光明覆護諸弟子故傳無止眞經頒無上秘法示無上妙詮開無上寶懺種種玄文皆爲諸弟子掃塵去障見明性玄之資也是故有志者卽當乘此勝緣開心悟道矣不奈壇中多士上根者鮮上慧者稀身雖在壇而未聞師訓者有之心雖慕道而未能力行者有之卽有二三弟子稍知向往然駁而未純歧而未一怯而未勇執而未圓聞大訓不知靜載於心發上心不知堅持於志向日所悟墮凡緣而復迷前修所得入塵勞而又障依依壇下荏苒晨昏究竟一無所造甚可哀已今日特蒞鸞軒因緣甚大諸弟子皆當念此因緣非可易得不見不聞之中必有一種大神通光結就若眞經若秘法若妙詮若寶懺皆是我三生罕覯之鴻文如是珍重因緣則自待自然不敢凉薄從此發生上志步步提撕時時儆省自然志光昭達始而清信繼而正覺旣而上解正覺開而大道圓上解生而神通就種種勝緣莫不由此珍重心爲而基本本固基堅成道何難然而世人非不能珍重也不知珍重也雖知珍重而不知珍重之有益吾身如此之大也今二侍訓弟子有能知珍重者乎知珍重者無二無疑惟道是好不以世塵混其清不以紛華奪其慕不以空乏改其樂不以忙冗害其修不以物欲引其眞不以人緣阻炁其如是爲心是曰知珍重者可笑凡夫俗子往往有躭嗜一藝一技一好一玩便能廢寢忘餐以爲其事勞而不倦貧而不怨力疾而不辭撥忙而不顧無他愛之也若能移此愛以求吾道何難大丹之結大月之成是故新皈弟子入我門墻第一法旨在知珍重當知此珍重兩字不是等閒可以發出上智下愚於此分辨今日聞訓之後卽當靜坐觀心觀心之際金明玉宣光明照耀遂覺大神通光停駐丹臺絳室因起珍重之心者此上智也若觀心之際暫離塵惱洞見元神因而慧花開敷迷處忽悟粘處忽釋亂處忽定着處忽脫獲此道智而起珍重者亦上智之次也若靜坐之際心安而體逸神清而氣甯清甯之中乃發方便照見一切事境同彼幻花泡影一點光英如如自在一念正眞前業蕩除獲此正覺而起珍重者此又上智之次也遞推而下至於下愚則靜坐之際便不能守其信心信心旣不守則疑魔入之便不能住其恆心恆心旣不住則怠魔入之便不能存其照心照心旣不存則昧魔入之便不能生其覺心覺心旣不生則退魔入之疑怠昧退四魔塡塞於靈臺如是而曰我知珍重也不亦妄乎是故諸弟子當認定我立壇傳教源頭是以大吉祥𢌿汝是以大福澤施汝是以大安樂導汝是以大顯榮加汝是以大無畏庇汝是以大長久夀汝知此種種利益自然克生珍重本師言王京啟教南國鼎峙宗壇金闕分燈中土廣宣靈乘心印非眞修不授丹頭豈昧者能探猗歟大道蕩蕩難名偉矣鴻猷巍巍無際五方十極罔不被澤蒙休八海九州盡屬通光流照瑞氣氤氲祥風披拂龍沙泰運迥出尋常茲者𡻕逢甲午時在仲春天垂甘露地湧醴泉鸞化爲之轉關人心從茲萃輯道人秉塵一談有志反躬三省乩仙應化在在林立我壇之所以久者平也談玄說妙處處開緣我道之所以高者直也坦然無私之謂平一毫無曲之謂直惟其平故可垂萬世而不弊厯亘古而彌新惟其直故所闡之道曰常道所接之人曰眞修細繹全規不外平直二字所以下篇曰我道平直平則心廣體胖直則神恬氣靜人能悟得眞規平直之旨自然事事契天心心符印禮門義路出入是由一壇之内和氣雍穆藹然可親秩然有序不言而喻不令而行使瑤階玉樹並沐春風之下均沾時雨之滋欣欣向榮觀感而不知爲之者庶幾法席漸昌宗燈聿顯而可不負玉清上聖開化南洲之意也主司重職可不勗哉道在有無際有無平直因存無性自養守有理方親有有彌綸大無無藴蓄眞非無非有處能悟道全身平直者規之旨有無者道之極有而無無無而有有非道也有而仍無無而仍有道也有而執有無而滯無偏也有而非有無而非無神也有而日趨於有害道也有而漸歸於無悟道也仰觀於天雷霆風雨之鼓潤日月四時之運行俯察於地山川嶽瀆之流峙飛潛動植之繁多非天地之所有乎近取諸身仁義禮智蓄於性經權常變運於外遠觀於物天下國家何其大禮樂刑政何其煩非此身此物之所有乎推之我壇有儀有職有主有司各有當盡之心當竭之力卽如主化之要在無爲無爲者道全德備無事於爲也若一行未備一德未全何能化人司教之要在大爲大爲者言坊行表以身教人也若一言之玷一行之苟不可以爲教司科之要在眞爲眞爲者明善誠身至誠動物也若善不明而身不誠不可以糾人司科之要在有爲有爲者無畏無疑以壇事爲己任也若稍萌畏勞之念疑怠之思卽非科司所宜主司之下有九職亦各有當盡之心當竭之力如是觀之天地人物皆有也主司儀職亦有也而其所以然之故則無也君子之道費而隱我壇之要有爲無爲有爲歸寂也然不從有爲入手求道者不幾生望洋之嘆耶故凡爲我弟子者在家則盡人倫日用之常在壇則盡百職庶司之事件件從有爲做起俟功行圓成而玄玄大道七日百日而得矣臺前諸子咸具上根夙慧尙其懋哉本師言吾道終歸寂眞空在洗心坐忘元性見藏密太玄深杳冥靈須覺絪緼志默尋洗心神氣定悟徹步瑤林用九者立玄之基洗心者覔玄之路基不立功無自而進路不覔玄何由而得道人今日發明洗心之學諸子皆須潛心諦聽心爲一身之主統四德備萬善遠則天下國家近則日用飮食大則綱常倫紀小則事物細微皆此心爲之主宰甯得寂守此心如死灰槁木也哉然由動而靜由勉而安由博而約由有而無必歸到寂然不動之地方見功夫究竟堯之大曰無名舜之治曰爲無文之德曰不識不知孔子之聖曰吾有知乎哉無知也皆妙於洗心者也顏子之心齋坐忘孟子之不動心亦庶幾能洗心者矣本壇之旨曰歸寂曰湛空曰觀心曰止念無非洗心之功也但洗心之前尙有九層工夫一字曰敬二字曰靜坐三字曰常惺惺四字曰戒愼恐懼五字曰親義序别信六字曰道不可須臾離七字曰非禮勿視聽言動八字曰懲忿窒慾遷善攺過九字曰彊恕而行求仁莫近焉有此九種功夫然後知用九之道知用九則知洗心矣洗心之要不徒去塵障幷須去理障不徒去魔障兼要去道障潔淨精微心無一物虛靈瑩徹心空萬象易曰聖人以此退藏於密其是之謂歟心旣能洗玄功之得易易也心息相依玄功要著心卽神息卽氣以淵湛之神馭呼吸之氣以升降之氣留靜嘿之神神以馭氣氣以留神神氣相守金丹立就呼吸之靈神氣爲之也神氣之合呼吸爲之也然非有心於馭氣有心於留神洗心之功旣至神自能馭氣氣自能留神如天地無心於覆載日月無心於照臨也天地人一理天能久覆地能久載日月能久照而人不能久存者眞僞之分也人能如天地日月之眞亦夀矣眞者何九是也用九者全體天德乾乾不息無一毫僞也故曰用九者立玄之基也洗心者覔玄之路也羅子松知乾始坤成之旨乎以聖學言乾知大始智之事也坤作成物聖之事也維乾至健維坤至順健則無私洞徹於始天道大明順則循理直底於成化機自得以玄學言乾乃屬志坤乃屬炁心無塵雜純純不已以志帥炁太極渾全炁無粗厲綿綿若存以炁從志坎離交媾此非難知亦非難行孔子有云乾以易知坤以簡能易則易知簡則易從爲主壇者洞明斯旨克體斯爲卽牖同壇交修交勉天道人道聖學玄功盛於我壇備於我教猗歟茂哉白眞人曰前聖師訓言仁義禮智蓄於性卽天命之謂也經權常變達於外卽時中之謂也性者德行之源凡天地間經權常變之事莫不藴蓄於中而仁義禮智則性之四德也在天爲元亨利貞在人爲仁義禮智故孔子曰君子行此四德者又曰君子以成德爲行實可見之行也夫古之聖人未嘗不期於見性然必實有可見之德行則性始發越而不可揜若無可見之德行則性亦滅沒而不彰又安能經權常變各得其當乎聖師指出有字見盡性之學必有工夫作用非僅空談空玄說妙已也易曰大哉乾元萬物資始乃統天元卽仁也仁爲眾善之長而統乎禮義智者必於此用一番切實工夫始焉明之於心無一理之不徹旣焉體之於身無一事之不順如今日所訓九層工夫皆求仁之學也故終之以强恕求仁也蓋能依乎仁則義禮智皆全矣由此隨其時位所値顯一番作用遇其位必當乎道隨其時必協其宜大而經綸天下小而盡職壇中舉夫經權常變之事莫不各盡焉德行之可見者莫大於此矣而性玄之不可見者不從茲而悟哉故又曰大道七日百日而得也本師言我道無奇旣直且平平直之理只在一心心是活物操之則存謹之於獨察之在萌善惡之機自見分明毋曰不貪見利生情母曰不嗔逢怒難平母曰我忠謀事勿勤母曰我恕有已忘人緣此之故塵氣易之如何爲善歡喜奉行如何去惡截鐵斬釘小善不爲自棄前程小惡無傷蒂固根深緬維冬仲妙如未臨因爾弟子未盡厥誠今朝甫至恭侍以迎主壇穆穆眾子肅清我心則喜奉道方殷細察壇規賴有科臣主化無爲亦合規心我從眾請晉爾上卿其餘道侣另日覃恩欽哉欽哉王天君曰聖師之訓眞守眞之寶筏渡世之津梁爾弟子勿草草看過要繹其體用爲妙總之求道不過一心此其體也而謹獨於平時審幾於臨事此用功下手處也爲聖爲賢皆在於斯爲佛爲仙亦在於斯包涵廣大厥旨精微不得視爲常訓也文昌帝君更生永命天尊玉書曰敬稽天尊以庚戌年正月立文昌靜壇於吳迥家中先期巳時親臨斗玄二壇頒經示懺至此復時親降靜壇厥後辛酉年始又時親降施錦家壇頒經示懺慈深願重故爲飛鸞開化之主文昌永命天尊曰修道之要惟存一敬字在心眞字在性清字在躬和字在氣卽便日新其德日進於道人但知敬字之用在於對越之時而忽於幽獨之際所以内念不純漸肆回僻果能常存敬心則放心日收惡業自伏天賦我形卽付我性本無不眞旣成我性卽成我命凡境緣之或順或逆俱從眞理中化現眞命中安排不因用僞而或移不因存眞而加劇故人之捨卻天眞好存人僞者俱未了本性者也至於清之一字尤當研究卽如坐忘則天君泰然用慧則夢魂顚倒可以知心本好清趺坐則血脈流通奔馳則氣機騰沸可以知形本好清蔬水則齒頰流香酒肉則胸膈塡穢可以知臟腑亦本好清居貧則布絮安然競爭則高車慮覆可以知一切事境亦本好清洵乎清靜經所云夫人神好清者是也庸士未研斯理故生倒識豈知清濁一分靜躁迥别清而靜者生之徒也濁而躁者死之徒也可不愼乎然而致清之秘妙在一和和者無過不及敬而能和則免於矜峻之患而開其自然之光眞而能和則免於滯著之害而生其大明之輝淸而能和則免於寂槁之容而養其純潔之體一和之用通貫三德譬之太極之中渾含至元三氣做此工夫不零不碎返躬具全方得修道之要願爾等致思焉韓耀宗問性命之旨曰空將性命苦尋思若個行藏得所宜回也屢空斯善受參乎一唯是能持半𥦗明月窺無盡一榻清風樂有餘試問向平推順逆何如守得性如如天教至廣性命之理闡發無遺只要吾子靜將眞訓細參便可一源洞達若言命則兼氣性則專理何以易書六十四卦全是氣機發現而物之正性卽具於中可見性亦兼氣又云性有氣質之性有義理之性分爲二者亦非也難道義理之性遂空空洞洞離了氣質而虛懸者乎後之儒者未通玄妙所以出此不了不當之說若本壇眞訓性命合一此玉光之教旨也至星家所言之命是主後天氣數而言更屬一曲之學明道者所不語又問立命之旨曰子輿氏所言立命者不過如太上所云全受全歸耳非袁學海所云積功求福之意所以端木貨殖孔子便以爲不受命蓋於人事中增了一分卽於天性上虧了一分是故不獨立命兩字廣大難知卽受命兩字亦精微不可易見人能解得受命之旨則無往而非道矣兩間粹氣命爲人四德同時集此身若使一毫私欲蔽誕衷先盡與禽倫所以學道之人不須於命上做手腳只要保全了天予之性卽已契合乎命故謂之受命可也謂之立命可也卽謂之造命可也復命可也總是聖眞學問無二無雜不著推求不俟談論在乎默而識之不言而信方爲得旨子其誌之正陽帝君帝君姓鍾離諱權爲斗壇基化之師天仙之祖正陽帝君曰盈天地之間莫非道也而道之所以爲妙者莫非氣故有形而不滯於形無象而能妙其象四時無象而生長收成日月有形而循環往來豈非一氣運行爲之屈伸變化乎卽從人身而論在母胎中何以成形纔下地時何以有聲三𡻕以還何以有覺漸漸成人知識頓開俄然而壯俄然而老又俄然而死豈非氣之初生發榮滋長氣之漸衰昏疲消竭乎𦕈然一身全賴天地之氣默默貫通而後可以長生不死故學道者以天地爲鼎爐以日月爲離坎以陰陽往來爲交媾所以開壇接引只要人人得道豈料下界凡夫如此昏迷但知目前得意不信身後輪迴心靈一點純被五濁汨沒殆盡天尊哀憫故以琅函玉笈寶誥靈符蕩滌邪穢消融戾氣無奈凡夫遂以不見不聞疑之爲爲鬼魔背壇者多信壇者少不知吾身之氣與諸子本同一氣中來以神仙之清氣通子等之元靈自然心開見道只如禮誦之下自有一種清和之氣沁入心腑便是神之格思神仙一降清光滿室一團眞氣無量瀰淪爾等雖愚氣感卽智爾等雖濁氣降則清所以度脫幽魂盡入光明藏者亦何非氣也耶若必欲求之形而不求之氣何以古來忠臣孝子精靈常在天地間與人默默感孚豈必形貌相接而後謂之有乎况三界之中赫赫神祇皆屬有形修行得道之人可以通幽洞微如德山見土地珪禪師受戒岳神具凈眼者自見天身我日日在壇而子等不見譬如瞽目之人不見光明遂疑世上無日月不亦愚乎因子等塵垢不能見我之形而一呼一吸尙能通我之氣故以飛鸞方便接引通光流照合神會氣先注精於玄宫後運靈於手腕自然流出金書玉字以破羣迷此一線之生機也奈何幷此一線而亦欲斷滅之爲快耶悵塵途之日妄悲大道之無傳感幽明之慘慘嘆劫海之茫茫上聖高眞辭瓊臺玉闕降塵凡市肆不惜方便略露天機指點禍福無非欲人歸於大道重悟本來何以世人疑之凟之更謗之毀之所以然者只是俗根未斷遂囿於習見而不能自出今諸子果能奉壇須要遠俗以此心還之大道此身還之天地此家還之劫數自然空空洞洞引眞歸元上可以參輔元化次可以獨成道果如是與吾之心嘿嘿相契方不爲緇玄所奪方不爲神靈所攝方不爲外道旁門所淆亂不離日用之中直達先天之境金丹妙道非子等莫受非我莫傳他年擕手三山爲蓬萊賓主豈不快哉豈不快哉正陽帝君曰所得無所得無得得所得得自無中來著有便無得雲飛水自流雲水混天一無形化有形雲水皆不息卻嘆修道人妄測金丹術無得保天英有得喪玄室漠漠守無爲無得方無失我嘆子等茫茫在此不過爲得字㓁亠月了身心所以日在水雲空洞世界毫不知享用縱有眞師眼前指點也不知路歧南北昏昏逐逐只爲戀戀不肯割捨卽有一時警悟便欲誇得勝人爭貪競起卽有眞得爲妄得矣豈可不自知猛省所以大眞示提心三十法正欲剪積染而警維新也勉之正陽帝君曰仙道貴虛虛者虛其所當虛儒道貴實實者實其所當實當虛者心也當實者行也太虛無踪以喻心也務實守約以迪行也心不虛則不存行不實則不高要之心行同源仙儒一理儒家不說金丹未嘗不說存養仙家不言治術未嘗不言利濟總是一箇道源一般作用非有二也世人不知往往卑視儒而高視仙云何卑視以卑卑利祿爲儒而不知儒者原非利祿何云高視以偶爾神變爲仙而不知眞仙不重神變二者胥失之今我承命啟教演道傳經務使仙儒相助心行交修達則儒中有仙隱則仙中有儒歸於不負聖恩便是玉壇宗旨自今以後子等當去歧說除疑心斷分别心成正信念自然種粟得粟因果不錯也正陽帝君曰大月在中氣自環衞何必學呼吸亂我動靜哉故至人無身依氣而生至人無心順時而見子等生於俗長於俗安能謝絕人事而成木石之體只要過而不留便是持身定心之根本氣神與精一之則靈分之則傾氣中有天不見不聞精中有天藴爲風雲神中有天光炳日星存之默之自然運成矯之揉之喪我元嬰子夜至已名之曰息從午至亥名之曰消息中眞火湛然而明消中眞水汪然而澄一息一消元會之根人能解此便是玄門正陽帝君曰諸子修道從何處下手修道者修心也心在先天本有正無邪有眞無僞只爲事物牽引情欲動搖故爾至明之體變成昏昧至公之用變爲私曲公明旣喪大道日離事天則天心不合應事則事理乖違持身則精神消耗處世則苦障叢生凡此種種皆由身雖奉道修不在心故也所以聖門指出誠意兩字示人修心之法全在於人不見不聞之地嘿嘿操存一如禪宗之止靜道家之内觀一塵不立一絲不掛到此地位方見愼獨之功用然意也念也不可滅之使無當妙其所有識也情也不可遏之使絕當歸其本眞明於此方達修心之理而與道日親矣至於眞陽之氣非至靜不復非至和不聚非至清不充靜也和也充也亦須從幽獨之中涵養而入陶融而得不可徒向語言文字中求流於訓詁之見謹成口舌之慧反使意念之萌不及照管是以道人今日先把丹基第一節指示子等若能細研我言修道修玄功夫日進莫謂斯理平平無奇不去修學自將大道之門塞斷不由反由旁竇而入如此則雖修道勤苦終不能升堂入室矣天眞啟教本自三教同原在儒則從此工夫顯出齊治平之效在仙則從此工夫顯出濟生渡死結丹仙化之效在佛則從此工夫顯出圓通無礙行因證果之效也正陽帝君曰邱子嶧勤持我誥知黃芽白雪在何處黃者中宫之土土厚則易於發生先天土薄多致昏倦昏倦則性光不透惟借我後天土氣重培故曰圭土厚生金故曰刀圭刀入土則膏澤徧沾故曰黃芽芽之所生隨性而發性有偏正芽有苗莠知其莠則先鋤去之而苗日長苗長穀成猶夫得道白雪者何腎中眞水也水爲天一之源出崑崙徧九河若散而不凝則爲浮潦爲淤池全賴牝中眞氣結之故曰白雪雪者朔風扇搖覆於土而不䊀於土陰極轉陽之機惟在於此卽超凡入聖之關也韓耀宗問觀心養氣之方曰觀心養氣先要得竅觀心不要著心觀四面雲霞抱玉盤空到不空方入彀綿綿眞息定中看細參此偈便是大道之門正陽帝君曰三返大法首曰觀心回光返照是也其中次第階級不可不知初攝心時積染將脫未脫正氣欲回未回此時觀心之道全要勿助勿忘如調疾苦是名養觀二攝心時四體粗安元精元氣稍稍旋復惟有意馬念猿拴住未定全要歸神太虛將清靜經三空句子轉轉密持自然心能泰定是名靜觀三攝心時定光始生照見五藴此時五行四大有餘不足自家能知然三關未開雖能知而未能治仍須一心養光勿起情欲壞其光體勿生苦樂損其光英勿隨動搖暗其光華三者克持卯地新蟾來臨午位而大丹有基矣四攝心時澄念念澄靜氣氣靜身中腠理脈絡漸漸貫通向日積習舊病漸漸解釋此時此際玉光漸長始而充滿絳臺繼而流注下田旣而回照崑崙遂覺三關洞闢吾身正氣直與天上眞陽貫通不善攝心者極易於此時返生妄想必要如月九經云得光若非光青青返眞房守此一心寂然不動而後二英始成是名寂觀五攝心時二英旣具聖心益明二英者抱日扶月也功效在左玄右牝太和元氣所結二英照耀則絳樓大月漸生五色光華上注五官漸開五慧到此則造化在手風雲護身矣是名定觀然此地位祇可稱爲小月一成三體初現耳未可云九英全復大月全成也然子等且將前五級從事無間亦不枉一生奉道望切望切孚佑帝君純陽妙道天尊帝君姓吕諱巖爲三教宗師奉勅顯化度人慈悲普濟等觀音之願海功德無量無邊且立壇百千萬億丕宣道妙宏範諸天晉號孚佑上帝位證文尼眞佛純陽帝君曰道法無邊廣莫外吾心光天眞無量眾俱在吾心中大道難思議吾能造其宏一心中有失不能禁其邪如彼世間人何堪爲我說說及多苦惱願救眾生劫救劫良不易挾之不可挾有能始信者終於多疑惑有能善信者壞於多畏縮有能具靈者多爲家緣失有能自悔者繼而復蹈也有能謹守者怯於無胆决有能勇爲者敗於入道邪此等愚迷輩俱入河沙劫欲返眞元良三九須尋急大限一來時此命頃刻結玄功不可擬如天嘿運月玄功不可知如彼須彌輪玄功不可及如天難幾也一入易幾處卽在心中獲無邊恆河沙俱有此米月欲得此心珠須憑守戒烈欲得此心清須仗歸命一歸命無作爲靜守天理樂樂天知命士吾願度出劫輕清者爲天重濁者爲地人得二氣以成丹臺虛明廓落本無所著一戀妻孥萬欲齊來一爲身家萬魔俱到殊不知此身死者也非靈明者也此身殻也非眞也豈可以有盡之身累此不壞之心乎身尙無用何况身外之物道之於人人心素具不假於人酒色財氣本無魔障只是本性旣失四魔畢集四魔旣集良心難復主翁旣去客人作主酒迷於一時色迷於一身財迷於終世氣遂因之而來大魔旣集各逞威風自相殘害酒殘吾之神色取吾之精財迷吾之志氣喪吾之身亡身敗家上遺辱於祖宗下遺患於妻子存不能見世人於生前死不能覲天顏於身後豈不可憐豈不可惜設有勇士能逐去四魔心無雜念心清而氣順氣順而精裕精裕而神旺三寶旣備不至喪失於是而内整玄功外度末世功成行滿上帝褒嘉拔擢及汝位證飛仙無疑誑言又或有人天生好道不致逢魔位證上仙者固無論矣抑有中士酒色財氣魔之又魔世味俱嘗作惡將盈而能一念悔心將前所作爲盡情改悔誦經禮懺歸命上眞度人自度自利利他功行一成靈根素具南斗標名亦可位證選仙吾道蕩蕩吾道平平人自遠之非遠人也一戀浮華卽遠道也又有下士不知道法不知明心見性然不敢自專亦不致作大過大惡此等之人卽經大道亦不能造飛仙證玄功惟積德累功作一集受洪福之流然或功德積久上帝亦不負之至於身亡南宫受煉殻脫尸解位證地仙可以無疑性本無著貴乎虛靈道本無相貴乎忘念諸弟子旣無生知之聖又無復性之功可乎吾願爲子論復性之功復性者非在於一念一意以復之也須要念念返本意意還元復性者又不在於一事一物以復之也務要事事報本物物知先太虛冥漠總不著一實相又不著一空相著實者不靈明著空者守枯寂枯寂者死不靈明者亦不活無非著一死相欲靈明者先提心欲提心者先去欲欲去欲者先斷疑欲斷疑者須定欲定者在於慧欲慧者在於玩鸞訓玩之務要行之純陽帝君曰鸞理微深空靈方覺能空其心空其相而後眞理湛然靈機直接此不獨能輔鸞亦能進道何也大道無形惟空能合大道無方惟覺始通凡夫之所以不知道者非道遠也爲多妄想以塞其本空多色心以障其靈體是以顚倒神志終身迷悶覺性不光今日諸子欲知大道須悟本心本心旣徹何道不集然本心兩字甚難體認文字語言講究不得步步要在身上理會及至身上理會更難下手知識意見都用不著全要在法上參求及至法上參求尤難立腳符印經詮亦屬虛形所以本心兩字迷者實多悟者實少玉尊所以發大慈心勅建宗壇欲使世人跳出塵囂咸臻道岸使本心不失遊樂眞鄕此大壇開化宗旨諸子各當奉命力行况天人相感寓於一鸞教之通塞存於一心道之廢興關於一機諸子誠欲使天常接教常弘道常興必要從本心發揮應現方稱妙乘上宗本心者天地自然之心無無虛寂靜動未形混沌未啟便有一點種子布於太極之先合於無極之極便是本心人從後天立體分陰陽定五行一本以二所以天與人分靈從知喪日從事於道而道愈遠子等只要貼認吾身未生以來心在何所本自何賦時時回顧時時注察便知此身已屬幻空此心萬劫難毀今玉尊開壇濟世宗旨不過爲本心兩字復歸元化至於法籙符詮靜功玄諦究不外此諸子能知能解便可稱爲上眞然修之有漸復之有源從源溯本妄盡眞生近裏工夫全在去妄勉之純陽帝君曰金子夙根旣好慧悟後開捨身衞壇可謂難矣若能一見本來便成眞聖小其心大其身一呼一吸還本眞存其神守其精左日右月抱靈根龍吞北海水虎嘯南山雲此心非我心此身非我身朝騰九霄布風雨暮列酆城濟萬靈精旣滿神復盈與天齊夀無陷傾仙家訣細討論身心與精神氣氣合元英元英一點分爲九八卦相排一中守子能尋得這源頭億萬仙眞隨爾走走走走莫嘆西風兩鬢斑雲中自有人㩦手諸子有志煉鸞務要日日涵養月從精生米以氣結天精未漓月體易復眞氣未散米珠具存持其志守其神勿逐物而營營念須空視須中固關鑰昇玄宫是名天精飛如龍調汝形潛汝息勿隨欲而役役尋眞母守玄室三田交通上下混一是名眞氣堅如石一米成大本立一月成性光得玄玄至道本尋常萬劫修成只性光就裏工夫微似髮靜中火候細如芒弄丸抱卵差堪擬伏虎降龍豈易詳得手莞然成獨笑誰無鼻孔費思量元始所𢌿之氣乃心之王所謂守心者無撓其氣養心者能定其氣氣足神完萬物備我何從更有欲念人之所以喪其心者喪其本來所以出之心也人能復其心者存我後天再造之心也故修煉之法不守心而守氣氣從混元之初而結先天地而生始陰陽而立所以一闔一闢從無極中剖出玄關一竅氣氣應合陰陽故曰始氣欲求道者斬後天立先天故能立地飛昇修行有五字訣正專靜存斬盡之矣行自在坐自在如如不動眞玄解養氣工夫只寡言躁急平兮天君泰晨調百息葆中黃叩齒三通百邪壞五辛絕兮腸胃香眞珠一點懸紫房紫房眞人天地通護養丹壺徑寸中龍飛虎走風雲動梅花片片琹三弄水底瑤天漸次明三彭不敢撼金身律巳嚴如侍君側競競執玉時畏惕日日常行人不知萬億仙宗從此出入俗無妨諧世塵避喧由此登仙室不炫聰明不走歧三千弱水舟堪覔諸子煉鸞未得通光者少此一段工夫故也今當平平做去淡淡得來自能優入聖域也純陽帝君曰修行路頭我前日五字訣盡之矣我再宣之一曰正如何是正周行大道本如弦曲逕旁門戒勿叅趁此大梁珠照乘輪蹄熟路著先鞭眞實路頭不難進步一曰專如何是專灰心息念檢玄詮一字堪消萬劫愆檢到無言明月對心珠光照大羅天只要專志不廢時日一曰靜如何是靜息息收回方寸田精神纔動守吾玄空裏影來空裏滅眞空湛湛定中禪不須絕俗只要隨應隨空一曰存如何是存眞心圓活是明珠動靜中含造化機但使七情沉碧海一輪浩月見眞如學道參宗最患執著一曰斬如何是斬大藥初成九轉丹三彭斬去萬神安塵緣攝向光明鏡拔宅飛升也不難目前骨肉豈易輕抛但須慾寡戀稀三彭斬去矣或言斬字工夫最難曰只要用沉船破釜工夫認得這條門路急急望前是生落後便死其勢不容不斬譬如毒蛇螫手不脫腕不生不得不斬一透此關何難直入眞境到得客火滅盡眞水復榮重如纔出母腹便是歸元大路也純陽帝君曰云何是攝心心起心還滅捺住無明津上潮眉中現出光明佛云何是息機機動眞光裂試看風平波不動一輪湧出光明月云何是養神神在崑崙穴莫將塵垢凂元眞飛身自到光明闕云何是報恩恩隆難喻說髮膚原是本來身直教認取光明血云何是充覺覺在智中徹撇盡巵言冺見聞珠心獨契光明雪金丹大道非易非難只要子等認正路頭認得正時怡情花鳥皆可得道認不正時埋頭面壁也是枉然施子子被那心魔縛了故懷抱不開心執著了道便是礙道認不眞三品合一之道三品之中精爲根氣爲本神爲標根主靜本主立標主動精靜而動藏神動而靜伏修玄者修靜也靜能見天精爲天本所以悟金丹者重於養精精固然後能養氣氣定然後能養神所以守精之法在於善潛不必納息黃廬恐撓於中也不必注光崑頂恐耀於外也惟有念念不著便步步不錯况暮年之人精元將竭安可妄有作爲哉今後子當一念養精方可攝氣氣攝自然充神若子妄以客氣爲眞氣僞神亂眞神烏能見大月升於碧海或問養精之方曰起居隨意適寒暄飮食須調護聖元但看梅花琹裏弄爐烟靜對共無言純陽帝君曰施子錦近來作何工夫對曰有志而神衰曰旣知神衰何不卽做養神工夫對曰志欲以壇法醫道訓子孫曰如此更役神矣志多則事多神愈竭矣豈不聞大眞人云志多於神其道日昏神旺於志其道日至子言志未衰而神衰不知子之神衰皆本於志未衰耳所以禪宗有云放下全放下佛也不要做𥪡起脊梁筋便是骷髏坐子若參透此旨心空則正氣長留心定則眞精長湛何患神之不旺也純陽帝君曰子等能明寶月二字乎太極初分先生月而後生日故日爲始氣月爲始精其體微妙而難盈其光清瑩而不耀始生爲三圓滿爲九降精於人謂之正性正性之門謂之寶精所以見月得道者甚多可笑人生逐逐徒見天中之月不知已身中各有一月只爲塵氛蔽之雲霧掩之不能使光明吐露耳若能潛神内照精滿而月生神全而英現從一至三從三得九金丹大道莫外乎此問從一之義曰天一精也大道從來要自探守元抱一見三三不須空向金爐叩攝念蒲團仔細參問三九之義曰陽數也月包日體故老陽之數至九而極月白水清故少陽之性從水而生知得此理便可長生純陽帝君曰聖光照朗洞徹始青生機潛運道氣内凝定慧若虛體乾效坤是曰純陽金丹之門我靈不遠人各能存我眞不難人各能明靈眞二物上藥之英一在去私一在滅嗔私去嗔滅方存我靈一在除妄一在還湻妄除湻復方明我眞二物克具納爐養烹元氣爲鼎元精爲鐺元息爲火元金爲薪三要口耳目固密五性充勻返三爲九天地合幷玉光温温降我崑崙金光微微現我黃庭金玉二光聚會生神不以知測不以意分無無虛極妙理自呈更形換骨漸育胎嬰雲霞燦發金火聿騰知此道者尅日丹成靈眞二物盡人具備不假造作不煩尋覔有生以來卽全體於我身但因世人馳逐塵途不思還返所以靈者變而爲窒眞者改而爲妄靈眞旣失窒妄用事所以道本大通而以窒性求之則處處染著道本至實而以妄心探之則事事虛僞殊不知靈眞之體賦自上天所謂天根者是也染著虛僞因於幻合所謂地根者是也以天歸天如水入海本無異致是以古來昇仙成道之士不過善保我身之靈眞而已大壇開化教育無邊亦止欲子等識善保之道所患子等有明浪擲有慧虛投不肯潛心凈識反照自已眞身耳若能返照則靈性日充神通可致眞心日透聖慧具全如此工夫雖或未能易胎換骨飛形上界幻身凋謝則眞身堅固安住天宫不難矣純陽帝君曰彭子甚有緣天恩旣深子立志亦復不小眞吾道之嗣法人也我適言有明浪擲者靈眞之體不可以言語彰不可以形貌狀惟在反身自問見一分自有一分受用見十分自有十分作爲若預期助長便同赤水神珠不可得矣所以世人不會修心者無不有明浪擲也所言有慧虛投者慧光原屬人之善根用之得宜卽是明心知性立命見天之基本若恃慧爲我有而用之以勝上之念則漸覺他人之慧皆不我及一點勝心化成大障如是則雖有聖訓而不聞雖有寶典而難入障根起於纖毫靈眞隔於霄壞是謂有慧虛投也今吾子信道正而且固諒無前者之過然大道精微不離平坦大道廣博不外近約若稍有務博好精之念便致忘失在我之靈眞而不易復矣道藉緣成緣從天授凡古來得道之士必有善緣以成之所以境界之或順或逆俱足以發明我靈眞之體而唯上慧之士爲能審緣而悟之若無慧者逢善緣而不能覺則善緣日遠反墮邪緣不知緣之善者其始必有逆境故能警惕身心漸歸正路緣之邪者其始必有順境使人迷戀轉展漸入迷途是以有志向道者必先正心以乘正緣所謂正心者去華就淡輕名重實崇本抑末尙志寡言乃能令我絳宫眞人通明洞達不因境順而昏不因境逆而苦則一切境緣俱是我成道之助何况更遇大壇無量提撕此善緣中之最勝因緣也所云緣從天授者子等於正心之後尤要生大覺悟看得世間一切因緣莫非天授半點不由人力造作自當心心事天冺私忘我棄智絕矜則靈眞本體日與天光相接而德行符於元極矣然必一言一動悉存戒愼之念樂善之誠而後過悞漸寡功勳漸多天之授緣有加無己而大道可成也若未明此則雖竭智探玄究竟金丹不復所以然者丹道非神助不成上神非功德不感最悞人者有一輩自了話頭徒講論汞鉛龍虎而置積功立行於度外如此等人雖能屏息絕糧終不是眞胎息眞辟穀也安可云道哉總是本壇大化闡玄功則以心月爲無上丹頭論功行則以性宗爲無盡妙諦言化度則以眞靈爲自然舟楫俱要天人合一處細勘而得非淺小智慧所能幾也呵呵此吾道所以知希也
