body:
  text: 立壇宗旨皈壇規約讀詮心法太上道德大天尊浯邱天公本師玉光普照天尊文昌帝君更生永命天尊正陽帝君飛行救劫天尊孚佑帝君純陽妙道天尊立壇宗旨本師諭衆言子等能知我壇宗印否宗有三一曰上二曰覺三曰正天下乩仙應化之壇咸出上宫淵源師派故凡建立壇宇要皆從上覺中演化而來惟我大壇上承元始中通金闕所以規曰玉壇正宗正者該乎覺而統乎上者也所謂印者亦有三義一曰妙二曰慈三曰照凡乩仙度世附鸞傳教者本乎照印中出照者悲深願重已能照徹本來亦望世人同加照徹借鸞以伸其接引之意此照印所由名也至若元皇開教闡道拯迷自從厯劫修證妙印圓隆乩鸞流藴奧竅弘宣故曰妙印要之妙也照也俱為一洞因緣寸地現光而非普慈上乘之旨惟大壇分演八毫光光映續十真開萬載之勝因八使護現前之妙道所以上覺惟此地為宗妙照奉玉清為主主印宣慈慈光四覆金光一百里祥煙遍江南正宗二字確有指歸實有明驗為是壇弟子者必須內究性元外操言行層層解悟步步隄防於至紛至擾易動易雜之時尋出大明不昧之體寶月高懸萬物畢照自然左右逢源法元俱徹方名善解上修弟子庶幾正宗慈印日顯月彰矣大金神曰天化昭垂聖慈廣運敕真仙以度世傳法寶以濟人天下有正壇三十六而玉壇為之宗因緣浩大功化淵深所以玉壇之光直接三壇而通玉闕上壇金光洞真之宫中壇雷光洞元之宫下壇寶光洞神之宫故敕罡元紫微大帝督典上壇星元文昌真君督典中壇輔元八大金神督典下壇三壇珠貫燈聯光充十極而此玉壇肇始於甲辰之秋定基於已酉之冬顯明於甲寅之春充括於癸亥之夏莫不待人而後著藉道而後弘如是三十餘年之功績遙遙接五百餘年蜀水之宗而開後千百萬年之緒成真之數已著明混元寶圖豈不偉哉子等千生慶幸值此正緣務須發志發志之道不在鋭進不在廣參但要大其真心去其凡心證其聖身空其幻身自然生出大志今俗夫之不入道者非道難也志不立也志立則信心漸堅志立則覺性漸開志立則正行漸充志立則元功漸著所以我規約之中首言有志即白上仙所云傳道傳心傳心傳志也然此志非人可發非心可發更非言語可發更非文字可發何也發與不發關乎道之成與不成是以就子等身上説則有天命主之根器佐之夙修成之尚有風土囿之元氣範之業𡨚持之所以易者易而難者難也然在子等既逢大壇難道任其虛生浪死該就極難發處特立志中之志念我大志何故不發必有𡨚業持我急思所以解之必因元氣嗇我急思所以培之必為風土囿我急思所以超之有此三種思修方能解悟夙修完其根器而全歸天命矣子等勉乎哉韓真人曰仙道儒道同者道也不同者法也儒道之中性天亦備但法在治世故詳於倫教而元元之理祕而未宣故我道祖憫世降凡敷揚神奧傳道德于函關授元科於玉局發先聖所未發以為萬劫度世慈航今函關一派尚識全真玉局一宗漸流應俗是以玉光聖尊重開木鐸丕濟蒸民曰明曰直顯大通出自重元曰月曰米闡性功本於元始正教煌煌言不能殫惟在有志弟子入我壇讀我書專心求之教心自悟一志行之聖果斯登矣陶真人曰飛鸞開化其來久矣秦漢以來在在有之總皆出於上帝大慈光所現不知者以為奇事不信者以為異端豈知通天達冥原屬吾人性分中事是以上古聖賢性光純潔雖無飛鸞之名咸有通靈之實是以苞符啓祕河洛成書嵩山授治水之經赤水傳補天之術甚至七返九還醫經辨藥等書皆從昔賢性光中得而利澤垂於萬世中古以降淳風漸漓人之靈慧不能出於自然是以上帝哀之遍敕瓊仙周流八海或託鸞以示化或假筆以相接其進者則如阿難之心聞道陵之神籙莫不從無達有自隱至彰雖因緣之殊途而感通則一致也迄今大壇啓化聖恩優渥溯泉源之細流匯巨浸而澤物所以道通元始法布玉京而仍有取於飛鸞以示教者為其近而易知也為其顯而易見也為其實而易學也苟能進之心聞神籙漸次堪成其靈通漸臻上古金書玉籙澤及將來此玉光啓化之深意也無奈世人肉眼未破一見飛鸞即驚詫為奇事或以奇而信奉或以奇而疑退信奉者不過買櫝還珠疑退者真同暗中投璧甚至偏邪小人挾其私心鄙見謗為異端致使已皈弟子不能堅守初心捨道入俗者比比有之此等庸夫總之未解鸞理罔識帝心真所謂欲自絶於天而並傷其日月也豈不更可哀哉又曰三天之上亦有鸞臺其臺高廣數千仞中設珠鸞丈餘金色香沙布於碧玉之几兩仙侍傍衆天人咸於臺下仰觀惟高真上仙許登臺侍側二仙子端肅寧靜乘鸞不動傳亦不多一言一句出於妙機聞者無不立地開悟歡欣頌揚聲如雷震故其天曰雷音寶勝天所以三天之上亦設是鸞者非天真之不能親謁元始故也蓋因天天有民不能隨上聖高真遠去故假鸞一接其文皆一丈天書能自發光音天民雖衆無不聞見不待侍真宣傳而後知也是以二仙真人亦曾供職九十劫始證天仙子等莫視侍鸞為艱苦事當作想此時侍側便不疑高真上仙之登臺鵠立安知此室之外庭除之下不亦有億萬幽靈仰瞻妙化乎所以侍鸞一日其功同於行煉一次故本願經曰同此無為功德之所莊嚴其功莫大也皈壇規約玉壇者上帝開化選擇真修之子以充真淨一會之壇也金闕巍巍七寶元苑上帝宫中侍真侍神悉是了悟因緣斷除障礙清齋弘誓曠劫修證故得親奉慈顏聆大妙音聲嬉遊聖域逍遙自在上帝慈憫深摯見彼衆生貪名逐利迷失本來猶如慈母見赤子入井心如箭入爰以神通移接下塵世界污垢之中成大羅宫七寶苑金闕殿復以一毫吹散人間以成十大真人八大元帥侍列左右金光一百里祥煙遍江南是名曰玉清正壇為是壇弟子上事聖真中交神明下濟羣生修元功立妙行入寶月參性宗浩浩乎上帝之心也悠悠乎米衆之因也有志者視戒規碧玉真宫大戒一戒曰不殺微命二戒曰不起淫意三戒曰不生諍念四戒曰不盜一芥五戒曰不欺一愚六戒曰敦行盡力七戒曰語言無妄八戒曰千魔不轉九戒曰弘發願力十戒曰事聖不倦真人曰上乘惟一道捨此難成覺圓明自然路非由為人作人性至廣大性開成上仙王天君注曰本師言夫玉壇者上帝開化選擇真修之子以充一會真淨之壇也開化二字上帝慈悲之心上帝自龍漢劫來何日不以赤子之心待人何至立了玉清正壇才説開化要見得時節因緣元始上帝親涖塵沙而説法也法廣而深真仙聽法之際咸發誓願親往下方濟度是時祥煙遍覆七寶浮空隨地結成宫殿仙真下降或示鸞書或降凡身親臨輔化上帝承是願言設立上中下三壇層次宣達俾有緣之子不致汨沒靈光所以本師又説選擇二字選者選其夙根擇者擇其品行夙根既嘉品行又正方許入得大壇是曰真修真修者以真心行實修也真心既充上光自接不待慕靈著異而始面我本師也壇曰玉清為何又説真淨見得以真合真性光明淨方始充得大弟子不負元始上帝之真切妙化也又説上帝慈憫深摯見彼衆生貪名逐利遺失本來一段要見得慈憫之心時時入人心坎照見那有夙根的被名利之心喪了有品行的被名利之心邪了本來故物日暗日昏上帝雖慈焉能人人盡施大藥故仙真不忘本誓時時降光啓迪冀復其本來如赤子入井何等皇急心如箭入何等哀痛選擇真修不得不汲汲也十真八使咸以本師之心為心指詮示法不啻萬言而示弟子真實清修只有七件七件之中前三件是教弟子之顯功後四件是教弟子之密證第一曰上事聖真上事者敬心所發萬聖千真式臨壇宇在內則屏息斂容時存兢惕在外則揖必至地拜必挺腰無速無遲班聯如一著不得縱肆之念方展對越之儀第二曰中交神明中交者誠意所動神祇將吏森列在前或冀表文之上達或冀符命之宣通當平氣以相接舒顏以導誠著不得諂媚之念方見孚信之至第三曰下濟羣生為弟子者上事既敬中交已誠一點誠敬之心直達瓊霄是時不將天化闡揚豈不依然虛生浪死所以本師又致叮嚀以下濟為急濟之一字有百折深情如渡江泛海必須乘風方能達岸如壇緣之順逆非逆施而行也壇緣之處逆則當固守待時處順則當廣宣壇教隨處宣揚以副上帝真慈又濟者廣及之意也萬民之災沴如我一人之災沴水旱之祈疫癘之禱豈容不為請命壇中弟子有厄如我一人之厄疾病之來祟邪之殄豈容不為驅遣至於下度沉淪亦在濟中生出第四曰修元功元者天之正色丹之定基自然而然非説可説修之則能中包天地外契五行不修則為血肉之窟而仙根難見矣本師指出箇修字有不疾不徐不難不易境候俟人自驗可歎世人妄意修元者或指左元右牝或指虎嘯龍吟或冥覩凝想或息氣閉關俱是拘形逐迹大足誤人所以又指箇功字示人這功字要見得不是內面去尋外邊去究實只須靜中著力一身三百六十餘竅皆有光明正上應周天之數人只須在尋常日用間靜持其真動維其簡勿勞我形勿役我身自然真竅中有妙光上蟠下際可通上帝之心可濟兆民之命故密證之功以修元為首務也第五曰積妙行元基既定若無善行持之其基必致易傾所以本師又以積行為急人之處境不一而可積行則一也故我規中分資力之法以勸弟子即本師積妙行之法也資者人之所吝也知妙行則吝可化力者人之所惜也知妙行則惜可竭總之積得一分自種一分善果他人奪不去人當初積之時尚有苦難之色若曉得了這便是妙行而千而萬勢如百川赴海豈有稍舍之時成真證果多稱妙行可見行不在成證之後而後積也明矣第六曰入寶月寶月者本師之名號也本師名號不一而此云寶月者要弟子見本師之心光明洞徹無一毫蒙蔽也本師何心以弟子之心為心故比明而共印弟子之心何心當體本師之心為心故潔淨而常圓所以提箇入字出來見得本師如愛護赤子惟恐傷之弟子亦宜以慈母之恩待本師惟恐一刻離之這才是入寶月第七曰參性宗性者人所固有之天良宗者人所當止之歸宿性出於天而賦於人五常百行豈有舍性而外求大道者乎故性有專屬而命則隨之修性不謂命者專主於天也立命兼攝性者自盡乎天也奈何世人不知正命遂因而縱食色之性以纍吾真是以性水不滋長生路絶性光不透十釁叢乘而夙根品行又烏可言哉所以將參字示人使時時內考常自檢曰今日所行會合天否曾縱情否自考未定於明師良友之中互相訂證失則攺之是則更勉行之既力性水性光自然重復而萬里危程今日始到是為完人七件既能方曰玉光上乘弟子庶不負上帝之心本師言有志者聽受戒規選擇清修之子便當立志志在精勤方始植得夙根不畏霜雪之壓覆志在堅確方始成得品行不為利欲所搖惑故曰有志上文密證既已持循勿怠全賴戒規以守本心故本師又説十戒弟子當細心靜聽本師頒這十戒可謂巨細兼該就是禪門之菩薩戒元門之天仙戒亦不出此範圍所以上文説了性宗戒中就教人明心一戒曰不殺微命此戒要弟子發慈憫心上帝慈悲度世只在仁字中發出所以物物必要度盡方始愜我大願本師示現十八身中尚欲變形飛走以度惡道故畜生一道其報最慘莫道他業重任受刀砧之苦弟子等見之便當惻隱動中惕然悲涕思我前生安知不曾墮此而忍殺之乎又當思我今雖為人安知來世不又墮此道寧忍嚼而戀之乎回思至此當代為哀求懺悔冀彼復全覺性至於微命尤人易忽殊不知他也曉得避寒欣暖躍草銜花一種自憐自適景象何常異人只因有知無覺有識無靈所以自生自滅一段覺靈未曾悟得耳為弟子者當憐之救之方不負本師之戒那有戲殺故殺之事乎受戒者當深體戒言不殺微命若微命不殺決無恣口腹而自奉者可知二戒曰不起淫意此戒要弟子發潔白心本師承帝恩開化度儒門而成正果修至性以全道心不是教弟子捨身出家而輕廢彝倫也所以指一意字示人然淫字亦要看得廣不可拘在色欲上説即如廢當務而逐遊覽是專淫蕩棄常經而事奇藝是專淫巧疏上真而媚左道是專淫祀捐詩禮而耽豔曲是專淫詞故本師説戒至此條要弟子守定真操勿為外好所役方能鍊得此心潔白如秋水一泓汙濁盡去故曰不起淫意受戒至淫意不起決無漁美色而敗倫化者可知三戒曰不生諍念此戒要弟子發忍辱心諍者諫言之直也雖君父之前尚有諍臣諍子然施於君父則可若守真之壇事關救濟合於天足矣何需於諍理符機會契於真足矣何待於諍况是非曲直言下即明必俟受諍始明此中先已撓亂烏能藉諍而感格乎甚有明知其非而故言其是明洞其曲而不言其曲任其事往而私議曰我已知其事之非而假意順之者恐言之以觸其怒也明知其理之曲而不面言其曲者言非我責奈何我獨饒舌也本師所以指一念字以抉人之隱人若能去此念字必也和其衷以納人之言大其識以繩人之謬彼此同心如水受月事無過舉理不妄牽人盡合天斯為大道故曰不生諍念受戒弟子諍念不生決無生謗誹而壞天化者可知四戒曰不盜一芥此戒要弟子發明淨心貪者盜之萌欲者盜之漸人身一落塵沙才離襁褓貪欲之心頓生養成驕慢以為舍此貪欲便無以立身成家故本師特揭個盜字警人甚至富而貪貴雞鳴喔喔猶如昏夜之乞憐貴而欲富虎視耽耽惟念脂膏之潤已燒黃煉白空求不死之丹翠繞珠圍幾見蘭枝之夢逮至欲求真道授受何從所以不盜之戒最難遵守不盜尚難况一芥乎若以明淨之心克之則取與之界清而盜源息矣故曰不盜一芥受戒弟子一芥不盜決無攫金於市廛者可知五戒曰不欺一愚此戒要弟子發真實心小智小慧最足損人道德而播我之智慧全將一欺字術人以鳴其得意殊不知愚有二種有質厚而賢之愚有質魯而拙之愚賢而愚者不受欺拙而愚者不知欺豈非徒逞機鋒而不受不知於彼何損况愚忠愚孝在聰明者止可旁觀愚直愚誠在椎魯者易於入道此戒犯者最多只因不知欺人正自欺耳故曰不欺一愚受戒弟子一愚不欺決無喪天真以害教者可知六戒曰敦行盡力此戒要弟子發報本心至性所出惟有良知良能何謂良知彝倫之外別無可知何謂良能彝倫之外更無當能知矣能矣而不加功盡力則景賢學聖則古稱先謂何所以本師指箇敦行二字為入道之階况淨明宗旨首重孝弟故斗重孝弟王垂法度人壇之脈絡實由於此奈何弟子等名浮於實性滅於情事親無養志之心他日事君必偽事兄無友愛之篤平居待友必疏甚有衣冠甲族而醉柳眠花學敗倫之蕩子詩禮名家而馬釣錢攤等下賤之傭工竟不知立身一敗萬事瓦裂豈不痛傷第思若輩豈不自有知能以用惟用之不良故至此耳所以本師要將行字去盡力盡力在行上為之自然惟日不足那得工夫去間遊曠蕩喪失天良乎故曰敦行盡力受戒弟子盡力敦行決無壞名節以傷化者可知七戒曰語言無妄此戒要弟子發誠一心妄之一字埋沒了多少仙根道果只因妄字認得太真故耳孰不有正緣當悟被那富室田園孶孶罔倦營謀不已貪嗔濟之甚有侵人之産以方圓已産占人之穴以為已穴遂致陽訟陰號資傾家疾莫不從妄而生此外境之妄當戒也若內妄則馳情縱欲但知圖歡習惰偷安不思精進妄冀長年而無玄功之修靜妄干聖真而無妙行之能積出片言而謂人必我從妄發於欺答一語而謂人必我信妄流於蕩甚有對上真而無實矯詞飾行參上帝而不誠陽攝威儀心不存於經懺而內與外相違志不專於幽明而聲與意俱倍如此而曰清修知大道者如是乎所以言語出入最有關切天心之去留在乎誠偽人之誠者言必寡人之偽者言必支是以善聽言者聽心善視人者視色若弟子能受此戒立功必成以其能默而守也妙行必積以其能簡而操也故曰語言無妄受戒弟子能不妄語言決無逞舌辨而妄道者可知八戒曰千魔不轉此戒要弟子發堅固心魔從心起不是外來世人常謂道高一丈魔高十丈此浪言耳非真實語若道高而召魔則古來得道者鮮矣何以龍漢劫來得道者愈繁而避魔之書絶少可見云道高者道究未高也世上妄稱道高者不一有嫺習歧法而顯神通圖私利者道不高有煉外丹而服假氣者道不高有品行端方真傳祕授不知時節強以與人者道不高有良緣際會大壇真元褻慢不珍者道不高召魔之由皆從此出若入壇之後妄想有為必受境魔入壇之後即冀天福必受病魔入壇之後不立輔天大願逐隊隨班無上進之志者魔亦不來道亦不見故本師以魔字堅弟子信心去弟子俗念所以不曰一而曰千鍊金剛體者自能解之經云魔王退保可見魔非邪道所以堅固正道也故曰千魔不轉受戒弟子雖千魔不轉決無舍正道而外求者可知九戒曰弓口發願力此戒要弟子發廣大心經云齋戒禮誦無願不成此為初進道弟子而説也蓋弟子初入大壇未知心性工夫當先以齋戒清其心禮誦明其性以至淺之事開發其至深之功所以願在是功即在是若加功既密便要將弓口字擴充其廣大之心大士云弓口誓深如海若有志無願志為虛設有願不弓口願為塵沙所以證如來成大道者願必大大而浮又慮其易竭故曰深如海所以大士辭佛身而作菩薩者度人之念億劫常存也我本師誓願不憚塵穢腥濁隨處真光相接者以誓願弓口深神通廣大耳本師更不欲以一已之願度人而欲羣弟子皆當以本師之願為願故曰發弓口誓願受戒弟子發弓口誓願決無作自了以成真者可知十戒曰事聖不倦此戒要弟子發精進心聖心無處不現聖光無在不燭所云事聖者非專指醮祝參鸞之際也人當不聞不覩必宜嚴如在如臨之愼倦心之生皆因平居失於戒愼故雜慮紛乘而自不覺惟能事聖者守神於室則事聖可接聖光納氣於中則事聖可見聖心若疲神傷氣則已之心光先已撓亂安能守天乙玄精而明我聖日聖月故本師提出不倦二字而表精之根源丹基萬法未有不先從事於精而可安身立命一身之中百骸九竅皆有真精而精之主則在中田上田為神廬精充則神光常湛下田為氣海精足則氣脈常流大月之源皆出於此本師故以水月示人入道精喜靜靜則明精喜蓄蓄則清故曰清明在躬志氣如神以清明之躬事聖天心和豫而至誠足感以勇往之志立功則妙行皆圓矣故曰事聖不倦受戒弟子事聖不倦決無面聖真而昏怠可知十戒之後本師復以偈言繫之曰上乘惟一道捨此難成覺上乘工夫不過見性明心所以本師以參性宗透了箇性字十戒內皆藏一箇心字世間萬法千門未嘗不具大道而獨我本師立將以心悟性一解即超無上所以説捨了這易進易遵之道更有何處能尋覺岸又云圓明自然路非由為人作圓明二字即本師寶月二字圓而不明不見大月之體明而不圓難澄金水之輝本師教弟子入道之法不過斂光於精定志於一便是登雲捷徑若簸弄靈光希通異法立願不堅喜入旁門者即與本師之道殊矣所以自然之道貴乎無為無為之道方可有為此志此願要言下立發如參唯唯是也所以説斯道之源如是若一萌歧退即父子之親師友之切其升其墮誰能挾之故曰非由為人作又云人性至廣大性開成上仙本師嗟嘆人之元性出於天而𢌿於人巍巍蕩蕩與元始之光明不異為大壇弟子即當養元始之光明以濟羣生充元始之光明以事聖真放元始之光明以交神明總不外這性字性見心明三彭六賊聞風宵遁故曰性開成上仙又何疑乎余自受督教以來本師之教弟子玄詮真訓多矣似無煩余之再贅然天心密邇不暢發本師之心恐愚迷弟子矯者無以化其正滯者無以致其和故將本師之訓所説戒言條分縷晰如霧開見日頃刻洞明庶幾後來英俊借此為濟海之葦云爾辛未讀詮心法王天君曰本壇妙經真詮須潛心細讀參求大義勿著色相邊推求勿向隱怪處尋覓平平蕩蕩真路自開切勿舍爾靈龜向街頭問卜倘遇盲人指點翻令性海汪洋納於牛迹矣又曰壇教雖有深淺之不同而所以為教者並無深淺之分看鸞諭者須要會心到無深淺處方能豁然有得苟萌一點好文之心深者則愛之淺者則置之縱使淹貫寶藏於心何益看諭之法第一要平心將真詮訓語如今日新聞句句不敢輕放第二要靜氣上真寶訓本從性光中演出若氣有不靜性光已昏何從更得妙義第三要去執本壇教言有因人而發者有因時而出者皆有一種妙圓妙機不可認作死句看第四要去恃人世元言甚多已同塵土苟本壇教訓亦將粗疏之見一覽便道能解不惟上孤帝眷抑且無益性靈若能去其執恃養其平靜可以閲寶藏而得真傳可以行大法而襄天化又曰正宗大道本在平直平則不偏直則無曲大壇所傳經訓如九孔神針一線而貫弟子等誦繹經訓先當尋繹大節大根方得我大壇綱領太上道德天尊壬子年降太上曰金精洞然大月之基性水昭融者天真自全精微至靈道寶惟一不二真一之悟靜觀元妙復其本來同德於元始氣氣相資光自不滅人能發正信道意尊敬玉光天子即有三清真人三洞神將施力護衛永斷夢幻泡影之相而得神明不壞之身性非難修和光剖微則悟真常入道者微以動著光以破迷可得性水湛明心如滿月大通無礙吾念銛能以鈍姿而修解脫復元之道故特降此言之須時時護苗種黍愛養靈苗以承大命不可忘也浯邱天公玉書曰浯邱太上假名為本壇洞法主浯邱天公曰廣揚聖化誕演真如恢漠妙道傳授真書本元妙本元真本元神三者同為萬化之母同謂之元五玄精六玄神九玄靈玄精神玄玄靈同出於一氣本元也精之始生沖然而虛精之始成湛然而明精之始有翼然而英故道人見英而知明見明而知虛虛之又虛謂之玉虛氣之始生鬱然而清氣之始成浩然而誠氣之始有肅然而青故道人見清而知誠見誠而知青青之又青歸乎始青神之始生混然一元神之始成昭然如嬰神之始有奕然有思故道人見思而知嬰見嬰而知元元之又元至於太元夫三者人之所以為人也即地之所以為地天之所以為天也妙真神三者上玄之體頂有金光覆護其身心如寶月性如帝英現光度世之本也浴神之道莫如無思吞芽之功莫如不馳養丹之法莫如至虛治身之方莫如不驕恬然無欲怡然神舒此之謂性青為元青虛為元虛元為元元入乎道則不知其入乎元一我而已傳道即知命明心即見性真真神神妙妙一元而已何者為真何者為神何者為妙一性而已夫惟如是期於得者必至於失期於有者必至於無期於勝者必至於不勝故入道之人心無所期惟有所止神神真真妙妙矣三者一玄玄起於帝故名曰帝玄帝玄玄一不知其所以然故道心無所住謂之真住心無所空謂之真空心無所為謂之真為心無所化謂之真化圓明之門盡於此矣吾故能知衆生之性浯邱天公在洞神之上居太於元居元於妙莫乎不可得微乎不可測遠之則不現現之則大變水之母金之真如煙具妙具妙生神吾能踐其位而不疑入其堂而不懼造其室而不怖所以然者吾能得精氣神而養之也夫是以知三者妙真神之基妙真神三者精氣神之元真人於此六者念念在心未嘗不勤三靈九英至此始矣本乎太元發乎九天道法一宗志士密傳祕之祕之浯邱天公曰主法須明行法須誠悟斯道者玉清可臻恩光甚渥天化靡窮在壇諸子皆有成果證因之日各宜勉力自新毋至倦怠斗宫九法乃太上敕命傳頒將來大法聿開神光正郁須俟壇中有大弟子出方能成就此緣也成道之人皆具弓口誓得道之人皆具慈悲造道之人皆具清淨行道之人皆具智慧修道之人皆具堅固大弟子在此五種人為之開化不易言事聖有倦不能開化矣事聖不易言昭明不結不能事聖矣昭明不易言天心不湛不能昭明矣天心不易言人我未忘天心不湛矣壇之興敗在乎幾微道之存亡在乎頃刻人之離合在乎須臾命之去留在乎纖毫大道坦坦大化昭昭大人純純大德平平能一者隆能空者弓口去其所愛得其所愛離其所欲遂其所欲反其所好成其所好用其所知開其所知導其所能進其所能遠其所樂適其所樂大弟子以此悟人之性見人之情明人之志順人之意發人之思啓人之睿大道之門有一而已入門之門可二可三可四可五因其所偏以正治之因其所陷以力挽之因其所窮以通將之因其所迷以照引之因其所失以得助之諸弟子皆能見道矣大弟子者諸弟子之師天神之君玉光之子衆生之燈第一曰守戒第二曰好善第三曰勤修第四曰靈通第五曰淨見第六曰正覺第七曰明曉第八曰入流第九曰乘時第十曰護念第十一曰大忍第十二曰大和第十三曰大慧第十四曰大觀第十五曰妙行第十六曰具妙第十七曰大具妙第十八曰無勝妙第十九曰最妙神光所在之處名為光嚴所居之境名為妙境所化之人皆得名為正法弟子一劫之中度人化人其果可知矣我見真道流行之妙至此盡美矣天心在一一者性天也天化在變變者神化也天道在誠誠者元真也夫是以知大弟子不勞其形不役其神不炫其明不有其知大人純純此之謂也傳道在心心之主曰神道光既厚神自清明是名修行門心主不清神明不察難得其道以心提起勿使坐昏是名煉神門大道在心心光未充見猶不見能勤能聞道亦可得是名致知門三門者乃入聖之要道見性之捷程入道者先須入門入門者先須認主夫如是人材日廣吾教可興夫如是天心可得度人乃弓口夫如是原本者多無有退轉夫如是神通廣大不入旁門夫如是性天合一俱入大乘故大弟子為諸弟子師當矣安矣妙法傳於月妙道傳於米傳傳而下月米而已月者米之精米者月之英悟其精返其英天尊恭敬尊重稱大弟子玉光弟子度人弟子妙如心法可以心傳飛玄神法可以神傳一切大法可見可聞三清妙境即在此矣現光弟子修光弟子乘光弟子愛光弟子現音弟子修音弟子乘音弟子愛音弟子皆是大弟子之徒師諸弟子者大弟子也當矣安矣入壇即入道未入道不可名為弟子聞道即聞性未聞性不可名為弟子談玄即談行未立行不可名為弟子侍鸞即侍聖未侍聖不可為名弟子當名信子蓋言可進於弟子者信也聞我之言當知我心見我之化當悟我道我心直而不倚我道常而不弊大弟子當具清淨而修解悟大化自彰天真可得夫道一而已無可言者也欲化衆生不得不言夫性一而已無可論者也欲化衆生不得不論然而吾道吾性終不可得而言之論之妙周於萬化化周於萬物萬物得化而生得妙而靈大弟子得妙而度衆生妙雖可得衆生不可得雖曰度衆生而實非度也妙道至此可以登真矣我奉上帝玉命來臨此壇俯觀景運真道宜隆因緣大事惟在諸子自召不可忽也浯邱天公曰修心不可著有著便非修萬法歸一空惟空乃能宏性覺圓妙性圓則合性滯則離歸真則能反一養慧則能定光人之一身非神寓則死人之一靈非道涵則滅故養其神而神長生守其道而靈常在凡夫不知道故不明心不明心故不入道道為心元心為道本兩者豈可暫離離道則昏昧心則著不可不知也滌心須滌盡莫放一毫污煉丹須煉真莫著一分假為已須為徹莫存一點障為人須為透莫置一絲寬大徹方大樂是即我安心積功成聖胎所修亦如是試問學道人還元欲也未浯邱天公曰靈臺峩峩鬱蒼香服氣生神守胃房雲霞杳沓來天中妙光湛湛聖月藏因道遂機玄中玄語語皆是仙中王回風混合真人悅延星康斗童女芳始氣在我絳樓中天精飛入天乙堂太上真符不用鈎直道金文付玉皇子能見之可翺翔飛玄洞神遊帝鄉世人不知心是母太玄渺渺非中黃太乙一現守太乙居之不懼藏不息固精養氣護靈明一點真文落太極圓明氣母是法主苟能悟之三彭死入道長生永遠希見玄為寶丹光立用神使將在金樓金樓一門通天子照徹英英三九數倣倣佛佛皆來護一日二日萬法通吾子得之是要路天皇真氣在泥丸太乙真精是丹母虛心觀之可現光光從金水長空窩胎元在我兩腎交丹田火熾胎元墮一升一升復一升真人乘火飛金門飛玄渺渺不可説煉光煉月皆有得世人豈知性裏通吾子知之可度蒙玄玄至道非尋常知識意見悉宜空湛然一點帝光照飛玄天道真天道真人志士始得聞一朝可役千萬神至心思念玉光聖三九心傳方可進十年功行積無邊到此方知是天性一言教子當細思一事臨身當愼之勿輕勿逸養靈光自有天神開子知聞道未可名言説至人勤行實無得歸來寂然相色忘天顏在邇天根實胞元一斷霹𩆝聲飛玄恍惚入帝庭大法有聞修可到莫將三毒喪元精太上真符在主君瑩徹光芒即可行何須步罡履牛斗何勞結訣誦靈文元始一符萬神走上帝一印千靈欽隨子立行并立功俱是我等真心興化工在人不可遏玄元真使靈通絶世人當知大月居故傳此法同志習勿使匪人敗化機勿使庸夫胡亂閲上道非緣弗可聞盜來雖成終日傾子當愼之勿慢存一言一字皆玉文誠敬由中舉止端品格卻從孝弟敦審緣察安不可忽付法他人如此説太上靈寶在心傳非心慕道神光滅愼兢翼翼開大教生者受恩亡者越傳心傳道及傳神高上金門上使臨惟有金剛不退轉飛神自然到玉清本師玉京左宫天子玉光普照天尊一號玉清首座聖慧寶月如來一號救生發願慈悲碧玉真人玉書曰敬稽天尊洪名寶號未著人間而辛漢臣所集錫福寶懺終僅有玉光普照天尊六字今為玉壇開化教主者自庚戌年下元蒙頒月九真經始知天尊以重梵光身發司靈大願叩元始而開宗顯聖師以度世故頒經之後即蒙真駕時涖靈壇教雨滂沾宗風丕振又按天庭金格曰本壇正脈元始傳宗故號玉清而正宗心印惟寶月得其真故教主則為玉光雖曰玉京左宫天子要之即是上帝應現法身託真人以立名示師道以設教蓋慈願也大金神曰玉光微妙淵通我等皆仰為師範今立壇在此如寶蓮出世色聲香味無一不臻至妙壇中弟子誰能消受此蓮之色得眼方見此蓮之聲得耳方聞此蓮之香得鼻方知此蓮之味得舌方嘗消受寶蓮之具爾等箇箇俱足只要能淨不淨則雖具而不足矣吾可為子等淨之然須先發肯心肯心一發善根即現現光弟子是也玉光弟子皆由現光弟子造就百年當如一日切勿求速效雷天君曰上帝住在金闕而玉光即上帝之清淨身也故居元始玉清宫今來此土開教降聖臨凡慈悲豈可名量奉道弟子必須心同玉光慈悲救苦奉玉光之戒同玉光之行守玉光之規同玉光之教參玉光之訓同玉光之心奉戒守規參訓乃可稱玉光弟子王天君曰靈應十方混然無名慈尊妙相寶月圓明慈尊妙心難狀難形浮黎黍米萬劫修成慈尊妙音普度天人三珠振響檀熾和鈞慈尊妙道三界推尊大無等倫細入微塵吾聞慈尊證果玄真萬仙為師千聖為朋吾見慈尊仙真道迎藹藹天顔穆穆天心吾願輔慈尊俾使正教興吾願輔慈化俾使人民欽本師言玉和靈範道結真光三藐泛蘭祁曩專然明梵浩渺淨正太皇我示刀圭蓮華黃房醜鑒惡奕洛澤真格三邱上聖元始天王抱孕萬靈散霞吐芒六角真妙觀察四方雲雲流流通入飛舞品圓液成次歸上玄蕩蕩大化真法之光咸至佻忘綿綿是狂景照互容飛到帝旁大聖智慧從定心降金門大神奔走雲鄉護道驅魔度人無量道者綿息非動償其幻動復歸綿息身如泡影法如鏡花不可取非法亦不可取身法非法非非法我心如是常應常靜故如來之果可修心者神之元領之至神完之至擴不損不滅勿害於情深求其情害心之故悟見本來俱為幻空空而非空至於玉清真人在上情生五衰五衰既現重下雲霞之天住有欲界以煉我無欲天人在天性迷生四相四相發露重下紅塵受人我報衆生短命報夀者滯生報故當於報中忘相參性復其本來凡人亦然欲動結愆愆結害氣沉為魂魄受報諸苦或者分靈之苦或者囚性之苦或者迷徑之苦或者落阱之苦或者戀眷之苦或者驚惶之苦心迷諸苦遂陷地獄惡境受無窮痛苦辛酸具本來而不見思欲脫而無門通道雖邇莫如返還是故人當克欲求神金闕可到凡人之報非止於一二生之前所定自元始分真即當有是深淺因緣真光既遠道岸難臻甚者緣報未盡復結罪狀生生不已愈久愈昏不知大地之上有聖賢可師空寂之中有玉光可得執迷忘返以墮苦惱求道者能捨除眼前境界即可安穩心志不驚不怖不畏而入清淨解脫無上真門俗者心之至妄真者我之至常但凡夫不知大本以俗為真忘其所以有俗是故落於凡流人能空其俗緣悟其真常即見無量光明即耳無上妙音即聞無上真香即讚無上妙道即通無上聖真樂淡自然真人可至法無頓速無遲延道無憎惡無好樂雲過月現幽寂之境米光湛然是曰沉潛大定可見妙如妙如之名我之妙如非妙如之我非爾之我是道之我故我不見有我亦不見有子子能不見有我不見有我我即是妙如虛無大道宗元正本得正真之氣也修無為者必先為有為有為之為即是修無為徹玄之義明玄之道收玄之神任玄之境故名之曰寶月妙如絳宫真人可飛可走可動可靜無形之形有名之義洞玄之子須當志以求之我昔在西天名天修如來三昧忍辱之性而證金仙厯無量億劫化人救苦乘元始玉毫來事元始上聖名曰普照真人餐聽妙法修入黍珠又厯三千劫得大乘菩薩道永超情想故號之曰聖慧寶月如來居大羅天處碧真宫登七寶座以成福報但凡夫之人未能苦志先貪福利故終不悟喪其真元深可憫也靈非我靈真人之靈神非我神至道之神道非我道中天至道心者得道非載道文者載道非得道但凡夫之人忘文即是忘道忘心即是幻道不能貫玄上士非文非心非我至悟於無法之境執法之柄如是如法故大貫成身以心纍非身纍心情以性纍非情纍性真見本來幻者即是至實忘者即是至真方圓可合大小相容而悟要妙風土習成易離易破神光一遠萬法難逢能皈命大道真師修緣養寂便有大羅真人教訓或出或入或立或行或坐或臥無非長養性光生神合帝而飛玄中金闕大殿有神無量無數皆同一性皆同一志皆同一慈皆同一信義理自然果報清淨周行大千世界可大可小無體無形無能無功漸摩涵養共悟元始人能知神之神故能傳神神化妙道不求可得求在解脫之志解脫者真心去障則慧性日新克之又克即是大慧金剛豈不入道但凡夫之人不知我心安知非心不悟無障豈知有障故宜調神息慮思我丹元也本師言上乘知覺在空本來欲悟本來先曉因緣銛等能悟因緣否業是因四大因緣著塵沙解障斷因緣莫如探本體空空即是道空道即是身勿見罪福相一切皆如來指你業身及業報有因有果種塵沙沙深忘本