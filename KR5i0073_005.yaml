front:
  text: 玉詮金闕左廡飛玄八大金神
  hash: sha256:e519ece70fa4a6d5122a4b8c3d5a58c700d056cda7e5b21c6e431621387487bf
  markers:
  - {type: page-break, offset: 2, content: '', id: CK-KZ_KR5i0073_05p001a}
body:
  text: 一曰九天元聖無量金神薩羅海諱雨鬼王一曰九天上靈無量金神鳩浮楊諱雨鬼丑一曰九天大洞無量金神金光湛雷諱雨鬼王一曰九天至真無量金神靈寶現光諱雨鬼品一曰九天極威無量金神火桀靈諱雨鬼共一曰九天高虛無量金神雲剎靈諱雨鬼某一曰九天上道無量金神魅汲墮諱雨鬼阜一曰九天空洞無量金神叱吼𠺽𠳿諱雨鬼羽玉書曰敬稽八大金神不素著於雷嶽自本願經既傳乃知八大金神皆係帝真始氣化生仙子散布八天精修大道各經纍劫然後還元返始侍列玉京茲因玉光啓教發願輔宣故於庚戌年十二月初一日齊降玉壇自稱道法總糾應化輔元天君又於辛亥年九月開傳月九大法一宗飛玄法詮二十八品及規約正律玉格心傳等書所垂訓詞皆文似徑直而旨極高遠又按皈壇儀云金神督理中壇則知為大壇喉舌之司也大金神曰神在法中取法在神中求非神非非法非法非非神在神宜捨法在法宜捨神神心在何處法法得神心法心在何處神神即法心在在有神法三九悟真訣三九何為名精神俱不一三九何可見法神入可得入神法自靈法精神自淸大神大法旨虛心觀九行大法大神門守一保三存三三三即九九九九即三天地一始終神法於此盡丹何以名氣一也真何以見氣彙也天真之氣在泥丸大道之根在寶室上神之用在丹田丹田者天水也水生萬物故沐浴於是者無有不真真嬰之輝即丹田之光也真嬰之出即丹火之升也若下界凡夫不知取鍊於丹田想氣想神想真想嬰無不頺然而死蓋因不得真母養育胎嬰教仙根何處立腳何處飛出所以玄玄大道亦在混丹真靈大法亦在基丹精光所聚即有真光真光所結即有神光三光彙合何法不靈是為守丹第一訣也杜彼我門宜用大慧杜私妄門宜用大通大慧大通方可行法二子真根已具真心未透慧通之力從何處求耶當觀古先聖賢大慈大悲之語即得悟慧觀古先聖賢至平至易之語即得悟通蓋通存乎常慧存乎慈知常則明非慧而何守拙返元非通而何我見立功化者多用此二字而升二子勿忽也我在塵寰輔二子是實輔二子否曰非也輔二子之輔天也天生二子待余輔否曰非也輔二子之輔天而輔二子之靈也靈根大者始於梵淸次者始於大羅中者始於玉樞三光下者始於五嶽下下則歸於地而已始於天者成於地故不論最上最下皆有地根惡根斬之則寧不斷有魔是真魔也非非之法曲法也直上之道直道也曲法臻直道者曲致則直也今汝二子既本大羅當認始氣大羅之氣米為真詮矣玉樞之氣月為真詮矣三光之氣淸淨為真詮矣五嶽之氣丹爐丹丘為真詮矣若夫梵淸一氣非空寂不至也汝二子若在塵寰勿忘始氣始氣不忘立刻飛升可也多劫輪回可也處富貴榮華可也居貧苦窘迫可也始氣之功大矣哉大金神曰身非我身求如其身九族非我親求盡其親心非我心求得其心法非有法求實其法道非有道求至其道故身非道也身身即道親非道也親親即道心非道也心心即道法非道也法法即道道非道也道道即道求之者一心誠之者一苦進之者一有若夫未見真修真得漫曰看空是我罪人也我始修行先求其身身雖不滿而道在矣復求其親親雖不久而道存矣再求其心心雖不得而道見矣復求其法法雖未效而道明矣進求其道道雖未實而心道道矣所以有便虛離便得成便止憂便長悔便全三界聖人不易斯言也大金神曰今日吾欲細教諸子仙風道骨須要我去磨鍊正覺神通須要上帝開恩你道知識聰明是自已否若是自已一切生動何不咸覩正法須臾悟道者豈屬須臾我前劫作忍辱仙百身始覩帝光作慈悲仙九身始覩帝相作輔化仙九十一身始覩帝心為帝使者自此以後尚不知帝道蹤迹你道帝經是虛言否淸淨解脫無門無住無意無文是故帝經演淸靜解脫從無一字講説淸淨解脫之法甚深甚妙正在此際玉女之香是淸靜解脫樣子後邊説三塗墮落因緣是不能淸靜解脫之故天尊説斷障諸語是真淸靜解脫門也所謂不言而言無説而説善哉善哉人能從此斷障之法何患不如經所稱述也三洞真文萬法備矣無量法身之所由開也是處為帝經之骨要得神通必須從此參究我雖未能闡玄亦可為誦經者訓要知經意然後誦之有益是香非香也即是上帝神通所及是女非女即是上帝慈心所化也深障如三塗則言不能喻音不能聞指物譬喻亦不能悟帝心乃作是香以貫彼心始返良善耳天真教人每每如此豈凡愚所能知也大金神曰靈寶赤文云一氣洞朗黍米素明包羅太極孕生乾坤神不異靈靈不異真幽廓常靜情意非私渾然太虛復返厥初和沖既衰上道難聞惟戒惟行曲度萬靈大道莫求我等將何言哉雖然豫不言誰度諸子子等與我本同一氣中也猶父子也父貴子賤能安乎子等與我本同一道中也猶師弟也弟不如師能安乎在壇諸子勿以我為難幾勿以俗為可樂我百年一度之身也積力上升子亦百年一度之身也積力下墮豈非源未淸耶豈非徑有殊耶故學道者貴在知其源擇其徑須把胸中自有明珠極力洗發照諸萬象自然不迷我願諸子得煉心門百年猶如一日入道猶如登山一日者瞬息易過登山者勉力難前凡夫入道是猶一日而登千仞之山也佛言有之三生因果道言有之夙根輕重儒言有之盡性俟命故學道者不破此關則不能堅定不能堅定則生退轉生退轉則不能淸淨不能淸淨則有魔障我願弟子入定慧門飛玄何奇大道何常性化道成玄性凝玄成道故在我曰道在天曰玄道貫玄者人合天也玄貫道者天豫人也是以本行不可虧神通不可慕慕神通者魔得乘之虧本行者真恆棄之欲避魔先須近真欲近真先須見性欲見性先須明心欲明心先須養氣養氣之學直上之雲梯也破迷之慧劎也我願諸子積功義修精神得真正門混元未離何者曰道大道未散何者曰德至德未隱何者曰教三教尚是後起何况飛鸞飛鸞之教最後則世人之惑也固宜雖然彼何知上帝之心哉不教不善繼以心教心教不善繼以文教文教不善繼以應教應教不善繼以魔教魔教者成善滅惡然又恐世人之迷故託於鸞以開之則鸞之不可不奉也固宜雖然奉之有道一曰淸心欲多者反此一曰敬心言多者反此一曰猛心見多者反此我願諸子得飛鸞門西有流沙隨風能飛東有弱波倒瀾沒山人世無定如彼足徵也火宅燒燎鑠石流金水澤漸染腐木朽骨人世可畏如彼足徵也諸子不可不發超凡之志欲超凡先須積玄功妙行當用天地以作烹藥爐當用始氣以作爐中藥先要打盡諸關掃盡諸境獨用一味常品便可丹成五色神入天宫我願諸子得自了門奕然而來神降之象洞然而來真臨之象凄然而來眷祖格之象三者皆名心象非象之象故曰通皇然而來天開之音蹡然而來地開之音啾然而來眷祖語之音三者皆名心音非音之音故曰寥能知通與寥者可以言心法矣雖然初入道者安能有此人欲得心先須得情情者心之用也人欲得情先須得義義者情之家也義以主內則專義以行外則決我願諸子由大義門丹者何一也金者何堅也堅以至一一以成堅身中至寶則靈臺也天中至寶則光音也地中至寶則精氣也故曰修道者當以天地為鼎爐光音上接則靈臺廣精氣內收則靈臺輕豈不希夷混成哉至此者不過謹三業忘四相而已我願諸子得金丹門人圓何在性實心幻地圓何在水靜山生天圓何在日水月火同本異標上下歸一大道母自然自然母一米此為圓圓周遍之體所以藏萬神化萬神者也故行法者將在心中氣在身中取之不竭用之無形神宫既得法何難哉所患者諸子真心不透耳我願諸子得求法門妙道精微要在言外參求不可著在文字要在當地做去不可姑待將來諸子在壇戲謔即是獲譴種子奉教不恭即是中廢因緣勿至鸞廢譴來始生悔心也大金神曰金光在頂何不求之水珠在田何不取之至寶在心何不洗之神通在手何不用之道者以剛而入以和守之以柔而入以堅持之默默者和安安者堅道至常而存至異守至一而行至變風之在宇宙也無體無形以此動物雨之在宇宙也有寒有溫以此潤物入道者當藏威見道者當夷志得道者當權流愼以居之大本立矣仁以行之大文顯矣三界聖鸞之法也如如不動性之常奕奕能飛性之光玄宫中有通天臺常守常護神明來水珠在田不易得忘人忘我忘空色黃芽紫煙真人守不如靈室沖天斗心教非緣那得聞天根有迹參赤文眼非凡眼骨仙骨從此依循到天窟成道非易事也斷障非淺力也求靈通先求心通求心通先求氣靜因月以生精因精以生氣因氣以成丹上乘也返氣以收丹返丹以歸精返精以見月次乘也我先言次乘丹光藏在凡身中養心下降窺赤龍龍甲鱗鱗若有風從風躍上牝門穴骨似仙兮體似真圓珠燦燦生光英光英光英不可得精中有意藏無極妄自絶滅真自來一年一月成仙胎大金神曰靈光動則開機靜則養神欲求靈光者皈命五斗真君真君大聖真君大靈絶人死戶注神玄精一曰北斗天根之神二曰東斗天祿之神三曰西斗上仙之神四曰南斗長生之神五曰中斗召靈之神上合元始下統五嶽中有百萬高真上聖分掌人間貧富夀夭金闕之出納也玄宗妙寶無極無涯粵自上帝授五老赤書則五老為法寶大藏之宗欲求神通者皈命元始下及五方五老尊神五老者混元一氣之精自有天地便成五行五行合配化生五帝元靈元老洞真之神五靈玄老洞微之神皓靈皇老洞虛之神靑靈始老洞空之神丹靈真老洞淸之神生𢌿五氣聚合五光結聚五丹是下界之耳目也金闕之法藏也是故五氣調則大寶立五老降則大法頒學仙者當於日月之卯𢑥氣齊神持誦玉皇尊經便可神處五雲之內謁老傅法內有獨得之文大公之寶曰性光金仙大乘菩薩大阿羅漢自玉皇開化誓願輔教遍遊四大天下啓人之迷開人之鈍但凡夫俗子五辛未絶五欲未斷雖能默坐未得見金仙大乘菩薩大阿羅漢故修真者不具獨得之文則大貫不至不具大公之寶則大乘不來學道者惟在大公以為人獨得以為已欲求獨得先具大公具大公皈命金仙皈命金仙者動不亂形靜不擾神獨得之文金仙之教也玉帝之心傳也同而靜者道之源也靜而運者神之功也昔玉皇開化敷大神通化生玉樞三府一曰雷聲應元二曰雷聲輔元三曰雷聲運元厯九萬劫化生十二雷宫金門羽兵玉府神帥九千大神復化下方行風翻浪一切神祗故學道者雷光現則雷神集金光現則雷神伏乃能行大法欲修金光者先修雷光三九之道雷光之本也九者金之精三者精之始月光一現三九之法傳矣三界下民不知大道乃有生死不超塵劫乃有疾病不信因果乃有災祥不悟本來乃有貧富不敬天地乃有鬼妖不修人倫乃有瘟疫不重天物乃有飢荒不尚孝慈乃有兵戈不燮五行乃有水火諸劫之報悉是嶽府司之祈禳者必當皈命嶽府投誠星垣乃能感而必通求而必應大金神曰將來生民苦厄甚多在壇弟子各當發誓願以輔上天輔天莫若敬重法寶法寶者心寶也敬重心寶為聖慢褻心寶為愚若人不悟法寶即是心寶則愚見疊出安得智慧智慧不充豈能輔化輔化不忠豈能還元在壇弟子若欲還元先須輔化子等當見衆生發大悲心即是性光照時也若見衆生而不發大悲心即是障根纒結子等當見玉光發大哀心即是性根了時也若見玉光而不發大哀心即是業報未盡子等自思之可自得之自得之可自脫之種種善緣俱從大法中出故曰勤參法寶為第一等弟子靈寶者道法之宗能鍊慧光則靈能養三品則寶天地交感三而生人故人人具此靈寶之貴但凡夫下種塵沙每因塵沙而起情欲靈寶之光遂隱若有志者將塵沙一時洗盡涵此性光故曰忍辱求宗為第一等弟子金闕玉京心中亦具性光慧刀遍布虛空大道玄玄總在不色不空處入手能知不色而色不空而空是為覺悟可入大道若有我見即生人見既見有我人猶如兩鏡相對幻形生生終非淸淨故曰無著知神為第一等弟子玉光真人有三德一曰事聖不倦二曰聞教不厭三曰改過不疑是三德者弟子之極則也然有志學道必當造其極則必當效法大聖子人也大聖亦人也一間未同即當猛省不能猛省即是自棄故曰效法無斁為第一等弟子靈通之人下土不少然道者混然無靈故能優容萬物若能見真萬物盡化靈通亦忘凡夫愚陋常好靈而忘大道大道既忘神光亦熄安得久靈是以有志者從靈求覺從覺求真不可以少得而止故曰忘靈不恃為第一等弟子世人具有大智因得小智大智遂隱世人具有大覺因得小覺大覺不露不知小智小覺無關生死不益本來奈何不求其大大者性也天所命也若能暫息鋒塵洗心退養便悟本來故曰沈靜明慧為第一等弟子大道可傳終難傳也教者自教得者自得譬如同事一師同聞一言究其兩人畢竟有高有下所謂高者聞於耳思於心發於事悟而神之神而明之所謂下者或以發而止或以思而止或以聞而止也故曰善通聖訓為第一等弟子道法無窮真功難盡先須去盡三障方能生長慧靈一曰欲勝他人人不我及二曰欲趨捷徑妄求法寶三曰欲求多聞聞過即放如此三障總於一心不過欲速豈能入道是以真修之人惟談法不談道恐求效之心生也故曰勤為不效為第一等弟子大凡天地之數有否有泰聖人之道有長有消假使終身學道終身忍辱到此地位能不動否若能不動便可直上苟萌微悔道光遂損故曰不求人知為第一等弟子聖真無鞅各有一印可接夫印即在名號中可見即如混元法懴有四百八十天尊即有四百八十心印若能鍊得身心淸淸淨淨諸天天宫俱可神遊謂之印證諸天法光乃備子等禮拜時亦會此意否能會其意道智無邊德慧長新不至為守株人矣故曰頴悟真師為第一等弟子玄玄妙法出於一心心之所現神之所憑也下士所以不能見神光者為有欲心欲心未淨道心未光若能克去已私公其大道自然心光明白了悟本來故曰克欲求心為第一等弟子金光洞慧出於真常至靈而不炫極妙而非幻神奇而非怪苟有涉於炫墮於幻流於怪則通靈雖勝必有敗日反不如平等修行實而無弊故曰好樂真常為第一等弟子上帝撫護下民如同赤子真仙陶冶人材不異師保神祗奉行教令一若傭強總是慈悲中出慈悲者曉知人我皆同一父母所生衆生不淨我果不成故能發出此心力行所願若非悟性雖欲悲人何從悲起故曰慈願不窮為第一等弟子下土人民有智有愚智愚皆屬風土不足評論惟有天下大智為能自度度他今人每欲求度而不求自已真師所以求之終身究不能度若能一見玉光便起哀心我夙昔何業何罪乃生下土為風土所囿是名大哀心有是心者不見可欲矣故曰善念真師為第一等弟子今人修道不過欲果總云慈悲救世莫不有我見混存意欲作真仙事績耳不知大道極公我善非實衆生受惠亦是虛妄不可執著惟大量人與人為善不作出衆之想故曰公同善道為第一等弟子天心人人具得故人人皆好善道今之不好善者不知心也道人訓世當使人自露心天若以我之所得強彼得之不能好善矣故曰靜化衆生為第一等弟子弱羽者不能高飛細鱗者不能深潛無力故也修道之力在乎一忠忠者至誠至願之心有此心方能積纍功行方能誠格幽明故學道者不可不敦其力也力有不敦事有不成事有不成化有不興出神入聖皆虛言矣故曰盡忠不二為第一等弟子大金神曰桐子靈乘闡教事不可緩上帝專以傳法之任任子所以護教也子當發護教之心以護已心更發愛已之心愛法則明光所燭成就非難但恐吾子志有未堅耳從來真仙得道皆有心傳心傳非下人不得下人者非謂不勝人也只是心中淸靜不生計較耳惜乎塵寰碌碌無志者貪有其利有志者貪有其名名利關頭是陷人大坑子世人甘心陷溺雖現在苦報亦尚不顧况過去之輪回耶但本師誓願愈廣愈堅吾子能體此心恩寵自然異等所謂捨身而身榮無我而我大也切要處惟在下人從前從後一齊放下念念道法即是念念玉光也大金神曰玉壇之立仙子謂吳子之功大矣仙子之化著矣自玉壇而聞道者誰不受子之恩蒙子之澤秉心效忠分所宜也在仙子尤宜善始善終留萬世不易之事方能上報帝恩雖有艱辛之事拂逆之言悉以奉命之心待之自然融化不致自傷亦不致妨人也有言囑子為大於其小圖難於其易子心不亂則衆子不紛子心不礙則衆子不爭子心不求則衆子不欲其機如此子能取是機而修之道法之宗也吳銛言自今聞命後當以無欲應事曰不能徐徐可也天徐徐經緯各展舒月徐徐蟾光滿碧虛心徐身自間身間事有餘天化徐徐開金丹結慧珠真妙徐徐討三花聚隱芝子讀徐徐吟且勿多執迂不見黃河水奔流墊民居不見太白星違時亂天樞不徐多有害敬守悟徐徐大金神曰規者儀之所由起度之所由設禮之所由生律之所由作四者合乎天良和其人情所以致其敬所以暢其慕所以存其誠所以開其覺如天之圓所以覆萬物也如地之平所以載萬物也規圓以治心規平以治身圓故無礙平故無傾無礙則可大無傾則可久規也者道之著也非以為招也心之用也非以為飾也故太上顯道而頒科玉光傳教而立規規其心則心無邪規其身則身無尤規其事則事不隕內以防志外以防非天真見焉靈寶存焉因果得焉故奉道而失規猶面墻而求通不可得矣是以玉真未傳法先傳規未傳規先傳律為其近而可守也為其實而可造也為其卑而莫踰也為其顯而莫盡也純乎純乎至於無為誠乎誠乎至於無作愚者安智者樂規之旨也天心本直規之前有大規大規者存之為聖賢失之為禽獸守之登天宫違之入地獄萬劫而不變專守而不紛其惟一米乎是故規也者米之道也月之英也欲造玉光者其在守規乎故規不可曰大不可曰小不可曰近不可曰遠不大不小不遠不近規之變通也能知變通者靜有神動有光語有倫默有存設於顏色施於四體是皆方便之道度人之源故守規為主壇明規為司教輔規為司糾整規為司科大金神曰金子誦經誠勇能會一二但於大本尚有未明大本者傳心之心也心在心上始能轉經心在經上心將物化經曰珠輪運道黍鏡通真二句方是心不化物吳銛云上句是靜下句是動曰然但是珠輪外動而中定黍鏡內虛而外堅總是一心不住道由心運心無入道之勞入道有二運則一也心能通真則真有同心之樂同故能通大樂也此二句是我示諸子禮誦之法當思之大金神曰一氣含萬化九英靜真如空洞本非寂寂寂修性珠珠光同聖體月白見光時嗟嘆歲復歲身心兩不持珠光日自鑠聖性安所施猛然提此心電鼓振愚癡羅子澄子誠敬由中性光已白但能守鼎存玄便可直參大乘子知丹頭妙諦不在吞咽呼吸不在觀心守神不在動作靜持不在有想無想要在心中綿綿不息勿容妄念跳進中勿使精光溢於外便是真丹時時刻刻可見吾真也真常大道非在聲音色相要實際工夫即如子等凡緣未淨豈能一旦即了性明心第一先要去躁境無順逆能養得性水身心自泰客火自消第二要去妄富貴功名浮雲過目况數由夙定何事強求使心緣顚倒究竟歸空第三要去疑真宗直接不異面命耳提何須三門兼入以搖性光第四要去識大道無為昏昏默默方能造入上宗若已見一參人我各異何由得進飛玄第五要去執魚躍鳶飛無非是道若不在活潑處見我真宗定從滯著處拴住聖性能克此五障便能通五慧至尊可面睹大法可親傳矣大金神曰仰奉玉光綸命開緣啓化建立靈壇將欲廣揚聖教大闡正宗無奈人心昏濁承教者多佩教者少路多歧趨志多歧向有好立功則著於事為有好淸修則淪於枯寂有好經而不知變有好權而不知守有好和雅見剛毅則心竊非之有好直率見遜順則心潛憎之有此種種性情所以坦坦周行無人能履偏邪小路各自慣遊終成小乘之人不是正宗之子今後須將汝等心性洗滌光明靜思天真開化本旨無為習性所拘人見所絆凡情所縈庶可仰奉慈光時沾化雨不然壇雖立而未立法雖傳而未傳唯在子等一心也修行無二亦無三無二無三本無一一生即是有二三失𨚫心中一箇直傳燈之子傳甚燈一二三中可推尋若言我道在勤修便是誤𨚫天下人修行無我亦無彼無我無彼亦無同彼我紛紛不可除皆因同見留胸中燈尚無燈傳豈傳須知此道無捷徑若言有道可祕傳便是揑虛為自性修行無意亦無識無意無識亦無滅滅者當知意識生是法非非名大月燈在人心我又傳便同騎馬又乘船夜來滴𤃉蒼苔雨幾處春山瀉碧泉玉壇無上正宗化開南國系接玄元其為得玉壇弟子者悉乘夙世善緣而來何况其中又能聞訓又能習法又能積行者乎在今日者俱當自喜自幸念我既生下土乃得遇此無上勝因正憶玉光淸淨教旨光光相續同登道岸此真千生難遇萬劫難逢每出一言行一事皆要把玉光弟子四字牢記於心自然履中蹈和言無詭譎行無卑污一切法習之而遂通一切戒守之而遂堅一切規行之而遂整同心同德協敬協和上以副聖眷之隆下以開後人之信所以然者不是勉強要結之也全在主壇司教二人於平日薰陶涵養使之各存正性故有如是正念有正念而後有正行有正行而後有正化有正化而後有正緣如是正緣乃可流傳奕𥜥若諸子正性未存各存偏念雖今日法會甚隆不足取也欲使諸子各存正性不是語言文字可以勸不是威儀可以動須汝存得正性發得正念自然有一種香氣動人故曰薰陶若在語言者爭之府也威儀者偽之尤也如何可稱大道故前偈以蒼苔雨近喻子性以春山泉遠喻他性在子今日只要看自性之水枯潤若何便知他人之水虧盈若何矣此古聖賢化度妙旨也大金神曰修真學道者修所本無學所本有何謂本無即今子等心上種種情根愛根是也何謂本有即今子等心上種種智根覺根是也情根不斬則智根不生愛根不除則覺根不發殊不知情愛之生於心也猶如幻影動而無實何以見之情變而為欲欲變而為苦苦之與欲不可同日語矣愛變而為貪貪變而為嗔嗔變而為殺殺之與愛又不可同日語矣所以者何不過一點迷心隨境遷轉並非我心本來面目故曰本無若能去其所無把此心打掃得空空洞洞自然有一個真人種子以此心而對越上天天心即無不合以此心而闡揚道法道法則無不興以此心而保持壇運壇運即無不固以此心而引進後人後人則無不賢此心者人人固有之心不是從外學入故曰學所本有子等務須從粗入細從卑至高從小至大大者小之積小者大之分高者卑之極卑者高之基細者粗之化粗者細之門不入其門不培其基不悟其分雖智大愚雖明大昧大金神曰守壇開化理無二致修已度人道有同歸全在得一見中斯能入門登室我等自膺帝命降凡輔揚寶月妙乘演法有詮言願有經一中之奧剖示已深今屆昌期四方寧謐八穀豐登善信雲興英賢駢集一會仙真從茲發軔一天瑞靄眷注靈壇故復命火車王使頒降金格勸獎修真之子一者使其顧名思義勵輔功於壇職二者使其知徑聞修積玄功於性命三者使其接靈受福仰護庇於幽明四者使其明系宗元漸登證於真果洞明四種妙事方是知此金格者圓成四種妙事方是奉此金格者然而金格之道寧在遠求盡之以一貫之以中內一者外自純內中者外自和純一以盡性故曰盡之以一中和以貫玄故曰貫之以中性玄雙修真假雙證圓通無礙寶月之乘也訓言雖多不如靜持半偈取乎一也詮疏甚繁不如總明大旨貴乎中也今本壇詮訓甚多弟子輩往往失其大旨所以未得真修實證四非要去得淨四知要生得正方能於一切經書領會大旨四非者觸也背也離也渾也四知者析也念也別也證也合此四知一條悟徑去了四非撤開迷路方能與經書大旨融洽大旨既融然後修於身心則身心不被死句所牿全為活句所助一句中具無量功萬言中具一種智必到如此地位方是會看鸞訓會讀經法者若錯會一句經便錯做一生事過失亦不小矣何謂四非四非者即四種枝見枝見一乘正覺便被他阻抑故名為非言非正覺也一曰觸者如人盲眼不見天日指盤指燭處處不喻蓋因未見真道千萬經詮亦不能為彼破暗所以者何以彼無目但知觸故學道之人最當戒此所謂背者如人聾耳雷震曰鼓梭響曰雷總於聞性未淸便與真道多背究竟雷梭自有真響彼耳已聾故錯聽也所謂離者如人腳不履地手不攀枝聳躍半空力盡自墮所以者何蓋是人粗知道之妙未知妙之常往往有蹈空之病故名曰離所謂渾者如人年老精衰目短觀空則花生看花則霧障非背非離別有一般未精神處故名曰渾此四種皆係凡夫氣稟中具習性中成故必遠離塵習習得一種淸淨心田方使氣稟中四種惡草不生四非可淨矣何謂四知四知者即人天賦四種解悟之性用之正則成真證果用之不正則反亂正覺所謂析者如截大樹必用析開方可炊爨故凡參看經詮先須識得字讀得句畫得段節節支解不見全牛方能入其有間處故一曰析也所謂驗者如捉生虎置於檻中方知平日熟視畫虎頭毛足爪件件皆同而尾能搖動口能呌嘯向者實未能知故凡看讀經詮者必要內驗於心外驗於身遠驗於物物歸於身身歸於心是名為驗所謂別者如持鏡背而知鏡是銅造若只觀鏡面幾乎錯認是月故凡看訓讀規必須把正文一反精義自出譬如論語云吾嘗終日不食終夜不寢以思無益不如學也若只正文便泥定思不如學不知反面尚有不食不寢以學無益不如思也在故宜用別所謂證者如人説食酸甘苦辣曾聞如是然未經入口安知今日之甘不反作前日之苦耶故凡學道必先讀經讀經必先靜坐坐後則知讀之功性光乃證經之義一步步自知一程程自得是名為證也四非四知略略喻指然大道無文欲仗筌蹄已忘魚兔今要子等力除四非善用四知庶使法乘昌明英賢繼出矣陳濟思問真假雙證之旨曰凡聖賢妙句即是常句我説雙證者無奇奧也不過云性是真身是假性修則性可與道合故名真證玄修則身可與道合故名假證又推而廣之真證者智證也假證者形證也故真證非難假證為難我飛玄詮云修德不修玄其身不飛便是假未證道也故雙證為高耳推而下之則身是真境是假身修而境未化亦是假未證也推而近之心是真意是假心靜而意不淸亦是假未證也推而實之壇中弟子是真壇運盛衰是假弟子皆已向道而盛衰未合真規亦是假未證也總之所證者何道也道字若作理字會便是老儒常談又會錯也道字若作空字會便是老婆禪話又會錯也有有真境道安得空恢漠神通道不拘理此是玉光寶月之道也證於是者豈不真假齊仙金闕下殿飛靈四大天君一曰雷威元帥宗諱渺一曰雷光元帥吉諱漠一曰雷火元帥法諱泂一曰雷聲元帥雷諱善總號曰金闕傳符捧詔大元帥神威自在妙通真應定光普救斬鬼蕩魔上宰飛靈赴感天尊玉書曰敬稽四大天君初蒞壇時自稱使者來輔鍊乩且云位遜雷部諸帥而在金闕同秩者九九之數及其後也談道談玄無微不悉注規注法無奧不宣每迎機而開始或輔理以成終辭尊居卑運大神力凡有祈禱救濟咸仰資焉四天君曰桐子未可以得大法未可以求大道未可以奉大命未可以上大衆未可以為大事必也其下人乎下人者心也非事也上人者道也非志也欲上人者其道卑也求上人者其心卑也心卑者未見本來也未見本來者未好玄文也好玄文而後慧光生好道法而後大本見子先立志讀書讀書者讀道也非讀文也讀文中之心也心中之人也汝未見心未見前人之心也未見前人之心即未見前人之道矣前人之道吾之道也吾道天下之道也前人之人道中之人也讀書宜如是見心亦宜如是未能見心而見性者寡矣未能見意而見心者寡矣意者道中之意也非心中之意也道無思者吾道之意也如是入道而不入道者性之障也非性有障道心有障也如是入道而不入心者意中之業也非意有業大道中有業也可以悟可以不悟者一之為道也一之為道我之直也三子汝見之心非心也見心之心是子心也用之則道成收之則道明廣之則道現如如不動意心合一意心合一同歸於寂寂者性之玄妙化之玄宗氣之玄竅知其竅守其宗入其妙傳心在是矣淸明之本未去何來來者如其本耳米者本來之淸明淸明之極淸明現矣米大為大米一為一天地萬物惟有一米子能守此一米謂之元始居心萬法之王也道高而義玄至難以語下士下士者相深欲重者也欲為米之仇相為米之障兩者一空米光如來本心之不堅非二心害之本心之未堅也至道之不立非外道妨之至道之未立也感應之機存於寂寂然而守寂然而化有德之士也三米高高心未求之豈在於心豈不在於有玄在壇弟子皆有一米皆有一米者心也若言其工夫未有也桐子汝前日以得為無得非也以有所得亦非也桐子汝心也何不得汝心也何所得心即是道道即是心二者同出同歸於月本來之月取象於月月中之月取名於月一月皆是性法法不妄法法而不法其理自然出於至真之道也夫道月而巳夫月米而已米者道之實乎實之精乎精之玄乎帝心之玄乎米光未現道無源而法無本本源之於人猶飮食也未得飲食而生者亦鮮矣得飲食而不生者亦鮮矣常道即是妙道妙道即是米道玉光弟子須向個中著力勿落於外外之者未見其要也如能知其妙之要其妙自來來而居之名之入道道入而性光矣未有道未入而求光明者也桐子心中真人太上之米真也一丹在中衆妙悉得米光一丹太上心傳其理深微近在目前大本在目謂之定觀定觀澄光夙根解脫善而藏之善而用之光明不減矣傳心者傳其心法也原其本來無心可傳傳亦無傳未入道則傳心未入道而傳心者未見心而傳心也心無其心傳道之傳心也非傳道而傳心者不足以傳道有心可傳者不足以傳道不足以傳道者不足以言傳心也妙心之在我亦太上之傳心也真心之在我亦太上之傳心也至於我則何思何慮至於人則何思何慮至於天地萬物則何思何慮傳心之子何思不思何慮不慮慮者道也思者真也來衆入月以應如是來衆得道以應如是而何為子之不見心哉因者去來之道去來之道性之道也去來之道道之性也道之性者吾之極也心之玄玄之帝皆以一米修之可以入月上聖之祕妙玉光之心法也子如能修之天上天下皆來呵護米光具在心中心光藏在米中米者玄中之玄帝心之玄也至於帝則米無米玄無玄不無不米不米不無無米而米米中有光光明入道和氣為之也和之為氣本身之本身心皇之心皇也莫如守其和而求之不守和而求之猶面牆也未可與言道矣流米在心其光有覺現光在性其性有覺善芽增長其道有覺誰為入道無得與得者我未至於得也無得者巳至於得也心中有身返求之心身中有心返求之身返之以完其本來本來見矣米在於道不在於心米在於心者未知心者也子若能見心道道有心非道勿用非其心之道而用之則傷其心矣天下衆法皆是心法以法求心不如以心取法法在而心在也心在而米在也道光所在謂之昭明昭明之至謂之神靈思之思之神靈其來來者守之心心入道矣凡夫不知神者不知心也愚夫好談神者亦不知心也若能知心之所以為心即知神之所以為神矣若知神之所以為神於心之所以通神即知米之所以為米矣三界聖賢皆以一米而分其高下淺深大道心無其心心者元始觀之法也元始之法法元始之法者即元始也至於是而心明矣見於是而心在矣米光之來所以主萬心也心在主者可以悟本來矣桐子汝若能傳心心可以傳道汝若能傳道道可以傳心上上法丹不外於是即大道之門也天真雖高在此一米而已矣本來之米非色非相玄中之玄也去其非而參其神用其機而居其官天道不遠人可至也入道者先去其欲速之心心性之功如水之隨月火之宿於日無形無迹其中至實其中至實玄理之極神之來也亦如是知而不覺覺而不見見者非見乃心之見見見恍惚其象為妙心性之功至於是者能有得矣有得之得米光使之也米光淸明心之智也藏於智者開於智也智惟其有有之所得則存於無無者合道之精而守道之極也求米光者當如此修光明者當如此此至真所處妙玄所現天地萬物之所由出也子若能見之勿以凡心妨害其化本來之化天地萬物之母也得其母而養其子故可以普化天下皆為善人入大智乘心心不二米月交輝大米非易有也須辦善道真心以得之善道者道中之道真心者心中之心心中道中皆有至精精光所至而米至矣有心道而後有身道有空道而後有實道有上道而後有下道不悟上宗道入於幻幻以為道其道危矣故子當知上宗上宗者天地萬物之所以天地萬物之所由天地萬物皆上宗之一體也養其米光守其真光則可知上宗之為妙妙而不知為妙故得本來本來在心不在物也本來用物不去物也是故傳心為貴貴於心傳之傳非心為傳何貴於心天化在在可見不見者不悟心也心為至妙妙為至近入道者當見心以察化化之為神神之宗也知化則知神知神則知道道有進退有順逆化心既得進之退之不失為妙順之逆之不忘其神故道以知化為重若不能知化米光不全全米光者自知化矣上上要妙不高遠也近而可至卑而易從順而自適自然而然何必有識無識之識至於空空而寂寂而天下皆歸於吾道玉光之法深而有門門而無形不若能見玉光之門即知玉光之無形矣可以為傳道之本矣上道在於我故自然為而好自然上道不在我矣充米之光充之有道也直心之真直之有功也其功不離於物其法不礙於空故亦曰自然淨明米光道法之至也淸者神之心神者光之體體完則光長存心淸則神自在下士所以不能見道者心有未神也神之失於心者心之戀於物也子若能不戀於物而求其神心光自湛桐子天下之衆生有善有惡子心不可有善有惡心之有善有惡心之障未斷矣事之有善有惡事之障未斷矣善善惡惡天地萬物之情也我何思何心妙法之高下亦如是至道之淺深亦如是是機之妙無實無虛永永得道而心入大月矣聖光在心求之不遠道意在目悟之在心寶月之光通天達聖若一心修月我等來奉子法米光之人上帝之使也我等今日來此傳心欲諸子皆聞上乘法耳至於細行小德諸子當自省察不必言矣四天君曰三界之中惟人可以宣揚正化普救諸迷而人之所賴以神者天也故修真鍊法者要明本來之天具在方寸全無虧損玄元一氣應感自然此天即天中之天萬劫不渝之天也仗此一天可以解脫塵垢可以厯劫化度可以隨遇而安充滿道氣培養真靈無非全固此天雖天人隨方設教説法未同究其本來未有不從此天而立説者故學道弟子貴在知我身之寶方可參究三寶方可得睹本來吾身與天身未嘗離也願弟子掃開心障剖出金光即天篆金書一一出我性中也法天君謂羅桐曰大志須勤子知之矣如勤而不得子知之乎對曰不知曰天心不合也夫修真之子須本時而後行故勤則有功傳法之人須要空人我空空色若非空空不染即是未能傳法矣浮動非美沈愚非美米光精光皆在一個字中得之須要提醒此心使之時時向道故精鸞法曰須常在也浮沈之理甚微浮者浮其光沈者沈其神使神光交聚於黃庭此心之至安也米三故有三沈三浮之數其實一也傳道在於志志合而道同汝能同於我之志乎對曰未能曰米光一透即見我心浮沈一悟米光即透浮沈之法當求之中勿求之上下二田二田之光我之光也中田之光子用力收之問有雜念何如曰河流滔滔有砥柱可止有心王可滅心中多欲不是道心中頑空亦不是道汝向來所做皆未得力若欲得力非生出上慧真靜不能也上道在心一覺便明子若能覺我可現光教子慧性充矣覺者心有所偏即以正心察之此之為覺若正心之中更有精進此之為慧慧光之中未嘗有一毫慧光可見此之為性三者一貫靜而思之非心勿動動而存之非義勿存為覺之功也雷天君曰太極宫真人有言高上至真存心於無相而應心以相為衆生故也高上至真分相以道合相以神為弟子故也衆生不離弟子弟子不離衆生一氣所感而行化度衆生即我豈能出我法敗我教今也子欲普化而存見存識人故不化也存見者不得已性存識者不得他人性性不得教不正教不正衆生不悟豈肯從子作善人真聖動物性也非情也行也非言也願也非欲也子曷以哉若不見性而具教法謂之旁邪獲譴不小當墮風輪火車萬劫滅光錮性愼之愼之仙子吳銛我今日以要言語子當發如是弘誓種種知覺師真撫念以成子道不然化將寄之他人敬之敬之吾言不得巳也四天君曰三三九九大緣已定何患壇化不隆可患者諸子未能見道也朱子立科於大本處不淸楚故所言皆不得要道惟以外面文章儀表建立道緣故終不立也夫佛氏非有意於人之供養不過乞食全生因道高德重乞食中亦自不辱立大法門故真人諭子有德無辱緣水窮山盡自有雲生理之自然耳奈何諸子不求其真富真貴而畏幻賤幻貧下人則愈上自卑則愈尊道在我也雖虎狼惡物尚知天良何况人哉故道德足則一人可化億萬道德不足則億萬不能化一人釋家弟子初祖東渡不過一人非有譽聞先之也非有言語要結也非有財寶莊嚴也而其因如是其成如是今飛鸞弟子引之以文章誘之以禍福護之以真靈而不能奉命信果是子等道心未開耳向來鸞教流行未有真種子承奉故不大顯今遇二子是真種也但修力淺薄不能頓悟無上故暫以平等緣相接二子須知作者人也成者天也子未能作天將何成子若能作天實助佑必無不成也雖然作不易言不如守常朱子未能作而又不能守常故終不用於帝切已即是度人愈切愈廣愈深愈顯道之自然也傳心不在鸞奉鸞不在言鸞之變化神也言之深淺道也神為靜者通道為真者得鸞為通者悟化為得者開傳傳至妙惟在一心經綸大業亦惟在一心故頓覺者見得此心明朗諸惡不入衆緣不生不必思而慮中不必勉而行安真直也求直莫如斷障非非門也其功夫以專沈為上專之極純自生焉沈之極定自生焉純全大定非入聖而何今人所謂智者與道大愚今人所謂愚者與道庶幾常人之性易失於浮不失於沈故上真顯九還九返之術所以復其靜元也法天君謂吳諟曰靜光道壇甚綿我甚喜之靜壇之通玉壇是上帝特恩將以正覺就子也大恩非特難報知得也難諸子能守報恩一念則道日加欲日離業漸消真漸近故我常言奉鸞弟子十年感恩合真度人十年悔罪悟玄脫蛻豈論時日之久與暫哉當率衆弟子皆求性報恩其福無量其功無量是以為主壇者先於人以真誠開於人以道機誨於人以畏罪使諸子有志者得言忘俗無志者聞訓守身在主壇為之也今也真教不布於人修為不格於常語言不服於衆戒光不充於身豈能奉承我帝我為因緣大本不覺言之痛切法天君謂吳銛曰觀心得身是三返中極要緊處心是月之門月是心之母故得月非難觀心為難觀心者非觀血肉之心亦非觀腔子之心是觀一念未起一物未交之中心此心即是性光發現之地能見是心方能見月若一執色相便落萬層大抵玄功一道非色非空若説是色何者是實實有的若説是空何者是實實無的悟玄功者全賴那非色非空處參入所以能出神而入化也我見子坐時則生欲速心不坐時絶不想及非落色相即著頑空竟不知玄功二字比性功尤難性功是一旦可鍊玄功是幾劫方成所以古來忠臣孝子常為神靈若考選玄真則皆未及矣雖然性與玄究非兩件在子能合可也法天君曰金語曰天中之道人性得之人中之道孝弟得之是敬為養心之要道孝弟為立命之根源精鸞不在一時鍊習全在平素存心有合有不合若心默契一坐可成若未契雖坐何益此修鍊第一截大功夫精鸞弟子不可不知夫身既在天地之中不可不順天地經云人能常淸靜天地悉皆歸淸靜孝敬二者不可缺一當寡欲使心常淸當淡情使心常靜靜則生動淸則生剛即是真人大力量也靈光養不易守念當合真孝敬與淸靜何往非至道月九工夫全在遁之一字夫遁者高而不忘卑榮而不忘辱常應物不常見物常修巳不常有已通真經云不覩不聞遁者真傳在左在右遁者處先處先者無物為有物之宗真傳者無聞為有聞之本月九大道即是精鸞全功遁字大諦即是常在全量非兩截工夫也然而未嘗無先後修鸞者先修常在而遁至矣雷天君曰我開教玉壇求真者則有法在求道者則有法在求福者則有法在傳一法而三者皆得大法也者非符呪之謂也法道之謂法日用間未嘗離也故上士一讀而得之中士必鍊而明之下士雖鍊不知也子不見舟子乎欲左則右其尾欲右則左其尾非逆舟之意也順水道也是故道人之輔化也欲顯必藏欲著必隱猶舟子然舟子人不得而非之道人人亦不得而非之非道人之藏且隱者猶笑舟子之順水道也是將以逆道為志耶不然矣四天君曰凡欲速者不可成大事要入道須如釣鰲用力既深一旦大獲非欲速之夫所能為者也先去其欲速之念則怯與怠皆無從出矣米光須極收乃見神光須極靜乃通人我須極空乃化大木之道以土修之土者廣大而容平正而忍安靜而生木直不可一屈充滿其本來曰直凝定其神明曰米修復其善根曰仙成就其大願曰直克盡其私欲曰淸化空其道相曰遂完誠其空寂曰因此惟上士可能也雷天君曰靈通自然得得者亦自然春至鳥自鳴秋深月自娟靈心與靈性無虧亦無添莫言靈通奇靈通本自然靈通本自然自然不可得銷礦始成金披雲方見日世人心未明心中亦無月錯用自然理萬劫修難徹四天君曰桐子聖根在汝心上回顧聖根使不昏昧此是第一件要事道之存也不昧而已其發也時宜而已其處常也知止而已其處變也隨順而已若乾元四德循環無窮便可成就一切法身妙行羅桐言道德文章不能有進欲求一課程以自朂四天君曰四時不同寒暑易令風雨有凄涼之色晴明有和煦之景隨時應酬已自無暇况更加一必欲為之事以為子心纍乎本壇法旨本無一物淸淨二字可以盡之而子之心終日營營汲汲祗因不能淸淨故耳本無事而強力事本無為而強有為此道之所以終不明而心之所以終不見也為子計者自今以後莫如掃心塵涵真樂淸淸淨淨把榮辱得失之念渙然氷釋誠能如是心塵何自而生真樂油然而至雖日誦金經而不知倦也雖日習時文而不覺紛也雖日走紅塵而不至勞也何等要妙何等直截不此之思而思一課今日一誦明日一禮間以應物雜以吟咏吾知其終身勞勞攘攘求勝於人而不能自勝其私求得於已而不能自得其志真所謂勞而無功泛而不實欲近而彌遠欲淸而反濁矣可細思之法天君謂羅桐曰要求大道人欲不可不盡除天理不可不全具天理在何處因相而生人欲去相則見天理汝今念念不離色身者即是相也靈光被他掩了多少智慧被他沒了多少善根被他損了多少因緣被他錯了多少真是害道第一個魔軍不可不除滅之除滅之法要淸淸明明的念頭常居絳宫滋滋潤潤的性水常流月窟浩浩蕩蕩的正氣常宿靈臺充充實實的願力常存玄府直至魔氣不留魔影不現便可到除滅境界汝今念念不離色身者於何見之求富之人初心非求富也不過曰我身活計非財不可既生了如是相因而又生貪又生妄又生煩又生惱又生怨尤又生驕恣又生忍刻又生嫉害種種無間惡業皆起於此求貴求食亦復如是而世人忽之往往説到相字即輕輕放過不知相之為害為諸惡首可輕視耶至凡厯一境者而存一境之相即從相上起無量障蔽生無量惡業諸相生諸障身空諸相空欲求大道者去相是真功四天君曰宣揚聖化扶植人倫上接元始下領修真厥功巍巍廣大光明惟公斯大惟敬斯明守敬在和守公在淸蜎私不著萬化同根春和風永萬物資生志同道合法法流行光之為體至微也顯而為用則至廣神在光中通法在光中悟道在光中興壇在光中立收此光可以煉玄升真出此光可以濟生度死聖真乘此光以救世衆生乘此光以還元故本壇帝師號曰玉光光者最上乘也人能通玄洞微一氣合於元英三品歸於玄一寶光充備真如具存則成玉光弟子其次修為真正功夫純密除物欲至於無欲之地離色相得悟無相之宗遊行自如道不踰矩則成性光弟子其次敦倫盡道孝義著於家庭守義無虧忠誠聞於鄉國全聖學即通仙道之精盡人功自見天心之復中和位育人範神宗則成道光弟子其次慈心利物有真願以行之慧眼求真有真功以進之博覽金書而不為法相所縛廣行濟度而無起自得之心能虛中而實外不進鋭而退速則成法光弟子至於慕光雖曰庸庸然必要始於慕而終於見始於見壇光而終於見已光方能成得一個慕光弟子蓋光者人所同具物所共知惟不自愛其光故至三塗輪轉奉道之子當明大壇開化之本總在一光既皈大壇必須把四光弟子自期從法而道漸躋高明勿得空談心性説過一生反使千真萬聖玉藏瓊書徒為子等屏障掩蔽天心大月也丹臺一點妙如光萬法林中號法王仙佛盡從儒理出淨明忠孝是天堂三子有道氣故我等今日始來道氣者何即是現前無彼我之心也彼我之心已化中和之氣斯集故能結成一光以通上真年來我等不到不是袖手旁觀任子等之紛紛也只是道氣未𤁒則神光不聚神光不聚則法效未彰今能保守此光使不為外相所搖撼繼續此光使不為內私所混淆我當次第輔宣聖化何謂次第第一宣明玉規開出子等一條坦道第二宣明玄功剖出子等一個聖珠第三宣明符法培出子等一雙聖手第四宣明宗旨指出子等一輪皓月但子等亦必具得光明心方能不厭不倦無怠無斁任我嘵嘵有述也望之望之四天君曰障隨心起心因物遷物無盡心亦無盡心無盡障亦無盡聖賢斷障法門不求諸物而求諸心欲惡之境在前當以無欲惡之心應之順逆之境當前當以無順逆之心處之即大經所云無起分別也分別之心是諸障種子一分別則是非愛憎隨之疑惑昏垢成之貪嗔淫殺錮之直至此時光明之體已被障盡卒難得開故善於斷障者先把分別第一個障輕輕撤去使物未來時則萬神調伏物已在時則心若太虛物已過時則內外貞白夫貞白者即我前日所言光字也四光弟子皆必要具斷障之心方始隨高隨下各見一光若分別之心未除則疑惑之心未去安知淫殺貪妄不相因而至乎三教同理萬法同心上不明理下不明心即教法兩個字便成一座大分別山此所以指月録第一案有云若人活千歲不見水老鴉不如生一日而得見了之此四句偈中已出無量修行人矣佛弟子云汝偈誤也曰若人活千歲不見生滅法耳自此誦偈者便不成道釋迦訶責之曰汝何得壞他佛性以此觀之分別是第一個障俗人最喜分別有一不能分別者即笑為愚殊不知大性海中視此幻身與幻世相值不異雲氣之白衣蒼狗不足當其一瞬又何睱置其一噱所以莊真有人間齊物諸篇為俗人下一箆子今日使者亦然分別之心既泯四光弟子便隨心現光大充法座各得成就正覺則正大之念日生淸明之氣日接有何高下之殊淫殺貪妄之萌乎所以玉尊至道唯在修性碧落正教首重聞修子等不能精進者皆壞於知識二字知識既深真明反昧是以易起分別劒子吳子號慧劍得道本未嘗研精於返還之術而驟證仙階者一則夙器之深一則真朴未鑿耳子等今日不須遠求步步學劒子足矣勿二勿疑可以服衆守真守朴可以登真玉光弟子也不要看得不可幾及只要自已真性不著垢染不為識昧此光便充若以慧解之則支以靈測之則小泯慧絶靈始成圓覺圓則觸境而融覺則不言而化斯乃無上大乘人子等勉之天君奉承玉光爰立大規只是從汝輩身心上細細看出一個大中至正之道詳悉言之耳不知者便把作絶妙好文讀之𨚫一似不曾讀也何以故未將大規真旨實實在自已心上體認身上力行所以口口談規事事背規念念行規步步亂規也我等今日不及細述規中深意且把大意略宣一宣太上曰聖人非以明民將以愚之大道渾朴唯愚斯可守至性圓明唯愚斯可參若一恃靈性即淆矣一弄識道即違矣一用慧人即偽矣一逞私物即乖矣所以真規開卷第一句只説道法無為四個字無為者四念住時也四儀寂時也四慮泯時也四相離時也這個時喚做無為如今𨚫把個無為做了道法的注腳難道吃飯著衣都不是道修持禮誦也不是法畢竟這個道法無為四字何解殊不知真聖高居天上縱目下觀一切蠢動生靈各各自具一個有為之性鳥矜其巢魚善其穴皆道是自已智慧搆成何况物之靈者曰人人之秀者奉道安得不生個自矜自善念頭道本直也我徒以曲求之道本一也我偏以二測之於是把天真淸淸正正法門反弄得不淸不正所以者何只是物物有個有為之性唯人具得較多耳是以玉真將欲開化南洲先使真帥立規圍住了弟子種種支離之見然後好以大光明攝之是以天君奉承此旨開卷便道出無為兩字以為一部大規總領四字中已罄規旨矣何故下文又添出三個字曰而有為不過就子等意中以為救災拔難作忠成孝種種廣大利益此是彰彰著明仍喚作無為𨚫不能得故只得點個有字以鼓舞子等興致而已究竟這個有為不向無為中決化不出所以下文疾忙增出一句天教來承上句有為兩字渡到歸寂兩字寂者即無為也於寂字暗添一歸字要知歸字中有多少陶鎔多少精神方能如十年蕩子一旦思家把昔年遊玩戀著之身澡洗得頭淸面白一程程望家而走更不回頭旁觀方始是能歸的好子所以者何諸境無常是幻現法諸事無常是電影法諸作無常是生滅法若不從身心上顯出一個大寂來修這個大通道宣這個大覺法便如瞽人看花聾人聽樂安能得其芳葩之色音節之和故天君深心大力摶捖出十四個字竟為首章第一節直為後章結尾句也五子在壇一人而具五官也雖曰主輔教糾科各有專責要皆稟於玉規而行猶人之五官皆稟一人而用但人有淸濁之分規有明昧之異明者言言見道昧者字字違心故非把玉規細心體玩必至勉強奉行背盡無為之旨矣所以大天君既已和盤托出説了無為兩字就把合壇的人在指頭一輪分明提著一個最要破法的賊曰智人是以便大張金口喝出人雖甚智遵規乃無失兩句且不要説汝小智就是你具了一目十行的見過耳不忘的聞錦繡的文章懸河的才辨世人誰不道你甚智孰知你的秉心偏與無為之旨相反眼見得奉道一年便造了三百六十日的過失矣所以大天君指他一個遵字遵者如人先走我隨之亦走此是舍已從人的訓解必要舍得自已智學得他人走方免歧路之悲破規的賊已發放了便要於壇中尋出一個不破規的人來教導必取一個最老實極本分的曰愚人這箇愚不但心無機變世人以為愚直是目無好歹天真亦以為愚方是甚愚賢者才德過人之稱若是這般魯鈍安能才德過人不知玉規無為之旨原極易守除是智人皆能守而不變所以聖門一貫之傳偏是魯者能唯故確然四句規便為第二節也全旨既顯兩種人又已表明仰承玉光立規的意思不得不再向大衆一宣所以復提喝一句曰規也者你看我所立之規有許多字許多事許多道理然此是規中所明言更有四件不言不知的妙用不可不先説了何等為四件妙用衛信絶魔啓迷安善是也有不知規者偏在規中尋個信魔迷善四件來講豈知四件不在規中規只有衛之絶之之法啓之安之之道耳至於信迷魔善一言難盡各人稟受不同則所信亦別或信之以理或信之以靈或信之以感應或信之以禍福然信理者理不引其至於大通則信理者壞信靈者靈不規其造於至正則信靈者壞何况感應之機其細如禍福之理其潛如伏苟不迎其機以導之陳其理以慰之鮮有信根不壞始終如一者如上等信各各不同故曰衆信衆信唯規能保護故曰衛也絶衆魔者魔是心生非如經所云六天大魔也即此人間種種害道之事便曰魔事種種纍心之緣便曰魔緣種種壞信之人便曰魔人種種無實之想便曰魔想有此四等魔縱有金堅石固之心也被他轉了冰淸玉潔的身也被他污了所以規之妙用在於絶之絶者不是使外面不生只是使弟子內面不隨他走不隨他走莫説只是四魔縱有千千百百動我主人不得矣衆迷二字包括得甚廣即如看真規不悟無為之旨便是為規所迷奉法寶不會離法求真之心便是為法所迷况世間種種音聲色相那一件不能迷人然而物不迷人人自迷耳若果能遵守玉規真修常道坦坦當前自能引出子等一條覺路安衆善者天下唯善事難成惡緣易入譬如聲色貨利之途人共趨之雖有阻之莫入而彼方以入之為安雖有勸之使出而彼終以不出為樂若夫善道者雖是人生第一件事不奈無始以來順流而下性田中善種十之一惡種十之九此所以善心難固善事難成也百日靜養一怒則傾千日抽𣷹一欲盡瀉何况砥志立行之士何堪魔人之口一言飛入玄樓頓令天光遠隔寶山空手大半如斯所以大天君顯明規旨便明四件妙用而四件妙用之中必安衆善為極功也四天君曰成道之本唯此一點靈光若逐逐於字句之間營營於禮誦之際是名志崇非養靈所喜至道之精𥥆𥥆冥冥至道之極昏昏默默人唯守得昏默二字自然精充氣周而神全矣然昏者大明之所致默者真慧之所存得了大明真慧則性天中具一太極自然能酬酢萬事包涵萬物而性中不失真靜之體故曰昏默也故太上曰綿綿若存用之不勤能節勞者也若未明乎此者事事皆堪傷性故有持呪而得喘逆作觀而病怔忡此無他不會修道耳四天君曰大道之成惟悟修二路然悟修二路總以一心貫之悟不從心是名曰識識起則悟門益迷修不從心是名曰效效浮則修力益淺如是工夫雖終身極勤不能到性光地位性不著光不現大月何由而成大月既巳不成則行法而無神宣符而無氣無氣則神將不隨無神則聖真不格以要言之諸種過失皆起於好文一念故惠禪師曰文字性離你先把從前所讀字句俱嘔出糞厠中我好與汝説佛法楊真人云心一而已一心好文即一心忘真一心忘真則一心迷相一心迷相則一心造業業重罪深故墮地獄皆好文一念始之也子等能力去文習將來本壇符命子等是歸矣四天君曰侍鸞之職壇化之根必須淸心寡欲然後天光可接既接矣必須靜氣凝神然後天光可恆既恆矣必須建中納和然後天光可大既大矣必須致虛守玄然後天光可充既充矣必須履誠蹈信然天光可純既純矣必須復元抱朴然後天光可混而為一故主教之觀靈不可不明其造詣之淺深不可不知其立志之純雜不可不察其存養之疏密不可不量其根器之厚薄不可不審其見悟之真偽所貴乎主教弟子者為能訓正鸞職以定靈壇之本也若不當奬而奬使鸞職稍萌喜心則破其混一之化若不當勉而勉使鸞職稍萌畏心則阻其充大之機所以善為教者不務奬勉不尚言説默而成之方可云觀靈一事矣靈不可恃也恃則易失靈不可著也著則易迷所以養靈之士致虛存一則恃念不生著念克化靈光永無迷失之患譬如坐禪者有時親見文殊妙相有時親聆大士説法有時親遇彌陀放光有時親覯釋迦摩頂此皆一合相也無實無虛之機也不可令我心隨相而轉隨相而轉則即真是妄不隨相轉則即妄歸真實得手之人方能識此利害不是口頭虛虛説空説妄已也非利即害間不容髮切不可口裏説空心中猶憶意中欲忘性內猶染猶之施財而希善報一種貪心積善而欲人知一般凡念所以靈乘弟子毫不可著假當從魔之又魔鍊出真心方可上侍天真耳吳楓翼有疾衆子懇恩救護四天君曰靈光者養於平日方能發於一時已任鸞職便當日日存養靈之念毋溢喜以傷神毋溢怒以損性毋過飽以害氣毋過飮以竭精毋任逸而萎志毋任勞而喪真毋起欲而危生毋起貪而散英毋近盜而自錮毋近爭而自驚明乎十者之要方能養乎真靈教子一言須記克伐怨欲休行囑子一言須守淸明誠正當遵靈非我所自有自天錫我何仁靈錫我不能養逆天獲罪非輕靈錫我若能養成真得道堪欣才大不如靈大多才每致亡身名大不如靈大盛名每礙修真末學不生正覺修道漸失元心多聞又好塗説算來只博才名何用勤參三寶南無子曰天尊何用宣揚道化體面世故人情健時靠粥飯氣勞筋鼓舌搖唇衰時無縮地術足軟腰疼涕零直至臘月三十手忙腳亂無憑年年臘盡春回陽春不照幽陰念到此時緊急當思存念養靈前言示之若生悔悟便是挽救之機若心無悔悟徒欲邀恩於上則究竟凡軀諸漏難除精氣何由生長經云仙丹妙寶隨意自取凡人當大患篤疾之時非凡藥可以治療必仙丹而後回旋所謂仙丹者非必隱芝月屑之難得也只此一點悔悟心發露得透便是無業不除無𡨚不解無衰不扶無結不去所以云隨意自取昔有二僧同修四十年念佛未曾一日有間忽然同感癘氣同瞽雙目檀越不來侣伴俱去無衣無食不能聊生乃相攜投淵欲投之頃二僧厲聲大哭曰四十年念佛修行功勳豈無一點佛天困我若此何用有生溈山大師邂逅見之各加一棒大喝曰昧畜生作何勾當兩僧聞喝即拜伏備陳念佛修行及感疾致瞽絶糧苦乏之狀溈曰未瞽之前是誰念佛僧曰某甲念佛溈曰我未見某甲念佛祗見畜生念佛僧曰如何不成畜生念佛溈曰念佛者真性念佛念真性佛真性念佛者念時不雜衣食想念真性佛者佛分上無生老病死苦此一廢疾安能窘佛兩僧聞之大悔大悟放聲痛哭四目流血歸菴靜坐中夜方飢即有地主供粥兩甌僧喜問曰施主何知僧飢地主曰土神相報知有二大士苦飢故特供耳僧取啜之四目皆愈嗣後天人供養不絶總之靈壇啓教貴弭禍患於未形挽災殃於未兆傳經示訓一字一丹而子等不肯及時吞服直至禍患災殃已形已兆欲挽維艱惟有悔悟兩字乃已形已兆之奪命丹也若併此奪命丹而不肯服反欲怨良醫之不救如此之人何足惜哉含光守真立壇本旨頃聞主教二子之論俱以督師止許淸修不許作醮為暫爾韜斂之謀是年聖誕止訓禮誦一日甚違上意究竟二子看得開花兩字未明故有此障這個障障了吳子二十年又障了金子十年又障了陳子十五年矣即如佛門初起止有一禪豈分赴應止因金山大師受國王之請不得已而潤飾醮法因著科文因立儀表後人不肖便重色相習技樂初猶不過云以法資生云爾孰知勞於外者必虛於內精竭則思味氣亂則思淫有私則分戶分戶則棄公遂使終身削髮披緇難免寒庭苦楚是以典師有慮及此故欲傳定玉書使子等探原返本不迷色相子若未信試問俗道何人知正宗者乎即有一二真實之士如施金經者亦祗做得外面工夫究竟與本性無益若李璞則又落於自了之見不能成丹皆吾道之庸夫也若欲為玉光弟子當以此二人作兩頭炯戒今二子從事內玄尚未及李璞之專一從事外法尚未及金經之純熟而徒一念貪生慕李璞之自逸一時逐相效金經之事業理欲雙馳心行相背多年積障牢不可破至於切已當憂之事反不知憂若終如此併玉規尚屬贅疣更傳玉書是何心歟子等心雖好道不知道之有原心雖慕光不知光之有本徒向聲名色相中討論是非高下天年有盡妄見無窮形色易凋神明日牿甚者因俗礙道不知道本至常何曾礙俗又或因人畏法不知法皆自度何常藉人子等都因此二種顚倒妄見未除所以不合天心不成大道悠悠忽忽竟隨四苦流轉而中心無定主也四天君曰韓耀宗施錦二子年將杖朝筋力宣勞固非爾責然俱要自樹老成典型方可為衆心推仰所謂老成典型者其體端然以莊其容溫然以和其言悠然以永其動展然以舒其氣肅然以淸其慮純然以朴皆所以徵其內養也大真人云分付後人休務外六時常把念頭看一念之躁體不可得而莊矣一念之傲容不可得而和矣一念之褊言不可得而永矣一念之遽動不可得而舒矣一念之得氣不可得而淸矣一念之矜慮不可得而朴矣我之言此不是要子容體上用功夫故曰常把念頭看也四天君曰我等位雖下僚心同上帝其為道也不高不卑無大無小其為心也無愛無憎不喜不怒有喜有怒有愛有憎者凡夫有我之心也可大而不可小可高而不可卑者腐儒執一之道也危微之辨桐子知否靜不忘危則人心不起動不忽微則道心常明上聖一心大壇一法萬法一旨不得其一則種種玄儀皆為具文種種妙制盡同死法若能悟一見原則人事盡為天功外儀俱屬妙行矣四天君曰天尊大慈悲普開淸靜門無聲亦無色無緒亦無文道即真常道心即湛寂心湛明寶月現寂靜性珠呈瑞氣結靈壇祥光護寶鸞壇以鸞為根鸞由人以傳潔已能無瑕玉心照高天守真靈自永敬至氣自綿泯我知見賊入我光明緣斯人秉鸞教大道始得宣慨彼世上人未能解鸞音馳神復耗氣枉爾稱多聞靈丹不可結三品徒凋零事真雖盡年功行終無成壇基易覆撥道心難永存所以大真師口敕諸天神護壇立規教法語何煌煌大則照今古細則分毫芒厥旨隱且密厥詞顯且彰一言盡三際一事兼五常斟酌由聖慧奧義不可詳遵之雖至愚法席日以昌違之雖豫智轉盼壇根亡念茲昌與亡只辨遵與違百慮歸一致合天守無為無為非不為心心道為歸但知奉天行不問行者誰偽心從此滅真氣從此回朗抱對白日神精互滋培靈嬰生面目逍遙走雲逵四天君謂施元根曰元子內光昭朗已堪進法但魔試未嘗未可自信已臻於不退之境須以下人忍辱法門降伏已心方能心照天心而成堅固之體所以古人善降心者必密察已之所偏而呵責之如飢嗔飽喜之類俱屬凡性之偏畏謗好諛之心亦屬凡情之障必要洞明至道人我無間方是性光流露之候性開天見無入而不自得則一切塵魔俱銷殞矣故規曰行法之要曰下人不然受一法則增一慕靈之念得一靈則增一著相之心窺一相則增一傲物之志究竟人不可上物不可傲始而為彼對待繼而為彼比敵終而為彼怨魔如是則所窺之相無非魔境所得之靈盡屬魔因終身入魔不知洗雪真果反因此而墮矣故曰行法非難𨚫魔為難下人忍辱降魔之第一義也性光弟子之品也玉光弟子之基也子敬而行之四天君曰靈壇啓化傳道傳心願宏者可以傳道志一者可以傳心何謂宏有一毫自私自利之心即非宏何謂一萌一點若信若疑之念即非一所以我於皈壇儀中首曰勘志次曰徵願蓋道非願不入心非志不覺也今日所傳玉書是要子等本願奉行的若無本願雖行何濟即如行一鍊度法必須發一大慈願行時始不虛妄這大慈願又不是設心要發即可名為願也實有觸悟於心洞見衆生緣業必然都入地獄哀憫慘怛思欲救之而未能於是得法如珍奉法如寶即此如珍如寶之心名曰喜法喜之至則習之勤習之勤則思之熟思之熟則行之貫行之貫則施之溥貫也溥也而後可稱度師也然其心不先具有慈願又何處生出法光凡讀訓者最忌輕信輕信者非真信也必要從疑團中晃然透出光明返之身心實可相證而後始稱真信真信一生知之必透行之必力入道入法無難事矣子等每每自稱道已知訓已信獨因塵境纍心不能躬行實踐耳若如此則子等塵境無時得脫即道法無時可成矣自誤誤人殊不知智慧人人具有果能用以照燭則一切事境之中即知是道非道之辨天理人欲之分至樂至苦之判至安至危之機自然從道而樂順理而安斷不肯違道以就苦縱欲以就危此乃行從信起信自悟生上士解此故能入道所以大學誠意工夫在致知之後修身之前也人生天地間所以為最貴者惟此一點靈光可以通天徹地可以濟死超生故得之則成聖真失之即淪異類學問工夫惟在保守此光而已但保守之法當知三品三品之用當知三節三節之道當應三時人自十歲以上至於三十名曰靑時斯時三品充周養立甚易惟有精不易固守精者在乎節欲節其身尤須節其心心有未節水不制火丹傾藥走呼吸間耳三十至五十名曰朱時斯時日麗中天光明圓滿神氣壯實獨患精已虧殘欲養玄者不徒節欲已也兼欲節勞凡一切奔競擾攘之處俱宜退避一步使我身無客火之侵得真水之灌而後三田平五臟調六府時運百節安和節勞之道甚細而微稍違於氣之自然即為勞矣故節勞之道在乎專氣致柔自五十至七十名曰黃時斯時精已耗竭雖節欲而猶凋氣亦衰殘雖節勞而無補可以為養玄之資者獨賴一神耳凡夫之神隨精氣而俱萎若聞道者不然念空則客火不生慮靜則真水常注元陽一點孕英成精法水一泓貫華生氣斯時還返之功全在每事知節毋為所不能毋任所不勝抱真伏雌含光守默方能保得靈光一點常在絳臺而疢疾自寡延年可冀施德浩問入門工夫曰入門不可好奇靈真二字乃玄門也故丹家有悟真之篇有致靈之圖靜觀其靈方悟其真潛育其真自生其靈真從三見靈以七名三者維何太極之精七者維何少陽之英精英相輔定光斯生大定曰玉大光曰金靑羅慧照金玉渾成凡塵不染心印光明飛靈上朝謁帝瑤京明此法旨赴感濟人鬼殃消滅災厄和平廣運慈悲普度羣生功圓德備證行登真小子何幸得覩龍文朝斯夕斯莫負宏恩吉天君曰三乘敦修貴循其序一曰照二曰明三曰覺照則明明則覺覺因明顯明由照宏宏其量乃克大其修振其功始得登其岸明明照照明覺三種修宜自學學到性命敦修地聖印堪承塵漸濯覺照明明覺照字字玄修宜細討松間明月滿長空若個能知消息好覺明照照覺明心性功夫靜始凝凝米護丹原有道六時先保念頭真一真可以通神萬真便為一貫照非真非妙如之照也明非真非湛明之明也覺非真非上覺之量也是故我道以真而入以真而得以明而見以覺而臻還童誕妙之鄉覺也明也照也總不外乎存真真則事事皆實言言立本心心無妄步步存神傳燈授印化導凡品總不外此金闕掌飛玄法大使白大天君大天君諱宀三玉書云敬稽大天君自辛亥年三月特蒞玄壇至九月則於玉壇輔宣月九真法及飛玄妙品九九之中大天君為之綱領矣位同四使職主飛玄所以金火隨身玄元共體將來樂法之士咸賴提攜而探星宿矣白天君曰子等本來具足文字文字具足本來諸子俱見文字不見本來安能久傳天鸞諸子各宜知本真實是空正相無相元始之心傳無上無等求之者心真米三耳汝勿生疑障本來淸淨方能知之我不浪言子勿浪聽真妙不在文也飛玄相我實相胡成相玉相圓滿相聖相普覺相飛真相是諸相皆為我相正相也子可尋已相舍其非已相可以進道矣如是為為為不可作想曰我為一心如是至於皇初太上而得道真之妙至道相成離欲相不求真實與真空我能斷滅諸妄心即見玄元無上道性光者大智光也慧由寂生寂者真遁真童遁為童門欲求童者必求遁至精之道在乎此也始之以誠繼之以空終之以默三者真實之法門可以見性也生是幻死是幻法是幻想是幻故去幻生真神光相接矣遁者無我如去有因如來去來無形去來之間不去不來湛然常在心須常在是此意也故曰擊其首其首不得搏其尾其尾不見遁矣道矣相者空相也是故不落鬼魔惡道非非空非相本元本淨是也白天君曰聞道半也執道半也空道空法乃是全也敬鸞半也信鸞半也忘鸞忘言乃是全也將欲實之必先空之將欲大之必先下之將欲用之必先舍之將欲彰之必先韜之離其欲破其相碎其光小其體必有大教付子也乩動非必善乩不動非必不善不靈之中大靈存不可測是玄極天鸞現化之道養誠之士心如赤子未知人事而知食乳天之動也赤子之心不離是是乃玄德可以通玄極寶一者上識一者次形相既空統一無著天真在心身相空不可得心相亦空不可得所以通玄大直之道通於天地天地一直以長存人得其直可以靈世人不知見吾鸞形是以不知鸞心混然而處鸞之理存蔚然而文鸞之理亡有文曰礙有礙曰妄有妄曰不在不在而在之非道之常文者意之子也大道無意而安有文文者色之祖也真修無色而豈可好文文人多俗慧人多狂大智之士有而若忘能於此者可以奉天鸞法有神篆有解然且不著二子何著於扶鸞哉不在多言白天君曰教育無常啓迪唯心宣化不一守教唯直直者不撓直者不曲不曲不撓可以言心心者心也心有其心斯為繫心心無其心斯為忘心心住其心名曰滯心心逐其心又曰放心凡此心者皆非不壞心無上心也不壞心者稟天道之純一守地道之堅貞秉五氣之正通三界之中出有入無隨感隨應常淸常靜同乎太虛太虛之體不壞真心無上心者心唯至平無所委曲心唯至直無所偏倚守元始之真丹得玄妙之真體從實至虛從虛返實從無入有從有歸寂同乎帝心帝心之體無上真心二心甚大不出一米二心甚廣不外一寂諸子若欲歸吾正教入吾正法顯吾正道須具正眼辦此二心方可為玉光弟子然此心者為之有道守之有因非渺茫而莫測非微細而難尋下手時用一存字存者為存其心於心也譬如飮食則存心於飲食言語則存心於言語坐卧則存心於坐卧以至應一事接一物無不存心以應之自然不錯又如心乃主人端坐中堂有客相訪不論君子小人即便相接便不淆亂我中宫毁壞我黍米矣次用一養字養者譬如心躁則養之以靜心亂則養之以一心憂則養之以死心怒則養之以忍心恐則養之以神心喜則養之以淡靜守真如斂息默坐抱神守一綿綿不絶如魚之得水不見其水也而樂生焉如鳥之棲林不以為林也而神止焉自然天性可復米光可現矣次用一真字今世學道之人常多詐偽常多自欺即諸子猶不能免今須要真實存心真實守戒不可外美其觀聽內忘其真實終用不足二字道法無邊愈進而愈形其不足真常無息愈求而愈見其難幾故進一步則知一步之路徑過一日則知一日之陰晴道路豈有盡頭日月豈有底定大道亦若是已觀於帝心尚形不足修真豈有定憑諸弟子一日存養則有一日存養之益一年存養則有一年存養之功故諉力於不如者自畫於進修者也心心求進於道法者真位虛之以待三年九年真丹有基綿綿不息真王可躋真米真光諸子俱有何不急急自修尚爾徘徊顧慮甘為末劫之鬼魂不樂身登於金闕大衆須各自省莫待臨歧忙亂白天君曰信為道本道由信入信為德源德由信充信為法根法由信運信者土也土生萬物信生萬善若具人身逢道緣而德未充法未究者非他也必其中心信還未徹徹者其心塵疑不起纎障不生如太陽當空任是妖魅現前亦見其膽嶮巇在下亦覺其平所以者何唯光大則照之自悉唯本堅斯持之乃固善哉信乎信之光最大信之本最堅也寶玉在石匠人能剖而得之知石之必有寶也明珠在淵鮫人能沈而取之知淵之必有珠也故能信則無象而可求無緣而可得若反是則羹中有蛆杯中有蛇雖有香飯亦難下口所以古人稱信是功德母然世人非不能信也不善用信也道本一途而好信其二德本一性而好信其私法本一神而好信其邪信之未善而曰信無益也豈不誣古謗經耶若夫善於用信者先於道中去二德中去私法中去邪使我心甚一甚公甚正然後曰此事如是此理如是毅而有為弘而有容坦坦蕩蕩自然人定天從理勝數轉此方是有本之學也治身理性教人之本知言養氣化人之原修玄所以治身也觀心所以理性也明理所以知言也持志所以養氣也人無智愚淸濁二氣皆渾存於身一不持養則淸氣衰少濁氣充塞由是施於四體則多躁多怠多肆多餒四者一乘動止有乖矣言詞有背矣雖欲化人人何能化處卑澤者不聞山巔之聲立高堂者乃睹庭下之物光以高而照遠心以定而慧生故知言之實在於明理能使萬理洞於中能使一心融於內自然言來即辨是是非非一無倒置方是化人之基本也修玄為治身之道者何也動容舉止養氣之人自然合節然止云外治非內治也所謂治身者必要使精光充溢元神和暢而後可云已治故非修玄不可得也觀心為理性之道者何也知言之士理既明矣而內觀之力未全則性元之善未透隹木之香火焚斯達文石之秀水漬益奇靈臺之米必須火以燭之水以沃之而後光明始吐故曰理性在觀心也夫是二者實為本壇設教之意焉有身不能治性不能理而可以教人者哉人世空華孰非夢幻雖云夢幻亦要於夢幻中尋個實境方可為人世導師全體呈露乃是實境不全體呈露者終是夢中説夢幻中生幻譬如養丹家必要到一點落黃庭方是真得手若其平日裏運關納氣猶是夢幻工夫耳願子等皆能到此地位則我等開緣化度之志伸矣如其不然有負玉光大恩無益爾等元命也白天君曰道何道道之是道心何心心之是心故不知道者以心求道能知道者以道求心心求道者躁者欲速靜者欲漸智者欲奇愚者欲常執者欲方流者欲圓殊不知道無頓漸之機亦無常異之別更無方圓之量道不如是而以如是求之故曰不知道者也若夫以道求心者和其中以應機無頓漸之法也分其心以合化無常異之見也大其修以造極無方圓之迹也道在斯行行人所不能行於是誠勇之心成矣道在斯守守人所不能守於是堅忍之心成矣道在斯專專而久於其專於是純一之心成矣道在斯權權而善於其權於是圓明之心成矣必能成此四心方顯平日修道之驗故曰能知道者以道求心者也子等以心求道乎以道求心乎以道道道乎以心心心乎修道得道中間不雜一心是名以道道道以心見心中間巳具萬道是名以心心心故經曰心集於虛道自來居心棲於一道自來入心懷其和道自來都心抱其月道從此出細味此言始知以道求心不由以心求道也下士不知此意將謂道以心得必藉心求殊不知此心未明雖求之終身亦終身求道人耳非得道人也故以心求道者下學之事以道求心者上達之機子等不可不知也大法宗曰田在身中吾不知所以耕義在田中吾不知所以取是名盲夫偉哉斯言子等向來習法坐玄其盲甚矣能於身中見田乎能於田中取義乎玄者法之本法者玄之化必成真玄而後可以行真法然真玄之道豈在高遠豈落虛無須知人人有身則人人有田三田六田井絡分明溝遂貫通自生以來人人具一太極陰陽五行之位故坐玄之士返觀洞見洞見其位自然洞見其神自能知神之性情知神之陰陽知神之能事知神之變化凡諸神之性情陰陽能事變化此所謂義也義者玄之所由名也道之所由立也至於法顯靈通參天贊地亦不外精此義耳子等奈何不能取之寧能免於盲乎易曰精義入神以致用也義不精何以入神神不入何以致用用可見也神不可見而可入也義不可拘而可精也何為不可拘陰陽二而已而動靜剛柔生殺消長之變不可窮極也五行五而已而生尅倚伏摩蕩盛衰之致不可勝紀也故人之於天道也賢人見之不及聖人聖人明之不及神人神人體之不及乎自然所以不及者精與未精之等也精一義則一義入神至於二三至於千萬則千萬入神也入神者神入也出化者化出也我神與義會是我取義以養神非從義而入之謂非神入乎神存於中不可見也化顯於神謂非化出乎是故不入神而用者是妄為也為而不應不精義而入神者是虛幻也求之無益子等細思我言靈壇以何為宗大月為宗以何為教淸塵是教以何為修直悟為修以何為玄自然為玄直悟者性直乃悟凡人作為修養誰個肯用直性直性既已不明悟安從來夫直性者無諸委曲無諸倚著無諸阻抑無諸紛歧合於一通於自然守其中成乎大公是以謂之直也不知直者心存物欲則委曲而不公心取境法則倚著而不中心礙色相則阻抑而不通心用私智則紛歧而不一是以凡夫日日求直而終不直也傳心曰自直者存我直者亡自然而合之者存有為而合之者亡道之存與亡也幾希大真人丁寧告誡專欲子等明自然之旨去有為之病有為則直道障礙故然去有為者非無為也譬如禹之治水以故為因以利為本知故之利者乃能知性之直也天地萬物之生成雨露風雷之變化山嶽江河之流峙人物藝生之動靜通其本根何一非直故善言道者言性善言性者言故善言故者言利利以養故故以達義直性可得而見矣天性既明悟從此出故本壇以直悟為修也生化之機出於自然若不自然即為勉強勉強即為假偽假偽即為敗壞玄功之道可以敗壞者成乎哉可以假偽者入乎哉故曰玄無大小自然為寶玄無小大勉強是戒從來古仙煉品浴嬰飛神脫胎何一非乘氣化之自然施調護之工巧令其自生自結自長自飛若非然者玄功之道同於飮食之用藥石之功欲求延年尚不可必豈能如旌陽之沖舉雞犬皆上升耶蓋所貴乎自然者自然無限量道功亦無限量自然無散滅道功亦無散滅故曰自然為玄則本壇之真玄也我前言以道求心陳羅二子已解得否求者從這裏尋覓這箇若曰以心求道你現成一片凡心那裏尋覓得道出所以我下一句斬關奪門之法曰以道求心其機甚滑其縫甚狹全要腳立得定頭鑽得進方可説此四字若略錯一針即落在大暗穽中矣反不如以心求道之庸庸也求字上著力方不錯一針道字上看淸方是頭鑽得進心字上得實方是腳立得定或問關字之義曰關者是汝等心上界限譬如一座大城有八門中居一箇大士八門皆通大士欲出此城走遍七門俱為惡鬼所攔惟剩一門位在正北通道最近亦為惡鬼所踞故斬之奪之大士方能出於此城登於大道坦然無慮矣所以我前日皆下壯勇之句曰道在斯行行人所不行道在斯守守人所不守斯字裏便具得一種勇敢果決之氣在字裏便具得十分確知實見之情陳子我有一言相贈一言者養精也精者從米從靑靑者東方木色在人須怡情抑志使肝氣平寡欲戒怒使肝精守絶妄節勞使肝神悅氣平矣精守矣神悅矣而後我身之肝木合乎始靑之九氣流液於心方能制得二火召得三精二火者元氣之賊也三精者元氣之根也其根既復其賊能制方能於中田中結成一粒米珠故育靑者養精之始事也米珠者養精之真果也心印經曰呼吸育靑此之謂也米珠非氣不結非精不光精氣二物皆屬有形唯神無形故心印經曰存無守有無之一字最難體認修道之士必要從一切事物上一切動用間尋得出一個無字源頭方可以無存神若言無即是神何不以無名無而以神名字也蓋陰陽之妙理曰神神之妙理曰無譬如太極之中已具陰陽之理然陰陽尚未朕兆渾渾淪淪一團真氣非動非靜不剛不柔不寒不溫不生不尅人能體會得太極方能認箇無字故曰最難體認也惟能存此神而不間斷則陰陽和平亢害不作由是天地交而復姤成元氣生而元精出元精元氣即人身之陰陽即丹家之水火即仙果之聖日聖月其工夫全在存無兩字若一念著物即驚其神一物起欲即漏其神一欲造業即濁其神一業受報即沈其神直至神濁神沈地位雖欲精氣之保不可得矣夫初生小兒即患種種惡疾精氣滯毒形肉潰爛彼豈精氣之未養哉只因前生帶得濁神染著漏業故至此耳今子等雖不夭札然而多病多災亦是神濁之故神濁則精氣之中潛伏幾分不足之因或不足於木或不足於金或不足於水或不足於火或不足於土有此五種不足一遇外邪內為牽引是以著而成病究竟病則精氣自病治則精氣不能自治必藉此千生萬劫不磨不滅的一點元神方能培得精補得氣接得命全得形若能存得此神純粹精密則不但我身可保顯用藏仁更可奉行大法普濟世間疾苦所以飛玄首言制萬象於幾先謂之曰洞元之神也神者精氣之母也精氣者神之男女也道者精氣之父也故神合道而精氣生焉黃庭經云道父道母常相望此之謂也故養生之士第一在存神心印經曰神依形生此神在我未生以前我不得而養之亦不得而壞之及我既生神已入此形軀則形與神相為依倚所以修玄之士養神固急養形亦不可緩然所云養形者非必食膏粱衣文繡快情欲餌藥石而後形始得養也只要於平常日用之間動靜合宜若花之在春若魚之在水順天時調地氣適人事尊生命敬天神此形便能遠害如久行傷筋緩行則養筋久立傷骨凝立則養骨久坐傷肉息坐則養肉久卧傷氣安卧則養氣久視傷血內視則養血久作傷節微作則養節久屈傷脈徐屈則養脈久伸傷俞略伸則養俞又如春氣和宜緩志而少憂夏氣炅宜微吟而去欎秋氣平宜小勞而莫躁冬氣密宜玄坐而寡言又如寒氣暴至當按摩以𨚫之風氣暴至當握固以𨚫之暑氣暴至當吐納以𨚫之溫氣暴至當溫尉以𨚫之燥氣暴至當洗泄以𨚫之如是三等工夫皆養形之事也形既得養氣精不為外物所淆不為客氣所奪由是元神日固道性漸充故修玄之士第二在養形握固有五皆用兩手握住內氣自固故名握固黃庭經云手為人關把盛衰所以手之所至可以變衰為盛初生小兒兩手作拳蓋其本氣未泄尚藏水中故能作拳名元始握固又神仙起居法云兩手腸下踞是交兩手兜勒少腹使膀腎氣得暖而交通是名運水握固又中氣凝滯則用兩手一手捺腰一手摩腹左右旋換通徹為度是名助中握固又若風寒初入皮毛灑然鼻流淸涕則用兩手交項手項交爭額有微汗則風寒去矣是名淸上握固又如風在經脈寒熱交作則用兩手抱膝而坐抱欲其緊坐欲其踡亦必得通身微汗則風氣亦𨚫矣是名治下握固按摩不第五處當隨寒之所入而按之摩之然出入起居耳輪面部亦宜常摩心胸腰脊亦宜常摩手足掌中及兩髀亦宜常摩摩則必按毋使膚熱此其度也吐納即呼吸也六字訣盡之問吹字念吹抑直吹風曰念吹音即吹風也若直吹風則太走泄又問呼吸何別曰直口曰呵蹙口曰呼呬音斯膽氣用嘻又問或云嘻主三焦然否曰三焦無專氣在上即呬呵在中即呼嘻在下即噓吹也道君授此六字為法門之最要行符作法非氣貫不靈然須平日做得存神養形工夫五氣方能真具於中真發於外若徒仗此六字口雖誦之中無其氣則亦取如不取用如弗用也上帝之諱訓豁落切祖氣也元始之諱曰洪王音弘切玄氣也紫微之諱聻漆錫切水氣也罡星之諱炓桃棗切火氣也必明其音乃識其氣必具其氣乃顯其法人身有三火一曰元靈之火即神光也一曰元命之火即命門之火也一曰元藏之火是東方之火也二火和則養形亢則害形故曰制之又有三精一曰胎光之精即絳仙也一曰爽靈之精即金精也一曰幽精之精即腎氣也總之水火二藏精氣相交金木二藏精氣各專土居中央金木水火各效其職以成其後天之元氣故中氣不自運得木氣乃運中氣不自和得火氣乃和中氣不自降得金氣乃降中氣不自升得水氣乃升故水氣不貫中病為滯下金氣不貫中病為喘逆火氣不貫中病為中寒木氣不貫中病為中滿所謂不貫中者無真氣以相輔也有邪氣以相賊也五性循環妙義難盡惟在子等能於身中覓田田中取義則此等妙用自能靜照其源默識其化矣白天君曰慈雲普覆化雨時新飛鸞埀教引度修真二陽全具嗣光傳燈燈光晃朗真接瑤京厥惟靜一入道之門旦參夕鍊胎就爐溫我道蕩蕩周行易登遵規守玉默契天心沖虛湛寂圓轉無停氣綿其氣其氣方生神充其神其神斯淸精霔其精精滿月盈渾淪三品內鼎存存水耕火耨霞起雲蒸茶煙一榻半卷黃庭是為晶寶寶花淨明淨明既足見聖要津有能解者米結丹凝外緣不擾性海澄淸尚加策勵莫負隆恩今日正期開教故特到此見弟子等誠信不渝敬光可挹深為悅豫但仙凡之界別於幾希理欲之源分於一芥欲非嗜欲之欲六種動因皆欲也凡非垢穢之凡見聞感觸俱凡也維此四字實為學人進退關頭必須於此辨得明白立得腳住方能默契帝心潛符我印而一息存胎之效不難一蹴而獲矣無奈爾弟子等慧根雖具上解未通不免理欲之莫分遂致仙凡之渙隔從茲以後當知人居福地咸可成真只要掃障離凡理存欲去性珠一透度品上仙可以斷滅罪垢永離惡根可以長親善道飛化浴嬰種種玄妙種種利益只由一點鑒別之心而始能知鑒別信曰大信誠曰大誠大誠淨信米結丹成飛靈無奇六通非異所謂脫胎換骨之道煉金陶火之術又孰有外於此者哉理欲關頭一芥分辨明淸濁道方純水耕火耨胎元固土土滋培蓮自芬煉金陶火始為仙仙種原來不易言攜杖緩行探谷口溶溶性水露珠鮮氣中有神神中有精精英一點晃耀黃庭神能會氣氣能聚精神神渾合紫電飛騰一心求道道反我真真者無偽理之所存理者無塵升仙之門天全胎息轉欲盡道心堅理至爐火熟九寶寶英鮮氣粹丹光徹神淸玉質妍精融融太始芝晶現寸田寸田能灌溉玉尊化化延苞涵涵大月月印照無邊三品不離散塵性日消湔以此云靜靜為大靜以此期一一為至一靜一之旨明存胎胎火凝真空之訣解上解慧花生觀心見道本本立念方純純純歸無極止念法光明上根根蒂足米米護玄嬰嬰童遊頂上竅竅吐華英無英全有英無有有無真理欲仙凡地關頭方寸分混混求三米三米漸舒精精舒爐藥滿二豎奚能侵妙如真印語語語盡天音囑爾諸同志休為俗故攖似是而非最混真慧刀劈破斷塵氛妙如心印誰能契契合慈燈在保英蜎私淨盡月光含一息存胎鼎不寒子欲傳燈須細辨辨明一芥法燈傳
