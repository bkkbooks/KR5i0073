front:
  text: 玉詮天部神威五雷都統劉大天君
  hash: sha256:259b831a0aa574228e9905893f8a4a30209d4bab45c210777c3603fc813991f1
  markers:
  - {type: page-break, offset: 2, content: '', id: CK-KZ_KR5i0073_07p001a}
body:
  text: 大天君諱蚪於戊申年三月奉命督教劉天君曰覺光度世法為道根明性見真道為法本我奉命開教混元惟道法兼持性命彚一度世開緣印心植鼎各當猛尋星宿源頭以副殊恩特典不可授法不鍊鍊法不純以虛上意欲鍊法者一在定基丹光培護息息貫中辛虎庚龍左旋右盼靜則為月月落長川動則為金金飛火冶勿以火候而強制勿以先時而預操循循入彀方為定基一在養靈靈光奕奕根在絳宫絳宫重重升於金樓金樓之中萬神是宗定則光聚一則光充萬緣之息神光隆隆守心定氣抱虎降龍升三降九息如條風暖從臍下乍伏乍從是為養靈天地始通一在息機天高四穹體健斯空日珠星璣旋轉不窮我有心珠綰合蒼窿心中之真能見六通一通於口守牝和中次通耳目塞兌神融鼻及四肢通於中宫應機發運左鼓右鍾按此六通機息神通是為息機與天同運一曰潛志志從心運志一心平志從心一平心在真峩峩七寶觀心得金無役我志志堅道凝無小我志志大法成潛志之功心心會明潛養潛伏慧眼洞真馘我三尸滋我三精潛志既極道果斯成一曰證神神光所暨照徹無邊天有萬神雷為法鞭地有萬神嶽為法源身有萬神玉為法先統合三神罡破風捐證神之奧道在目前守真見光真達萬天功成黃籙證神靈籤先天主教護國衛道朱大天君大天君諱𩆝於庚戌年三月奉命督教朱天君曰緣由心造緣起心滅緣滅心存惟在空識信道者心無所疑也見道者心無所蔽也知道者心無所昧也能知道方能見道能見道方能信道不能信道謂之障不能見道謂之惑不能知道謂之愚去愚莫如思去惑莫如定去障莫如慧慧從定中生定從思中出凡夫所以不能信道者無慧故也欲求慧者先求定欲求定者先求思妙如寶月從思中來能思則能悟能悟則大行生身有絳宫非思不親身有三品非思不融身有善神非思不見身有陰魔非思不滅善思者如珠輪轉空一不著如玉魄照世運於自然故謂之觀觀非目觀也反智內藏神機自發其發也如車已推舟已帆自禁不能止况他人乎先天猛火降邪輔正王大天君大天君諱善於辛亥年十二月奉命督教玉書曰敬稽本壇基化之始斗玄二壇止有先師掌教自戊申三月劉大天君蒞玄壇始稱督教事無大小咸聽綜理故傳懴頒科施符治病屢奏弘績而於庚戌三月去任朱大天君繼之神威更肅紏功核過峻若嚴師未滿二載又於辛亥年十二月初三日今督教王大天君蒞任綜理三壇統裁衆務或授法於壇員或宣勞於齋醮呼吸相通知弘慈之迫切性玄兼盡識大智之圓明更於壇事紛紜之日論撰真規遂為本壇萬世不易之模總之三大天君皆係先天一氣化生積功成聖已經纍劫而於本壇因緣尤為浩大云王天君曰凡身不可戀亦不可棄俗緣不可著亦不可滅總之要尋本來面目先掃一切偏見若是漫然拋落更從何處參究玄機我與子一訣有事悟無事除偏見性真本來無一物何障與凡身吾性即元始元始即衆生三界理一貫心明入貫門心心妄且幻何者為心明改過改是主淡欲淡是真無止無不止便得自然靈郤笑多識者碌碌貪虛名從來萬法千門只求一悟並無大小若不到此貫門總使修菩提三昧也是空花王天君曰桐子將來俗緣甚重本來能勿昧乎我等向望子為龍沙真種不意尚戀凡緣凡緣非外來也皆因子有一線凡情留滯心內所以境從心結但未知吾子何日此情了悟空緣本無相一著便生緣了緣方見本忘本便隨緣身世如電光功名真幻泡蹈履網羅中禍機不可測豈若安愚賤悠然自怡悅桐子豈不聞乎剩凡情之一線悵雲路之千層從今以後欲結真月成大丹不亦難乎銛子應俗不是道能應能空方是道子非不能空以為不必空耳我等初修時處富貴猶看得甚壞何也諸境觸心總是罪障惟看得壞了所以能空惟看得空了所以能安身是行尸家是囚生民攘攘負刑儔憂悲苦楚時時現方得真心性地浮子等不要看得樂境是樂苦境是苦求得性來苦樂皆假所以入道當從空緣始非不明本心漫然空也王天君曰煉法之根在精守精之道在息息有陰陽出於玄牝玄牝之竅貫於綘臺心火熾則腎水熱火熾水熱則起淫心淫心一起則息不調而精不透月矣欲煉法者先寡欲煉法之基在氣氣中有五行各有繫絡能守氣者不必在心腎中取要從崑頂注入中丹方是先天祖氣若止在五氣中添出便是旁枝不能直上也然須循循導引三車而進八景自有真氣能下不必生尋一竅反致日月失輪欲煉法者先定息煉法之宅在神神者身之主道之源也道源在天身主在日天光惟日能燭曰光惟天乃容人中之神上承天氣中接日輝所以無幽不燭而光被四表然神光在宅能養方充韜晦始明全在水中養火中韜方是神光直透故度人經云氣月神日真靈混沌也欲煉法者先求慧具此三種方可煉靑羅混元也王天君曰大緣在本壇緣者造道之資有道心者可以授緣上天是以待人而傳道擇時以開恩擇非其時雖有真修緣弗至也待非其人雖遇運會道弗隆也故緣者道之符道者緣之根能修乎道可以感緣者在我不患緣之不至也其或與道相違可以敗緣者在我勿望道之能隆也天操其衡人操其權天人之會一理貫通感應之機分毫不爽金子可將我言細參之光明洞照提挈珠心珠心在人妙靜真一奈為習尚所移情緣所絆雖有珠光如砌墻壁不能吐露淸輝可憐下土衆生珠體個個圓明但因未聞正教徑路多歧以致圓者變而為偏明者變而為昧珠心既失罪業無窮罪大業重者地獄隨之苦報及之是以天真哀憫開鸞設教俾有志者聞教而自新有罪者聞教而遷改傳之其人以廣天化布之於法以垂後人此皆天真救世之慈開化之本也故規曰以性為宗以慈為化慈者非姑息之仁煦煦之愛也教人以正覺人之迷使彼復其性天保其心珠遠其罪垢永脫苦報而後謂之大慈若非善人接引在壇或有苦報漫然哀之至於代其禱禳是名黨惡不名大慈其或彼有悔悟之心我無接引之力言不足以開導行不足以觀摩漫然不哀而置之於相忘之地是名負信亦不曰大慈其或一言之微足以開人一事之小足以澤物為善於莫知之地立功於不見之鄉澤及於人而不以為功道被於物而不以為德中心坦然無欲昭然淨白者是名大慈可以奉化矣成道之人一心不離道一事不忘道一言不悖道行之有常乃能見道今之人雖欲成道合道之時甚寡一杯之水豈能勝車薪之火哉世人昏昧不察乎此便道修行無益作善無功不知纎芥之善必受善報纎芥之惡必受惡報蒼蒼昊昊自有主持何况靈壇感應乎丕弘善道立壇之根接引善人度世之基道以人而顯人以道而興然後能使世間衆生俱發善念共乘元始慈光也桐子勉之王天君曰紅塵萬丈汨沒性光譬如寶珠為諸穢氣所毒非惟光不能發即珠體亦將毁壞諸子今日性光亦如是也若欲復見本來非痛加哀悔一番洗滌一番安能光輝如舊我所謂哀悔者實實見得俗塵可厭靈珠可惜故能哀悔師前冀教雨之沾濡也我所謂洗滌者大心洗滌斷制甚剛收攝甚密故能培養道根使玄風之流暢也若不如是洗心懴悔終日悠悠忽忽功行不積道果何由而成乎金子汝知教行兩關否侍真閲詮所以聞教也煉心養性所以立行也若聞教而不立行終身奉壇亦無一得若欲立行而不知聞教如瞎馬過山動足即礙向來諸子聞教已多所以終不悟道者皆因奉教之後不能靜養道根功夫不足故也若能躬行實踐雖片言半偈足以悟本何患法藏未充寶詮未備耶金子不要把道法兩字太看難了本性不昏時頭頭是道真神運用間處處皆法修道修法者總要看得源頭淸大旨透不如小鳥銜花東飛西啄也汝等所以不能見原守道者不在道不守而在塵不淸不在心不明而在欲不去我千言萬語不過要汝等去欲奈子等認欲作性認俗作道正覺既不能生偏見又敢於肆若終如此縱有十萬寶經豈能度汝哉王天君曰子等欲入道先明性明性非難也善根發處可見本來但守性為難耳守得一日便是一日真人聖賢之路不雜不煩只明得一性所以能定能安能慮能得得者此性時時能明不間斷也子等能見性即能見天能見天即能觀物能觀物即能觀境境忘而後相空相空而後真見天心見已心明道量宏身量消其基在參玄也玄者非空非虛即是我心極深處所以能守𢆯者默然寡言昏然守慮粹然靜思恬然順境無觸無著但守虛明此乃入法要道修真初路苟能循循奉行自然一旦貫徹心法兩空得大智慧也從此而淸靜圓通謂之玉光從此而純修堅固謂之性光從此而具足妙行謂之道光從此而廣布慈愛謂之法光四果者皆以明性而入也性有二耳之於聲目之於色口之於味類皆塵性也宜空也耳之能聞目之能見口之能言天性也宜實也何也自然之才也心亦有自然之才仁義忠信四者不可忘也人之所以忘者不思耳故曰心神丹元令我通真妙在思也思之道有二動則觀其應觀諸物觀諸文靜則觀其空觀其萌觀其存能觀即能思能思即能明動而常靜靜而常思思之直道也子等能用力如此何患果之不得化之不揚各各盡心返照我願畢矣王天君曰靈化無方隨心而感心有二三化不能久本壇可以垂久者皆吳子一心所格但化本無形著之則障至能輔化者心空見空大事出於無事大為出於無為總之有為之法皆是空相聖賢事業宜從本際點化隨點隨化俱成妙境若二等人於事為中生一我相我相一生貪著一切以此立壇開化未有不敗者也修真學道總要一誠若稍有爾我便非一稍存妄見便非誠諸子爾我之生妄見之起皆從輕躁中出心一輕則教語不受心一躁則事機不明內忘教語外舛事機所以誠一之心因此漸失殊不知靜中之樂無待於外心性之功可以殺境但要尋著本真方能入手本真者初念也念起於心追念見心心生於道空心見道上根備此即為頓門下根修此亦不失漸門若曰大法由頓小法由漸此人便終身不悟何也法無曲直根之利鈍使然也且如飛𢆯妙品中有萬法亦只一法修飛𢆯者有一門而入門在何處淸淨經曰內觀其心一句可以盡經義亦可以入飛玄矣𢆯詮萬卷不外觀心然此心不可執也精氣形骸無非心寶卷之以大其體煉之以發其光真身自見矣王天君曰澄子汝家道氣已齊德心尚有未備緣尚有一病未去如能去此天福自來道者性之光也理者光之寓也明理以安性性自不昏見性以發光光自常在所以既聞道法尤當默受若一生著念性光遂昏吾欲勸汝家人各求已性毋談人短縱使他人不能入道與子入道無干不可談也只要修已之身安已之心改已之過自然家風丕振嗣息賢良可以傳此壇脈人言心要死我言心要活活則無所牽愼勿死於物境本無滯形心滯塵網結將心返太空境同水中月一念參真諦棄死求心活道本無爾我執我便非真善功由濟世陰德在寬人人孰無情欲人誰少愛憎克已已所安施人猶用恕况以已所難責人期必至非汝欲過求纍汝業有四一者欲尚心欲尚疏自治一者自見心自見忘人志一者不平心不平嗔火熾一者浮淺心浮淺懷聲勢豈知大道中無心亦無志此身屬造工如鐵入爐中鐵隨爐火轉人隨天命通若有一分我究竟非真空此乃道人安心之法見性之門當以靜心會之王天君曰真𢆯洞虛現飛𢆯靈極會靈天中天香環雲護寶月母塵沙世劫散空煙非煙非雲抱飛斗舞靈回光九氣綿上守崑頂下守牝空空九神三九傳一水一火運刀圭中含無極金光全二乾一兌聖相具朱嬰端坐火中蓮一氣轉交神顧母再轉神充氣母安三轉不離精上月月盈月缺庚辛弦三三之後即九九水中生火見乾圜此是先天受胎訣何人能解月中天壇化欲彰全在守玄守玄之功全在真一真一之理全在見心今觀子等何人能見心心不離道道不執道方能下手坐玄若道俗相間則俗勝而道微欲勝而私積滿腔中皆三彭為主矣又安能見心悟道金子問二乾之義曰先天之精後天之門知其門守其精大月自明王天君曰復性之功存乎守戒性不明無以見道戒不真無以復性戒者非徒在事為上桎梏一身須要內觀守戒之心本自光明不染衆惡如此才能守若不內求戒心徒在外境約束胸中已無主子譬如家中已無主人誰為防禦外寇所以守戒非難真心為難真心既透何戒不可守矣王天君曰修圓則化開感實則應速我願奉壇諸子皆敦本行自然無負上意不必徒仗鸞沙徒勞禮拜以為奉真之具也大凡道之一字最難識取天之一字最難合一人之一字最難化度我以為道可得未必即得欲得即迷我以為天可接未必即接欲接即著我以為人可感未必即感欲感即紛所以人之退道每從三者不效中生出許多憂慮許多煩惱許多不平殊不知聖賢成已故能成物自度故能度人化障則緣從神靈則法顯皆屬性分工夫並不起一毫私念為我聲名為我利益為我高尚為我智巧只是平平實實日進月躋漸漸修證譬如飢人吃飯安飽自知不向他人賣弄是以有貴而自喜賤而自得富而自足貧而自樂此之謂和緣合道是知道者也至於增修上法尚有無窮妙境或至神遊天府去來自如或至身現光明千真為侣或至曉達妙乘玉質金姿種種福緣不可殫述然皆要從平實修證自然而得非可拋郤坦途蹴至聖真之域也王天君曰道如山立惟在歸宗本壇係玉京開化以明心見性為宗何等直捷而子等不知大旨東馳西逐何益之有譬如瞻視日月舉頭即是郤乃水中覓影豈非枉費精神原其障礙只為二種夙習所牽一者枯寂之病天地人物本同一性子等只知守定頑空向空望道而真氣周流反視為若有若無靈光相照反以為恍恍惚惚豈不遠之又遠一者著相之病大道深微全在無聲無色子等只認色相莊嚴神通感應處求見聖真豈非管窺蠡測蕩蕩難名巍巍無上豈庸庸之士所能奉者乎故曰道人入俗皆道俗人奉道亦俗識破二病朗然頓見本體如同太虛太虛真體落一色相耶吾心靈明著一色相耶太虛與心體刻刻流通又豈落於枯寂耶從此悟去便看見本壇宗旨此心與壇光時時相接如同香雲之交互水月之俱映則玉壇正教豈非提醒人心大玄宗乎思子從今悟去當發無上想發歡喜想發哀悔想哀痛自已遇如此正教而復徘徊顧忌豈非前生業重今世障深既已自悔更當哀人日光照於上盲者不見雷聲震於耳聾者不聞既同到寶山又復疑畏交參仍是一雙空手所以然者汝等從文字悟入不從性宗透也上帝簡書深重眷注甚渥須各打起精神守定玄宫勤參鸞訓念我等為上帝簡用之臣非世俗役使之人我一奮志神光直沖霄漢我一退志魂魄便落冥途况過去日長光陰漸短豈可以片時之苦樂換厯劫之升沈乎急宜痛定思痛慟哭一畨方不負今宵提挈王天君曰靈光無常有覺即接靈通無常有慧即開靈性無常有機即悟然有數存焉通可進也而不可恃光可待也而不可強性可循也而不可任三者能具方可言法言玄法無定本執則膠虛則妄不膠不妄只要於方寸中靜養內基不為外塵所擾方可以真見真內光直透外光相激於紫光中雷霆日月任我號召方可隨感隨應至於玄之一字尤不可執相尋想所謂坎離鉛汞者相也非真也若落一相守一門縱使得手亦屬旁枝宗壇正傳不過要子等修我本來一米欲修米光當漸次去私復本由外達內米光充則內鼎堅內鼎堅然後可以行法度世外境之擾不在坐時可空要平日立基堅固譬如大風撼古木枝動而本不搖平日工夫當以淸心為主若一涉煩惱則空化為大火坐時愈覺焦熾然淸心要平日從容處境如花之開落自然中有天機相泊暗合時緣非若告子之強制不動也吳銛問入道之門曰觀心心如天之日隨在降光然不可執日在何處此中一點丹頭觀心之祕也養氣為根守精為門復性存存在於冥冥勿撓我神神守崑崙勿喪我珠珠在玄牝聖日聖月氣氣資生丹靈骨靈日月升騰是為真丹夀同岡陵光不可見神不可升沈我碧虎赤龍乘雲時時無間手握天根靜中有機真靜始凝動中有括真動方寧動靜闔闢乾坤大身是為真訣悟之長生王天君曰真實修行行盡覺空覺空所空得大智樂修行人最重真實最惡浮偽為善於可為之地浮也立功於有為之時偽也須要三心不牽二意不挂方是真功實善知此者鮮矣天化顯世本非由人人之能從化者以其能自化也化障則緣會開化隆則道光集時而行之我不有也時而舍之我不棄也守者一用者直修者純行者權故能自化也任大責重不可畏難也慮善以動可耳高真妙果不可自畫也勤學以希可耳世情危迫不可避脫也修已以俟可耳三關明萬善足此之謂要道王天君曰汝汝我我可謂一乎汝我既不一可以一人乎汝我之生情與非情我本無我汝二其心情去心一汝同我心且求己心莫論人心同見於我同見於真真人在上非在玉京玉京真人是我心真我不見心情想紛乘情忘相絶因我見心心如明月亦若輕雲雲流無蹤月體常淸性光充足故能守真化人先化已已化人自化修身先修心心修身自修水之柔也不得其性尚能決隄而行况人情乎情生為機機成事成故司教者有先機有後機有當機觀於天人之會察於動靜之端始能見機應物機在事先不可後也後則不及機在事後不可先也先則淆亂機在當機不可或先或後也先後則不濟三者洞明可為普化之本三者不明教人實難人之心也動而生情好惡各異趣向不同譬如河流可導不可障垢膩沾身必以灰滌此雖物性人性亦然得性知機教之能事畢矣天意深微誰能知之知之者亦不知之不知之者亦曰能知非不可知不可知知非不可知知以知求知真實不載故莫知也能知者如童嬰然童嬰不知有人而人愛之不知有已而人保之同於天真完其神志與天合德是謂知天天心如何平等是也天德如何直上是也直本無直上本無上人本無人我本無我人我雙忘直上之道也貴德尚仁則人無爭貴仁尚義則人不忌貴義尚能即不能以無爭貴能尚功即不能以無忌大朴渾然渾然不敝知大朴之所在其可謂主化弟子矣迷者勿引人昧者勿教人怯者道之仇俗者障之根身者事之本行者言之符靜而靜其心如淵動又動其過如林戒中戒其戒在心守中守其守在一一時有一善善功日積一時省一罪罪過日消不見其真雖智大迷不窺其奧雖明大昧吾守一精吾守一則三者能守可面玉光王天君曰鴟梟在山鳳凰不至匪類在壇英賢不生接引愈嚴人材愈廣守壇愈斂天化愈廓斂者必使人人知斂無有為心無好大心無著相心方可同其守壇故主教二子不在當事與人爭執全在平時以天真意旨薰陶衆人涵育衆心使各心明道見自無背規逆理之事矣然必始於自修終於及物二子自修未純遽思及物非惟無益於世而且有纍於已豈不知大道平直無心成感乎豈不知躬行實踐無為成化乎豈不知含光守雌應世真如乎總之大本大原不外一心心之相感其變無窮狂心感者狂為同氣而放蕩之人應之妄心感者妄為同氣而詭誕之人應之勝心感者勝為同氣而妄為之人應之隘心感者隘為同氣而偏謬之人應之故同心相附同氣相求遂至結成一氣稍有不合於道未有不干天和而壞道紀愼之愼之王天君曰修道法門非止一端禮誦又為入道始基不拘壇中法寶壇外經書皆可聞道但勿以速為程以多為貴總於禮誦之時得見淸明本體內心不出外緣不入如如妙覺朗朗元音非色非相默然貫通即是真禮誦也王天君曰聖化無邊聖心弘慈聖教無方聖道無適聖行具足聖功莫測神神神神非神𢆯𢆯𢆯𢆯何𢆯神𢆯神𢆯𢆯神𢆯神𢆯神既分天地始剖神𢆯合一大道乃得悟之則生執之反失知𢆯忘言昧𢆯神窒神明明神神非身生有無無有妙𢆯自得𢆯𢆯無知𢆯𢆯無道無知無道混然合一神非身生神非神得得之不得失之永失通三至九返三還一得是旨者即為太極此返神法也王天君曰道法興隆不在俗人敬奉而在法嗣賢能古先聖賢雖具普化大慈亦未嘗家喻戶曉使舉世之人奉之若狂也蓋道法兩字甚難辨別一經俗眼大者亦小一經俗口精者亦粗即如尼山弟子尚有異聞之疑旌陽之徒未免色心之染何况未皈道者耳不聞天真訓誨目不覩大道經書內懷利欲之心外染塵囂之習如此之人雖欲竭力稱揚反使聖心淪隱故白仙云炫惑凡俗謂之邪炫惑鬼神謂之魔常使世人疑之吾道庶幾不壞妙哉是言也所謂凡俗鬼神者必非正覺淸信傳道法門也必因一時神通禍福所感傾心向慕雖在彼亦云信心而以道觀之止成炫惑而已以炫惑之見出讚嘆之口真道有不淪隱者乎無論在我之是非而即此炫惑一端邪魔之名所不免矣是以上仙法旨反取一疑不取一信此正救世大慈保道之祕妙也此等真訓汝輩不參每事好於稱説汝意何如不過曰使人敬我使人信我耳豈知敬信之中即謗毁之機也興隆之內即敗壞之由也故五老啓法元始慮其礙真如來示寂囑弟子以守默上聖用心如此久遠而子等智慧未充輕説道法雖言言有本豈能繫之人心乎王天君曰子等未明虛明二字便謂道法可以勇進之心求之而不知四大未破趕前退後俱是魔窟當以空心破之勿以必心入之所謂十劫坐道場不能成佛道也白大真人云靈非我靈求不得上前下去皆虛妄此時見道見元身不用苦修脫塵網此時者於上前下去忽然見此身而破四大也此是真悟法門有志弟子各當留意王天君曰上真頒示戒條所以啓人正性若子等正性無虧雖不奉戒戒即在是故守戒者要見戒心即所謂圓明自然路也若能識取圓明領會自然則於諸戒無起分别何大何小何難何易寸天障掩雖小而難心地光明雖難而易總是戒者諸法之要入道之階聖真之果凡夫之防防者防患於未然防過於未萌防心於未兆即昔賢所謂惟精惟一兢兢業業之道耳一日能守一日能戒一念不守一念背戒豈有既戒而自恃未戒而可避之迹哉王天君曰煉度有三要一要者心合也二要者氣合也三要者身合也金尊大慈救災拔苦既傳斗煉則以救拔之事任之弟子當是任者便要體金尊慈救之心去怠去疑胞與為念是故合心在於慈慈者本也輔之者氣也凡夫濁氣稍聞道則為正氣修三品則為精氣三品彙一則為𢆯氣𢆯性交成方為梵氣夫梵氣者非外取可得非部位可守有有無無氣入𢆯𢆯者是也當去濁使正養正使精精者忌諸穢以亂之正者消諸邪以凝之是故合氣存乎養氣既養宜乎身無不合矣已無待操持矣所云身合者有三一在平日之行也欲代天尊行慈先須不殺欲超冥魂苦惱先須戒嗔欲覺諸魂先須自覺欲宣大戒先須自受此為平日身行合也一在登座之時也身未登座是名汝身身己登座不名汝身宜現三種色三種容三種音三種色者神色定色愈色也三種容者端容恭容無倦容也三種音者淸音哀音不躁音也是為登座身貌合也習此三合方可稱習煉一法既通萬法即貫子可專行煉度便是入道階梯不必更求别法矣人心和則道光昌人氣靜則天心接光昌天接自然培得幾個法種若論目下氣象諸子到壇一參猶屬勉強何睱言及傳法即有志者不辭勞矣而施伐之念未泯肯向上矣而自足之心時萌拾得唾餘便誇靈藥窺得皮相便稱骨髓總是諸子志願不弘三司教道不切今後若聚大壇談道談心當從切實處説不可因欲聳聽故作奇論不可因欲壓人故作高言內無主則言泛詣不到則言浮氣不平則言激見不徹則言濫四言皆病為師長則不能教人為朋友則無所觀摩不見他心莫開口自心昏處且無言欲知開教須知已三益功夫仔細參王天君曰天教宏開人羣萃集欲求解脫先須淸靜淸以養神則神自充靜以養心則心自澄自然臨事舒徐出言合節若隨境即躁事必無成惟不逆料於將來不追求於既往渾然穆然是道之根今子臨事每紛紜議論皆因平日無靜養工夫子能自然而然則天下自合人情鮮拂矣操萬事之原者唯心應萬事之來者唯靜靜以處之天真必豫無躁妄之念生則心自靜無搖亂之心生則神自淸陳子以之日夜操持應事能間心神不妄動矣儒道有二否對言無二曰無二孰為主對道為主曰無二孰為二對言儒言性道修命曰成道者未嘗離性學儒者何曾捨命惟人欲天理之分不可強合若去了人欲止存天理此時儒道之名從何而立名既不立二何由成我説孰為主者正此純乎天理主之也但莫管他儒倫道法儒性道命凡有分别便非真理要取究聖賢明明白白空空蕩蕩地位即是下手工夫便欲成聖作仙又失之矣陳子化不易主當思其道其道惟何唯在大慧要知此箇大慧不是從耳聞目見生不是從文字訓語生不是從思量計度生不是從觀照知識生此大慧者從定而生四大非有何况名利貴賤非真何况得失得失是幻何况愛憎我心雖真而識情非真我性是實而思想非實知此説者可入淸靜經可云三空之門矣念念相續最是賊害何也使子精耗神疲皆為此耳看得破斬得斷方是真實修力其次主化之道要不背真規不失人情天真立規本緣人情未嘗逆人之説以伸其説不過於人情斟酌其中者而用之耳故善奉規者要善取人情之中而推行之斯能天人協一目下人情不中極矣子之情又未合於中故臨事每多紛亂所謂主化者以中主夫不中也若以不中主不中孰得而正之何謂中即前言淸靜是也解脫是也天理是也大慧大定是也所謂異名而同出也今日中秋令節可各把中字來體驗要問中不中先驗和未和中如寶月和似金波獨處時皓魄當空萬象俱寂接物時自能如桂花湛露香氣襲人一種天機妙用只在眼前時時顯露如是者人自觀化而感望道而興矣天下無心外之物有心斯有物應物在無心心空物我同一念歸真靜若説無心應物要知無處亦非三空照性非空主化斯堪宏化三空之道已詳之矣至於守精之理尚未悉也三才之內莫不有精日月星辰為天之精山川嶽瀆為地之精元神氣海為人之精天能保精故光明常湛地能孕精故流峙常存人能運精故長生久視唯天地能導人之精而使之化人當效法天地之精而守其根所以三品中先用一精以貫氣通神精足則氣順氣順則神充不凋不殘者能固守其真精也蓋人當十六而精源始通二十而足從此學道所謂天童也此時五行既調六腑正盛養精之法只在引氣歸元太和納鼎苟能卸塵入道何難一日九還三十至四十血氣既強天氣降地氣騰卦至乾陽剛方健精元圭露氣溢神旺此時守精專保三田勿以利欲耗其真勿以貪戀失其元勿以憂悲損其質勿以玩好泄其源從此進修亦可廓然返漓還淳不失真宗道果若過五十六十精既耗而神光不充則氣海已漏所存者三品之鞟耳然人尚未知此身是鞟而貪戀之心更勝壯年修道之念愈怠往日自謂此身之精與天地之精共此不傾不滅豈不重可悲嘆天尊大慈隨緣接引原不分於老幼只要共明此性宗然年老之人守精不易但能持此正息綿綿內降不得學坐𢆯亂此五行不得專禮誦傷此筋骨不得雜思慮耗此絳神不得混藥餌破此真府唯有堅守黃庭調平氣血守正訓以養神行正事以濟事持半偈以歸元苟能如此亦可長生證果矣雖然在天地間果能有擔當宇宙者守精之法又不以老幼分殊界有一生奉道一事之失致蹶從前有一朝奉道一事之善遂躋層霄一墮一升只在轉關一念可不勗哉施子教司天職甚重必要善達天心曲體人情子之教人非不盡也然未得其道教人之道必先虛已虛已言和言和人自樂從勿多言以傷氣勿守默以失教至於教人原在躬行上士設教必先虛已子功非不多矣然行之有時勿先時勿後時恰好子可以道觀人不可以道拂人須觀人之候審人之材度人之力觀候而教者猶一貫之傳必量其功候所至若教失其宜必至躐等無序審人之材者陶鑄得宜若不因材而篤未免矯情拂性量人之力者力可任重而教以輕則失其重矣力可任小而教以大則失其小矣施子教司之道盡在於斯勿虛吾此教也王天君曰淸靜為入道之本而淸中不可無欣悅之氣靜中不可無生發之機譬如嚴冬固密必待三陽旋復藝藝品類方得向榮人之身亦然性亦然道亦然也故玉格曰和為天下通融境界通融者非世所云無是非也通則人人包我性中能知彼進退知彼難易知彼苦樂知此三者而後贈以教思便如景風膏雨生長萬物風不鳴條雨不破塊無傷其形而後可以達其性故曰通融則事事合於大公無執私見無偏氣習無著名相無此三者乃能宣揚聖化為於無為事於無事明鏡當前人自鑒之夜光在室人自珍之故能得衆心之愛者方能得衆心之敬故曰融我自督教輔化以來欲壇中弟子人人到此境界不料子等無始以來流入塵沙種子誰能省察解脫一塵未掃即一道未光豈特一道未光即此一塵中醖釀染變便成萬丈深泥何况多塵然塵性之最惡者尤在不和子看從來三劫流行八難並作非皆不和所致乎子看人生五親相賊百病交攻非皆不和所致乎即今壇員濟濟法器森森尤要相接以道相待以和方能感格上穹故曰道氣即和氣也和氣即靜氣也靜和之氣即天真之氣也以天真之氣事天真雖澗毛蘋藻不加嚴飾猶可以上達萬天下迎百福何况諸子竭誠備物乎王天君曰聖賢懲忿窒欲工夫本極細微不是強制祗因不善修學之士錯認懲窒二字便覺工夫犯手難為不知天下能懲忿人必是天下極曠達人天下能窒欲人必是天下極活潑人懲之愈透則靈光愈遠窒之彌堅則神水愈潤所以本壇要人懲忿窒欲先教之養靈御神靈神日生則忿欲日滅忿滅則物無攖欲滅則境不轉從此下手步步得之於心若錯認者滿腔積忿郤以螢火照之填臆大欲郤以滴水澆之正力豈能勝邪邪既不勝正復增疑所以塵障日錮靈神日敗也夫靈神若赤子忿欲是坎陷忿欲一生譬如赤子已落坎陷善救赤子者只須輕輕舉手將他扶起便得若填坎平陷以救赤子赤子已在死徒矣此是本壇立教之宗乘也子能立志做工夫自有效驗不須愁工夫不效只須愁不做工夫若能做時大則大應小則小應疏食膏粱同於充腹只患人不喫耳或問活潑恐不若恬淡之可以窒欲曰何名恬淡何名活潑活潑者處處真機發動時時天趣流行能於最苦處見真樂最淡處得真味得此真樂真味世味自然不戀欲樂自然不耽即孟子所云仁義禮智生於心不願人之膏粱也若恬淡二字以為無欲之效則然以為窒欲之把柄吾恐其力薄故寧用活潑兩字耳施子日來道心非不篤實而道光彌覺衰減得無養心之法少得活潑乎養心之法不在靜坐不在修持只在心無其心自然天理流行隨處充滿所謂心無其心者起念即滅是也然又不可強制要如梅花萬樹搖動春風香來襲人非有心去襲也奈何子尚未之審耶即如子為教職弟子衆多豈能一一啓迪只須身為道範諸子莫不率從時雨芝蘭因機自發可也最不可以言以見動他致使賢者不易服從愚者反生訾議愼之愼之王天君曰我久未到壇只道子等道心加進工夫純一奈何絶無真光真願足以上格天心下導真侣豈教迪多年尚有凡緣未了塵障未斷耶今日我再將凡緣塵障四字為子等一宣此四個字皆從一點無明而生一切境空緣何能縳一切事等障何能乘祗因子等內先具了一個凡心所以現前諸境盡化凡緣又著了一個障識所以一切事上轉增障礙緣障互交精神暗鑠真光從何而生光既不生真願從何而發須知本壇開化最重真願無量天真俱乘本願之光所以降凡濟度若無願者即落洞仙小乘豈能體聖慈揚妙化然此願之一字最難言之若凡心未去塵障未開強曰我願濟苦我願度人譬如乞兒妄思濟衆願非不佳非乞兒之分也所以願必在真真願者從大悲生從大明生從大圓生從大通生此四種心皆合得天真之光所以能運已身之光更能引領衆生之光是故名曰真光玉規首言四光本是一光祗因凡心凡識有多有少所以中間略有差别若子等果能修到性光地位則凡心即是天心塵識變成聖識水疾無波火明煙滅從此合神通道便造玉光地位不須有為直悟成就今日有志者既聞規教直須於四光弟子中著力認做一光方能合大壇宗旨若隨緣逐隊禮拜瞻仰便是世俗燒香一般心仍是凡識俱是障豈能合得玉光啓教之願凡為本壇弟子貴乎能見真宗所謂真宗者道則玉光之道心則玉光之心也心外無道道以心凝道外非心心從道立故凡本壇一切經詮法訓所以載道即所以載心故善學道者不離字句亦不粘字句何以故字句曰名名生相相生著著生疑疑生障所以月九經云離法求真是為真玄不奈世人心力浮淺雖有朝參夕誦都作字句觀而文人尤甚所以道心兩字終墮雲霧不知經詮所談皆是我身中本具之道法訓所教皆是我身中實有之心從前聖賢特先覺耳若因字句轉生名相轉墮著疑如此人便是不會學道不會學道又安能成道可慨凡夫俗子於道原不知學獨是既為壇弟於道既云知學矣而卒無一成之可望者豈非不會之故耶所以不會者豈非離心問道之故耶然新皈且勿論一二大弟子皆知以心求道矣而亦無一成可望者豈非作字句工夫耶今後汝等當先認取真宗次於四光中認定一光次於五門中擇一門而入五門者一曰立行二曰稽經三曰養靈四曰審緣五曰直悟因彼弟子境緣不一故列為五心行交修純一無間一門既入五門盡通一光既成四光咸備此方是我壇大主腦真學問也我所言水疾二句是性光弟子心行也本願經云性光弟子純修堅固這純修二字最難形容若云如玉之純此是定體與修字不合而性光之純純在修道上見故如水之就下不期行而行不期疾而疾只因他源頭大來路遠取道直立心勇水能如是縱有刮地狂風終不起掀天白浪若微風安得生波故學道人性光一透便能親見玉光心印是此源頭大也便能把最初元心觀身觀物此其來路遠也不著字句不取名相此其取道直也順境不移逆境不惑見道如歸莫歧莫阻此其立心勇也故曰水疾無波不透性光者如少水注於曲霤其行也艱則多渟滀瓦尖草蔓障面生波猶之小乘之修其力怠緩則境風易於鼓蕩心水易於動搖所以大道日迷真光日暗至於火明煙滅者煙火本是一氣氣未達則火伏煙生達則光明一透沈煙頓消猶之性光弟子直悟一門走透用以立行不墮妄為用以稽經不增枝見用以養靈不落異端用以審緣不逐色相色相滅則真相直異端滅則大道通枝見滅則正覺露妄為滅則大為成到此地位方始成得一個性光弟子若云火息煙空無悟無修此又是枯寂學問未見真宗者也子等今後且將已身水火來細參一番得有省悟即是性光基幹道心齊明勿作淺輕工夫僅為吾壇煙波弟子可也靈從性出是曰真靈行從性起是曰真行有真行斯有真功有真靈斯有真化汝等性光不透事真習法止在色相上著眼徒以禍福感應勸人徒以語言文字詔人如此為化化安得真有志者貪多聞以為博有願者兼邀福以為誠習法未究法源濟苦未免偶中參玄未探玄旨丹基未免或傾至於二三小子徒飾貌於壇中屢改步於壇外如此為功功安得真不知大道平常聖心時照道惟平常故斯須不可或違道惟平常故厯劫方能永久至於聖心之鑒洞悉隱微是以善養道者必先養心善養心者必先愼獨莫謂無傷積惡成殃莫謂無害積妄斯敗子等既入吾壇惡念雖無而妄念人人俱有所以性光暗昧今欲修煉性者當先去此妄念夫妄念者非徒貪名逐利之為妄即此道法之中一有著心或著於聲相或著於詞華或著於名譽或著於福祐即此種種著念即正心中之妄念矣妄念一乘則神易驚氣易漓精易耗三品先已不真妄曰玄理如是法心如是徒自矜炫與本壇真宗背謬殊甚所以我規中有云天人相接存乎一性指子一個宗旨不知者將謂本壇啓化法鸞並通畢竟其中有多隱奧有多奇異有多高深殊不知並無隱奧不過是平等耳並無奇異不過是常道耳並無高深不過是真修耳所以然者存乎一性故也故下文即把妄因為戒曰巫覡曰外道曰入山求仙皆是舍了自已性珠去弄他人瓦礫者也若能參見此旨立誠去妄存養於不見不聞之中發現於共見共聞之地內外純白顯微會一此從來愼獨工夫亦即本壇性光門戶也是以言不貴多言多則性光不蓄行不貴矯行矯則性光不宏志不貴高志高則性光不實思不貴深思深則性光不正學不貴博學博則性光不純聞不貴多聞多則性光不一要在平平坦坦之中用一番真真實實之力知寸進寸知尺進尺必到豁然貫通之時方是妙覺顯露之地不然吾未見或免於妄也為主壇甚難作人之化全要以身親之故規曰主壇之要曰無為守曰靜正用曰平等子為主壇雖未能全此四句然賴汝立心本正又子才懦不能鋪張施設反得無為之意然子之無為非見道之無為不及道之無為也見道之無為者內不見已外不見人是道則進非道則退三司不敢有僣事九職不敢有曠司人心和同天意孚格任有揚化之功不存揚化之迹故曰無為欲到此無為妙境必須內有所守外有所用所守維何靜正是也壇之邪正係乎人心人心邪正根於主心培固壇根唯此正字最難執持切不可略有圭角有圭角則在已雖正而不能化邪為正又切不可略有嚴厲一有嚴厲則不能使化和同所以必先之以靜何謂靜無爭曰靜何謂爭執我曰爭何謂我已私曰我總要先克盡已私公其大道不疑不畏不做不作方能成得靜正二字守者守於已身用者施於壇弟故必悟平等二字方能禁絶種種過患一不平等則壇衆之心隨風而化漸至爾我山高淸白異眼大傷元和以敗壇化故主壇之用在於平等雖然平等有源靜正有本總要明得性光自然無欲而靜正可守自然圓滿而平等可用非徒口中説平説正已也王天君曰陳子子何不看天乎何不看心乎甚矣夫天之慈也湛然靈明恆久不已覆冒於萬國九州而靡有所遺者天之化也雨暘時若而民無失所者天之愛也知天之化而道自生知天之愛而理自出坦坦施施何嘗上下相睽無奈禮教衰微民情偷薄遍及海隅而天亦不能為化為愛所以咎徵屢見災兆疊興玉光聖師開壇救劫用化用愛先及於夙緣大弟以普聖師之大慈也不意數年以來敬心失而朝參之禮為具文懼心失而齋醮之儀為赴應行法氣淺不能上達金門煉度慈師不克廣拯泉路主輔一體也而微覺分形三司股肱也而每見殊用至於家庭之間甚邇也而父子之情不聯兄弟之氣不屬由是推之沐浴於聖師之訓迪者尚爾心同頑石何况林林總總之黎庶未入大壇未覩法訓豈不墮斯災劫乎今欲汝等將天慈愛之仁時時在心上安置天化大公之道刻刻在心上流通天真開教之心步步在心上輪轉天訓啓迪之妙念念在心上潛修果能如是則功過自明迷惑自解妙悟日新則道芽日長妙氣日積則道幹日堅妙行日光則道果日進矣妙行者奉天揚化之行也行非妙氣不能成妙氣者奉天養玄之氣也氣非妙悟不能集妙悟者奉天不二之慧也悟因一生慧由二斷一則性體昭明天光相接故悟生二則識塵紛起天光遠隔故慧斷一二之辨細若毫芒非下一番靜工將已心細細理會則日由二中行走尚認做一中運用如是工夫豈不枉費看天看心工夫一貫天之所以為天人之所以為人皆出於一團真理不從造作不容假偽是以人心必見到無造作無假偽之地方名曰心尋得此心即是心中之天時時與蒼蒼之天玄感默契能如是者真仙導之神將護之百邪避之兆民信之則法可行玄可悟功可積道可登所以修行兩字原極易明白極易下手只因子等不從一貫處入門遂覺千頭萬緒顧此失彼瞻前忘後便覺得奉道之難習法之勞矣殊不知符篆繪圖也詮咒桴筏也經教筌蹄也故誦經禮懴謂之小小過渡行科作法謂之小小補苴靜坐養玄謂之小小藥餌皆要看得虛圓明活方於三者之中不成住著之病不起疑退之障不生煩惱之魔不發狂妄之習不貪有欲之報不入造禍之門若不如是看心天終不見天且不見而况於人乎况於鬼神乎王天君曰今日因壇緣蹇阻故蒙真駕親臨訓示復為主壇振起人心然聖慈雖大不可苟萌恃念惟宜推度緣會浸衰之由化機漸隔之故必使其故其由了然洞明先自主輔暨於三司皆能推度洞明即將己心為合緣之本已身為承化之地方能使已衰之緣復其全盛將隔之化重見光昌故規曰合天者人功合人者天性子等平日未嘗不欲合天奈不知人功兩字所以欲合愈違人者仁也天地生此一人便賦此生生之理於心所以聖賢照得此心便能發出慈善柔和四種功德功者公也人孰不事事皆逆天事孰不力力皆由己誰人肯以已之精力辦及公事所以用事雖多無功可稱人功既不能修天心如何可合子等平日未嘗不欲合人奈因不明天性二字故欲合人而人愈渙性原在天人所同具只因私欲蔽之便生彼我是非種種不合始而意見之不符繼而言論之剌謬再大而作事之背馳甚至互相訾議大破元和此無他未明天性之故也所謂道化者燈燈共引性性相淑開口是功閉口是行一語而具萬法之體萬言而不失一字之宗故能善善及人人從此合今子等上未知天下未知性內不自量外不度人朝聞一訓夕即備説則與道聽塗説何異勿論人將棄之即已心先自棄矣如何可以合人乎故真者所以誠此天性也定者所以保此天性也一念虛偽即非真一物淆亂即非定所以五倫五常皆本一真以為進修之地百思百想皆以一定為敵魔之方果能依此工夫自然化機可復合緣會可永隆矣謂陳子曰主壇所主何事對曰當明規心曰何處是規心對曰先修已心使有主曰無心之心是為規心平直二字從何發出對曰從忠恕發出曰人心本平七情溢於中則不平人心本直五欲搖其內則不直所以情欲兩邊最背易規萌於心則志向不合矣發於言則議論不合矣見於事則動作不公矣所以然者只因未能體認規中平直二字然平直二字極難體認必觀察到心無其心地位方見得事無不平理無不直譬如目司視耳司聽各效其職而無我相若使耳目各有我相則人專視之時耳則生怨專聽之時目亦當憂如何專聽之時目不期而閉專視之時耳不期而忘可見五官皆讓美以成其美所以然者五官統承於一心猶三司九職統承主壇也然主壇亦須統承玉光如心官主視聽必合於道方能得耳目之益不然雖專任之能無邪乎故主壇所主主於道耳輔壇所輔亦在道耳至於三司方有教糾科之名究竟教紏科三事之實初不在名亦只一道耳故規曰若有弟子已任司職心懷驕傲不能虛已從真者譴可見從真二字必要從虛己生發這虛已之虛字又大難講己字又甚細密須把前日施子不敢和詩大師説他不憨一個公案來參司馬大師前降壇言我在南城開教三十八人中只度得一憨漢可惜玉壇中少一憨漢耳因吟詩一首令諸子和之時陳子欲和施子云不可一作詩則費時失教矣大師云施君議論甚是但少憨氣我不能度也因論憨字義云憨者酣也女子醉心於夫壻其愛則憨文士醉心於詩書其學則憨武夫醉心於主帥其勇則憨憨之兒不别利害而惟適是從憨之心不擇是非而唯使之適真之至也動乎情情之篤也成乎性故曰憨便見極正道處尚有一分己字未虛故昔日劍子有一言天真深取之其言曰奉道我無他能唯能依上命耳上命我行法濟人我則行法濟人上命我閉門吃飯我則閉門吃飯上命我入地獄作榜樣我則入地獄作榜樣雖入地獄我心不苦何也到底抱著一個玉光心印此雖劍子狂態然天真所憑實在此志故能開無上正宗若使劍子無此大願無此大順其玄修不及金子奈何反先金子而見真乎金子之志則不然其學法也因其便而習之其參訓也擇可能而為之其奉規也擇順人而行之凡規之有拂於人情者皆不行也凡訓之有難於從者皆弗守也凡法之非有人輔者皆弗習也故身化之日光明雖洞然覺照無如慢法背規二罪為天神所呵斥是以久淪冥界耳陳子自後當將此言時時銘心設有上命難從之處亦當實任其未能不可反將上言文飾引此抵彼有逆天化輔司亦當知之且如應赴規所禁也忽命汝去應之不得引別諭推郤且如行符上所命也有時忽命勿行亦不得引慈濟等話頭來逆上意總是虛己從真一句盡之矣王天君曰水火二字性命之基水火先天之日月後天之陰陽也體本空靈不著挂礙惟情欲動於中則火炎水涸性命之基傾矣觀心之妙用慧眼內觀不可強把肉眼閉了便作觀心其法先從調息入門調息久則內生精精充則不倦不倦則神旺精充神旺肉眼化成慧眼矣王天君曰塵世眷緣生則聚首死各浮沈若同壇弟子便是千生以前從一氣中來千生以後從一光中住切不可因性情之不若志向之不同議論之未諧遂愛憎之各别總之大道甚公至善無我各各存個我不如人之想虛以受之各各存個天真啓化之心敬以接之各各存個同甘共苦之願愛以容之自然人心和而真氣凝真氣凝而道功積道功積而天心格矣淸靜道之根真誠道之本不淸復不靜斯道難得進不真又不誠厥修豈能證可憐大寶筏何不爭先趁正性若一沈百劫難再拯急用智慧刀斬斷三毒眚急用猛火鞭打盡迷魂陳尋我第三目覻看道中正躡我足下輪一程便厯盡庶幾成正果不負開壇聖勿因境苦疑潛外初心信勿因境樂牽埋頭溺塵坌先後悟不齊成道無利鈍普願諸弟子莫把他人論彼非已不非自有天為證已非彼不非誹謗徒逆命閉此論人口忍此苦樂境將心反太虛塵緣庶堪屏念兹釋在兹真修真學問燈燈互引傳速踹函關乘王天君曰施子德浩真誠出於天性慈和合於人心吾壇之大器也但願力未弘真光所以不接參求未猛真道所以不立往者有志煉鸞正是子之道芽萌動奈何不得有成竟灰此志不知子之未接真光者皆由未發弘誓耳上帝選才之心如渴如飢只要下界之人肯發一超凡之念救世之心無論後日修為勤惰即此發心之時無不即降大寶光明充其靈府所以今日若有新皈弟子主師必當先以願力兩字為彼細細宣明必要使新皈者聞教之下本性忽開大願浡然生發方是善於開導又不得指著一事要彼勉從方能得其真願然真願之生又係斯人夙植子昔年一覩鸞書發心皈教即是子之夙根好處道本萌動然止於信道皈教而已至於體聖宣慈成真度世四字子若視為分外願且不發何功可稱他如韓子耀宗顧子廷玉陳子源寬文子輗皆具有夙慧但須俟其弘願一發必能上靈交感各要在金神本願經中細繹微旨看上使發願之時必有觸悟必有緣會必有因地必有真基故其發願之時自然真篤深摯圓滿具足譬之矢己在弦炮已點火豈不真乎豈不速乎豈不一乎是願一弘則子之道功亦弘天化亦乘子願而弘矣然不可誤認弘字也弘於願者必能愼於微真於願者必能空於已愼微所以成其弘不然則堂堂之象也空已所以保其真不然則戚戚之情也願四子各勉之王天君曰大壇之立靜修為主即後日拯災苦亦終不脫靜修所以我撰規文首言有為歸寂建公壇者不得徒事外飾開教濁世不得不然道愈神者迹愈韜靈愈高者相愈晦而後可以養生可以安弟子若不務韜晦而務彰施使後來弟子無暇靜修多招毁謗是猶愛其子弟而飾以金珠置之盜叢而曰無傷者吾未之見也所以近蒙金闕尊師頒授玉書字字皆崇本抑末之論行之者先要戒空言盡實事事勿分於大小當務為急志無論其高卑真實為要慧姑亦曰寧為真鶩母為假鵠斯言可味也道本至常常則不壞向來子等未曾理會常字之旨所以多遭磨折在今日者正是掃幻見常勝進一層不可反多自悔之障云是上真為拙改繩不知主壇者主化也化之一字非心非口若以心為化人豈能盡從子心若以口為化更不能服從子口所以善主化者先去我心則人從我心而化矣先愼我口則人從我口而化矣今日之事譬猶蒙師指教初學昔日兒志未忘暫賞果餅欲其記字示以花蔥俟其正性漸開然後示以書詩此番之訓授書詩也子等莫戀昔日之花蔥餅果而失上真指點之大恩更負已身真實之歸宿尤負後賢向往之機關所以今日為主壇計者莫如一味淸修去我心始吐對越之心去我口始出化人之口如是為之子在六年之內大可宣揚聖化而成真有基矣王天君曰法壇嚴肅寶相煥巍自大壇開化以來今日可稱完備矣從兹以往各修為無上妙道或閲訓以迪知或持戒以立行或盡人倫以培無上正果或濟物命以培無上福果或勤養玄以培無上真果知行相輔福慧交修庶幾漸合真宗而傳玉聖宗燈於無盡我之本願如是廣大豈為一人一事而時時臨蒞哉我之所以能發廣大願者以玉光之心為心也以玉真之心為心若何唯能洞見玉真之心何者是其存主處何者是其發現處何者是其運行處何者是其韜晦處一一洞見我心之存主發見運行韜晦自然與之符合不錯一針不間一芥如此為心則玉真與我不二是故一切聖賢皆於不二法中宣演無上妙諦皆於不二法中進取無上妙道皆於不二法中修成無上妙行從得妙諦漸進妙道由進妙道漸成妙行三妙所證是曰妙果在壇弟子欲從事進修者下手工夫首要思維玉光之心思維有道先修助因所謂齋戒是也次修迪因所謂閲訓是也次修攝因所謂禮真是也次修養因所謂靜坐是也四因互修我之心既無不正俟其既正而後致思則思而易通俟其既正而後加維則維而易達問思維何别日甚微之謂維又四周日維古字一也思而四面營度故日維如此思維方見玉真大慈大悲之心我亦如是方見玉真大覺大明之心我亦如是方見玉真至淸至靜之心我亦如是方見玉真至廣至大之心我亦如是方見玉真極平極直之心我亦如是方見玉真極虛極讓之心我亦如是總是萬善萬德之玉真求之我心靡不吻合是稱能見玉光者只要子等具有此志決定修為一日二日之後便有真師在上提接或有光有色顯現神機或隱光隱色默啓玄竅決不令子等暗中摸索而有困勉之苦也施元根請習淸羅法王天君曰我任教職以來日以大法期望弟子成就不料習者雖不乏人悟者並無一士至今晨星漸落茅彙無征我志已灰我心竊憫頃見主師一揭乃知元根有此上志可稱空谷之足音矣故特一降當披我赤心迪爾玄路大法可以修真可以濟人至平至易至簡至直識平易簡直四字方可稱善習學者何謂平平者常也煉法之士俱患好奇不肯從平路走故不能登峯造極初發志則心雜於慕靈始煉心則意岐於色相及其後也矜誇恃傲惡性縱橫而不自覺故天真上人鑒是人也而不假之以緣反𢌿之以障使無成就為不平也能平者即知先從靈生靈本性具大法參贊之功要不外我性中所現擴而充之飛玄無奇六通非異百年一日此中如然故曰平也何謂易易者無難之詞天真修道得道煉玄得玄俱不從難處學習而從易處進求故意舒而體適坐照自然天人共協後之學者性光昏鈍便覺大法難行大道難悟見法戒則畏其礙於俗情見法律則慮其阻於人事見法義則歎其浩溥而難知見法儀則嗟其煩瑣而難竟此非法果難也人自視為難耳所以自視為難者即凡心之萌動也即塵情之搖撼也即業性之牽制也善鍊法者先將凡心塵情業性打掃得乾乾淨淨譬如混沌初開以來祗生一我上則三光覆照下則木石與俱縱有凡塵因何而起具得此種善悟方知大戒所戒戒我本無大律所禁禁我所惡大義所宣宣我現有大儀所行行我自然如是則畏慮之念不萌於中而嗟嘆之情泯滅於內出門由戶何易如之故曰易也何謂簡簡者少也太上曰多則惑少則得寶明曰夫鳥啄粒充飢如食斗粟則雖鴻鴈斃矣今世學者承俗儒凋敝之習好涉獵而薄孤陋殊不知真儒以一心貫道真釋以半偈通禪所操者愈約而所及者愈廣何况法燈玄照靈非我靈天𢌿我靈神非我神天賜我神靈通之用縱能到得移山填海飛形入石亦非我欲如然不過我一性常存帝光攝受所致俗子良知迷昧雖聞此言不能信及若有根之子便知此言是我等實心實意之語毫無疑惑一味信行於法中推尋歸根結穴至簡至一之道造次顚沛守而不違如是簡者既悟則於法中一切繁文一切繁儀悟也可不悟也可能可也不能可也不悟不能而參贊之功仍具故曰簡也何謂直直者自然也道之用在法法之體在玄靜則金丹動則霹𩆝未有煉法而不從事於煉玄者然玄功一道易偽難真先賢託象以立名因名而存義後人即因象以執名循名而失義何况真玄妙用大法神機即義字尚不可著乃至有不可思議之事不可名言之境俱從一片帝乙真光化現是故明玄者寡昧玄者多故我指一直字教子天地之間何莫非真仁之於父子義之於君臣智之於賢否聖之於天道其當然所以然之故稍容得一毫私曲否真所謂種蘭得香種粟得糧者也我即曰種慧得光種福得昌者也子若欲望道法之光昌而昧於種慧種福之理是失直也我等輔乎哉王天君謂陳源寬曰夫三田者心主神中黃主氣下關主精精固則化氣氣充則保神精不足則氣不充氣不充則神亦不凝故水為天一之元氣屬後天之本而神則滋養於二物者昔廣成子告黃帝有曰毋搖爾精毋勞爾形形即氣也今所謂凝結三田者蓋聚結三者於中黃以成丹鼎而得會合先後二天以長生即廣成子之説也今爾當思神鍊氣以聚合中黃久久自然三田凝結矣子聽我言做去無得紛紛雜念總在黃中做工夫夫黃中者天地會合之處萬物之母也要專心養靜目視寸田一塵不起萬慮捐除舌下津液不可耗失必須鍊液下咽由十二重樓貫注心君再傳送中下二田自然三品能結源寬問用何時刻曰不拘時刻刻要做刻刻要想黃中行住坐卧不可須臾離也雖是第一層工夫然而成始成終之道亦在是也又問黃中所在曰心之下臍之上一寸三分處也津乃下田之液從舌下蓮泉玉液而滋養乎上人非此水不生今咽下以潤丹田即子來顧母之義夫玄功者養玄之道天玄而地黃故黃中為天地交會之所然玄者又水之色北方之神天一生水是以鍊津咽下亦此意也久久精氣神會合乎此漸有勝境所謂化而不可知之謂神也如線穿針汝去參去四字之中指點甚深不可以言語形容者也所謂如線穿針者人人能之即人人不能之也亦時時人可能之即時時人不可能之也蓋人之幼時目雖淸而手不能穿人之壯時手雖強而氣不能穿至於老耄之時則目易昏手易怯氣亦在若有若無之間則針針受線幾難必矣故曰如線穿針也幸而爾目能明爾手能強爾氣亦醇正不偏則可以三品徐調之可以津液徐咽之勿執著勿怠忘時而然日而然而月而歲亦無不然則雖有萬條之線千針之孔當必個個穿之也古云玉磬聲聲徹金鈴個個圓此之謂也陸地行仙之道思過半矣太上神威真元顯應關大天君大天君諱羽全職曰督理萬法宗壇考校職員升降綜貫丹書黑籍伏魔收崇大元帥玉書曰敬稽天君於辛亥年九月涖玉壇自云大願未滿尚欲輔佐仙子立功陽世至辛未年十一月復膺玉命涖壇監法又於乙亥年五月請頒都天符法九月又請頒北極寶懴丁亥年八月又頒伏魔十二靈章是知天君位證右垣職同左廡巍巍乎大願弘而成功溥矣關天君曰至道浩浩萬天同光去欲存真神識堂堂於魔何有於崇已藏出入唯諾眼定正韁五塵不惹十善斯臧迷開謬解昻首春陽今日訓子等正性工夫須要勇往直前方能成個道種若一起念頭思東顧西便落歧門不能親授正等正覺所以三教大聖人莫不先以正性為宗儒道教人復性復者復其固有不為雕飾故作忠成孝一觸即現不待轉念思維所以三十三天中由忠孝而證位者不少此儒道正性之門也佛以定性為主性待心而動又隨心而滅直將此心無動無滅才是菩提所以禪流入定時先要一念不念然後反觀五藴洞達妙慧方開故慧從性生悟從定出慧以普濟真慈悟以直超淨界此又佛家正性之門也至於元始天尊於黍米光中包含萬化攝度大千其於正性之功瀰淪莫測有三等教人第一曰圓性圓者無所虧缺上天誕𢌿斯人本是天位分身親為化度説法以接有緣故觸處無礙隨在應機緣成之日復返天位第二曰明性性在先天心居後天既入玄宗知性功在先心功在後時時守一存中將假心盡情除去方有真心發現可以超凡入聖可以行法濟人外丹既成內丹自就自然光明裹護直達金闕第三曰因性天尊憫念衆生既不能如圓性之人四果謫降又不能似明性之人斬斷情根只得以因字勸勉之因者依也天生一人原有天良依附他只因聲色貨利時刻紏所因之真性日就衰落將來下鬼一沈天光難近所以玉光聖師開壇廣教傳經垂訓無非要人存個性胎上以乘光闡教中以接度慶緣下以免得虛生浪死所以又將因性功夫指點中材然由因可進於明由明可進於圓只在自已致力非畫地以限也鄭子樹璋昏昏默默原是大道根本但昏字底面是個明字默字底面是個慧字有了明慧在中不要把明慧播弄故曰昏昏默默太無中汝不昏昧將何所得乎蔣子坤大壇難遇大法難堅必須發得真進真慈方不負子宿生大智何為真進凡有為法須要看是空花不著於心不厯於目心心步步是玉光聖師方不為外物所誘譬如行路一般若一步不勤此夕便不能安息一步不前此夕便有無限驚惶存了這個念頭道何由而不進何為真慈慈者兹心發現也兹心本出天中一毫無染一毫無滯所以結得一個慈字天尊全體此心傳經示懺濟死超生總在大慈中發出可憐欲海衆生不知兹心即是聖心任情顚倒恣肆妄行心為賊滅或當生受報或來生受報憂悲苦惱難述難殫受報衆生只因不去顧這慈字是兹心件件背謬心已非心又結了一個悲字所以天尊慈心是欲救衆生之心悲心是見了憂悲衆生説法去救衆生之心也故法中之言或激或勸或解或消無非從慈字發現習法者身代天任口代天言寧有心不體天尊之心而可以膺法職升法座乎關天君謂顧廷玉曰壇中有志於道得如子者能有幾人惜乎願未宏也心未澄也氣未細也人能自知其病方可發藥願未宏者病於無力竟不知力從志生志堅則力自副心未澄者病於念雜大凡念頭是殺心之賊不但妄念不可起並正念亦當絶之何則正念才起妄念便伏兩念交戰那得更有澄定日子終身成個鹵漢結束可不急急治之氣不細者病於精浮也精充則氣靜氣靜則呼吸自綿欲知綿息之方須養三田之水水盛則土滋土滋則萬物遂長丹經所謂培土築基怕逢金削是也總之氣也心也願力也總要基定得好記之關天君曰聖光遍達無明不屆人遂五通即能契合五通之精兩瞳之英左日右月回照天根五通之神絳臺之君平治六府臨涖天庭五通之氣周環斗星明則迪吉暗則捐生修是三品晝夜存存微而若蟄動而如雲不沾不著三顧三停上存紫微護我身心中存玄武衛我生門下存白豹斬我業根如是一期五通化形五通上飛謁帝凝靈五通下救濟含生是名五通丹成鼎烹三三九九平步天程淸靜玄通是為玉光弟子所謂玄通者即五通也夫可以成通者有五可以成通而能決志進修者亦有五一曰神定神者通之基也定則基堅所以大道淵微唯誠朴者能人之小慧者不能也一曰氣淸氣者通之本也淸則本立所以道雖高妙而寡欲者日近日親而多欲者日遠也一曰精沖精者通之源也沖則源長所以道法深奧必藉精英以貫之必賴精明以洞之必賴精華以發之若多思以敗其英多言以耗其明多欲以折其華三者不去通何可成一曰志專志者通之幹也專則幹實所以能修道者不阻於境緣不染於物欲不馳於玩好不紛於動作聞道則思以身行之聞法則思以神悟之如是行之悟之既久自然於平平坦坦之中化現千神萬化專之效也而志雜者不能也一曰慧沈慧者通之體也沈則體固體固則光堅光堅則障泯障泯則質化質化則神全神全而五通成矣所以月九真經宣演大神通之道必本於凝慧體元全遁還童也若使有人初皈我壇慧心未沈慧花搖動未知曰知未見曰見不能聞一知二便曰一隅三反矣未能窺豹半斑便曰全牛己解矣如是之人真患慧病不知玉光大道何等精微高妙而可以小慧測之耶故成通之子必大智若愚大明若昧大巧若拙大辨若訥所以然者通非沈而不得也黠巧捷智豈能成哉夫能決志進修者有五何也五愚之人也一曰入世愚愚則入而不入韁鎖易脫而不堅也一曰謀身愚愚則自待菲薄少營少戀奉養不纍其心而嗜欲淺也一曰信向愚愚則信非所信向所難向人皆疑之我獨不移人皆嘲之我獨不搖心志專一神通自現一曰修為愚道形於上其實在心道妙於神其機在物愚者不知形上之高妙故不騖遠但知形下之真實斯能力行則成通之門也一曰見道愚見道者本無所見若執見為見於道體已離唯真愚之人心已合道而不自謂合道也道無盡其修為亦無盡其信向亦無盡於信向修為之中初不間一見道之想如是工夫純熟自然一旦五慧開通五通現前矣或問五通五慧白真人曰精也氣也神也三品合一成小通三品化無成大通若上聖高真不待有形而一不待有種而無故曰具六通五慧之具在我先天元氣氣具五行每行不損即全一慧而土為行之根命之蒂修道之士善守刀圭方能發生四氣印合四時貫千古而真身自在者先培土氣是也培土之氣唯在土上加土以厚築其基土培矣培而不化終為頑土必藉金以鋤之方能發榮滋長故曰刀圭人身四行易動而脾土最靜以靜制動如川之流而不止也以動養靜如山之峙而不騫也所以黃庭為身之膏腴水耕火耨須要按時方能收穫不然稂莠雜之精不能固矣潦水傷之神不能旺矣旱乾及之氣不能敷矣訣云密密密功夫一點中黃出黃婆撮合未多時朱嬰抱得金雞立立基也又訣云蠢蠢無知才學仙朱嬰在腹要回旋朝吸春曦宵吐月坎離先在震宫懸脫胎也玄功盡矣
