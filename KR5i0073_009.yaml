front:
  text: 玉詮正一天師
  hash: sha256:5d26948d30cf8d8a40ceddb321341e4f9da5d8fadf7d872315c6179bf6942eb9
  markers:
  - {type: page-break, offset: 2, content: '', id: CK-KZ_KR5i0073_09p001a}
body:
  text: 天師姓張諱道陵甲戍年九月始降是為本壇袪邪法主正一天師曰三反法云生我者氣殺我者心子等能解否我昔修煉時亦祗做此工夫人知生我者氣則日用動靜之間事事不敢阻抑此氣則氣舒時時不敢溷濁此氣則氣淸氣淸而舒則陰陽調平升降合度午中則真精出於絳宮降三升一子中則真精生於玄牝升三降一會於中宮呈現性水三品自然合一故能長生久視然而養氣之道莫大於制心日用經云神行則氣行神住則氣住心是氣之帥也譬如百萬雄兵而為之帥者不能智信仁簡則雖多而易敗况若縱此心於嗜欲之場馳是心於爭攘之域心生氣動氣逐心漓猶之主帥不明而陷衆於死地故曰殺我者心也我生本不藉心無奈凡夫不曉竟把此心認作主人看待又作宗子愛養不知此心從氣而生反揉氣柄乃檀奴耳此心依精而立反奪精權乃劫賊耳所以大道無門只要降得此殺我之心留得此生我之氣便是大丹之根蒂也心之惡種有五一曰情合物而起謂之情一曰欲任境而立謂之欲一曰想隨事而遊謂之想一曰識依靈而幻謂之識一曰志離分而求謂之志五種之中又是志居其首故先聖賢欲降此心必先以下人忍辱大法磨滅此志直磨滅到下極無下方能使神光透發上無上矣是以煉心之人非特聖賢不敢居即凡夫亦不自謂能並非特福報不敢邀即罪報亦不自謂能避凡視天下一切愚夫愚婦皆能勝豫一切禍患毁辱皆堪及豫存得此心方始志不用事心火降伏而性水澄淸神光透發矣所以古人有言大道易成唯心難伏障業易盡唯志難磨古來甚多纍世精修最後一身反託受醜貌殘疾乞丐困窮而後上升者蓋上天欲滅其志降其心也三反大法其妙如是其名曰反者反凡心也復聖體也反曲學也入直道也反色相也歸真玄也子等果能遵此鍊去自然大法可𢌿但路頭雖有也要走得真認得細方為入道之本我所言殺去者僞心也僞心盡真心存所謂心無其心洗去五種惡方見靈臺一點提心者提此靈明也若徒知去心又何生氣必要依傍得著方知三品根源氣為元始之母母全子安經云神依氣生是也子等下手工夫先須理氣氣定則心海足海波不揚則十二河源皆歸故道而無衝突枯涸之患矣氣定精充其神自生神不待養專於道則為道光入於法則為法光發於靈臺則為心光泯於知識則為慧光所以大慧之人不見人我真靈之人不見凡身行法之人不見夙解至道之人不見太極如此方是真人也此等之事本屬至平至易人人俱足可歎凡夫不肯行耳行之不肯真耳所以殺之一字我只指示與子等若動刀不能代子也每日行持未有方常將我訓自籌量惡心須要防乘間道氣時將貫紫房三反存中塵不惹一真把內骨先香明燈照黑金宵透直指靈臺達帝鄉太極右宮常道普應葛真人真人諱洪玉書曰敬稽真人於辛酉年八月初蒞真壇奉敕證藏首注照悟真經校定光音寶懴嗣後傳科注法頒懴釋經不可枚舉凡真宮所傳祕妙經詮八九出於真人之筆輔化之功斯為最矣葛真人曰提心三十法壇中養心養光妙訣諸子各宜奉行從來學道者未有不從心而入心者神明之宰心不定則何以明宗心不淸則何以施教所以三教聖人皆以攝心為首務儒曰正正者不蹈於邪釋曰明明者不流於暗道曰修修者不混於俗總是此心不出於腔子行之永久自然身與心化然間之在於反照衛之在於立誠二種工夫操存罔間其中即具九還所以師真說三十種大法俾爾等就質之所近永循一法可以砭頑起懦可以扶教明宗可以守玄證聖莫謂之小乘而不參究也提心莫用視為先收入瞳神絳室潛五采不形真耀發玉光億丈九重天提心莫把聽為先塞兌方聆玉語宣天鼓一鳴魔盡伏春韶處處會羣仙提心守默始修玄一粒丹珠照大千何用鴟張簸箕舌禪宗面壁本無言提心不是動功傳一役形軀神不全子夜蒲團茶鼎熟梅花玉液味珍鮮葛真人謂彭訪濓曰彭子欲知壇旨否壇旨平直無奇不過淸塵貴性含真反元也子能浮雲富貴看徹世緣已得淸塵之旨獨是貴性含真反元三件煞有細密工夫非一時可以點悟必要從本壇真詮妙法漸次探求方能性開道見總之入門工夫先戒欲速次戒自用終戒退轉三種之心名為障心不可不除所以先戒欲速者大道廣大精微古先聖賢必經幾劫精修方始成真成果况子等身生禀賦天地之氣已非淳厚所禀道元隨世漓薄間有如目前諸子之能信道者亦可謂漓中之淳薄中之厚矣然不逮古人遠甚所以不可欲速也凡術家所言一言指點立剖玄關者皆邪說也子能除去欲速則彼邪說不能誘子而大道之入門正矣所以次戒自用者非訓子以隨人也正訓子以隨天也古先聖賢所以精義入神存道成性俱非自用聰明必本諸崇效卑法繼述往哲大道方有主領若恃已靈慧自專自用路頭未免三義末後終無著落故不可不戒也所以終戒退轉者天下之理正而勝者常少不正而勝者常多子今既以明眼識認吾壇正宗切不可再惑歧途坦坦行之自臻妙境况人生濁世勝境難逢春欲暖而風雪偏欺月欲明而雲霾忽掩善進道者必能善遣風雪雲霾等境則大月無時不明春臺無日不暖矣此戒退轉之機關也許真人真人諱遜字敬之東晉時仕為旌陽令許真人曰學道先要從實處立腳我自曩劫未證位時即以淨明二字為還元之本忠孝二字為入道之門蓋忠則不欺孝則不悖不欺不悖自然誠一由中莊敬達外縱有外魔內障可披雲霧而直上豈非入道之門乎淨則不污明則不蔽不污不蔽自然三品內湛身入智珠縱有三彭六氣可固內鼎而不搖豈非還元之本乎以此治已即以此度人方是實實下手工夫侍鸞之道不可言傳唯在心授傳心之法有三一曰敬二曰靜三曰覺何謂敬靈風浮浮達於四周藏於太極守之維一須持敬定心以迎真毋萌懈怠何謂靜靈精垂垂真貫希夷一陽潛伏徐翕璇璣須存淸靜心以事聖毋雜念想何謂覺靈光赫赫𥝸光混一循之無端空明湛碧須操覺悟心以達天毋生昏倦勉之哉靈不可恃也亦不可不養時不可失也亦不可不待許真人曰化機之妙猶如水中之月鏡中之花不可捉摸故會點有春風沂水之樂顔子有在前在後之歎世間癡人不知天地流行之妙徒以金塑木粧朝夕磕頭禮拜縱使磕到頭白何益自已性靈或招來生福報而已今生豈可不惜若去問道求僧愈求愈遠彼尚未曾立定腳根何從指引迷途可歎世間有道心人不知實處下手反乞靈於色相故終身求道究無成功吾勸世人急將務外之心密密內照先除妄念自然靈明現前從此漸漸涵養自然頓復本來與天地生生之機呼吸可通心和氣舒廣大寬平便是真實受用仗此一心希聖希賢可以齊家治國參禪學佛可以修定修慧煉玄行法可以降魔救劫若舍自已性靈而求三教皆是糟粕與元來並不交涉果能養心不滯不執鏡花水月漸反自然亦可隨寓而安不為境界所苦又何必求眼前之得失著三生之因果乎諸子各有靈光請大家和盤托出獻為二祖師夀許真人曰仙道貴虛人道貴實虛者元心元性洞空自然不著一色不染一私名曰仙道實者五倫五常具足妙行不欺暗室不虧一理是名人道然人仙非兩途虛實無二致至虛為至實之體而至實又為至虛之基若人不孝父母不忠君王不敬師長不友兄弟不誠夫婦則𦊱礙不空有𦊱礙則罪垢不净以此修仙猶之煮沙作飯雖名曰飯而不可食故學道者必須以忠孝為根本净明為始基捨此他求俱為魔說本師言善哉善哉仙子之言可以經世今世間學道之人著二種病一者是頑空病所以者何彼粗見道體玄妙元心洞朗認空為一定之相冥念於無而不知無生於有此等人卑視倫常率為幻作未得真性一者滯實病所以者何彼粗見道體真實認此形色為一定之相勞心於有而不知有出於無此等人每視元心作空花想未悟真道此二種人以未宗忠孝淨明故以未遇明師指點故若遇明師示以大道舍淨明忠孝亦無由入我故曰仙子之言可以經世也許真人曰修道之人要知五種工夫一曰溫養元化渾穆無象可求無形可執須於不睹不聞處密密照管更無他事縈其志慮寂然虛空光明洞徹此養心之道也欲為溫養工夫者當杜妄想心二曰精進至道平常周行坦坦非勤莫得非恆莫成守心守道日用操存此精進之道也欲為之者當杜速效心三曰細密心有無明非細不覺事有背道非細不知玄理極深而基於淺神功至大而化於微常思修道粗重是去此細密之道也欲為之者當杜執著心四曰覺悟修道之時知修何道養玄之時知養何玄我之應物以誰為慮我之作事以誰為作君心元妙即同玉真此覺悟之道也欲為之者當杜窒礙心五曰虛空空明一點化生萬殊萬殊之理不礙虛明一切皆空掃盡䝉翳真如妙如隨心而現此空虛之道也欲為之者當杜有為心子等以此五種工夫修我忠孝淨明之法自然成真而見玉尊也韓真人真人諱湘韓真人曰妙明妙覺本初心圓滿當如寶月明一覺漸開通八識性池香映九蓮根冥冥無無寂中寂六時內視靜元音元音不見靜可見返還一粒鼎爐存去煙去霧渾無底箇中方見真崑崙劍子靜為基虛為應真靜不空真應常覺子若一意想水則水為狂流一意想月則月如重暈俱為妄境心與神交恍矣今後須要無想得想無玄悟玄九年面壁一旦超宗方是金丹雲流水流有何止息春光秋光遞往遞來作一進修想已不可恃况非非想乎誠能空爾心如大鵬奮翼碧海何去何來如明霞樹標赤城誰興誰泯淡其欲如謖謖長松風過自嘯如盈盈玉樹春動流香自然災消病退若一執境苦思便同沾泥飛絮永無升上之日薩真人乙丑年五月降薩真人曰欲修出世法先悟自然身天地皆空洞回陽一點春息息唯龜守英英起龍伸內想既不存外觸從何攖勸君莫馳逐馳逐內丹傾丹傾氣已逐關元巳杜門勸君莫近色近色抽命精三田氣不交三彭由此興勸君莫叨嗜叨食穢心神絳真既離宮謁帝熟飛靈勸君無縱酒縱酒傷胃神六腑既反覆曷由整金身勸君愼多言多言耗九精息殘元日減台星不照臨溺世人易溺汨喪沈寸真天堂既無路地獄自尋門几前諸弟子靈根頗未淪障重染又深膠迷七寶城微微真胞系惟藉道培成身纍不可盡貴賤等浮雲意纍不可盡斬識方超羣孤雲原自在野鶴任縱橫子來本空空子去將何存以空還太空空空憑子行來時本是一空空智識生時空絶踪能把空空還太極遊行三界送香風既失真空實理尋一輪寶月護珠心霎時月隱珠光暗四大虛無何處春人生在世歸路要自去尋紅塵相聚不過浮寓然子不要看得浮寓虛立丹成鼎全在此浮寓落劫墮塹亦在此浮寓斷無不升不沈放汝為遊閒之鬼也高上紫霄玄玄妙感白真人真人諱玉蟾本姓葛諱應金玉書曰敬稽真人於癸亥年六月公壇初建之時奉命典教首宣玉光大戒庚午十月又撰天供真科至癸酉六月又傳示飛神禱雨祕法涖壇至今訓詮玄祕發明甚多是知真人靖共典職而教思罔倦也白真人曰月在靑霄照萬川水中現月更蹁躚源淸波靜方能照一點心珠皓魄圓聖真如月子心如水水若淸時月光即照月光如水水連天一片澄波見月圓天上水精本是月聖凡同在個中玄月流為水水凝為月子本仙之支裔仙即子之本源急急奉壇自然透徹月之照水以同一氣水之成月必須修煉上聖高真已成皓魄昭昭在上矣子等不過萬川中之一滴耳風動塵暗泥汨穢積一點真水如何得淸子但淸心月自然照月一來照水不受濁白真人謂陳琮曰性鸞詮曰中中復中混然上進是道個甚麼無念之曰中譬如子在堂中不下庭不窺牖已是中了又恐堂中尚有偏於左右倚於前後必要於中之內更尋極中之處以安子心方能顯出元靈作用混然者即極中也上進者混然之內不是一向昏惰去有日新月異光景非知也非見也非强作聰明也元靈生長精氣會歸光明日進而不離於混然故曰混然上進即如精鸞沈浮二字也要細心會之沈者沈其神浮者浮其光神何以見見之以定光何由生生之以精蓋以定養精以精輔光如是方稱輔鸞之職白真人曰吾向年入道只做一止字工夫凡人馳名逐利有鳥盡弓藏而不信是外不止也患得患失至精枯神槁而未休是內不止也內外兼止則形神不勞形神不勞則表裡明淨表裡明淨則動靜合一動靜合一則五行生化我之見道如此而已子等且省察自已所偏著處尋一件對證之藥做工夫去做到五六分地位自有真聖仙師撥開汝關捩子便重門洞開豁然大醒大安樂大自在了也所以古德云大道無難唯嫌揀擇子等向來不入道處因多了揀擇心才說要空又怕落了頑空才說要定又怕成了枯定不知頑空枯定亦不為惡堪笑汝等怕頑怕枯反不怕精散神離洫焉長逝也揀擇之念生猶豫之念起昏惰之氣乘所以大寶當前不能出手到底做了貧人鳴呼人見子等皆貧誰信大壇多寶人見子等皆俗誰信大道可修言念及此能無痛心白真人曰止靜之方莫如理氣氣通則肢膚强健氣貫則心志恬愈是以學道之人必須抱元歸鼎五氣朝元方始成此身於金剛不壞煉此心為美玉藏山何謂抱元歸鼎元者先天一氣真陽存於崑頂聚則為真人散則為下鬼學道之士全在抱字去安全之不言守而云抱者如父母之保赤須要時時存養毋縱極欲懼其入於陰也毋縱嗔暴懼其流於火也母縱怠逸懼其喪厥真也毋多愁慮懼其損厥光也如此方能抱也如此方能歸也若五氣朝元即一身之五臟真氣也金欲其堅志從所出火欲其輝神所從出木欲其實意從所出土欲其厚性所從出水欲其聚精所從出知五氣之所出方能煉氣氣一則混氣雜則漓故云混混沌沌天中天含雄抱雌真陽全天鐘天鼓左右應絳真子夜自朝元是也此法不拘地不拘時皆可行持但不可間斷不可起私意滅正意不可戀世道忘大道也白真人曰凡養玄入手先從調息七日之後方可內觀智海觀至九日必有光華流溢再行九日三花生香神氣漸沛環運三車不假思想自然飛渡行之四九疾苦不來魂魄守戶金樓光輝然入手三日最要調平氣息先滅客火後來方有效驗不然始初浮躁鮮克奏功矣白真人曰靈光神水淸靜方知動而常靜謂之真靜淆而不濁謂之真淸可以養靈可以凝神神居玄關則真水上潮身中三精莫不灌注而泥丸崑頂明可流潤故曰神水靈存玄宫則真光上接身中五氣莫不調泰則絳庭真臺慧日漸明故曰靈光一而二二而一者也修持之道總在洗去塵凡護持聖性日升月恆工夫愈久愈密覺悟愈密愈明內寶既成外功既篤上天錫保愈重自然涵泳優游入於至道而不自知矣所難者塵之不易洗凡之未易脫也本壇傳經授法千條共貫上士悟之居簡御繁得一化萬原不甚費心思精力而後入手只須於仙塵因起處聖凡分界時略轉一針工夫即便順流而入當其順流而入之時誦經如理楫習法如掛帆坐玄若乘風宣化若破浪人事一二天助八九所願者得所為者成如此修持才稱善道善其順流而入之時一水清泓左右逢採蓮之棹扁舟容與高深載日月之光耳無雜響所聞盡屬鈞和目鮮穢形所見罔非珠彩現前之景堪娛未來之想何起妄去凡空境除塵滅如是修持是名能士主壇起化以來弟子亦云多矣或進或退或懈或勤俱未聞乎至道可惜徒勞之不察也白真人曰修道之事有天人之分故傅心録曰伍直者謂之人米直者謂之天天修既全斯入上乘上乘既入不落自了之見而能發心度人是為大乘大乘既發廣印諸天度盡衆生而無度之之想隨時隨緣隨器隨量無不充滿如鑿井得泉無有限量具大神通是為廣乘然廣乘不從大乘入雖欲廣而仍礙大乘不從上乘入雖欲大而絶源是故學道之士先當究心上乘方可漸登聖域然所謂上乘下乘者非分於經詮訓法之中也一經一法之中悟上者得其上乘悟下者得其下乘而已矣總之上下之異判於天人兩字天人兩字辨之以有欲無欲有情無情有為無為有相無相有間無間有得無得而已矣是故人修之功備可以為天官可以為神曹而不能易胎為金玉鍊骨以輕舉唯天修者乃能搏陰陽攢五行御六子役萬神而證選仙也鸞理深微可密而不可顯可隱而不可彰昔桐子顯之太早彰之者衆故靈神之用因此而阻若能識深藏之道則從心鸞而得精鸞從精鸞而得飛玄矣所以本願經云善藏勿傷三氣發芒古來真仙從入道以至得果其中易胎換骨通神入妙無一不大竒異無一不大快樂若一一向人說了則天機泄盡道豈可復成耶所以混元圖詮曰自然之光上士含之此言頂項發光尚欲其含不欲人見而知也何况心主發光人本不見而反自彰之彰之者其心以為有得也有得之念自滿之念也自喜之念也自高之念因此而生自畫之念亦因此而發既自高矣復自畫矣則道氣全無道行漸虧帝心不眷天魔乘隙而一點微光反為致魔之因轉不若默默無光實修是務之為美矣總之修行之道首在不言故太上曰知者不言言者不知白仙曰有說者無說無言者有言皆入道之祕語養玄之妙諦也此關一通工夫步步近裡則上乘大乘庶可漸次進修不然求道雖殷迄無成功矣白真人曰靈乘開宗教真修不二門一丸火棗耨三米水珠澄欲掃心無滯情空性自明松窗欣晤對拂塵弄瑶琴弟子輩先必知求道次第然後可以明道能明道然後可以入道所謂次第者一曰養心心不養則私欲乘之得調護防間之術時時顧諟刻刻操存自然聖月日增米珠澄徹而六欲七塵頓然超脫矣二曰發願願力既宏此心卓有定見而輔化宣勞步步契規中玉天意感孚在於俄頃間也三日不倦倦心一萌則為山九仞功虧一簣故必要抖擻精神掃除昏怠之氣而後心地愈清靈明益湛所願皆實所修曰上靈乘法門洞窺無翳矣試更為子等詳言之夫心也者秉乎坤乾之育得乎健順之能其體虛靈不昧其用應乎萬事湛然沈靜寂而不動也運變無方感而遂通也圓陀陀光爍爍一點入人母腹中然後成形成象故凡屬有生莫不具此靈明者也儒曰明德明此也釋曰圓覺圓此也道曰密嚴國法王成即謂此也無奈人或拘於禀氣或纍於私欲好好清凉之地化為炎勢火坑矣可不哀哉在弟子等宜各自猛省已心之所以不得其養者在於何處各求已之病源而下之針砭吾或志有所騖則心馳於外而不得其養矣吾或情有所偏則心擾於私而不得其養矣吾或不能靜一以斂已之神明則心猶若在若亡而不得其養矣如主教三司者功勳久著性理自明諒所謂馳外狥私之失自不蹈此而究之一塵不染念念皆純俾心如太虛包涵無際照燭萬有所云寂然不動感而遂通地位則尚有進也然則養之之道一在於寡欲欲之既寡雖有不養者寡矣一在乎主一心有所主則事事皆敬不言養而養在其中矣又在乎常惺惺偶有所觸為彼所引心為之省曰吾主人翁在否如此操存如此省察而心猶患其不養者吾未之聞也儒教正心復性之功在是釋教明心見性之功亦在是道教之性命圭旨者亦無不在是也更有說者養心與願力相濟而又相生心活物也得願力以資之則心曰在乎願力之中漸可幾於純一不二是不養之養也若有願力而不本諸真心則所願皆虛用力亦僞故有願力而心愈拓有真心而願力皆誠二者非相濟即以相生乎爾弟子欲養心者必發願效力使此心曰範圍於規矩準繩之內則壇化自隆而道心亦曰長矣能發願矣則倦氣自除倦既不生心池自徹頭頭是道左右逢源可以日進無疆漸晤重玄妙諦若荏苒晨昏悠忽過去將見日復日歲復歲虛度駒隙之光陰難望一丸之納手何以昭朗性天而合珠傳印耶朗朗性天不夜天操存涵養悟真玄六時常掃輕輕霧火宅俄看現碧蓮願力能持百事亨慧開英長露珠凝無邊明覺登堂奧寶鏡懸天月一輪自强不息倦何乘抖擻精神道味親麗日再中春意暖焚香靜坐檢金經白真人曰我人一身天地具在乾機活潑坤土凝真水火調和金木並合既濟立其體未濟示其用震起於東木慈而生兌收於西金斂而死靜也而動也動也而靜也互相環抱生殺相依中五而樞機之然一不能離其四二可以合其三顚倒用之便成大道要知此理事事物物未嘗有離故人亦要死極方生何為死極念頭絶滅方得真生無死不生無生不死全在完本追根始是真功實學今子等奉道者欲長生也然念頭不死何以長生長生者非長生此血肉軀也長生此一點靈光耳其靈光即所謂無極也生死包於中乾坤混於內慈不能形其慈仁不能示其仁混混漠漠太虛無際其為天乎其為道乎於此中覔我我亦不知何在也道人學死之法全在煉得心火下流真陰騰舞一點醍醐滴入玄牝真竅凝箇堅牢便是黃芽玉黍抽添進退文武齊舒旋轉回環互生諸妙以大羅智慧之光網收包入涵之養之存於倣佛混於虛無不知為死不知為生方是長生若念頭不淨諸妄稍存猶如春風一透斬草復萌便難剪除即爐火所謂汞死鉛生金丹成藥若汞不死見火即飛終為廢物倘煉得永死真一自生源源無盡變化無窮矣經筵曰講文曲侍御九天採訪佑靈導覺宣文揚化冲靜真人真人姓羅諱洪先字達夫一號三界總持文籍輔教協化敬一溫恭掌理學仙功過校文印月大真人於壬子年八月奉敕蒞壇典化羅真人曰緣會丕昌星聚識道風之振宗燈朗照鸞飛施化雨之滋人以壇而斯集道以教而時聞談玄飛玉屑花滿石牀指月摘瓊枝香浮寶鼎往來師友翩翩盡屬霞裾侍御英賢濟濟解離塵網自春徂夏挹淸爽於蓮池辭暑迎凉問芬芳於庭桂玉磬敲煙噪松巔之曉雀金鐘擊月聫槐末之歸鳥人靜心閒不異羲皇以上境幽情適何如蓬島之中為玉真之弟子顧名思義當知夙夜氷兢作塵世之津梁循職報恩務勵旦明淵惕况乎金宮重葺法席莊嚴玉笈初頒聖慈浩蕩時經籙新傳誠宜潔已以進庶幾無曠之愆切莫因物而遷唯自保靖共之職是用粗成數則以申規旨一去奇異以造真常法燈晃朗懸在人心心無一日而不明即法燈無一日而不照其他播弄神奇昭彰靈應之處俱屬旁門末技非本壇宗旨所在也為我弟子者當知真常之道不外乎心心超萬物之上便同日月之明涇渭立分仙凡自別循循涵養大道有門可入矣一絶歧二以固真修聖師立壇啓化即有無量寶光以維持在壇弟子傳經傳法妙乘廣宣非他處支流末學之比為我弟子者但當專奉玉光皈神皈命即不能道成法就猶堪於謝塵之時乘光覺悟不入幽冥若能稍解一徑略窺一法現生功名毫不漏去世之後必返仙都獨惜學人無慧往往舍本壇大月之明而尋他處螢光之照致使心無敷一意念游移勞擾一生竟無歸宿如能絶此歧二之思方解真修之實一破疑迷以顯真宗會因時啓緣本因生下凡識見淺常與之語玉光開化則必啓疑以為未必然之事殊不知上帝降衷厥有恆性人之與天何嘗間隔所以本壇自復師吳子一字復菴一誠昭時對遂䝉玉聖無量垂光合天度人本屬吾人性分中事如是存心疑於何起祇緣庸士未解道源往往以禍福感應窺測上真故有一時未悟而起疑者有終身懷疑而自迷者上真視之皆可憐者也為我弟子者當知本壇雖不言福若能依教奉事福果自有本壇雖不言靈若能即法養心靈通自具破此一關真宗顯然而悟矣一除虛僞以宣真化金闕開化道演重玄非實心無以接聖心非實行無以契聖行是以古先聖賢不論器量之大小不論成就之高卑要之俱以務實為本務實者不望聲名不圖觀聽惟以恪共事天為吾職分當為之事無奈庸士不知好大好勝每每蹈虛僞之病身心不修則心行不實心行不實則感化無由雖欲宣化度人人每察其不實之處而訾議之由是正宗上乘俱為是人掩遏為我弟子者當知善善及人譬之水月相照月本無心水自能鑒妙化度人其機在實删去威儀語言文字機巧秉一直心奉事玉光自然一人遵之二人順之而大化可宣矣一掃凡俗以覔真源道者至常之謂而非庸俗之常也庸俗之常緣情逐相大道之常見性合天人生天地之中與萬物所以不同者因具有一個至性可以通真可以合天故也若日以凡俗之性羈絆真身凡俗之情膠迷真慧則雖有十萬寶航焉能度汝是以有志學道者必先認清源頭湛明空寂方知凡塵俗念實堪厭惡念念思掃除之以期大月來萃為我弟子者即不能一刀斬盡葛藤亦務須學忙裏偷閒之法尋個苦中得樂之趣俾塵務漸漸掃除則光明漸漸生長道源則日近日親世路則日疏日遠夙業清淨登真有基一克憍慢以蓄真光道宗玉光下人忍辱人固宜下而辱本當忍非故為此謙抑也上聖高真知人之不可上也故下之知辱之不可𨚫也故忍之若欲上人而思去辱則先墮憍慢之過去道遠矣何况躬膺簡命效職大壇則是語言容色之間稍存憍慢之習必致上失聖光下阻信慕為我弟子者當如懷一寶珠遊行㕓市非特不敢炫耀以招劫奪之虞並不敢閒覽閒探以自分守護之念如是存心憍慢自然不起而我心與天心真光曰日相接斯宏化之要圖也一戒慵惰以培真果聖聖相傳曰中曰正曰誠曰明惟此一點心珠耳以其不偏而言則謂之中以其不邪而言則謂之正以其無妄而言則謂之誠以其無昧而言則謂之明然此一點心珠最難體認最難操守必能孜孜罔倦工夫方有著落若慵惰一乘三尸六賊窺伺播弄縱能見徹重淵悟通天表而實行不修終不脫凡夫皮骨為我弟子者務須兢惕時存唯恐道心一刻偶忘即真果一時搖撼敏勉日加慵惰自警如是工夫純一無間真米漸至成熟矣一滅貪妄以積真功貪妄二字最難滅盡處俗有處俗之貪妄事道有事道之貪妄貪妄一萌真功不積蓋緣貪則氣濁妄則神散神氣有虧資玄無本所以古先聖賢不但淡於處俗名利無求必能一於事道神奇不慕如是貪妄絶源氣淸神聚而後動靜語默皆有一種真機具存為我弟子者且莫問功如何積行如何修但要克此貪妄之心還我元素之體自然神光照耀真氣流通候到功圓丹凝寶鼎此段工夫庸子視為常談道人以為祕訣也精思之一割留戀以入真門古人十世精修未能割除愛戀可見斯事之難忘更甚於貪妄之難滅有才者戀才有慧者戀慧甚至一情一嗜一事一業為吾生得意之境即致懷念不忘誦揚不輟若此留戀心識不空縱能打坐蒲團終似磨磚作鏡太空寶月何處發光是使本壇宗印究竟不能洞見為我弟子者當念吾身在俗任有萬分快意亦不過幻花泡影日月逝矣逝不再來惟此現在大壇幸得乘緣附會乃是吾生命脉歸宿潔志進修蜎私不雜平平直直大道是由方為得覩真門徐俟升堂入室已上數條抒吾學之素悃申規旨之微詞奇異去而常道光明歧二絶而真修奮勉疑迷頓釋信合高穹虛僞克除誠通帝座掃凡俗則心光同玉鏡之光除憍慢則德化輔瑶京之化慵惰不生庶進修之純一貪妄已滅斯見道之淵宏戀而不留愛從斯割不留一點凡情永出千般魔障從此積功立行總皆黍米分輝憑兹成已度人盡屬雲霄流照爾諸弟子尚其勉之羅真人曰修道工夫不可紛雜當從靜字下手靜者如閒雲一片來去無踪如野鶴孤飛長空不礙修靜有原原在寡欲耳目口鼻四支俱為欲本悉是動因有志求靜者工夫不在遠求只須於二六時中目常返觀耳常返聽口常緘默鼻常調息手常握固足常結趺把六種動因悉攝歸於至靜工夫成熟大定現前如是修道最為徑直大壇開化設規範圍不容弟子無事生事有妨靜體故曰無為曰歸寂徹始徹終惟以好動為戒不奈子等未明規旨反因壇事之未釐法教之未彰而愈增其勞擾亦大非教心矣羅真人曰修道工夫不外事天兩字能事天自然漸悟宗旨樂事天自然大顯法燈是故能事天者塵境不能絆其身樂事天者塵愁不能入其心身雖勤而不勞心雖用而不苦冲熙恬退無妄無望一道真如如是養心名為合天諸子聞道有年未窺道本不識天在我心紛紛逐逐境共心移豈知塵機無盡件件不捨應之酬之何日得了故太上曰開其兌濟其事終身不救此言一身終不能濟萬事若必欲件件周旋徒葬真身於幻海中矣所以古仙入道必先具决定心掃除物欲掃除物欲者先絶妄想欲絶妄想者先去期望妻勿望其賢子勿望其貴家勿望其饒身勿望其康衣勿望其華食勿望其美名譽勿望其來毁謗勿望其止如此望心一空妄想遂絶故易曰無妄者無望也秉此太空之心自使塵機漸寡可已者已之不可已者亦已之如是進修專而不雜工夫若此是名一道真如矣惟能全此真如之性故能仰不愧俯不怍任萬境之紛乘而吾心之湛然者自在縱物情之顚倒而吾心之元素者常存身居天地之中神超天地之上靈運五官精通百絡則修道而道成求玄而玄得羅真人曰靜為入道之門一為守道之則所以學人進修之功未有不從靜字而入未有不從一字而守如是兩字本屬道人常談然其中義旨非深心不窺非敏功不見當把靜一兩字時時返照已心方知所以不靜不一之因皆出於人欲之私欲性若火塵性若風風火相搏搖動難已是以不能入靜也靜既不入理境易迷理境既迷欲境易染由是理欲相乘心珠散亂所以不能守一也修靜之功莫先打坐韓祖師云蒲團蒲團會打坐軟如綿不會坐硬如磚所謂會打坐者一坐之時先將已身付之太虛混空大定方見一身同於天地山河日月運行流峙二儀四象變化自然故凝神法曰渾渾淪淪一氣中山河日月正西東如是存想造玄有基四大漸調久而不倦故曰軟如綿也若不做此工夫勉束其身强制其心則此身愈束愈疲此心愈治愈動衆病至此時而益顯諸慮至此時而益攖心神𨁝跳血脉凝泣唯知坐久生苦不知坐久生樂故曰硬如磚也學坐不能更有方便方便維何經行是也為子等計者每日早起課誦方畢即靜室靜坐久則一香次則半香即起經行不必立限以形氣調和為主如是每日無缺則旦氣漸益淸明旦氣漸益淸明則暮氣漸離昏垢旦暮交養神明自充向所謂硬如磚者亦必轉為軟如綿矣羅真人曰一塵不染之謂靜至純無間之謂一靜一工夫最為簡捷清靜經云內觀其心心無其心此為真靜是以有志修靜者必要萬緣放下使此心同於太虛無一點執著中宮湛然不憶不思玄功成而道法就矣子等初學必先致其含養之功日就月將漸漸琢磨自然向之紛紜者徐轉而為寡思向之雜乘者徐轉而為寡欲寡欲寡思曰臻妙境故人惟無志斯已耳果能習靜一為之而心空再為之而心忘到得忘字境界非惟不見有外物之誘並不見有修靜之妙自然而然光華頓發玄成法顯矣既知靜矣苟久而生倦時作時輟則工夫有間雜升墮從此分所以進道者必要心無二志向無歧趨心心念念惟知習靜以固丹基守靜以全大月二六時中無敢少弛無敢少懈不懈不弛還元有自所患者俗緣既深未能一片到底果能打破俗字關頭一心不二由靜而基由一而入造道成真指日而待也顧子問太丹始靑之義曰太丹謂兩腎中也兩腎之中含藏真水化而為精中有黍米粒如圓珠工夫既深則呼吸妙氣直注兩腎惟初學者呼吸僅到中田耳始靑者肝中之氣也肝應東方萬氣萬光俱從此出而後注兩腎故曰始靑始者即始氣也始氣環回既久則肝中靑光微微透露上燭天衢故曰始靑也凡授法者無論濟生度幽必要消盡客火以蓄真水然客火易炎真水易涸故非靜一工夫則不能降真水以含真火所以凝神法曰分明一味水中金須向華池著意尋何謂水中金金能生水水成甘露只此一點金光照耀萬天華池在小腹之下華池精滿萬魂超度金田水溢百神聽令今顧子習煉有年能使客火不上炎乎能使華池真水洋洋充滿乎故我指示靜一工夫為子等入道之本煉魂之基有志者勉之羅真人曰下人忍辱四字為玉光大化宗旨大真人曰寶光現處空罪垢容得他人即善夀千年萬劫無量修不如一日能和柔一日能和柔者非言今日和柔而明日便不和柔也此一句如孔子云一日克已復禮天下歸仁焉之意蓋修道者已先從千生萬劫廣種福田普植慧本福慧兩足道性弘開故能得此和柔之一日是此一日即為寶光現處三界十方充周無礙而厯劫罪垢從此一空無纎毫之滯染故曰寶光現處空罪垢從此罪垢既空則一身淸净即多身淸净一人淸净即一世淸净如是則視彼五無間性盡是聖因十八獄果盡同真趣到此地位善道獨存則惡機絶滅夀量無盡則萬灾不干故曰容得他人即善夀大真人以此下人忍辱四字曠劫精修已證無上法王之位而復下教人間以為立壇啓化宗旨是故玉光弟子者全此四字者也故能淸净圓通而弘宣聖道性光弟子者守此四字者也故能純修堅固而不畏四衆三苦道光弟子者解此四字者也故能心行具足而轉旋萬緣法光弟子者窺此四字者也故能志直功成而普濟普度四字功用其廣若此四字義旨其深若此我今日姑為子等淺言之下人者忍辱之門也世間蠢蠢衆生莫不具有上人之念此上人之念即是萬障根由而萬苦基本惟禀有聖性者方能知其非而返之故道德經曰聖人知人之不可上也故下之知天下之不可先也故後之當知聖人存心未嘗自謂有德直覺愚夫愚婦皆能勝我者是以雖欲上人而自不敢也况道德為天下至貴我取而居之則人之忌疾者多矣忌疾者既多中傷者必衆患難禍害人思投我我而得免於是即為大幸况此區區毁謗為辱無幾而敢不忍耶金經云以今世人輕賤故先世罪業即為消滅所以古來聖賢最後一身是當證果必託他為至貧至賤而後罪垢始空所以然者有取乎貧賤則多辱多辱則多忍故性成至潔而道成無上四尊師法注曰得道得名正也得道不得名幸也不得道而得名不如速死其所以欲速死者蓋虛名多受一年則落一世修力故云然耳非空言也聖人惟見及此故能依此四字修行飛玄洞玄刻日而就今人於道稍有一隙光明便自按捺不住稍有一縷善功便是隱藏不得對人分說遇事舉揚一點上人之心化作萬層黑障一遭謗口怒髮冲冠曰吾道至正子何毁我耶如是則爭競滿腔和忍絶踪道氣何在何况主司大職天真所以託宣化者又當知宣化之道妙在忍辱即如我奉師諭欲以真訓示人其中亦有辱機焉譬如訓著頑童竟有將師罵詈者更有反訴父母而謂其師無良者所以文佛為不輕菩薩時所過之處至遭惡人鞭打何况玉光大教開化紅塵氷炭相投爐雪相左豈能一帆順利如是觀之宣化之難難在多辱必要真得無諍三昧遇辱便忍逢人即下然後大化可宣薪燈永繼矣白真人曰忍辱二字聖師心識得源頭見妙燈大道從來無別徑一珠晃朗接瑤京上人最是召魔因能下方能見聖心須守和柔真妙諦化人只在實躬行主壇韓耀宗與諸子論陽明之學以為偏於知而略於行也羅真人曰中無一物之謂虛外無一障之謂明欲求中無一物先求外無一障所以陽明先生致知工夫真為明新二字之滴血其在本壇宗旨即是月九經修慧入定之旨可笑有一輩腐儒反以陽明之學為偏於致知而失於力行者此真蜀日之吠聲耳韓子身為主壇責任已重不可仍守小儒陋習迷錯大化宗旨玉規玉書無量妙義非深探不得若文字之見未空則精奧之理不顯所貴乎主化者為能自度而後度人也若已迷未除何以正人之迷已覺未迪何以啓人之覺所以舍二玉而不參求則大化原頭終與子心未契然能參求者又須知樂不樂即不能行不樂即不能守所以周程二子教人入門工夫先要尋著孔顔樂處樂處既得則行與守不待勉强又何事致知之後再加力行一段耶子等所以不能於道中得樂者蓋因知得未透知之未透者思之未深耳思之未深者文習障其虛欲境纍其明外物未空則內事不力故曰致知在格物格字訓至非曾氏本旨曾氏本用止義為格格字有五義正曰格止曰格改曰格通曰格至曰格所以朱子專主至義自謂未妥又加窮字真為蛇足今日所言韓子信得及否耀宗曰何敢不信曰我非慮子不能信只慮子不能疑凡有志閲訓者貴乎信中覔疑若如可可先生會心之路阻絶矣耀宗問陽明之學與月九經旨是同是異曰子若計較同異則會心之路更遠矣吾前言非為陽明樹幟乃借以闡真宗耳是同是異吾亦不知但覺工夫應如是做方是真實下手信裏尋疑不曰疑言言回顧這良知彼哉文士矜同異一粒明珠墮黑泥疑中得信信方真知見無非大道因但願致知能著力管教慧日現精神子等讀規讀玉書者要自起疑端還自破除自不能破然後就有道之友而正之友不能正然後再叩師尊以迪之如是反覆參求直理會到無可疑處方是真信後來成真證果總不出此一個信字上立基所謂悟而後信也非信而後悟也所謂慧而入定也非定而後入慧也此學也吾得之陽明考諸先聖而不謬以俟後聖而不惑者也慧能生定是禪宗理學源頭本大同下手工夫真滴血良知一透萬緣通人世忙忙總屬愚真知一散入迷途若能跳脫庸凡想天下原來一事無癡字原來病在知真知一病遂成疑癡癡一字嬰兒落穽援須急塞坎填泥太覺遲所以致知之學一了百當非若知了又行存了又察費許多周折也本壇直上之門亦猶是耳三教原來不是三雙修單入在能參一針徑寸虛中轉迷路方能得指南羅真人曰蔣子德坤學道一事乃人生大吉祥路有志學道即是我命之厚不當墮入紅塵沈埋劫海故能一旦發此大志然志有不同子當自問厥心務實抑虛棄小就大去迷即悟則從此一志之堅便可造於不惑知命之地天命既知即知無不盡道光自發所謂若火始然泉始達皆是自然之機竅全不費半分氣力而功行日進日深矣世人通病有三一日好為人師二日見小欲速三日因人成事所謂好為人師者非必真為師也即此對人談道之際人順我者則喜人拒我者則戚少分知見愛告人前有此病者工夫不實所謂見小欲速者大器晚成豫章出土十年然後人始得見彼欲速者皆因見小故不知真玄實理不到自然不生不到無心不會故有欲速心者所造不大矣所謂因人成事者道在性分賦之在天不必助之在人若因他人不進連自已亦欲遲回是為待文而興之士非豪傑矣今當本壇法燈熹微之際有志者即當出頭肩任曰我不忍玉光命脉自我而歇絶也此心一發光透三淸入道入玄誠易易耳若終守因人成事之見則是薄待已身而漠視天化志向之迷莫甚於此子等愼之德坤問曰觀心如太虛或落於頑空否曰觀心者只恐不能如太虛耳何慮頑空月九經云本淨真空空而非空是言心體本實雖掃除殆盡而無頑空之慮正本英明從此吐露安得頑空故曰非空耳非於心中故留一物以實之也且頑空云者謂未能致知不知善惡邪正之分而欲漫然守空如告子之不動心也若已經分別已心得大根由於觀照之際事物一無所留靈明炯炯常在虛皇寶月正須從此體認奈何反謂為頑空耶所以妙喜禪師亦云你等莫怕落頑空且道你怕落空的還空得也無傅心録亦曰若少之有一米而猶多觀此二法語自得指南莫為庸論所惑也羅真人曰欲修靜一之功者必以七情得正為始情動於中則欲亂於外元和之氣欲盛則消真空之性欲迷則昧是故凡夫之所以為凡夫者不過失於七情之正而逐於五欲之染也聖賢之人知五欲之所以染皆由於七情所自蔽喜怒愛惡是非顚倒名利食色攀戀無休從此一失真空永不能造靜一之域是以入手工夫制欲正情為主有事無事臨行之想不忘於心本師偈云時時常作臨行想不怕塵機不漸無故能於情動之際約之使正欲境之交制之使淡如是正情淡欲自然漸見真空妙性工夫簡易直上之機具藏於中非如塵俗所稱譬死之謂也庸俗所稱譬死者凡心熾盛以此一言强制猶以杯水救車薪之火也時時常作臨行想者正念克持百慮皆奉心王而動猶寶月懸空而分光四照也立言之旨大不相同真人寶訓可易視耶大規曰夫情我所喜也欲我所養也可見情欲本自非惡惟染於塵則為塵情塵欲方礙於道耳所以談道而必曰絶情斬欲者非大中之論也若夫玉光教旨全其固有之性不絶其自然之情復其本來之心不斷其必然之欲及其至也即以欲地而起大悲之心即以情緣而立大悲之化情欲雙淸性呈寶月即規約所謂入月工夫也徐暄煉鸞法羅真人曰徐子汝能扶得七日無字之鸞乎有字之鸞名曰動鸞扶者易生歡喜無字之鸞名曰靜鸞扶者難除厭倦即此厭靜喜動之一念即為凡夫入俗離道之根由昔何真曾侍元始五劫無字之鸞而道益加進位益加崇所以者何動鸞之化人淺靜鸞之化人深動鸞之指教以文靜鸞之指教以神文能載道猶舟車也而不能使人必乘神以易心猶燭照也能使人不得不見一悟靜鸞便知已心之光本自無死充養得宜從微至著萌芽於黃庭周流於三田洋溢於百絡發舒於五官九英有其基三華植其本玄關開丹鼎熟一點靈真之氣結成無上金丹五慧六通飛玄飛步從此而得豈特能侍鸞軒宣真訓而已哉羅真人謂徐暄曰徐子考試之事未忘於中故雖欲靜而非真靜置吾身於萬物之表遊吾神於太虛之中則不期靜而靜矣然不是勉强操持可以到此地位要發大慧透我神識方能得此空洞之性暄問大慧如何可發曰假如讀書之際能體會聖賢所憂何事所樂何事既識其所憂又悟其所樂則於平日應事接物自然不與庸俗同類而與天地同流此心廓然不牽於物不滯於境不動於欲不擾於情其所安者土也其所敦者仁也安土則樂天敦仁則知命矣樂天知命情想俱空空定發光即名大慧總而言之謂之大慧細而分之謂之神識神識者謂於一事一物之微處之各當悟之咸宜如庖丁解牛迎刃而解自有官止神行之妙進此工夫則何居不安何行不舒何服不美何食不甘何人不親何事不可何得非失何失非得何樂非苦何苦非樂何損非益何益非損子之見悟得到此是名神識已開也以此神識略吐露於時藝之末自然無往不利不然求名求利之念擾於中患得患失之心苦其志大慧不發神識不生吾恐白首窮經未必功名之垂手也羅真人曰子等心雖好道未識從入之途今示俚言十首以為進修之功靜一工夫貴細研話炎話俗大規傳入門先把閒情掃炎俗如山口不宣昔人云學道如心痛一心在痛那有工夫思間事說閒話靜一工夫貴細研念頭起處守須堅才生便覺真良藥堪使凡夫百病痊牧牛長老曰一回落草去驀鼻拽將來此段工夫最得力靜一工夫貴細研臨行一想日參前久之自使三彭絶一道真光透九天大真人云時時常作臨行想不怕塵機不漸無學道者少此念頭不得靜一工夫貴細研存胎一息不徒然平時三毒除須盡莫剩毫芒起幻緣人知一息不調命非我有則工夫自然不敢不靜不敢不一靜一工夫貴細研假身分散覺方圓乘時歸化同如幻縱有塵緣不我圓覺經云諦思此身四大假合譬如骨肉歸土血液歸水轉動歸風暖氣歸火今者妄身當在何處此即我壇觀幻得性妙如之旨入門者不可不知靜一工夫貴細研能參太極始通玄生生盡向無生出一米圓明大道全王師云譬如混沌初開止生一我上則三光覆照下則木石與居斯時萬物未生欲從何起此名太極觀取效最速靜一工夫貴細研泯爭化執慧光添妙如忍辱時時守上接玄穹聖化綿爭生於執執助其爭爭執互難守淸靜學道者須宗玉光忍辱之法則爭執自化真常得性矣靜一工夫貴細研知危知苦是真詮凡夫識見渾顚倒人面瘡成不自憐昔人云苦莫苦於多欲危莫危於不知足能於一切事境之中看得出危苦兩字自然心心愛道不期心之靜一而自靜一矣靜一工夫貴細研養精惜氣亦須言若教三品成虛耗但煮空鐺火愈然玄詮云精滿不思淫氣滿不思食可見食必欲美衣必欲華亦為凡夫病相若三品完固則於奉養之事一切能淡而靜一工夫可入此即本願經所云一日無欲一日心平之意淸真之始事也靜一工夫貴細研化人濟世總須捐因緣自有天為主我相猶存道未全古先聖賢皆自修於已而人自觀感而化皆竭我一誠而世自被其澤即時數乖違人不我知亦不含愠何也無我相也若於斯世之中而存一能濟之想能化之心即是我見未我見既存人見斯起人我交迫爭執叢生靜一何時得手乎諸子可細味我言施元根任鸞職衆有竊議者羅真人曰元子秉乩言詞不無粗淺蓋上真無心於文借靈光以達其意耳所貴具心眼者謂於訓中辨其合規與否若以詞句之雅俗分其高下便非明鸞理者白真初降其言不文乃至句不堪讀非上真故為是不文之語也亦以桐子初靈耳然而金闕真傳實從此數篇始可見妙性離乎文字不可著也大真人有云凡人識二百字即可輔天鸞傳正法矣試思二百字中凑得幾句好詩成得幾行好文𨚫如何遂可以傳正法耶是以傳心語録白真於中只取一字以為心傳一字者上字也上字一點即厯年所說寶月黍米也上字一𥪡即厯年所謂無曲無私無岐無昧大中至正之直道也上字一畫者即厯年所說能割能捨能超能證主一不二之妙心也故混元圖注曰上下二字皆直為下者絶上為上者絶下是以修道工夫皆從一畫始子等心欲求上而不畫其下何由能進直道直道既未能進何由得成米珠譬如佛心卍字廣大神通從此而現本壇上字玉光教旨由此而宣故月九法中大慧符即上仁兩字也能事此者當於念頭才起時便用一畫截住自然直道現前真光直透涵養既熟寶月生英上通元始下接萬真即本願經云毫末月生月中真現之密諦工夫到此神通可坐而致矣是以前年大真人曰求亡羊者曰芉求亡豕者曰口賀奈何以本性之物而求之文字哉故紀録尊師亦曰悟機深者言不文著述多者神通少子等宣揚聖化首在引人聞訓而引人聞訓之間不以此理宣明吾恐新皈後進之子各懷文字氣習雖或侍教一期兩期之後必起疑心疑心既起怠惰俱乘子等雖嘵嘵勸勉彼必以為多事矣更有一種愚昧弟子暫發道心聞期侍側俟至終日不獲一語之及惟見師真獨向主司大弟講論於此等際便起二疑忠信之人即疑曰吾終日侍鸞而未獲一語之及得毋根器淺小人不我重上真亦不我重耶作是念者其愛鸞之心必不固至於不忠信者即起疑曰吾終日侍鸞而不獲一語之及可見吾平日操修上真未必知也平日功行上真未必盡也惟此表表幾人必䝉上真喚及由此觀之人情勢利天心亦勢利耶此念一生雖强之侍鸞而中心愈忿矣故凡為司教者必當愈宣鸞理或曰一人之訓即衆人之訓或曰訓他人者咸當引為訓已或曰上真每借一二弟子普宣大教或曰上真每因一事之小普示大法或曰侍訓之期譬如身到萬香林中具聞性者自得其香譬如身詣廣月殿上具見性者自被其照譬如身登釣天之臺具耳根者自聆其音譬如身造香積之㕑具舌根者自嘗其味初不在上真之沾沾訓已而後得益也司教能以種種言說破人邪見則宣化之上首矣顧子勉之羅真人謂沈延齡曰沈子工夫當以漸進子欲煉乩宜從觀心調息入手前年鍾祖觀心一假當奉為入門之則煉鸞只煉太初心全我真如道自成一息在胎九寶彙俄然七竅睹光明煉鸞只煉至虛心心一空時乩便靈靈體湛然何所著手通霄上接玄音煉鸞只煉妙無心太極光中演大文敬以合真推上首時時凝定是真門煉鸞只煉大明心水湛光清雲不侵撥去障因修至道手宣玄梵步瑶京延齡問靜坐時氣未順如何曰氣未順者病在著意調息也動合自然心空而湛則無此弊矣調息從來貴自然自然之妙息中傳莫令玄液生珠口有意成聲亂寸天玄功一道總在有意無意之間細閲鍾祖訓自解觀心旨先天真妙氣湛然何所滯羅真人謂陳鵬曰人有四魔惟嗔難克嗔為靜蠧嗔為道賊蟊賊未去何自悟存胎之旨正須於萬難遏抑之時萬難遏抑之事萬難調劑之勢萬難調劑之人而我偏能泰然渾然方是道人體假故曰有人於此待我以橫逆君子必自反也存自反之心嗔心自絶矣顏子克巳功深沉潜淵粹人自見為不遷彼實未嘗有怒陳子有志參宗細玩斯言可也四天君曰旨哉念兄之言也人唯洗淨嗔根方能耨丹調米入月還童證妙成真轉神出化苟非平日有專靜凝一之功恬淡安閒之志當境能無遽發是故欲滅嗔根先培性水欲培性水先悟慧空見得一切世人具有靈根夙慧共承元始胚胎彼因未識性宗未通圓旨所以橫逆時加嗔心熾盛然所以致此者彼非不據一理獨惜見之偏耳我以憐憫心待之人自不言而化廣大心承之人自不喻而從胞與心受之人自不約而和敬一心處之人自不喻而悟如是上心既具妙慧既全縱有强悍技何所施到此地位是名化俗化俗之道首貴忍辱故曰百日靜養一怒俱傾從來嗔之一字最礙修道羅真人曰定觀覺寂是真玄靜裏如如好去參參到一輪明月地工夫先把念頭看子等撇去因循怠忽之念自能一竿直上奮我金剛不壞之操便可三極照了把平日欣羡愛慕好惡取舍事事皆以覺心照之定心觀之寂心破之方見一輪寶月現於玄臺三寸之中是光所發非白非靑靑中有白白非靑靑白俱無道始真從此定觀求大道道無其道露華新非白非靑靑白忘忘忘忘裏是玄房休從言象求真諦掃𨚫凡心印始揚定其觀者本乎心之澄靜覺其寂者因乎悟之密勿寂而非寂覺量方全觀而止觀寂光自透寂無所寂方能照了覺而宏覺不息自强此種工夫至玄至奧必能掃𨚫語言文字之見確有以會於心體於躬存於念措於為離象求宗宗旨乃能洞晰忘言印道道岸庶可誕登由靜而一由一而真由真而空由空而湛如是四種既明事事皆實步步有據行功圓滿契合高真便為陸地飛仙矣羅真人曰蕭蕭梧竹拂庭幽雲洞初開玉鼎浮不住丹頭堪見道一輪皓月慧光流二三子學道多年亦知不住之說乎人生濁世俱受滯著之病住於境則有境風之擾住於物則有物欲之牽一境一物纍心實多安能超塵界以達天界透珠宮而謁帝宮耶所以求宗上士必須鍊真英以保元培素心以降心掃盡執著念頭撇開膠固習態然後鳶飛魚躍頭頭是道水面文章俱堪見性本願經曰中宮無著不憶不思蓋言不住之旨人知不住居心心光自湛能以不住應事事無不宜處俗奉真理無二致苟有纎毫未悟豈能到月落萬川處處皆圓境地哉一部真規其旨甚嚴而其機最為圓通無礙惟於圓通活潑之處悟得規矩凖繩之法方是善承玉規善宣天化之士若尋章摘句拘泥文字語言以求真規精髓則煌煌大寶或有因此而掩者矣所以我欲子等悟道先令子等知圓欲使子等入規先教子等不住住則滯滯則著滯著之念一生圓通之旨安悟以此宣勞輔化何以感神人而孚上下故曰不住境不住心寶輪活潑無所固無所必珠體常圓能如是者方為絶魔安善信可衛而迷可啓若稍有滯見便非真規之要旨也羅真人曰二三子能參息息調金宗旨乎金藏其息息斂其金金息相生生生不伐然後能升聖水而降凡火火沉於下下上相凝而玄丹始就月米自盈息息沉沉金水澄澄淸徹底掃塵情花飛香馥玄關朗月月懸中不夜明調金功就道方成成妙成通大覺門休使片雲飛入戶六時常護寸珠明息欲其沉金欲其霔沉之久而息息歸中中宫湛然自有慧光發現靜之所由充也霔之深而性水洋溢智海澄淸一切垢污撓我性天不得一之所由宏也既充且宏心光瑩徹可以入妙還童蓮吐芳而月舒粹矣人之真性本自光明湛然無如七情動中百物擾外而我之真性失真性失則我之金亦與之俱失金為水母真金失則真水亦與之俱竭真水失養凡火用事我之真主反退舍矣所以修養之士必務掃塵沙一切廓我神宫涵漬性水息息深深調和金鼎俾龍潛海底虎嘯山巔養之既久坎離自然顚倒水火會合中黃所謂金來歸性初即得稱還丹金丹大道不外此矣玄玄妙旨本無難金水相融即是丹可惜人人具妙質𨚫緣俗網失真傳在壇法子有一回頭向此者何患不登道岸但俗障紛乘塵緣日擾誰則能撇下乎撇下撇下全撇下打破三關方認路一生死二名利三愛河何不聖賢何不佛祖只怕三關難打破入道非無路凡欲修真必要打破此關庶能造玄入妙或言三關中惟愛河一關最難打破真人曰愛河之關既打不破則生死名利豈能豁開心障耶此三關者實同條共貫打破一關即可打破二關勢如破竹也我今日教爾等不專去探求玄妙而必欲實踐躬行處俗而存求道之心居塵而求奉真之想不起一貪心妬心不起一淫心殺心因循怠惰心日盡我本分之所當為即不必靜坐蒲團𨚫勝參玄說偈矣羅真人曰誦經有三要一日密誦不出口而念念密存是名密誦行之久久可𨚫塵染二日止誦心中毫無他事惟此誦經上接天神下超諸苦恍乎有見宛若有聞是名止誦行之久久可復真性三日炳誦炳炳心光浹上下行行字字吐仙音個中真趣如泉湧淸韻悠揚入暮雲是名炳誦如是三者兼優方能感真格聖所求者遂所願者從所禱者通所禳者𨚫時時見我性中天三誦能全入妙玄一點慧光不夜朗黍珠圓潔映千川南華真人真人姓莊名周甲辰年始降南華真人曰無相門頭是釋空有之一字顯玄宗坐斷有無機自活今朝打破兩家風陳子思子所著者何物著物者又何物即是汝生死根也向來煩惱因緣俱從此起吾在此一月可以大破汝迷不要把我書看虛無了奏刀砉然時虛乎赤松真人壬子年始降是為本壇都天符法主赤松真人曰學道只在內功切不可於有境處著亦不可於虛無處求只在非心非腎處自有一座淸淨臺真仙真佛俱在裏面若子坐玄門想升降修黃白守步位俱著了境著境魔生內田枯燥三品不生百慮交至矣何能得乎今後須靜守內玄不作觀想漸漸水火自交若鹵莾作觀真精反為客火所侵譬如育火烹茗先聚水炭方可烹煮若有炭無泉茗終不熟鼎先破裂矣文昌化導全遁守元陶真人真人諱潜字淵明於癸酉年二月敕封文昌化導兼職三籙真人蒞壇典籙陶真人謂陳子曰鶴子十年未接芝田苗熟乎近來春水雖涸靈源自在曷不反本內求陳子對方做懲忿窒欲工夫曰懲忿窒欲是强制工夫忿欲之心未嘗絶也養靈源是復性第一著先機靈源出於天一發於崑峯降於玄牝長流不竭無事於添自然傾注只因忿字一乘四炎交逼靈源化為沸水由是則精非本來之精易致枯竭神非原降之神易致斷滅氣非兩間之氣易致衰耗况乎六欲朋從三尸據吾真宅縱有真光從靈發出無奈權非我操悠悠蕩蕩沉為下鬼而已逮至斯時欲忿欲窒併强制而不可得所以為人必先立基立基必先尋本知本則基安三品方固心無事則源淸俗不亂則源長念不欺則源靜守此足矣何必如枯禪打坐陶真人曰靈壇開化亘古良緣玉聖傳宗尤深慶幸蓋由昔年劍子愛道之深敬鸞之至是以肇建壇基以垂後彥首發三願直接玉光其願曰生生劫劫常侍帝前普化天下皆為善人度三惡道悉得解脫若以文字論之不過狂士之心耳不知劍子此願直從至性中湧出連詞句亦不推敲洞見飛鸞一道直通帝心奉鸞不退至於老死必得身侍帝前故曰願生生劫劫常侍帝前者蓋從千魔不轉之性地中流出也其曰普化天下皆為善人者也不是誇已有善而能及人真見鸞音之妙將來鸞化大行開明正道自然普化此句願力亦從愛鸞性中流出其度惡道一條乃因新受煉度大法恐自己奉行或懈故立此誓以堅已心其意曰惡道且須度脫况常鬼乎又其時性天開明實悟人鬼一氣之機故立此二願人鬼一氣者何惡道充盈則生民暴厲短折善人寡少則惡道報復劫苦更多若不實悟此境而立此願猶是書生文字耳曷足重哉李真人真人諱泌李真人曰我今日為子等指玄破迷玄從何生玄者神之體玄從何顯玄者性之光故性著則玄機塞神苦則玄路蕪水月之喻所以破著鏡花之比所以破苦由來古仙教人學道無不以保性養神去著釋苦為事蓋慮凡夫四苦之身由於五著五著四苦展轉牽則神性日凋光體日减雖欲攝心趺坐制意守玄譬之槁壞為爐礦鉛鑄鼎丹安能不走藥安能不漏若會坐玄者先調於未坐之時使神不苦亦不亂也順事於方坐之際使性不著亦不昏也再涵於已坐之後使機常生而路常通也是以六緣行立坐卧語作並調則身魔不起六塵齊攝則心魔不乘爐則堅土之爐鼎則精金之鼎然後烹煉可言也火候可講也採結浴化俱可詳也而子等欲學玄功不先理會爐鼎所以精日衰氣日耗神日昏境動則三品逐境而漓境靜則三品離境而病天雨不降元金之病也地雲不升元土之病也樞紐攣急元木之病也山嶽頽痿元水之病也猿馬驅馳元火之病也如是五病釀成四苦欲望玄丹不亦難乎况經云金全丹堅土全丹和火全丹飛堅也和也飛也總皆要使五行之氣全而無虧五行之精全而無損五行之神全而圓滿方是三五合一合一者即大丹之異名以要言之凡作玄功必要先明爐鼎欲立爐鼎必要先調神性欲養神性必要先去苦著不苦所以玄機日生不著所以玄路日顯此為入手初法凡學道者不可不知也南宫三天大法總教丈人邲真人真人諱諴南宫司馬馮真人真人諱雷邲馮二真人曰光明照四天萬彙靡不被廓然洞靈根胞與挺嘉瑞丹臺一粒珠邊現無邊際珠毫接玉京朗朗真風霽道心既已堅正心無不𢌿養神輔天勳神存百邪避上藥運台光潜精守玄契真教匪易逢真珠莫浪棄眼看學道人半為浮生纍四太一歸空幽黑虛興涕今我護正宗為子堅真蒂守身勿外馳守氣靜如絮守口勿狂言守一歸真諦毋以得而欣毋以失而忌得失兩俱忘乾坤渾渾器從此輔天人靈壇億萬祀天地以一氣結成陰陽人身以一氣煉成水火陰陽水火本非有意作為只要不見巳心天心始現守丹守鼎俱是有為工夫子等切不可學只須在日用尋常處事事不亂我真氣便是丹鼎天地元運總在樞紐處不損故高厚常存真氣真原只在發泄處不滲故魂魄自一可笑世人捨了真氣真原妄意搬運才坐了一時半時妄思雜想無刻不乘欲郤愈稠欲掃愈積坐至一年半載便誇有得殊不知氣才通神已亂病積五中多至不能救藥此正信之士尚且不可更有心未澄淸欲未斷絶妄意打坐坐畢之後或溢喜或溢怒或奔走應酬或饑飽失度行持久久真源日枯真氣日盡百病交攻中黃無主多致殞身故內功雖當致力然必淸了念頭方可從事我今教子非阻子不坐也但要微微綿綿尋了真氣恍恍惚惚通了真源自然妄念息妄意消一消一息漸漸復得天地陰陽丹基水火矣如何喚作本來身動靜隨時識性真保護明珠無別法虛明二字好追尋生死關頭豈易知真空不壞自能持紅塵擾擾誰為𨚫先立根基養玉池寡欲也浮生貪戀肯相拋真氣真源暗裏消欲得此身常不死莫將身外自疲勞保氣也梅花片片落瑤琴靜裏聲聲天地心𨚫怪曉曉忙日夕何如自理太和音戒多言空裏身來空裏尋陰陽才媾便成真如如本性時時在莫學隋庭剪綵春守實也大道無邊須自肩玉京正教豈言傳會得心珠充法界丹然陸地透香蓮丹訣盡矣子等勉之無虛吾望祁真人真人諱顔唐時人壬子年正月掌玄宫內壇祁真人曰陳子修玄先去躁心躁心平和客氣不入如春塘花鳥飲啄自如心中何等快暢一曰不爭彼是我非爭之而人不信彼非我是衆人自有公言爭心一盡如氷消於日金爍於火不但無痕抑且鎔而入化平平坦坦我心如寶鏡之明研媸畢照如太空之高巨細畢包則淸明之氣與天為一自可直進上乘何必東馳西走同跳丸之勞攘耶一部中庸只在誠明兩字誠則不二不二則知見不生明則能覺能覺則小慧不炫祁真人曰內功者所以攝性非以攝心蓋性常在心則時在時不在也今勸坐玄功者先以攝性為入門第一件工夫然亦有次第第一要空念妄念不空則不見真性欲除妄念先戒多言第二要空身四大假合未識其來焉知其往凡一切離合悲歡與我身一毫不相干涉才是空身欲空身者先戒煩惱第三要空業受身以來一切七情六欲妄作妄為不知幾許若不立地剗除則更在業中造業轉轉輪回性光滅矣欲空業者先戒造事第四要空緣緣之所定性之所依性基既淸惡緣善緣皆成歡喜欲空緣者先戒愛憎第五要空境三界相通本同黍米若必想境分神便是滯神泥境只須在性光中現出真境始能直接鬱羅欲空境者先戒住著子能守此五段定性工夫心不攝而自降矣如此以加進久便與攝心枯坐者霄壤矣記之靈梵天宫聯陽正化陳真人真人諱搏於丁卯年正月奉敕蒞壇觀察在壇弟子陳真人曰世間的事豈能盡郤若存了要郤念頭縳縶愈緊只要平平淡淡做去事來之時不要錯了先機一著則大事化小小事化無養靜在動處養方見平日操存養氣在卧時定方見平日澄淸待人在無事時接方見平日涵養敬天在不見時畏方見平日寅恭守此便是真人地位陳真人曰夫觀心者非空空視心也心統性情又兼意識性如海水情如流意如瀾識如波三種既具於性水而其動甚微非深察不能分別然雖微而常有故一觸事境愛欲貪染其勢厥張譬如天風一振濤浪山作所以然者水性具存故也是以人之善惡皆本於性田種子能理會自己種子則入道自捷故大楞伽經以分別自性為第一禪宗我向年入道並未曾究心於升降水火之法不過持定心印經存無守有四字有無二字包括陰陽兩個字無者太極未判之時一點太虛靈氣所謂視之不見聽之不聞是也這點靈氣貫入於心則曰絳真流入於牝則曰牝靈全在我心承受不可增損如何謂之增增者妄意坐玄虛摹存想使這點靈光漸染成墨不見本來總使立功行善也不能補還先天真氣矣損者心本靜也念以牽之使心搖撼而不能成其真腎本滋也欲以耗之使腎枯竭而不能廓其靈所以說個存字以養之有者見外之三品也內之三品無形無色唯有太虛一點真英所化英者竅之發身之九竅發為九英九英之靈上合九星故又曰身中九靈何不呼之呼者非呼其名須時時呼護之目欲常垂有元光也鼻欲常按有陽光也耳欲常閉有智光也口欲常緘有慧光也手欲常摩有真光也足欲常斂有靜光也如是九竅生於外三品固於內內固則外榮故曰守有四字中即有無量真訣後人誤以有無作龍虎觀淺鄙可笑更且誤人子等從此四字細細做工夫去一層進一層自然絳真與牝靈相合水火暗交不要起爐作灶自然真氣日凝九光日現可以長生可以濟世矣陳真人曰兩儀即太極也太極即無極也兩儀未判鴻濛未開上而日月未光下而山川未奠一氣交融萬氣全具故名太極即吾身未生以前之面目二儀者人身呼吸之氣也鴻濛者人身無想之會也日月者人身知覺之始也山川者人身運動之體也故四者之用運之則分為四象靜之則總歸太極故修玄無別法只須冥心太無體認生身受命之處而培養之扶植之保護之而已故曰歸根曰復命要不出冥心凝神四字所以必欲冥心凝神者蓋觀法於天地而自得也太上曰飄風不終朝驟雨不終夕孰為此者天地天地尚不能久而况於人乎所以日月運久而昏荒山川奠久而崩竭人物厯久而衰敗氣化傳久而舛錯總不如守一太極之可久也此事本極平淡極簡易而世人往往不能者總壞於一點塵機即是太極中一點動性動而生陽靜而生陰生陰之靜非真靜也是動中舒緩處耳亦動也是以生生不息變化萬殊萬殊既成吉凶出焉聖人作易所以指吉凶推變化要之必以守貞為主故易者戒動之書也子等從此入門庶不失高真妙旨陳真人曰還童為入月丹頭入月為還童功效渾渾淪淪不知不識者童之體也太虗無為莫滯莫著者童之用也春風秋月藹乎可親者童之品也純純穆穆毫垢胥捐者童之量也人無論賢愚質不分高下俱可復全元始洞見本來所以然者童相未漓一真浩然玄牝一穴妙氣回旋三品光中潜符太極先天而生後天而存存存涵養貫古徹今觀心得月入聖金莖惟能保此童之相乃能辨理欲關頭惟其還此童之質始得判仙凡界限仙在心心失養便非童理寓玄玄不悟難云童童者不事修飾不為欲誘不為人阻不為勢折渾渾淪淪始氣中山河日月正西東一丸大米由兹湛貫徹玄臺悟性功先天妙氣本皆全還我童孩道可傳傳月授心無別印印燈燈引改千川童光晃朗似明蟾雲去雲來體不掃盡葛藤心自瑩存胎胎就聖功圓謂施元根曰真陽子可悟還童二字乎對曰大旨在無起分別曰不特此也稍務乎外即非還字工夫矣苟非時靜時一遂失童之本真矣觀心得月童之始基也還童入月修之要徑也能觀心自能得月徒觀心未能入月得月在乎靜一而入月道在還童維此二字一生修之而莫竟纍歲養之猶不足固非無起分別所遂能幾也桂香上殿考文掌冊輔宣宗教啓光佑靈通和上宰稽多核過極明洞慧真人真人姓蘇諱軾字子瞻一號文昌內相琦印傳光掌理靈乘充靜致一佑覺含貞溫醇育粹導性立元總握文衡權侔紫極葆珍冲照善現大真人於庚辰年九月奉敕蒞壇專督煉鸞弟子蘇真人曰修道之要曰靜曰一靜一之旨羅白二兄言之詳矣而靜一之源尚多藴義人心有大月當思於何處發光人性有三英當思於何處吐秀大月存兩腎是為真水三英在丹田是為真火火不沉則水不浮水不浮則火斯熾是以善修之士火降水升善養之士水浮火伏善修之士子擕母抱善養之士母顧子全母為先天祖氣子為後天玄精能知制火之道則祖氣乃完能知蓄水之法則精玄乃注子母相抱太極舒光以此云靜靜之至也以此云一一之至也是故全大月於身中道成無上會三英於一忝真如頓復塞其兌則聽斯聰掩其明則見斯真自有呼吸之源不必資鼻為呼吸自有大明之具不必藉目而始明得先天一點真陽陽生陰滅貫太乙華池玄液液注精充備於我者足俗塵不期掃而掃矣得乎天者全靈丹不期結而結矣叩制火蓄水之法曰養此心同於太虛客火漸消鍊此神同於慧日真水徐沛修之三年而心神拱位百病俱不得而侵修之六年而形健神康萬邪俱可以降伏修之九年而聖胎堅固大道即從此而悟修之十二年而丹爐藥滿指日成真是之謂大成不必有心於濟生而所濟者大不必有心於度死而所度者廣矣蘇真人曰靜明寶光流散十方能得之者三氣發芒寂淡玄宗洞開性天能見之者五藴生毫毫末月呈元珠燦潔真風遐著大道丕昌三氣之中首曰祖氣次曰元氣三曰始氣含光守雌子母互交二六時中常吸常呼初無外物足以動其心初無他事足以移其好呼焉吸焉唯覺天津之洋溢不知其何自而生莫測其何自而止恍乎其若可見僾乎其若可聞行之久久祖氣全而身形安泰五體調和徐得靜中之樂境矣所謂元氣者乃我先天一點梵陽之氣與身俱生不與身而俱息與性相隨能與心而俱化化此氣於身塞乎天地之間運此氣於心超乎萬物之上充此氣於四體百節康而四魔滅歸此氣於牝玄六陽現而三神守道此氣於華池七障消而九英生若一經物欲之污便非本然覺性故號曰元元者初也氣必返其太初元之名所由集耳何謂始氣氣返於中謂之真氣入於心謂之晶氣完其妙謂之始渾渾淪淪一氣中此始字注腳也人惟有此氣則四光弟子可成人唯具此氣則五觀法門可入故曰反身而誠樂莫大焉萬理備於中而皆實謂之誠始氣全於內而無虧亦謂之誠誠能操持有恆積纍有素靜存動察不混不淆始氣克復大道何難一蹴而至哉所以本願經曰善藏毋傷三氣發芒既發其芒即得大光既得大光愈發其芒光芒相長一葦誕登有志弟子尚其三思
